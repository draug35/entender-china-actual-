n class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si el Partido puede tanto aplastar (2020) como cortejar (2025) al capital privado según le convenga, ¿quién es realmente soberano en la economía china: el mercado o el Partido? ¿Y qué significan los \"derechos de propiedad\" en un sistema donde quien los garantiza está por encima de la ley? <em>(Conecta con las Lecciones 6, 7 y 9.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué significa \"economía socialista de mercado\"?<\/li>\n<li>¿Qué son las \"alturas dominantes\" de la economía?<\/li>\n<li>¿Qué mostró el freno a las tecnológicas de 2020–21?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué el Partido permitió la propiedad privada y a los capitalistas sin ceder el poder político. ¿Qué gana y qué se reserva?<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China ya es capitalista, así que lo de 'comunista' es pura fachada.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre una empresa china (una regulación, una multa, un apoyo estatal) e identifica qué relación Partido-mercado revela.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>China se define como \"economía socialista de mercado\": un híbrido, no una contradicción a resolver.<\/li>\n<li>Modelo de tres niveles: el Partido dispone, el Estado administra y posee lo estratégico, el mercado asigna.<\/li>\n<li>Permite capital privado porque funciona, pero el capital es instrumental, no soberano.<\/li>\n<li>Conviven cuatro lógicas: capitalista, leninista, nacionalista y desarrollista.<\/li>\n<li>\"Comunista\" describe el poder; \"de mercado\", la economía; ninguna etiqueta sola basta.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 6.<\/strong> Si el Partido está por encima del Estado y del mercado, ¿dónde está exactamente el poder <em>dentro<\/em> del Partido, y quién decide? La Lección 6 abre la caja.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Barry Naughton, <em>The Chinese Economy<\/em> — manual de referencia.<\/li>\n<li>Nicholas Lardy, <em>Markets over Mao<\/em> y <em>The State Strikes Back<\/em> — el debate Estado vs. sector privado.<\/li>\n<li>Yasheng Huang, <em>Capitalism with Chinese Characteristics<\/em>.<\/li>\n<li>Richard McGregor, <em>The Party<\/em>; Jude Blanchette sobre el papel del Partido en la empresa.<\/li>\n<li>Ian Bremmer, <em>The End of the Free Market<\/em> — la etiqueta \"capitalismo de Estado\" (una lente entre varias).<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Texto de la Ley de Promoción de la Economía Privada (2025), Ministerio de Justicia.<\/li>\n<li><em>Caixin<\/em>, \"Six Messages on the Private Sector From Xi's Meeting With Business Leaders\" (feb. 2025).<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li><em>Foreign Affairs<\/em>, \"China's Private Sector Pivot\".<\/li>\n<li>Brookings, \"Will China's private economy promotion law reassure its private sector?\".<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 5 — ¿Es China comunista? Tipología del sistema Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~21 min. Recorrido de la lección A Apertura B Modelo mental: tres niveles — Partido / Estado / Mercado C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Qué tipo de sistema político y económico es realmente China? La escena. El 17 de febrero de 2025, Xi Jinping —líder del Partido Comunista— se sentó con los empresarios privados más ricos de China, entre ellos Jack Ma, el fundador de Alibaba al que el propio Estado había humillado en 2020, para tranquilizarlos. Semanas después, la Asamblea Nacional Popular aprobó una Ley de Promoción de la Economía Privada que garantiza los derechos de propiedad de las empresas privadas. Un partido comunista legislando para proteger el capital privado. ¿Es esto comunismo? ¿Capitalismo? La respuesta es que ninguna etiqueta simple funciona, y ese es justamente el punto. Idea clave China se define como una \"economía socialista de mercado\". Ese oxímoron es honesto: el sistema combina de verdad el monopolio leninista del poder por un partido con una economía mayoritariamente de mercado y un enorme sector privado, más objetivos nacionalistas y desarrollistas. Ninguna etiqueta única —comunista, capitalista— lo describe. La pregunta productiva no es \"¿qué etiqueta?\", sino \"¿cómo encajan las piezas y quién decide?\". B Modelo mental: tres niveles — Partido / Estado / Mercado Partido (arriba): monopoliza el poder político, fija las reglas y las prioridades, y está dentro del Estado y de las grandes empresas. Estado (en medio): administra; posee empresas estratégicas y bancos; ejecuta la política del Partido. Mercado (abajo, pero enorme): asigna la mayoría de los recursos; el sector privado genera la mayor parte del empleo y la innovación; pero opera bajo permiso y vigilancia del Partido. Cómo se usa el modelo. Imagine una economía de mercado funcionando dentro de una carcasa política leninista. El Partido no gestiona cada empresa, pero fija los límites e interviene cuando quiere. La fórmula para recordar: el mercado asigna; el Partido dispone. C Desarrollo C1. ¿Qué significa \"economía socialista de mercado\"? Es el término oficial desde 1992–93. \"Mercado\", para asignar recursos y generar crecimiento; \"socialista\", por el control del Partido, la propiedad pública de los sectores estratégicos y la afirmación de que todo ello sirve a fines colectivos. La clave está en el enfoque de Deng: el mercado es una herramienta , no una ideología (\"la planificación y el mercado son ambos instrumentos\"). No hay que tomarlo como una contradicción a resolver, sino como una descripción de un híbrido real. C2. ¿Por qué permite propiedad privada y capitalistas? Porque funciona. El propio Partido resume el peso del sector privado con la fórmula \" 56789 \": más del 50 % de los ingresos fiscales, en torno al 60 % del PIB, el 70 % de la innovación, el 80 % del empleo urbano y el 90 % del número de empresas (cifras oficiales aproximadas). Desde 2001 los empresarios pueden militar en el Partido. Pero el permiso es condicional : el freno regulatorio a las tecnológicas de 2020–21 (con la salida a bolsa de Ant Group suspendida y Alibaba multada) demostró que el Partido puede disciplinar al capital que se vuelve demasiado autónomo o políticamente incómodo. Y el giro de 2025 muestra que vuelve a cortejarlo cuando necesita crecimiento. Mecanismo: el capital es instrumental, no soberano. C3. ¿Qué papel conserva el Estado? Las \"alturas dominantes\" de la economía: las empresas estatales dominan sectores estratégicos (energía, banca, telecomunicaciones, ferrocarril); los bancos públicos dirigen el crédito; el suelo es de propiedad estatal o colectiva; y los planes quinquenales y la política industrial orientan la inversión. No es, por tanto, laissez-faire . (La mecánica detallada se ve en la Lección 9; aquí basta con retener que el Estado conserva las palancas.) C4. ¿Qué etiquetas conviven? Cuatro lógicas operan a la vez: Capitalista: mercado, propiedad privada, ánimo de lucro, competencia. Socialista/leninista: monopolio del Partido, propiedad pública estratégica, planificación. Nacionalista: poder y estatus nacional, superación de la humillación (Lección 2). Desarrollista: el modelo del Estado que dirige el desarrollo (como Japón o Corea del Sur en su día), pero con un partido leninista al mando. Ninguna de las cuatro, por separado, describe el conjunto. C5. ¿Por qué ninguna etiqueta simple funciona? \"Comunista\" es cierto del régimen político (partido leninista que monopoliza el poder, marxismo oficial) y falso de la economía (mayoritariamente de mercado). \"Capitalista\" es cierto de la mecánica económica y falso de quién detenta el poder último. El error consiste en dar por hecho que la economía y la política deben compartir la misma etiqueta. En China, deliberadamente, no la comparten. La mejor descripción es funcional: un Estado-partido leninista que dirige una economía de mercado , o bien la propia fórmula oficial —\"economía socialista de mercado\"— tomada en serio como híbrido. D Conceptos imprescindibles Economía socialista de mercado Definición: término oficial para el híbrido de control del Partido y asignación por el mercado. Importancia: describe el sistema mejor que \"comunista\" o \"capitalista\". Error habitual: tomarlo por mera propaganda; describe una realidad híbrida. Estado-partido (party-state) Definición: la fusión de Partido y Estado en una sola estructura de poder. Importancia: explica por qué el Partido está dentro de todo, no fuera. Error habitual: imaginar un Estado y un Partido separados como en Occidente. Leninismo vs. marxismo Definición: leninismo = monopolio del partido sobre el poder; marxismo = doctrina sobre la economía. "}, {"id": "Leccion06_Quien_manda_realmente", "group": "II · Cómo funciona el sistema", "badge": "6", "title": "¿Quién manda realmente?", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~23 min.", "readmin": 23, "color": "#4f46e5", "html": "<div class=\"doc-head\"><h1 id=\"leccion-6-quien-manda-realmente-estructura-de-poder-e-instituciones\">Lección 6 — ¿Quién manda realmente? Estructura de poder e instituciones<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: un mapa de actores en dos columnas<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Dónde está el poder dentro del sistema chino?<\/p><\/aside>\n<p><strong>La escena.<\/strong> El título más importante de Xi Jinping no es \"presidente\" (ya lo vimos en la Lección 1): es <strong>secretario general del Partido<\/strong>. Su segunda fuente de poder es presidir la <strong>Comisión Militar Central<\/strong>, porque en China el ejército no pertenece al Estado, sino al Partido. Lo dijo Mao: \"el poder nace del cañón del fusil, y el Partido manda al fusil\". En 2025–2026, Xi purgó a cinco de los seis miembros de esa misma comisión. Para saber quién manda en China hay que dibujar una estructura donde el Estado formal es la punta visible y el Partido es el cuerpo sumergido.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>En China el Partido está por encima del Estado. Los cargos que importan son los del Partido —secretario general, Comité Permanente del Politburó, Comisión Militar Central—, no los del Estado —presidente, primer ministro—. Pero, y este matiz es decisivo, dibujar las casillas formales no explica del todo el poder: el poder real fluye también por redes personales, facciones, control de los nombramientos y la maquinaria anticorrupción. <strong>Instituciones formales + poder informal = el cuadro real.<\/strong><\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: un mapa de actores en dos columnas<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Partido (donde reside el poder):<\/strong> Secretario general → Comité Permanente del Politburó (7 miembros) → Politburó (24) → Comité Central (~200) → Congreso del Partido (cada 5 años). Órganos clave: la <strong>Comisión Militar Central<\/strong> (el ejército) y la <strong>CCDI<\/strong> (disciplina y anticorrupción).<\/li>\n<li><strong>Estado (la cara visible, que ejecuta):<\/strong> Presidencia (protocolaria) · Consejo de Estado y primer ministro (el gobierno) · Asamblea Nacional Popular (el legislativo, que ratifica).<\/li>\n<li><strong>Ejército:<\/strong> el Ejército Popular de Liberación es el ejército del Partido, no del Estado, a través de la Comisión Militar Central.<\/li>\n<\/ul>\n<p><strong>Cómo se usa el modelo.<\/strong> El poder se concentra según se sube por la columna del Partido; la columna del Estado administra. Y Xi está en la cúspide de las tres cosas: Partido (secretario general), ejército (jefe de la Comisión Militar Central) y Estado (presidente).<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-por-que-el-cargo-decisivo-es-secretario-general\">C1. ¿Por qué el cargo decisivo es \"secretario general\"?<\/h3>\n<p>Porque el Partido monopoliza el poder y el secretario general lo dirige. La presidencia del Estado es en gran medida protocolaria: por eso eliminar en 2018 su límite de mandatos fue más simbólico que mecánico —los cargos de secretario general y de jefe de la Comisión Militar Central nunca tuvieron ese límite—. Quien controla esos dos puestos controla lo que importa: el aparato del Partido y el fusil.<\/p>\n<h3 id=\"c2-como-se-organiza-la-cupula\">C2. ¿Cómo se organiza la cúpula?<\/h3>\n<p>Una pirámide que se estrecha. El <strong>Comité Permanente del Politburó<\/strong> tiene hoy siete miembros (composición de 2026): Xi Jinping (secretario general), Li Qiang (primer ministro), Zhao Leji (preside la Asamblea Nacional Popular), Wang Huning (preside la Conferencia Consultiva), Cai Qi (jefe de la Oficina General y del Secretariado), Ding Xuexiang (viceprimer ministro ejecutivo) y Li Xi (jefe de la CCDI). Por debajo, el <strong>Politburó<\/strong> (24 miembros), el <strong>Comité Central<\/strong> (~200 titulares y suplentes) y el <strong>Congreso del Partido<\/strong> (~2.300 delegados cada cinco años, que en la práctica ratifica). Cuanto más arriba, menos personas y más poder real. La selección es de arriba abajo, no de abajo arriba.<\/p>\n<h3 id=\"c3-como-se-toman-las-decisiones\">C3. ¿Cómo se toman las decisiones?<\/h3>\n<p>Tradicionalmente, mediante cierta <strong>dirección colegiada<\/strong> y búsqueda de consenso en el Comité Permanente, con \"grupos dirigentes\" y comisiones centrales que coordinan Partido y Estado. Bajo Xi, la toma de decisiones se ha <strong>personalizado<\/strong>: Xi preside él mismo numerosas comisiones (\"el presidente de todo\"), concentrando la fijación de la agenda. Los órganos colegiados formales siguen existiendo, pero el centro de gravedad se ha desplazado hacia un solo hombre. Es el mismo hilo de la Lección 4: continuidad de la estructura, ruptura del estilo.<\/p>\n<h3 id=\"c4-por-que-el-ejercito-pertenece-al-partido\">C4. ¿Por qué el ejército pertenece al Partido?<\/h3>\n<p>El Ejército Popular de Liberación jura lealtad al Partido —no a la nación ni a la Constitución— a través de la Comisión Militar Central que Xi preside. Es un principio leninista y una lección histórica: el Partido debe controlar el fusil. Las purgas de 2025–2026 muestran a Xi imponiendo un control personal sobre esa comisión, y revelan a la vez su poder y su inseguridad. Junto al ejército, la <strong>CCDI<\/strong> (la comisión anticorrupción) es una palanca paralela: puede investigar a casi cualquiera, lo que la convierte en arma de disciplina y de control faccional.<\/p>\n<h3 id=\"c5-por-que-las-instituciones-formales-no-bastan\">C5. ¿Por qué las instituciones formales no bastan?<\/h3>\n<p>Porque el poder real circula también por canales informales: <strong>facciones y redes de patronazgo<\/strong> (quién ascendió a quién), el <strong>control del personal<\/strong> (el Departamento de Organización decide los nombramientos), la <strong>maquinaria anticorrupción<\/strong> como herramienta de presión, y los lazos regionales o de \"principitos\" (hijos de la élite fundadora). Además, por debajo de la cúpula opera el <strong>autoritarismo fragmentado<\/strong>: provincias y ministerios negocian, resisten y aplican a su manera lo que Pekín ordena (lo veremos en la economía, Lección 9). Y queda la mayor incógnita: la <strong>sucesión<\/strong>. Xi no ha designado sucesor, rompiendo la norma post-Deng, lo que vuelve opaco el futuro del sistema. El organigrama da las casillas; las redes y las campañas dan el flujo real del poder.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Secretario general<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el jefe del Partido y, por tanto, el cargo con poder real.<br><b class=\"mlbl\">Importancia:<\/b>  concentra la autoridad que el \"presidente\" solo aparenta.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que la presidencia del Estado es el puesto decisivo.<\/p>\n<\/li>\n<li>\n<p><strong>Comité Permanente del Politburó<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el máximo órgano de decisión, hoy con siete miembros.<br><b class=\"mlbl\">Importancia:<\/b>  la cúpula real del país.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginarlo como un gabinete que debate como en una democracia; es opaco y jerárquico.<\/p>\n<\/li>\n<li>\n<p><strong>Comisión Militar Central<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el órgano del Partido que manda sobre el ejército.<br><b class=\"mlbl\">Importancia:<\/b>  controlarla es condición del poder supremo.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que el ejército es \"nacional\"; es del Partido.<\/p>\n<\/li>\n<li>\n<p><strong>CCDI / campaña anticorrupción<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la comisión de disciplina que investiga a los cuadros.<br><b class=\"mlbl\">Importancia:<\/b>  limpia corrupción y, a la vez, disciplina rivales.<br><b class=\"mlbl\">Error habitual:<\/b>  leerla solo como lucha anticorrupción, ignorando su uso político.<\/p>\n<\/li>\n<li>\n<p><strong>Autoritarismo fragmentado + sucesión<\/strong><br><b class=\"mlbl\">Definición:<\/b>  poder concentrado arriba pero disputado en la ejecución; y ausencia de un mecanismo claro de relevo.<br><b class=\"mlbl\">Importancia:<\/b>  matiza el mito del control total y señala la fragilidad futura.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginar una máquina perfectamente centralizada y con relevo asegurado.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"El presidente chino gobierna como un presidente occidental.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> Xi es jefe del Estado y toma decisiones ejecutivas.<\/li>\n<li><strong>Qué omite:<\/strong> su poder no viene del cargo estatal, sino del Partido y del ejército; no hay elección, ni separación de poderes, ni oposición, y el \"parlamento\" ratifica.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"Xi gobierna como secretario general de un partido leninista que monopoliza el poder y controla el ejército; 'presidente' es su etiqueta menos relevante.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Comité Permanente 2026 (7 miembros, verificado):<\/strong> Xi Jinping, Li Qiang, Zhao Leji, Wang Huning, Cai Qi, Ding Xuexiang, Li Xi.<\/li>\n<li><strong>2018:<\/strong> eliminación del límite de mandatos de la presidencia estatal (no de los cargos de partido). <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>2025:<\/strong> más de un millón de expedientes disciplinarios; más de 190 altos cuadros caídos desde 2023; cinco de los seis miembros de la Comisión Militar Central purgados.<\/li>\n<li><strong>Sucesión:<\/strong> sin sucesor designado, en ruptura con la norma establecida desde Deng.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> La purga de la Comisión Militar Central (2025–2026) es una ventana al poder real: al caer sus vicepresidentes He Weidong y Zhang Youxia y el general Miao Hua, y cerca de un centenar de altos oficiales, se ve cómo Xi ejerce el control a través de los dos resortes clave —el Partido y el ejército— y cómo usa la CCDI como instrumento. <em>(Fechas verificadas.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> Secretario general + Comisión Militar Central como palancas reales; la CCDI como arma; la personalización; el vacío de sucesión.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Purgar la cúpula militar demuestra control absoluto o inseguridad peligrosa? ¿Qué implica para la disposición operativa del EPL y para la planificación sobre Taiwán?<\/p>\n<p><strong>Qué información falta.<\/strong> Casi todo el detalle: la política de élite china es opaca y se infiere de fragmentos (es el ejercicio de humildad epistémica que recorre el curso). No sabemos con certeza las causas ni el alcance real de cada caída.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar) — coincide con un producto final del curso.<\/strong> El <strong>organigrama de instituciones y actores<\/strong>: la columna del Partido (secretario general → Comité Permanente → Politburó → Comité Central) situada por encima de la columna del Estado (presidencia, Consejo de Estado/primer ministro, Asamblea Nacional Popular), con el ejército conectado al Partido vía la Comisión Militar Central, y la CCDI como órgano transversal de disciplina. <em>(No se incluye imagen; se describe para su elaboración fiable.)<\/em><\/p>\n<p><strong>Cronología (8 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1982<\/strong> — Constitución del Partido; normas de dirección colegiada tras Mao.<\/li>\n<li><strong>2002–2012<\/strong> — Era de Hu Jintao: liderazgo colectivo y \"discreto\".<\/li>\n<li><strong>2012<\/strong> — Xi Jinping, secretario general.<\/li>\n<li><strong>2013<\/strong> — Arranca la campaña anticorrupción.<\/li>\n<li><strong>2017<\/strong> — \"Pensamiento Xi Jinping\" en los estatutos del Partido.<\/li>\n<li><strong>2018<\/strong> — Se eliminan los límites de mandato presidencial.<\/li>\n<li><strong>2022<\/strong> — XX Congreso: tercer mandato; Comité Permanente de afines.<\/li>\n<li><strong>2025–2026<\/strong> — Purga de la Comisión Militar Central.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Confundir \"presidente\" con el cargo real.<\/strong> <em>Corrección:<\/em> el poder está en la secretaría general del Partido y en la jefatura de la Comisión Militar Central.<\/li>\n<li><strong>Creer que la Asamblea Nacional Popular legisla con autonomía.<\/strong> <em>Corrección:<\/em> sobre todo ratifica decisiones ya tomadas en el Partido.<\/li>\n<li><strong>Leer solo el organigrama.<\/strong> <em>Corrección:<\/em> hay que añadir facciones, control del personal y campañas de disciplina para entender el flujo real del poder.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si Xi ha concentrado el poder como nadie desde Mao, ha eliminado a rivales y no ha designado sucesor, ¿es el sistema más <strong>fuerte<\/strong> (decisión rápida, sin disputa) o más <strong>frágil<\/strong> (todo depende de un hombre, sin mecanismo de relevo)? Recuerde qué ocurrió la última vez que China dependió de un solo líder sin contrapesos (Lección 3). <em>(Conecta con las Lecciones 3 y 12.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Por qué el secretario general es más importante que el presidente?<\/li>\n<li>¿A quién pertenece el Ejército Popular de Liberación?<\/li>\n<li>¿Qué es la CCDI y para qué sirve, además de combatir la corrupción?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué controlar la Comisión Militar Central es esencial para el poder en China. ¿Qué principio leninista y qué lección histórica lo sustentan?<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"Las instituciones formales chinas explican cómo se toman las decisiones.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre un dirigente caído o ascendido e identifica qué revela sobre facciones, control de personal o uso político de la anticorrupción.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>El Partido está por encima del Estado; los cargos que importan son los del Partido.<\/li>\n<li>El poder decisivo es secretario general + jefe de la Comisión Militar Central: aparato y fusil.<\/li>\n<li>Bajo Xi, la decisión colegiada se ha personalizado, sin abolir los órganos formales.<\/li>\n<li>El poder real también fluye por facciones, control de nombramientos y anticorrupción.<\/li>\n<li>La gran incógnita es la sucesión: mucho poder en un hombre y ningún relevo previsto.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 7.<\/strong> Hemos visto cómo el Partido controla el Estado y el ejército. Pero ¿cómo controla —y negocia con— a 1.400 millones de personas? Censura, vigilancia, cooptación y consentimiento: la Lección 7 baja del poder a la sociedad.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Richard McGregor, <em>The Party<\/em> — funcionamiento interno del PCCh.<\/li>\n<li>Kenneth Lieberthal, <em>Governing China<\/em> — \"autoritarismo fragmentado\".<\/li>\n<li>Sebastian Heilmann (ed.), <em>China's Political System<\/em> — manual institucional.<\/li>\n<li>David Shambaugh, <em>China's Communist Party: Atrophy and Adaptation<\/em>.<\/li>\n<li>Joseph Torigian sobre política de élite y sucesión; Alice Miller (<em>China Leadership Monitor<\/em>).<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Estatutos del PCCh y documentos del XX Congreso (2022).<\/li>\n<li>Comunicados de la CCDI; informe de servicios del Congreso de EE. UU. (CRS), \"China's Political System\".<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li><em>Foreign Affairs<\/em>, \"Xi's Forever Purge\".<\/li>\n<li>MERICS, \"Meet China's new Politburo Standing Committee\"; Jamestown Foundation.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 6 — ¿Quién manda realmente? Estructura de poder e instituciones Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: un mapa de actores en dos columnas C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Dónde está el poder dentro del sistema chino? La escena. El título más importante de Xi Jinping no es \"presidente\" (ya lo vimos en la Lección 1): es secretario general del Partido . Su segunda fuente de poder es presidir la Comisión Militar Central , porque en China el ejército no pertenece al Estado, sino al Partido. Lo dijo Mao: \"el poder nace del cañón del fusil, y el Partido manda al fusil\". En 2025–2026, Xi purgó a cinco de los seis miembros de esa misma comisión. Para saber quién manda en China hay que dibujar una estructura donde el Estado formal es la punta visible y el Partido es el cuerpo sumergido. Idea clave En China el Partido está por encima del Estado. Los cargos que importan son los del Partido —secretario general, Comité Permanente del Politburó, Comisión Militar Central—, no los del Estado —presidente, primer ministro—. Pero, y este matiz es decisivo, dibujar las casillas formales no explica del todo el poder: el poder real fluye también por redes personales, facciones, control de los nombramientos y la maquinaria anticorrupción. Instituciones formales + poder informal = el cuadro real. B Modelo mental: un mapa de actores en dos columnas Partido (donde reside el poder): Secretario general → Comité Permanente del Politburó (7 miembros) → Politburó (24) → Comité Central (~200) → Congreso del Partido (cada 5 años). Órganos clave: la Comisión Militar Central (el ejército) y la CCDI (disciplina y anticorrupción). Estado (la cara visible, que ejecuta): Presidencia (protocolaria) · Consejo de Estado y primer ministro (el gobierno) · Asamblea Nacional Popular (el legislativo, que ratifica). Ejército: el Ejército Popular de Liberación es el ejército del Partido, no del Estado, a través de la Comisión Militar Central. Cómo se usa el modelo. El poder se concentra según se sube por la columna del Partido; la columna del Estado administra. Y Xi está en la cúspide de las tres cosas: Partido (secretario general), ejército (jefe de la Comisión Militar Central) y Estado (presidente). C Desarrollo C1. ¿Por qué el cargo decisivo es \"secretario general\"? Porque el Partido monopoliza el poder y el secretario general lo dirige. La presidencia del Estado es en gran medida protocolaria: por eso eliminar en 2018 su límite de mandatos fue más simbólico que mecánico —los cargos de secretario general y de jefe de la Comisión Militar Central nunca tuvieron ese límite—. Quien controla esos dos puestos controla lo que importa: el aparato del Partido y el fusil. C2. ¿Cómo se organiza la cúpula? Una pirámide que se estrecha. El Comité Permanente del Politburó tiene hoy siete miembros (composición de 2026): Xi Jinping (secretario general), Li Qiang (primer ministro), Zhao Leji (preside la Asamblea Nacional Popular), Wang Huning (preside la Conferencia Consultiva), Cai Qi (jefe de la Oficina General y del Secretariado), Ding Xuexiang (viceprimer ministro ejecutivo) y Li Xi (jefe de la CCDI). Por debajo, el Politburó (24 miembros), el Comité Central (~200 titulares y suplentes) y el Congreso del Partido (~2.300 delegados cada cinco años, que en la práctica ratifica). Cuanto más arriba, menos personas y más poder real. La selección es de arriba abajo, no de abajo arriba. C3. ¿Cómo se toman las decisiones? Tradicionalmente, mediante cierta dirección colegiada y búsqueda de consenso en el Comité Permanente, con \"grupos dirigentes\" y comisiones centrales que coordinan Partido y Estado. Bajo Xi, la toma de decisiones se ha personalizado : Xi preside él mismo numerosas comisiones (\"el presidente de todo\"), concentrando la fijación de la agenda. Los órganos colegiados formales siguen existiendo, pero el centro de gravedad se ha desplazado hacia un solo hombre. Es el mismo hilo de la Lección 4: continuidad de la estructura, ruptura del estilo. C4. ¿Por qué el ejército pertenece al Partido? El Ejército Popular de Liberación jura lealtad al Partido —no a la nación ni a la Constitución— a través de la Comisión Militar Central que Xi preside. Es un principio leninista y una lección histórica: el Partido debe controlar el fusil. Las purgas de 2025–2026 muestran a Xi imponiendo un control personal sobre esa comisión, y revelan a la vez su poder y su inseguridad. Junto al ejército, la CCDI (la comisión anticorrupción) es una palanca paralela: puede investigar a casi cualquiera, lo que la convierte en arma de disciplina y de control faccional. C5. ¿Por qué las instituciones formales no bastan? Porque el poder real circula también por canales informales: facciones y redes de patronazgo (quién ascendió a quién), el control del personal (el Departamento de Organización decide los nombramientos), la maquinaria anticorrupción como herramienta de presión, y los lazos regionales o de \"principitos\" (hijos de la élite fundadora). Además, por debajo de la cúpula opera el autoritarismo fragmentado : provincias y ministerios negocian, resisten y aplican a su manera lo que Pekín ordena (lo veremos en la economía, Lección 9). Y queda la mayor incógnita: la sucesión . Xi no ha designado sucesor, rompiendo la norma post-Deng, lo que vuelve opaco el futuro del sistema. El organigrama da las casillas; las redes y las campañas dan el flujo real del poder. D Conceptos imprescindibles Secretario general Definición: el jefe del Partido y, por tanto, el cargo con poder real. Importancia: concentra la autoridad que el \"presidente\" solo aparenta. Error habitual: creer que la presidencia del Estado es el puesto decisivo. Comité Perm"}, {"id": "Leccion07_Estado_y_sociedad_control", "group": "II · Cómo funciona el sistema", "badge": "7", "title": "Estado y sociedad: control", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~22 min.", "readmin": 22, "color": "#4f46e5", "html": "<div class=\"doc-head\"><h1 id=\"leccion-7-estado-y-sociedad-control-consentimiento-y-contrato-social\">Lección 7 — Estado y sociedad: control, consentimiento y contrato social<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~22 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: el pacto autoritario y la caja de herramientas<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Cómo controla —y negocia con— el Partido a 1.400 millones de personas?<\/p><\/aside>\n<p><strong>La escena.<\/strong> La imagen occidental de China es una única \"puntuación de crédito social\" que dicta la vida de cada ciudadano: una distopía de ciencia ficción. La realidad: esa puntuación nacional única <strong>no existe<\/strong>, y hacia 2026 la mayoría de los ensayos de puntuación individual se habían cancelado. Pero antes de relajarse: el aparato de vigilancia real —cámaras, registro obligatorio con nombre real de teléfonos y pagos, bases biométricas, internet censurado— sí es masivo y penetrante. Tomados por separado, el mito y la realidad engañan. La verdad es más interesante y más útil: el control de la sociedad china no es una sola máquina, sino un sistema por capas de censura, vigilancia, cooptación y concesión selectiva.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>La relación del Partido con la sociedad no es solo coerción: es un <strong>pacto<\/strong>. El Partido entrega orden, niveles de vida crecientes y orgullo nacional; a cambio exige quiescencia política —que nadie se organice fuera del Partido—. El control mezcla herramientas duras (censura, vigilancia, policía) con blandas (nacionalismo, cooptación, respuesta selectiva a las quejas). Entender ese \"pacto autoritario\" —y dónde se tensa— es la clave para leer noticias sobre protestas, censura y opinión pública.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: el pacto autoritario y la caja de herramientas<\/span><\/div><div class=\"sec-body\">\n<p><strong>El pacto:<\/strong> el Partido entrega (orden, prosperidad, orgullo nacional, cierta capacidad de resolver quejas locales) ↔ la sociedad concede (quiescencia política, no organizarse de forma autónoma).<\/p>\n<p><strong>La caja de herramientas, de dura a blanda:<\/strong> coerción (policía, detención) → vigilancia (cámaras, datos, biometría) → censura (Gran Cortafuegos, borrado, \"guía\" de la opinión) → cooptación (dejar entrar a élites y empresarios) → respuesta selectiva (resolver algunas quejas para desactivar el descontento) → nacionalismo (legitimidad emocional).<\/p>\n<p><strong>Cómo se usa el modelo.<\/strong> Ante una noticia de control, pregunte qué herramienta opera y si señala fuerza (gestión rutinaria) o inquietud (un pacto tensionado).<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-que-es-y-que-no-es-el-credito-social\">C1. ¿Qué es —y qué no es— el \"crédito social\"?<\/h3>\n<p>Conviene desmontar el mito con precisión. <strong>No existe<\/strong> una puntuación nacional única que califique a cada ciudadano. Lo que existe es un mosaico fragmentado: listas negras judiciales (quien desacata una sentencia puede quedar excluido de vuelos o trenes de alta velocidad), calificaciones de cumplimiento para unos 33 millones de <strong>empresas<\/strong>, y una plataforma nacional de datos que en 2024–2025 unificó pilotos municipales. Hacia 2026, los ensayos de puntuación <strong>individual<\/strong> habían terminado en su mayoría. La lección metodológica: desconfíe de las distopías importadas y compruebe qué se ha implementado de verdad. Lo real es más burocrático —y más orientado a las empresas— que la ciencia ficción.<\/p>\n<h3 id=\"c2-como-funciona-la-censura\">C2. ¿Cómo funciona la censura?<\/h3>\n<p>El <strong>Gran Cortafuegos<\/strong> bloquea las plataformas extranjeras (Google, redes occidentales); las nacionales (WeChat, Weibo) se autocensuran bajo presión estatal. Se combinan el borrado de palabras clave, la \"guía\" de la opinión mediante comentaristas afines y, cada vez más, la moderación automatizada (incluso los chatbots chinos censuran temas sensibles). El objetivo no es el silencio total, sino <strong>impedir la acción colectiva<\/strong>: puedes quejarte, pero no organizarte. Es lo que se ha llamado \"autoritarismo en red\": se tolera el desahogo, se bloquea la coordinación.<\/p>\n<h3 id=\"c3-como-funciona-la-vigilancia\">C3. ¿Cómo funciona la vigilancia?<\/h3>\n<p>Es real y extensa: cámaras con reconocimiento facial, registro obligatorio con nombre real (teléfonos, internet, pagos) y bases biométricas. Alcanza su extremo en Xinjiang (Lección 8). Su fin es anticipar el malestar e identificar a quienes organizan. Ahora bien, conviene el matiz opuesto: en Occidente se exagera a menudo como si fuera infalible, cuando es desigual y en buena parte funciona como <strong>disuasión<\/strong> —teatro del control tanto como control efectivo—. Ni distopía perfecta ni exageración: vigilancia masiva y real, pero imperfecta.<\/p>\n<h3 id=\"c4-por-que-a-veces-el-partido-cede\">C4. ¿Por qué a veces el Partido cede?<\/h3>\n<p>El régimen practica un \"autoritarismo receptivo\": vigila la opinión pública (sentimiento en redes, protestas) y a veces <strong>concede<\/strong> —revierte una política, castiga a un cargo local, paga indemnizaciones— para desactivar la ira y mantener las quejas locales y despolitizadas. El ejemplo mayor: el abrupto fin de la política de <strong>COVID cero<\/strong> tras las protestas del \"papel en blanco\" de noviembre de 2022. No es, por tanto, pura represión, sino un control calibrado. <strong>Mecanismo:<\/strong> absorber y localizar el descontento para que no se vuelva nacional ni político.<\/p>\n<h3 id=\"c5-donde-se-tensa-el-contrato\">C5. ¿Dónde se tensa el contrato?<\/h3>\n<p>El pacto depende de entregar prosperidad —y la Lección 10 muestra un crecimiento que se frena, con paro juvenil y pérdidas inmobiliarias— y de apoyarse en el nacionalismo cuando la prosperidad falla. Pero el nacionalismo es de doble filo: puede volverse contra el gobierno si parece débil ante el exterior. Las protestas del \"papel en blanco\" (2022) probaron que el pacto se agrieta cuando el control (COVID cero) destruye medios de vida. Y el sistema del <strong>hukou<\/strong> (registro de hogar) incrusta una desigualdad estructural —los migrantes son ciudadanos de segunda en las ciudades donde trabajan— que también tensa el contrato. Aquí el equilibrio crítico: el control es fuerte, pero no omnipotente, y el pacto está bajo presión.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Crédito social (mito vs. realidad)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  mosaico fragmentado de listas negras y calificaciones, sobre todo a empresas; sin puntuación individual única.<br><b class=\"mlbl\">Importancia:<\/b>  corrige el error occidental más extendido sobre China.<br><b class=\"mlbl\">Error habitual:<\/b>  creer en un único marcador nacional que gobierna cada gesto.<\/p>\n<\/li>\n<li>\n<p><strong>Gran Cortafuegos / censura<\/strong><br><b class=\"mlbl\">Definición:<\/b>  sistema que bloquea contenido extranjero y modera el nacional.<br><b class=\"mlbl\">Importancia:<\/b>  su meta es impedir la coordinación, no toda queja.<br><b class=\"mlbl\">Error habitual:<\/b>  pensar que busca el silencio absoluto.<\/p>\n<\/li>\n<li>\n<p><strong>Autoritarismo receptivo<\/strong><br><b class=\"mlbl\">Definición:<\/b>  control que concede selectivamente para desactivar el descontento.<br><b class=\"mlbl\">Importancia:<\/b>  explica por qué el régimen a veces rectifica.<br><b class=\"mlbl\">Error habitual:<\/b>  ver solo represión y no la calibración.<\/p>\n<\/li>\n<li>\n<p><strong>Hukou (registro de hogar)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  sistema que ata los derechos (escuela, sanidad) al lugar de origen.<br><b class=\"mlbl\">Importancia:<\/b>  crea una desigualdad estructural entre urbanos y migrantes.<br><b class=\"mlbl\">Error habitual:<\/b>  ignorarlo al hablar de desigualdad y consumo.<\/p>\n<\/li>\n<li>\n<p><strong>Pacto autoritario<\/strong><br><b class=\"mlbl\">Definición:<\/b>  intercambio implícito de prosperidad y orden por quiescencia política.<br><b class=\"mlbl\">Importancia:<\/b>  marco para leer protestas y concesiones.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que el consentimiento es solo miedo.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"China es una distopía tipo 1984 donde un algoritmo puntúa y controla cada gesto de cada ciudadano.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> hay vigilancia masiva y real (cámaras, biometría, censura).<\/li>\n<li><strong>Qué omite:<\/strong> no existe una puntuación nacional única; el sistema es fragmentado y burocrático, y hay márgenes de queja, negociación e incluso concesión. <em>(El contramito también engaña: quien dice que \"la vigilancia es propaganda occidental exagerada\" ignora un aparato real y penetrante.)<\/em><\/li>\n<li><strong>Versión más precisa:<\/strong> \"China combina vigilancia real y extensa con censura selectiva y cierta capacidad de respuesta; el control busca impedir la acción colectiva, no dictar cada gesto individual.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Crédito social:<\/strong> sin puntuación nacional única; listas negras judiciales, calificaciones a ~33 millones de empresas y una plataforma nacional; ensayos individuales en gran medida terminados hacia 2026. <em>(Verificado; fuente: MERICS y analistas.)<\/em><\/li>\n<li><strong>Censura:<\/strong> el Gran Cortafuegos bloquea plataformas extranjeras; las nacionales autocensuran. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Vigilancia:<\/strong> red real de cámaras, reconocimiento facial, registro con nombre real y biometría.<\/li>\n<li><strong>Noviembre de 2022:<\/strong> protestas del \"papel en blanco\" contra el COVID cero; giro posterior de la política a finales de 2022. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Hukou:<\/strong> divide derechos entre residentes urbanos y migrantes. <em>(Hecho comprobado.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> El seguimiento de 2025–2026 confirma el desajuste entre mito y realidad del \"crédito social\": la actualización de 2025 formalizó el intercambio de datos entre ministerios para <strong>empresas<\/strong> (banderas por infracciones fiscales, laborales, ambientales o aduaneras desde un único panel), mientras que los ensayos de puntuación <strong>individual<\/strong> se dieron en gran medida por terminados hacia enero de 2026. En paralelo, el aparato de vigilancia real se consolida.<\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> El mito frente a la realidad; el autoritarismo en red; el control orientado a impedir la acción colectiva.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿\"Fracasó\" el sistema (no hay marcador ciudadano único) o \"triunfa de otro modo\" (cumplimiento empresarial más disuasión selectiva)? ¿Es menos distópico o simplemente más sofisticado y menos visible?<\/p>\n<p><strong>Qué información falta.<\/strong> Cómo se vive por dentro y cuánta variación regional existe; el acceso independiente para investigarlo es limitado.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un esquema de la \"caja de herramientas\" del control (de dura a blanda) y un diagrama del Gran Cortafuegos (qué se bloquea, qué se tolera, cómo opera la autocensura). <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (8 hitos).<\/strong><\/p>\n<ul>\n<li><strong>2003<\/strong> — Despliegue del \"Escudo Dorado\" / Gran Cortafuegos.<\/li>\n<li><strong>2013<\/strong> — Xi endurece el control ideológico y de internet.<\/li>\n<li><strong>2014<\/strong> — Se anuncia el plan del \"sistema de crédito social\" (esquema 2014–2020).<\/li>\n<li><strong>2017<\/strong> — Ley de Ciberseguridad.<\/li>\n<li><strong>2020<\/strong> — Registro con nombre real generalizado.<\/li>\n<li><strong>Nov. 2022<\/strong> — Protestas del \"papel en blanco\".<\/li>\n<li><strong>Dic. 2022<\/strong> — Fin del COVID cero.<\/li>\n<li><strong>2025–2026<\/strong> — Consolidación del crédito social (centrado en empresas); fin de los ensayos individuales.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Creer en la puntuación nacional única<\/strong> (el mito de ciencia ficción). <em>Corrección:<\/em> no existe; el sistema es fragmentado y sobre todo empresarial.<\/li>\n<li><strong>Creer que la vigilancia es propaganda occidental exagerada<\/strong> (el contramito). <em>Corrección:<\/em> es real y extensa, aunque imperfecta.<\/li>\n<li><strong>Creer que el control es solo represión.<\/strong> <em>Corrección:<\/em> también hay cooptación, respuesta selectiva y un pacto de prosperidad.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si el pacto es \"prosperidad y orden a cambio de quiescencia\", ¿qué ocurre cuando la prosperidad se frena (Lección 10) y el Partido debe apoyarse más en el nacionalismo y el control? ¿Es sostenible sustituir crecimiento por orgullo y vigilancia? <em>(Conecta con las Lecciones 2, 4 y 10.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Existe una puntuación de crédito social única para cada ciudadano?<\/li>\n<li>¿Qué es el Gran Cortafuegos y qué busca sobre todo?<\/li>\n<li>¿Qué es el hukou?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué el objetivo de la censura china es impedir la acción colectiva más que silenciar toda queja individual. ¿Qué gana el régimen tolerando el desahogo?<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"En China un algoritmo controla cada gesto de cada ciudadano.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre censura, vigilancia o una protesta e identifica qué herramienta del control opera y si revela fuerza o tensión del pacto.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>El control chino no es una sola máquina, sino capas: coerción, vigilancia, censura, cooptación y concesión.<\/li>\n<li>El \"crédito social\" único es un mito; la vigilancia masiva, en cambio, es real.<\/li>\n<li>La censura busca impedir la coordinación, no toda queja.<\/li>\n<li>El régimen a veces cede (autoritarismo receptivo): el fin del COVID cero lo mostró.<\/li>\n<li>El pacto —prosperidad por quiescencia— se tensa cuando el crecimiento falla.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 8.<\/strong> El control sobre la sociedad han se intensifica hasta el extremo en la periferia no-han —Xinjiang, Tíbet— y en Hong Kong. Allí el \"contrato\" es otro: seguridad y asimilación por encima de todo. Eso examina la Lección 8.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Margaret E. Roberts, <em>Censored: Distraction and Diversion Inside China's Great Firewall<\/em> — cómo opera la censura (fricción, inundación, miedo).<\/li>\n<li>Kai Strittmatter, <em>We Have Been Harmonized<\/em> — vigilancia y autoritarismo digital.<\/li>\n<li>Rebecca MacKinnon, <em>Consent of the Networked<\/em> — \"autoritarismo en red\".<\/li>\n<li>Jeremy Wallace, <em>Seeking Truth and Hiding Facts<\/em> — datos, legitimidad y control.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / actualidad<\/strong><\/p>\n<ul>\n<li>Actualizaciones del sistema de crédito social (2025) y medidas de la NDRC (2026).<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>MERICS, \"China's social credit score – untangling myth from reality\".<\/li>\n<li>Coda Story / ORF sobre vigilancia y control de la información.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 7 — Estado y sociedad: control, consentimiento y contrato social Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~22 min. Recorrido de la lección A Apertura B Modelo mental: el pacto autoritario y la caja de herramientas C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Cómo controla —y negocia con— el Partido a 1.400 millones de personas? La escena. La imagen occidental de China es una única \"puntuación de crédito social\" que dicta la vida de cada ciudadano: una distopía de ciencia ficción. La realidad: esa puntuación nacional única no existe , y hacia 2026 la mayoría de los ensayos de puntuación individual se habían cancelado. Pero antes de relajarse: el aparato de vigilancia real —cámaras, registro obligatorio con nombre real de teléfonos y pagos, bases biométricas, internet censurado— sí es masivo y penetrante. Tomados por separado, el mito y la realidad engañan. La verdad es más interesante y más útil: el control de la sociedad china no es una sola máquina, sino un sistema por capas de censura, vigilancia, cooptación y concesión selectiva. Idea clave La relación del Partido con la sociedad no es solo coerción: es un pacto . El Partido entrega orden, niveles de vida crecientes y orgullo nacional; a cambio exige quiescencia política —que nadie se organice fuera del Partido—. El control mezcla herramientas duras (censura, vigilancia, policía) con blandas (nacionalismo, cooptación, respuesta selectiva a las quejas). Entender ese \"pacto autoritario\" —y dónde se tensa— es la clave para leer noticias sobre protestas, censura y opinión pública. B Modelo mental: el pacto autoritario y la caja de herramientas El pacto: el Partido entrega (orden, prosperidad, orgullo nacional, cierta capacidad de resolver quejas locales) ↔ la sociedad concede (quiescencia política, no organizarse de forma autónoma). La caja de herramientas, de dura a blanda: coerción (policía, detención) → vigilancia (cámaras, datos, biometría) → censura (Gran Cortafuegos, borrado, \"guía\" de la opinión) → cooptación (dejar entrar a élites y empresarios) → respuesta selectiva (resolver algunas quejas para desactivar el descontento) → nacionalismo (legitimidad emocional). Cómo se usa el modelo. Ante una noticia de control, pregunte qué herramienta opera y si señala fuerza (gestión rutinaria) o inquietud (un pacto tensionado). C Desarrollo C1. ¿Qué es —y qué no es— el \"crédito social\"? Conviene desmontar el mito con precisión. No existe una puntuación nacional única que califique a cada ciudadano. Lo que existe es un mosaico fragmentado: listas negras judiciales (quien desacata una sentencia puede quedar excluido de vuelos o trenes de alta velocidad), calificaciones de cumplimiento para unos 33 millones de empresas , y una plataforma nacional de datos que en 2024–2025 unificó pilotos municipales. Hacia 2026, los ensayos de puntuación individual habían terminado en su mayoría. La lección metodológica: desconfíe de las distopías importadas y compruebe qué se ha implementado de verdad. Lo real es más burocrático —y más orientado a las empresas— que la ciencia ficción. C2. ¿Cómo funciona la censura? El Gran Cortafuegos bloquea las plataformas extranjeras (Google, redes occidentales); las nacionales (WeChat, Weibo) se autocensuran bajo presión estatal. Se combinan el borrado de palabras clave, la \"guía\" de la opinión mediante comentaristas afines y, cada vez más, la moderación automatizada (incluso los chatbots chinos censuran temas sensibles). El objetivo no es el silencio total, sino impedir la acción colectiva : puedes quejarte, pero no organizarte. Es lo que se ha llamado \"autoritarismo en red\": se tolera el desahogo, se bloquea la coordinación. C3. ¿Cómo funciona la vigilancia? Es real y extensa: cámaras con reconocimiento facial, registro obligatorio con nombre real (teléfonos, internet, pagos) y bases biométricas. Alcanza su extremo en Xinjiang (Lección 8). Su fin es anticipar el malestar e identificar a quienes organizan. Ahora bien, conviene el matiz opuesto: en Occidente se exagera a menudo como si fuera infalible, cuando es desigual y en buena parte funciona como disuasión —teatro del control tanto como control efectivo—. Ni distopía perfecta ni exageración: vigilancia masiva y real, pero imperfecta. C4. ¿Por qué a veces el Partido cede? El régimen practica un \"autoritarismo receptivo\": vigila la opinión pública (sentimiento en redes, protestas) y a veces concede —revierte una política, castiga a un cargo local, paga indemnizaciones— para desactivar la ira y mantener las quejas locales y despolitizadas. El ejemplo mayor: el abrupto fin de la política de COVID cero tras las protestas del \"papel en blanco\" de noviembre de 2022. No es, por tanto, pura represión, sino un control calibrado. Mecanismo: absorber y localizar el descontento para que no se vuelva nacional ni político. C5. ¿Dónde se tensa el contrato? El pacto depende de entregar prosperidad —y la Lección 10 muestra un crecimiento que se frena, con paro juvenil y pérdidas inmobiliarias— y de apoyarse en el nacionalismo cuando la prosperidad falla. Pero el nacionalismo es de doble filo: puede volverse contra el gobierno si parece débil ante el exterior. Las protestas del \"papel en blanco\" (2022) probaron que el pacto se agrieta cuando el control (COVID cero) destruye medios de vida. Y el sistema del hukou (registro de hogar) incrusta una desigualdad estructural —los migrantes son ciudadanos de segunda en las ciudades donde trabajan— que también tensa el contrato. Aquí el equilibrio crítico: el control es fuerte, pero no omnipotente, y el pacto está bajo presión. D Conceptos imprescindibles Crédito social (mito vs. realidad) Definición: mosaico fragmentado de listas negras y calificaciones, sobre todo a empre"}, {"id": "Leccion08_La_periferia_y_la_unidad", "group": "III · Territorio y economía", "badge": "8", "title": "La periferia y la unidad", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.", "readmin": 23, "color": "#15803d", "html": "<div class=\"doc-head\"><h1 id=\"leccion-8-la-periferia-y-el-problema-de-la-unidad\">Lección 8 — La periferia y el problema de la unidad<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: centro-periferia y una escalera de métodos<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Por qué la periferia no-han (Xinjiang, Tíbet, Hong Kong) y Taiwán son tan sensibles, y cómo los gestiona Pekín?<\/p><\/aside>\n<p><strong>La escena.<\/strong> En diciembre de 2025, un tribunal de Hong Kong condenó a 20 años de cárcel a Jimmy Lai, fundador de un periódico, de 78 años. En enero de 2026, expertos de la ONU advirtieron de que el trabajo forzado de uigures y tibetanos podría constituir crímenes contra la humanidad. En julio de 2025, el Dalái Lama cumplió 90 años y declaró que solo su propia fundación —no Pekín— podrá reconocer su reencarnación; China respondió que el próximo Dalái Lama deberá ser aprobado por el Partido Comunista, que es ateo. Tres lugares muy distintos, una sola lógica: el centro sostendrá la periferia, cueste lo que cueste.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>China no es uniforme ni étnica ni políticamente. Un núcleo han rodea periferias no-han (Xinjiang, Tíbet, Mongolia Interior) y casos especiales (Hong Kong; y Taiwán, que Pekín reclama pero nunca ha gobernado). El Partido trata la unidad territorial como algo <strong>existencial<\/strong> —el miedo a la fragmentación de la Lección 1— y su método, bajo Xi, se ha endurecido hacia la <strong>sinización<\/strong>: asimilación, seguridad y control de la religión y la identidad. Entender esta lógica explica algunas de las noticias más duras sobre China, y por qué para Pekín no son negociables.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: centro-periferia y una escalera de métodos<\/span><\/div><div class=\"sec-body\">\n<p><strong>El mapa:<\/strong> núcleo han ↔ periferias no-han (Xinjiang, Tíbet, Mongolia Interior) ↔ casos especiales (Hong Kong, bajo \"un país, dos sistemas\"; Taiwán, reclamada y nunca gobernada por la RPC).<\/p>\n<p><strong>La escalera de métodos, de blando a duro:<\/strong> autonomía nominal (regiones \"autónomas\" que no lo son) → desarrollo e inmigración han (diluir la demografía) → sinización (asimilar lengua, religión, identidad) → seguridad y vigilancia (Xinjiang: campos, transferencias de mano de obra) → represión legal (Hong Kong: Ley de Seguridad Nacional).<\/p>\n<p><strong>Cómo se usa el modelo.<\/strong> Ante una noticia de la periferia, sitúela en la escalera y pregunte qué amenaza percibe el centro. Casi siempre, la respuesta remite a la unidad.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-por-que-regiones-autonomas-que-no-son-autonomas\">C1. ¿Por qué \"regiones autónomas\" que no son autónomas?<\/h3>\n<p>La RPC heredó un imperio diverso y concedió formalmente \"autonomía\" a las regiones de minorías. Pero el poder real reside en los secretarios del Partido —controlados por el centro y, en la cúspide, de predominio han—. La autonomía es <strong>nominal<\/strong>; la prioridad es la unidad y la seguridad. El término engaña si se toma en su sentido occidental.<\/p>\n<h3 id=\"c2-xinjiang-que-ha-ocurrido-y-como-se-nombra\">C2. Xinjiang: ¿qué ha ocurrido y cómo se nombra?<\/h3>\n<p>Tras incidentes separatistas y atentados (disturbios de Urumqi en 2009, ataques a principios de la década de 2010), Pekín lanzó desde aproximadamente 2017 una campaña vasta: <strong>campos de \"reeducación\"<\/strong> (las estimaciones hablan de más de un millón de detenidos), vigilancia extrema, control de la natalidad, <strong>transferencias de mano de obra<\/strong> y sinización del islam. El informe de la Oficina de Derechos Humanos de la ONU (2022) apreció posibles <strong>crímenes contra la humanidad<\/strong>; en enero de 2026, expertos de la ONU reiteraron la alarma por trabajo forzado (el plan quinquenal 2021–2025 de Xinjiang proyectaba 13,75 millones de transferencias laborales). <strong>La terminología está disputada:<\/strong> EE. UU. y algunos parlamentos lo califican de \"genocidio\"; el informe de la ONU habló de crímenes contra la humanidad; China lo llama \"formación profesional\" y antiterrorismo. Conviene ser preciso: los hechos documentados —detención masiva, trabajo forzado, supresión cultural— no están seriamente en disputa fuera de las fuentes oficiales chinas, aunque la <strong>etiqueta legal exacta<\/strong> sí se debata. La lógica interna de Pekín es seguridad más asimilación para prevenir el separatismo. Explicarla no es avalarla.<\/p>\n<h3 id=\"c3-tibet-asimilacion-y-la-batalla-por-lo-sagrado\">C3. Tíbet: ¿asimilación y la batalla por lo sagrado?<\/h3>\n<p>Décadas de inmigración han, control de los monasterios y <strong>internados<\/strong> que separan a los niños de la lengua y la cultura tibetanas (\"sinización\"). El punto caliente de 2025: el Dalái Lama, a sus 90 años, afirma que su sucesor se buscará <strong>fuera de China<\/strong> y lo reconocerá solo su propia fundación; Pekín insiste en que aprobará la reencarnación —la insólita pretensión de un partido ateo de controlar una sucesión religiosa—. El riesgo: dos Dalái Lamas rivales, uno respaldado por el exilio y otro por Pekín. <strong>Mecanismo:<\/strong> controlar lo sagrado para controlar al pueblo.<\/p>\n<h3 id=\"c4-hong-kong-que-fue-un-pais-dos-sistemas-y-por-que-se-acabo\">C4. Hong Kong: ¿qué fue \"un país, dos sistemas\" y por qué se acabó?<\/h3>\n<p>El traspaso de 1997 prometió autonomía y libertades durante 50 años. La secuencia posterior: protestas masivas en 2019 → <strong>Ley de Seguridad Nacional (2020)<\/strong> → <strong>Artículo 23 / Ordenanza de Salvaguarda de la Seguridad Nacional (2024)<\/strong> → oposición encarcelada o exiliada y prensa arrasada (Jimmy Lai, 20 años, diciembre de 2025; la libertad de prensa cayó del puesto 80 al 140 en la clasificación de Reporteros Sin Fronteras). Pekín priorizó el control sobre la promesa de los \"dos sistemas\". <strong>Lección para Taiwán:<\/strong> el destino de Hong Kong desacreditó \"un país, dos sistemas\" como modelo para la isla.<\/p>\n<h3 id=\"c5-taiwan-como-cuestion-domestica-simbolica\">C5. Taiwán como cuestión doméstica-simbólica<\/h3>\n<p>Para Pekín, Taiwán no es política exterior: es el asunto inconcluso de la guerra civil y la prueba última de la \"unidad\" (Lección 1). Nunca gobernada por la RPC, con autogobierno democrático (unos 23 millones de personas), pero reclamada como provincia. Su peso doméstico-simbólico es enorme: la \"reunificación\" está ligada al \"rejuvenecimiento nacional\" y a la legitimidad del Partido. <em>(La dimensión internacional y militar va a la Lección 11; los escenarios, a la 12.)<\/em> Aquí interesa entender por qué es innegociable y emocionalmente central.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Regiones autónomas (autonomía nominal)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  territorios de minorías con autonomía formal pero control real del Partido.<br><b class=\"mlbl\">Importancia:<\/b>  muestra la brecha entre la etiqueta y la práctica.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que gozan de autogobierno real.<\/p>\n<\/li>\n<li>\n<p><strong>Sinización<\/strong><br><b class=\"mlbl\">Definición:<\/b>  política de alinear lengua, religión e identidad con la cultura han y la ideología del Partido.<br><b class=\"mlbl\">Importancia:<\/b>  el hilo común de la gestión de la periferia bajo Xi.<br><b class=\"mlbl\">Error habitual:<\/b>  verla como integración voluntaria y no como asimilación dirigida.<\/p>\n<\/li>\n<li>\n<p><strong>Xinjiang: campos y transferencias de mano de obra<\/strong><br><b class=\"mlbl\">Definición:<\/b>  sistema de detención y trabajo dirigido a la población uigur.<br><b class=\"mlbl\">Importancia:<\/b>  el caso más grave de control de la periferia.<br><b class=\"mlbl\">Error habitual:<\/b>  dar por cerrada la etiqueta \"genocidio\" o, al revés, aceptar la versión de \"formación profesional\".<\/p>\n<\/li>\n<li>\n<p><strong>\"Un país, dos sistemas\"<\/strong><br><b class=\"mlbl\">Definición:<\/b>  fórmula que prometía autonomía a Hong Kong (y se ofrecía a Taiwán).<br><b class=\"mlbl\">Importancia:<\/b>  su vaciamiento en Hong Kong reconfigura el cálculo sobre Taiwán.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que sigue vigente en la práctica.<\/p>\n<\/li>\n<li>\n<p><strong>\"Una sola China\" / Taiwán<\/strong><br><b class=\"mlbl\">Definición:<\/b>  principio por el que Pekín reclama Taiwán como parte de China.<br><b class=\"mlbl\">Importancia:<\/b>  soberanía inconclusa ligada a la legitimidad del régimen.<br><b class=\"mlbl\">Error habitual:<\/b>  tratarlo como mero conflicto de política exterior.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente (versión oficial china):<\/strong> \"Lo de Xinjiang es solo formación profesional y lucha antiterrorista; es un asunto interno.\"<\/p>\n<ol>\n<li><strong>Qué parte puede ser cierta:<\/strong> hubo atentados reales y una preocupación genuina por la seguridad y el separatismo.<\/li>\n<li><strong>Qué omite:<\/strong> la escala (detención masiva), la coerción (trabajo forzado) y el objetivo cultural (supresión de lengua, religión e identidad) desbordan por completo la idea de \"formación\". <em>(El error opuesto también existe: tratar la etiqueta \"genocidio\" como un hecho cerrado; los abusos están documentados, pero el término legal exacto se debate —la ONU habló de crímenes contra la humanidad—.)<\/em><\/li>\n<li><strong>Versión más precisa:<\/strong> \"En Xinjiang hay detención masiva, trabajo forzado y supresión cultural documentados, orientados a la asimilación y la seguridad; la etiqueta jurídica (genocidio o crímenes contra la humanidad) se discute, pero los hechos de fondo no.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Xinjiang:<\/strong> más de un millón de detenidos (estimaciones); informe de la ONU de 2022 (posibles crímenes contra la humanidad); expertos de la ONU en enero de 2026 (trabajo forzado; 13,75 millones de transferencias laborales proyectadas en el plan 2021–2025). Sinización codificada como política en 2016.<\/li>\n<li><strong>Hong Kong:<\/strong> traspaso en 1997; Ley de Seguridad Nacional (2020); Artículo 23 (2024); Jimmy Lai condenado en diciembre de 2025 a 20 años; libertad de prensa del puesto 80 al 140.<\/li>\n<li><strong>Tíbet:<\/strong> el Dalái Lama cumple 90 años (6 de julio de 2025); disputa abierta con Pekín sobre la reencarnación.<\/li>\n<li><strong>Taiwán:<\/strong> nunca gobernada por la RPC; democracia de ~23 millones; reclamada como provincia. <em>(Hecho comprobado.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido — tres frentes, una lógica.<\/strong> En pocos meses: la ONU alertó (22 de enero de 2026) de trabajo forzado que podría constituir crímenes contra la humanidad en Xinjiang y otras zonas; Hong Kong condenó a Jimmy Lai a 20 años (diciembre de 2025), la pena más larga bajo la Ley de Seguridad Nacional; y el Dalái Lama (90 años, julio de 2025) abrió el pulso final por su sucesión frente a un Pekín que exige aprobarla. <em>(Fechas verificadas.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La sinización, la autonomía nominal, la unidad como asunto existencial y el control de lo religioso.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> La terminología (genocidio frente a crímenes contra la humanidad); si la sinización es \"integración\" (versión oficial) o \"borrado\" (críticos); si la represión de Hong Kong fue reacción a las protestas o un plan largamente preparado.<\/p>\n<p><strong>Qué información falta.<\/strong> El acceso independiente está muy restringido (humildad epistémica): buena parte de la evidencia procede de documentos filtrados, imágenes de satélite y testimonios, porque la verificación sobre el terreno está bloqueada.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar) — útil como producto final.<\/strong> Un mapa etnolingüístico de China: el núcleo han frente a las regiones autónomas (Xinjiang, Tíbet, Mongolia Interior, Guangxi, Ningxia), más Hong Kong y Macao y Taiwán. Debe hacer visible cuánto territorio ocupan las periferias no-han pese a ser minoría demográfica. <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (10 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1950–1951<\/strong> — Incorporación del Tíbet a la RPC.<\/li>\n<li><strong>1955<\/strong> — Creación de la Región Autónoma Uigur de Xinjiang.<\/li>\n<li><strong>1959<\/strong> — Levantamiento tibetano; el Dalái Lama se exilia.<\/li>\n<li><strong>1997<\/strong> — Traspaso de Hong Kong.<\/li>\n<li><strong>2008<\/strong> — Disturbios en el Tíbet.<\/li>\n<li><strong>2009<\/strong> — Disturbios de Urumqi (Xinjiang).<\/li>\n<li><strong>2017<\/strong> — Escalada de los campos en Xinjiang.<\/li>\n<li><strong>2019–2020<\/strong> — Protestas de Hong Kong; Ley de Seguridad Nacional.<\/li>\n<li><strong>2022–2024<\/strong> — Informe de la ONU sobre Xinjiang; Artículo 23 en Hong Kong.<\/li>\n<li><strong>2025–2026<\/strong> — Dalái Lama a los 90; condena de Jimmy Lai; alerta de la ONU.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Tratar \"genocidio\" como hecho cerrado y unívoco.<\/strong> <em>Corrección:<\/em> los abusos están documentados; el término legal exacto se debate (la ONU habló de crímenes contra la humanidad).<\/li>\n<li><strong>Aceptar la versión oficial (\"formación profesional\", \"asunto interno\").<\/strong> <em>Corrección:<\/em> la escala, la coerción y el objetivo cultural la desmienten.<\/li>\n<li><strong>Ver Taiwán como política exterior.<\/strong> <em>Corrección:<\/em> para Pekín es soberanía doméstica inconclusa, atada a la legitimidad del régimen.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si la unidad territorial es existencial para el Partido (Lección 1) y el modelo \"un país, dos sistemas\" quedó desacreditado en Hong Kong, ¿qué opciones creíbles le quedan a Pekín con Taiwán, y qué coste tendría cada una? <em>(Conecta con las Lecciones 1, 11 y 12.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><
