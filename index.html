\/p>\n<ol>\n<li>¿Qué significa \"autonomía\" en las regiones autónomas chinas?<\/li>\n<li>¿Qué es la sinización?<\/li>\n<li>¿Por qué el caso del Dalái Lama enfrenta a Pekín con la religión?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué el destino de Hong Kong afecta al cálculo de Pekín (y de Taipéi) sobre Taiwán.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"Lo de Xinjiang es solo formación profesional y lucha antiterrorista.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre Xinjiang, Tíbet o Hong Kong e identifica en qué peldaño de la escalera de control se sitúa y qué amenaza percibe el centro.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>China es un núcleo han que sostiene periferias no-han y casos especiales (Hong Kong, Taiwán).<\/li>\n<li>La unidad es existencial; el método bajo Xi es la sinización: asimilación, seguridad, control.<\/li>\n<li>En Xinjiang hay detención masiva y trabajo forzado documentados; la etiqueta legal se debate, los hechos no.<\/li>\n<li>Hong Kong mostró el vaciamiento práctico de \"un país, dos sistemas\".<\/li>\n<li>Taiwán, para Pekín, no es política exterior: es soberanía inconclusa ligada a su legitimidad.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 9.<\/strong> La unidad no es solo política; también tiene lógica económica —recursos de Xinjiang, el papel financiero de Hong Kong, la integración de las periferias—. Y la economía es el siguiente gran sistema por comprender: cómo funciona realmente. Eso abre el Bloque de economía, en la Lección 9.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad. Las ONG de derechos humanos se citan señalando su función de denuncia.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Darren Byler, <em>In the Camps<\/em> y <em>Terror Capitalism<\/em> — Xinjiang.<\/li>\n<li>James A. Millward, <em>Eurasian Crossroads: A History of Xinjiang<\/em>.<\/li>\n<li>Barbara Demick, <em>Eat the Buddha<\/em> — vida y represión en el Tíbet.<\/li>\n<li>Louisa Lim, <em>Indelible City<\/em> (Hong Kong) y <em>The People's Republic of Amnesia<\/em>.<\/li>\n<li>Sean R. Roberts, <em>The War on the Uyghurs<\/em>.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Informe de la Oficina de Derechos Humanos de la ONU sobre Xinjiang (2022) y declaración de expertos de la ONU (enero de 2026).<\/li>\n<li>Texto de la Ley de Seguridad Nacional de Hong Kong (2020); declaración del Dalái Lama sobre la sucesión (2025).<\/li>\n<\/ul>\n<p><strong>Análisis / denuncia (para el caso actual)<\/strong><\/p>\n<ul>\n<li>Council on Foreign Relations, <em>backgrounder<\/em> sobre Xinjiang; MERICS.<\/li>\n<li>Human Rights Watch y Amnistía Internacional (organizaciones de denuncia; postura declaradamente crítica).<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 8 — La periferia y el problema de la unidad Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: centro-periferia y una escalera de métodos C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Por qué la periferia no-han (Xinjiang, Tíbet, Hong Kong) y Taiwán son tan sensibles, y cómo los gestiona Pekín? La escena. En diciembre de 2025, un tribunal de Hong Kong condenó a 20 años de cárcel a Jimmy Lai, fundador de un periódico, de 78 años. En enero de 2026, expertos de la ONU advirtieron de que el trabajo forzado de uigures y tibetanos podría constituir crímenes contra la humanidad. En julio de 2025, el Dalái Lama cumplió 90 años y declaró que solo su propia fundación —no Pekín— podrá reconocer su reencarnación; China respondió que el próximo Dalái Lama deberá ser aprobado por el Partido Comunista, que es ateo. Tres lugares muy distintos, una sola lógica: el centro sostendrá la periferia, cueste lo que cueste. Idea clave China no es uniforme ni étnica ni políticamente. Un núcleo han rodea periferias no-han (Xinjiang, Tíbet, Mongolia Interior) y casos especiales (Hong Kong; y Taiwán, que Pekín reclama pero nunca ha gobernado). El Partido trata la unidad territorial como algo existencial —el miedo a la fragmentación de la Lección 1— y su método, bajo Xi, se ha endurecido hacia la sinización : asimilación, seguridad y control de la religión y la identidad. Entender esta lógica explica algunas de las noticias más duras sobre China, y por qué para Pekín no son negociables. B Modelo mental: centro-periferia y una escalera de métodos El mapa: núcleo han ↔ periferias no-han (Xinjiang, Tíbet, Mongolia Interior) ↔ casos especiales (Hong Kong, bajo \"un país, dos sistemas\"; Taiwán, reclamada y nunca gobernada por la RPC). La escalera de métodos, de blando a duro: autonomía nominal (regiones \"autónomas\" que no lo son) → desarrollo e inmigración han (diluir la demografía) → sinización (asimilar lengua, religión, identidad) → seguridad y vigilancia (Xinjiang: campos, transferencias de mano de obra) → represión legal (Hong Kong: Ley de Seguridad Nacional). Cómo se usa el modelo. Ante una noticia de la periferia, sitúela en la escalera y pregunte qué amenaza percibe el centro. Casi siempre, la respuesta remite a la unidad. C Desarrollo C1. ¿Por qué \"regiones autónomas\" que no son autónomas? La RPC heredó un imperio diverso y concedió formalmente \"autonomía\" a las regiones de minorías. Pero el poder real reside en los secretarios del Partido —controlados por el centro y, en la cúspide, de predominio han—. La autonomía es nominal ; la prioridad es la unidad y la seguridad. El término engaña si se toma en su sentido occidental. C2. Xinjiang: ¿qué ha ocurrido y cómo se nombra? Tras incidentes separatistas y atentados (disturbios de Urumqi en 2009, ataques a principios de la década de 2010), Pekín lanzó desde aproximadamente 2017 una campaña vasta: campos de \"reeducación\" (las estimaciones hablan de más de un millón de detenidos), vigilancia extrema, control de la natalidad, transferencias de mano de obra y sinización del islam. El informe de la Oficina de Derechos Humanos de la ONU (2022) apreció posibles crímenes contra la humanidad ; en enero de 2026, expertos de la ONU reiteraron la alarma por trabajo forzado (el plan quinquenal 2021–2025 de Xinjiang proyectaba 13,75 millones de transferencias laborales). La terminología está disputada: EE. UU. y algunos parlamentos lo califican de \"genocidio\"; el informe de la ONU habló de crímenes contra la humanidad; China lo llama \"formación profesional\" y antiterrorismo. Conviene ser preciso: los hechos documentados —detención masiva, trabajo forzado, supresión cultural— no están seriamente en disputa fuera de las fuentes oficiales chinas, aunque la etiqueta legal exacta sí se debata. La lógica interna de Pekín es seguridad más asimilación para prevenir el separatismo. Explicarla no es avalarla. C3. Tíbet: ¿asimilación y la batalla por lo sagrado? Décadas de inmigración han, control de los monasterios y internados que separan a los niños de la lengua y la cultura tibetanas (\"sinización\"). El punto caliente de 2025: el Dalái Lama, a sus 90 años, afirma que su sucesor se buscará fuera de China y lo reconocerá solo su propia fundación; Pekín insiste en que aprobará la reencarnación —la insólita pretensión de un partido ateo de controlar una sucesión religiosa—. El riesgo: dos Dalái Lamas rivales, uno respaldado por el exilio y otro por Pekín. Mecanismo: controlar lo sagrado para controlar al pueblo. C4. Hong Kong: ¿qué fue \"un país, dos sistemas\" y por qué se acabó? El traspaso de 1997 prometió autonomía y libertades durante 50 años. La secuencia posterior: protestas masivas en 2019 → Ley de Seguridad Nacional (2020) → Artículo 23 / Ordenanza de Salvaguarda de la Seguridad Nacional (2024) → oposición encarcelada o exiliada y prensa arrasada (Jimmy Lai, 20 años, diciembre de 2025; la libertad de prensa cayó del puesto 80 al 140 en la clasificación de Reporteros Sin Fronteras). Pekín priorizó el control sobre la promesa de los \"dos sistemas\". Lección para Taiwán: el destino de Hong Kong desacreditó \"un país, dos sistemas\" como modelo para la isla. C5. Taiwán como cuestión doméstica-simbólica Para Pekín, Taiwán no es política exterior: es el asunto inconcluso de la guerra civil y la prueba última de la \"unidad\" (Lección 1). Nunca gobernada por la RPC, con autogobierno democrático (unos 23 millones de personas), pero reclamada como provincia. Su peso doméstico-simbólico es enorme: la \"reunificación\" está ligada al \"rejuvenecimiento nacional\" y a la legitimidad del Partido. (La dimensión internacional y militar va a la Lección 11; los escenarios, a la 12.) Aquí inte"}, {"id": "Leccion09_Como_funciona_la_economia", "group": "III · Territorio y economía", "badge": "9", "title": "Cómo funciona la economía", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.", "readmin": 23, "color": "#15803d", "html": "<div class=\"doc-head\"><h1 id=\"leccion-9-como-funciona-la-economia-china-mercado-dirigido-por-el-partido-estado\">Lección 9 — Cómo funciona la economía china: mercado dirigido por el Partido-Estado<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: el mercado dirigido<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Cómo combina China mercado, planificación, competencia y control político?<\/p><\/aside>\n<p><strong>La escena.<\/strong> En China conviven cosas que parecen incompatibles: una competencia de mercado feroz —cientos de fabricantes de coches eléctricos enzarzados en guerras de precios, gigantes tecnológicos privados— y, a la vez, planes quinquenales, bancos estatales y las mayores empresas públicas del mundo. No es la economía de mando soviética ni un mercado libre. ¿Cómo encajan estas piezas? La respuesta: es una <strong>economía de mercado dirigida por el Partido-Estado<\/strong>, donde el mercado asigna, pero el Estado y el Partido fijan el rumbo y pueden imponerse.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>El Partido no gestiona cada empresa (el mito de que \"todo se controla desde Pekín\" es falso, como ya apuntó la Lección 7). Dirige mediante palancas: la propiedad de empresas estratégicas y bancos, el control del crédito y del suelo, los planes quinquenales y la política industrial. Por debajo opera un mercado real, competitivo y a menudo caótico, con gobiernos locales que compiten e improvisan. <strong>Dirección desde arriba + competencia y negociación desde abajo.<\/strong><\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: el mercado dirigido<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Palancas de dirección (arriba):<\/strong> empresas estatales en sectores estratégicos; bancos públicos que orientan el crédito; propiedad estatal del suelo; planes quinquenales; política industrial.<\/li>\n<li><strong>Motor de mercado (abajo):<\/strong> sector privado (empleo, innovación), competencia feroz, precios de mercado.<\/li>\n<li><strong>Actores intermedios decisivos:<\/strong> los <strong>gobiernos locales<\/strong>, que compiten entre sí, se financian con el suelo y ejecutan —o desvían— la política central. Es el \"autoritarismo fragmentado\" (Lección 6) en clave económica.<\/li>\n<\/ul>\n<p><strong>Cómo se usa el modelo.<\/strong> La fórmula para recordar: <strong>Pekín marca el rumbo; el mercado rema; los gobiernos locales interpretan (y regatean).<\/strong> Ante una noticia económica, pregunte qué palanca estatal y qué fuerza de mercado están en juego.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-que-controla-el-estado-directamente\">C1. ¿Qué controla el Estado directamente?<\/h3>\n<p>Las \"alturas dominantes\": las empresas estatales mandan en energía, banca, telecomunicaciones, ferrocarril y defensa; los grandes bancos públicos dirigen el crédito hacia sectores y empresas favorecidas; y el suelo urbano es de propiedad estatal (las empresas y familias solo compran derechos de uso). Son las palancas directas: no hace falta gestionar cada fábrica si se controla el crédito, la energía y el suelo.<\/p>\n<h3 id=\"c2-como-dirige-sin-controlarlo-todo-planes-y-politica-industrial\">C2. ¿Cómo dirige sin controlarlo todo? (planes y política industrial)<\/h3>\n<p>Los planes quinquenales fijan prioridades: el 15.º (2026–2030) impulsa las \"nuevas fuerzas productivas\" —semiconductores, IA, biomedicina, cuántica, aeroespacial comercial, 6G—. La política industrial canaliza subsidios, crédito barato y compras públicas hacia los sectores elegidos (el programa \"Made in China 2025\" ayudó a que China lidere hoy en coche eléctrico, solar y baterías). <strong>Mecanismo:<\/strong> el Estado no produce; inclina masivamente el terreno de juego hacia lo que quiere impulsar. Resultado doble: éxitos espectaculares (coche eléctrico, solar) <em>y<\/em> sobrecapacidad y despilfarro (demasiadas empresas subvencionadas, guerras de precios, excedentes).<\/p>\n<h3 id=\"c3-que-papel-juegan-los-gobiernos-locales\">C3. ¿Qué papel juegan los gobiernos locales?<\/h3>\n<p>Es crucial y poco entendido. A los cargos locales se los ascendía por generar crecimiento del PIB, de modo que competían con ferocidad por atraer inversión, construir infraestructuras y respaldar a sus \"campeones\" locales: una fuente enorme de dinamismo. Lo financiaban con las \"<strong>finanzas del suelo<\/strong>\" (venta de derechos de uso) y con deuda fuera de balance a través de los <strong>vehículos de financiación de gobiernos locales (LGFV)<\/strong>. Esa competencia impulsó el crecimiento, pero también duplicó proyectos, disparó la deuda e infló la burbuja inmobiliaria. Aquí está la \"competencia, negociación e improvisación\" que definen el sistema.<\/p>\n<h3 id=\"c4-como-se-relacionan-los-empresarios-con-el-partido\">C4. ¿Cómo se relacionan los empresarios con el Partido?<\/h3>\n<p>Las empresas privadas prosperan, pero bajo la mirada del Partido: hay <strong>células del Partido<\/strong> dentro de las compañías y la posibilidad siempre presente de intervención (el freno de 2020–21 y el cortejo de 2025 de la Lección 5). Los empresarios deben mantenerse alineados políticamente. El capital es poderoso pero no soberano: la relación es simbiótica y asimétrica.<\/p>\n<h3 id=\"c5-por-que-todo-se-dirige-desde-pekin-es-falso\">C5. ¿Por qué \"todo se dirige desde Pekín\" es falso?<\/h3>\n<p>Porque: (a) el mercado asigna la mayor parte de los recursos y fija los precios; (b) los gobiernos locales tienen gran autonomía e intereses propios, y a menudo desafían o \"torean\" la política central; (c) ministerios y provincias negocian; (d) la ejecución se aparta de la intención (autoritarismo fragmentado). Hay, pues, dirección política real, pero también competencia, negociación, improvisación y conflicto institucional. El error es imaginar un único planificador; la realidad es un sistema dirigido pero desordenado y competitivo.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Empresas estatales (SOEs) / alturas dominantes<\/strong><br><b class=\"mlbl\">Definición:<\/b>  grandes empresas públicas que controlan sectores estratégicos.<br><b class=\"mlbl\">Importancia:<\/b>  palanca económica directa del Estado.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que son ineficientes reliquias; siguen siendo centrales y financiadas.<\/p>\n<\/li>\n<li>\n<p><strong>Planes quinquenales / política industrial<\/strong><br><b class=\"mlbl\">Definición:<\/b>  prioridades y subsidios que orientan la inversión hacia sectores elegidos.<br><b class=\"mlbl\">Importancia:<\/b>  explican liderazgos (coche eléctrico, solar) y también la sobrecapacidad.<br><b class=\"mlbl\">Error habitual:<\/b>  verlos solo como éxito o solo como despilfarro; son ambas cosas.<\/p>\n<\/li>\n<li>\n<p><strong>Gobiernos locales / finanzas del suelo / LGFV<\/strong><br><b class=\"mlbl\">Definición:<\/b>  administraciones que financian el crecimiento vendiendo suelo y endeudándose fuera de balance.<br><b class=\"mlbl\">Importancia:<\/b>  motor del dinamismo y origen de la deuda y la burbuja.<br><b class=\"mlbl\">Error habitual:<\/b>  ignorarlos y atribuir todo a Pekín.<\/p>\n<\/li>\n<li>\n<p><strong>Crédito dirigido<\/strong><br><b class=\"mlbl\">Definición:<\/b>  asignación del crédito por bancos públicos según prioridades políticas.<br><b class=\"mlbl\">Importancia:<\/b>  cómo el Estado premia sectores sin poseer las empresas.<br><b class=\"mlbl\">Error habitual:<\/b>  suponer que el crédito sigue solo criterios de mercado.<\/p>\n<\/li>\n<li>\n<p><strong>Autoritarismo fragmentado (económico)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  brecha entre lo que Pekín ordena y lo que provincias y ministerios ejecutan.<br><b class=\"mlbl\">Importancia:<\/b>  matiza el mito del control total.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginar una máquina perfectamente centralizada.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"Toda la economía china está controlada directamente desde Pekín.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> hay dirección política real (planes, política industrial, empresas estatales, crédito dirigido).<\/li>\n<li><strong>Qué omite:<\/strong> el mercado asigna la mayoría de los recursos; los gobiernos locales compiten, improvisan y regatean; hay conflicto institucional y desvíos.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"China es una economía de mercado dirigida por el Partido-Estado: Pekín marca el rumbo, pero abajo hay competencia feroz, intereses locales y ejecución dispar.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>15.º Plan Quinquenal (2026–2030):<\/strong> \"nuevas fuerzas productivas\" (aeroespacial comercial, economía de baja altitud, biomedicina, cuántica, IA, 6G).<\/li>\n<li><strong>Liderazgo industrial:<\/strong> China domina hoy en coche eléctrico, solar y baterías (herencia de \"Made in China 2025\"). <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Deuda local:<\/strong> la deuda oculta se ha reducido un 65 % (a abril de 2026) y el 82 % de los LGFV se han transformado o liquidado; aun así, la deuda LGFV rondaba el 45 % del PIB en 2024, con fuerte disparidad costa-interior.<\/li>\n<li><strong>Estructura:<\/strong> las empresas estatales dominan la energía, la banca, las telecomunicaciones y el ferrocarril; el suelo urbano es de propiedad estatal. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Tensión:<\/strong> la inversión en sectores estratégicos tiende a desplazar el consumo y agrava la deuda local. <em>(Análisis; Asia Society.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> En 2026 China despliega su <strong>15.º Plan Quinquenal (2026–2030)<\/strong>, con las \"nuevas fuerzas productivas\" como eje: un empuje estatal masivo hacia la autosuficiencia tecnológica (chips, IA, aeroespacial, cuántica).<\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> Política industrial, planificación, mercado dirigido y ejecución local.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Es una apuesta ganadora (como el coche eléctrico o la solar) o una sobreinversión que desplaza el consumo y añade deuda? Varios analistas advierten de que los sectores estratégicos son aún demasiado pequeños para compensar la contracción del ladrillo y la infraestructura.<\/p>\n<p><strong>Qué información falta.<\/strong> Si el plan reanima la demanda interna o profundiza el desequilibrio inversión/consumo (el tema de la Lección 10).<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un diagrama del \"mercado dirigido\": arriba las palancas del Partido-Estado (empresas estatales, bancos, suelo, planes); abajo el mercado privado; en medio los gobiernos locales. Como complemento, una tabla de \"quién dirige qué\" por sector. <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (8 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1994<\/strong> — Reforma fiscal: centraliza ingresos y empuja a los locales a las \"finanzas del suelo\".<\/li>\n<li><strong>2001<\/strong> — Ingreso en la OMC: la fábrica del mundo.<\/li>\n<li><strong>2008<\/strong> — Estímulo de 4 billones de yuanes: auge de infraestructura y deuda.<\/li>\n<li><strong>2013<\/strong> — \"Papel decisivo del mercado\" y reforma de las empresas estatales.<\/li>\n<li><strong>2015<\/strong> — \"Made in China 2025\".<\/li>\n<li><strong>2020–2021<\/strong> — Freno regulatorio a las tecnológicas.<\/li>\n<li><strong>2023–2024<\/strong> — \"Nuevas fuerzas productivas\".<\/li>\n<li><strong>2026<\/strong> — 15.º Plan Quinquenal.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Imaginar una economía planificada al estilo soviético.<\/strong> <em>Corrección:<\/em> es de mercado, con dirección estatal por incentivos y crédito.<\/li>\n<li><strong>Creer que \"todo se decide en Pekín\".<\/strong> <em>Corrección:<\/em> los gobiernos locales tienen enorme autonomía e intereses propios.<\/li>\n<li><strong>Ver la política industrial solo como éxito o solo como despilfarro.<\/strong> <em>Corrección:<\/em> produce ambas cosas a la vez (liderazgo y sobrecapacidad).<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si los gobiernos locales se financiaban vendiendo suelo y endeudándose para crecer, ¿qué le ocurre a ese modelo cuando el sector inmobiliario se hunde (Lección 10)? ¿Puede China cambiar el motor del crecimiento sin desmontar los incentivos que hicieron ascender a sus propios funcionarios? <em>(Conecta con las Lecciones 6 y 10.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué son las \"alturas dominantes\" de la economía?<\/li>\n<li>¿Cómo se financiaban los gobiernos locales?<\/li>\n<li>¿Qué son las \"nuevas fuerzas productivas\"?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica cómo la competencia entre gobiernos locales generó a la vez dinamismo económico y sobreendeudamiento.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"La economía china está planificada centralmente.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre un sector (coche eléctrico, chips, inmobiliario) e identifica qué palanca estatal y qué fuerza de mercado operan en él.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>China es una economía de mercado dirigida por el Partido-Estado, no una economía planificada.<\/li>\n<li>El Estado dirige por palancas: empresas estatales, bancos, suelo, planes y política industrial.<\/li>\n<li>Los gobiernos locales, compitiendo y endeudándose, fueron motor de dinamismo y de deuda.<\/li>\n<li>La política industrial produce a la vez liderazgos (coche eléctrico, solar) y sobrecapacidad.<\/li>\n<li>\"Todo se dirige desde Pekín\" es falso: hay competencia, negociación e improvisación abajo.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 10.<\/strong> Este motor —inversión dirigida, suelo, gobiernos locales, exportación— produjo un crecimiento histórico, pero se está agotando. Por qué, y qué límites lo frenan, es la Lección 10.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Barry Naughton, <em>The Chinese Economy<\/em> y <em>The Rise of China's Industrial Policy<\/em>.<\/li>\n<li>Yuen Yuen Ang, <em>How China Escaped the Poverty Trap<\/em> — el papel de los gobiernos locales.<\/li>\n<li>Nicholas Lardy, <em>The State Strikes Back<\/em>; Arthur Kroeber, <em>China's Economy<\/em>.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Documentos del 15.º Plan Quinquenal (2026–2030).<\/li>\n<li>FMI, Consulta del Artículo IV de 2025 sobre China (concluida en febrero de 2026).<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>Asia Society Policy Institute, \"China's Next Move\".<\/li>\n<li>Rhodium Group, \"China's Financial and Fiscal Decay\"; Gavekal Dragonomics.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 9 — Cómo funciona la economía china: mercado dirigido por el Partido-Estado Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: el mercado dirigido C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Cómo combina China mercado, planificación, competencia y control político? La escena. En China conviven cosas que parecen incompatibles: una competencia de mercado feroz —cientos de fabricantes de coches eléctricos enzarzados en guerras de precios, gigantes tecnológicos privados— y, a la vez, planes quinquenales, bancos estatales y las mayores empresas públicas del mundo. No es la economía de mando soviética ni un mercado libre. ¿Cómo encajan estas piezas? La respuesta: es una economía de mercado dirigida por el Partido-Estado , donde el mercado asigna, pero el Estado y el Partido fijan el rumbo y pueden imponerse. Idea clave El Partido no gestiona cada empresa (el mito de que \"todo se controla desde Pekín\" es falso, como ya apuntó la Lección 7). Dirige mediante palancas: la propiedad de empresas estratégicas y bancos, el control del crédito y del suelo, los planes quinquenales y la política industrial. Por debajo opera un mercado real, competitivo y a menudo caótico, con gobiernos locales que compiten e improvisan. Dirección desde arriba + competencia y negociación desde abajo. B Modelo mental: el mercado dirigido Palancas de dirección (arriba): empresas estatales en sectores estratégicos; bancos públicos que orientan el crédito; propiedad estatal del suelo; planes quinquenales; política industrial. Motor de mercado (abajo): sector privado (empleo, innovación), competencia feroz, precios de mercado. Actores intermedios decisivos: los gobiernos locales , que compiten entre sí, se financian con el suelo y ejecutan —o desvían— la política central. Es el \"autoritarismo fragmentado\" (Lección 6) en clave económica. Cómo se usa el modelo. La fórmula para recordar: Pekín marca el rumbo; el mercado rema; los gobiernos locales interpretan (y regatean). Ante una noticia económica, pregunte qué palanca estatal y qué fuerza de mercado están en juego. C Desarrollo C1. ¿Qué controla el Estado directamente? Las \"alturas dominantes\": las empresas estatales mandan en energía, banca, telecomunicaciones, ferrocarril y defensa; los grandes bancos públicos dirigen el crédito hacia sectores y empresas favorecidas; y el suelo urbano es de propiedad estatal (las empresas y familias solo compran derechos de uso). Son las palancas directas: no hace falta gestionar cada fábrica si se controla el crédito, la energía y el suelo. C2. ¿Cómo dirige sin controlarlo todo? (planes y política industrial) Los planes quinquenales fijan prioridades: el 15.º (2026–2030) impulsa las \"nuevas fuerzas productivas\" —semiconductores, IA, biomedicina, cuántica, aeroespacial comercial, 6G—. La política industrial canaliza subsidios, crédito barato y compras públicas hacia los sectores elegidos (el programa \"Made in China 2025\" ayudó a que China lidere hoy en coche eléctrico, solar y baterías). Mecanismo: el Estado no produce; inclina masivamente el terreno de juego hacia lo que quiere impulsar. Resultado doble: éxitos espectaculares (coche eléctrico, solar) y sobrecapacidad y despilfarro (demasiadas empresas subvencionadas, guerras de precios, excedentes). C3. ¿Qué papel juegan los gobiernos locales? Es crucial y poco entendido. A los cargos locales se los ascendía por generar crecimiento del PIB, de modo que competían con ferocidad por atraer inversión, construir infraestructuras y respaldar a sus \"campeones\" locales: una fuente enorme de dinamismo. Lo financiaban con las \" finanzas del suelo \" (venta de derechos de uso) y con deuda fuera de balance a través de los vehículos de financiación de gobiernos locales (LGFV) . Esa competencia impulsó el crecimiento, pero también duplicó proyectos, disparó la deuda e infló la burbuja inmobiliaria. Aquí está la \"competencia, negociación e improvisación\" que definen el sistema. C4. ¿Cómo se relacionan los empresarios con el Partido? Las empresas privadas prosperan, pero bajo la mirada del Partido: hay células del Partido dentro de las compañías y la posibilidad siempre presente de intervención (el freno de 2020–21 y el cortejo de 2025 de la Lección 5). Los empresarios deben mantenerse alineados políticamente. El capital es poderoso pero no soberano: la relación es simbiótica y asimétrica. C5. ¿Por qué \"todo se dirige desde Pekín\" es falso? Porque: (a) el mercado asigna la mayor parte de los recursos y fija los precios; (b) los gobiernos locales tienen gran autonomía e intereses propios, y a menudo desafían o \"torean\" la política central; (c) ministerios y provincias negocian; (d) la ejecución se aparta de la intención (autoritarismo fragmentado). Hay, pues, dirección política real, pero también competencia, negociación, improvisación y conflicto institucional. El error es imaginar un único planificador; la realidad es un sistema dirigido pero desordenado y competitivo. D Conceptos imprescindibles Empresas estatales (SOEs) / alturas dominantes Definición: grandes empresas públicas que controlan sectores estratégicos. Importancia: palanca económica directa del Estado. Error habitual: creer que son ineficientes reliquias; siguen siendo centrales y financiadas. Planes quinquenales / política industrial Definición: prioridades y subsidios que orientan la inversión hacia sectores elegidos. Importancia: explican liderazgos (coche eléctrico, solar) y también la sobrecapacidad. Error habitual: verlos solo como éxito o solo como despilfarro; son ambas cosas. Gobiernos locales / finanzas del suelo / LGFV Definición: administraciones que financian el crecimiento vendiendo suelo y endeudándose fue"}, {"id": "Leccion10_El_modelo_de_crecimiento_y_sus_limites", "group": "III · Territorio y economía", "badge": "10", "title": "El modelo de crecimiento y sus límites", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.", "readmin": 23, "color": "#15803d", "html": "<div class=\"doc-head\"><h1 id=\"leccion-10-el-modelo-de-crecimiento-y-sus-limites\">Lección 10 — El modelo de crecimiento y sus límites<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: motores frente a límites<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Cómo creció China tan rápido y por qué ese modelo empieza a agotarse?<\/p><\/aside>\n<p><strong>La escena.<\/strong> Durante unos treinta años, China creció cerca del 10 % anual y sacó de la pobreza a unos 800 millones de personas: el crecimiento sostenido más rápido de la historia. En 2026 combate la deflación, una crisis inmobiliaria que ha borrado buena parte de la riqueza de los hogares, una población que se encoge y un paro juvenil cercano al 17 %. El \"milagro\" no ha terminado, pero el modelo que lo produjo se está quedando sin carretera. Ambas cosas son ciertas a la vez.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>El crecimiento chino no fue un misterio: fue un modelo conocido —movilizar ahorro, invertir de forma masiva (infraestructura, fábricas, vivienda), exportar, urbanizar y absorber una enorme mano de obra joven— ejecutado a escala continental. Dio resultados espectaculares, pero traía una <strong>caducidad incorporada<\/strong>: infradesarrolla el consumo de los hogares, depende en exceso de la inversión y del ladrillo, y se apoyaba en una demografía favorable que ahora se ha invertido. China debe cambiar de motor —de la inversión al consumo—, y es difícil porque todo el sistema está cableado para el modelo antiguo.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: motores frente a límites<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Motores (lo que impulsó):<\/strong> ahorro elevado → inversión masiva (infraestructura, industria, vivienda); urbanización; dividendo demográfico (mucha población activa y joven); exportaciones; transferencia tecnológica; educación.<\/li>\n<li><strong>Límites (por qué se agota):<\/strong> sobreinversión e inmobiliario; deuda (sobre todo local); envejecimiento y caída de población; consumo doméstico débil; productividad decreciente; paro juvenil; deflación; fricciones comerciales externas.<\/li>\n<\/ul>\n<p><strong>Cómo se usa el modelo.<\/strong> La imagen para recordar: <strong>el motor de la inversión rinde cada vez menos por cada yuan, y la demografía, que antes soplaba a favor, ahora sopla en contra.<\/strong> Ante una noticia económica, ubíquela en el eje motores/límites.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-como-crecio-tanto-los-motores\">C1. ¿Cómo creció tanto? (los motores)<\/h3>\n<p>Un ahorro altísimo se canalizó hacia una inversión altísima; la urbanización trasladó a cientos de millones del campo a la ciudad (salto de productividad); una población activa joven y creciente aportó el \"dividendo demográfico\"; la integración en el comercio mundial (OMC, 2001) convirtió a China en la fábrica del planeta; y la transferencia de tecnología y la mejora educativa elevaron la capacidad. Es el modelo del Este asiático (Japón, Corea) llevado a escala continental. No un milagro: un modelo ejecutado a lo grande.<\/p>\n<h3 id=\"c2-por-que-el-inmobiliario-es-el-corazon-del-problema\">C2. ¿Por qué el inmobiliario es el corazón del problema?<\/h3>\n<p>El ladrillo llegó a pesar en torno al 24 % del PIB en su pico (2018): una proporción enorme. Los gobiernos locales dependían de la venta de suelo; los hogares metieron la mayor parte de su riqueza en la vivienda. Cuando el Estado apretó la deuda de las promotoras (2020, las \"tres líneas rojas\"), estalló la cadena: impago de <strong>Evergrande<\/strong> (2021; orden de liquidación en enero de 2024), caída de <strong>Country Garden<\/strong> y otras, precios de la vivienda un ~30 % por debajo de 2021 y precios de vivienda nueva cayendo 31 meses seguidos (a enero de 2026). Como el ladrillo era ~una quinta parte del PIB y el grueso del ahorro familiar, su caída arrastra a la vez al consumo, a las finanzas locales y a la confianza. Es la mecánica de una <strong>recesión de balances<\/strong>.<\/p>\n<h3 id=\"c3-por-que-la-demografia-se-volvio-en-contra\">C3. ¿Por qué la demografía se volvió en contra?<\/h3>\n<p>La población activa tocó techo en 2015; la población total lleva <strong>cuatro años cayendo<\/strong> (−3,39 millones en 2025; 7,92 millones de nacimientos, el mínimo desde 1939; fecundidad en torno a 1,0, muy por debajo del reemplazo de 2,1). Hacia 2035 habrá unos 15 millones de muertes al año; para 2050 China podría perder 250 millones de habitantes. Consecuencias: mano de obra menguante, costes de pensiones y sanidad al alza y el riesgo de \"<strong>envejecer antes de enriquecerse<\/strong>\". El legado de la política de hijo único (1980–2015) y una fecundidad ultrabaja pese a la actual política de tres hijos —que no funciona— hacen de la demografía la restricción más determinista.<\/p>\n<h3 id=\"c4-por-que-el-consumo-es-debil-y-por-que-importa\">C4. ¿Por qué el consumo es débil y por qué importa?<\/h3>\n<p>El modelo <strong>reprimió<\/strong> el consumo de los hogares (baja proporción del PIB frente a la inversión) mediante intereses bajos al ahorro, el sistema del <em>hukou<\/em>, una red de protección social débil (la gente ahorra para sanidad, educación y vejez) y políticas de suelo y salarios. Ahora que la inversión rinde menos, China necesita que los hogares gasten, pero están golpeados por las pérdidas inmobiliarias, la inseguridad laboral (paro juvenil del 16,9 % en marzo de 2026) y la deflación (que invita a posponer compras). <strong>Rebalancear<\/strong> hacia el consumo es el reto central y es política y económicamente difícil.<\/p>\n<h3 id=\"c5-esta-agotado-el-modelo-o-solo-en-transicion-equilibrio\">C5. ¿Está agotado el modelo o solo en transición? (equilibrio)<\/h3>\n<p>Ni colapso ni milagro eterno. China conserva fortalezas reales: dominio manufacturero, liderazgo tecnológico en coche eléctrico, solar y baterías, un mercado gigantesco, ahorro elevado y capacidad estatal. Pero el motor inversión-ladrillo-demografía está gastado, y el cambio hacia consumo e innovación es incierto y lento. El veredicto honesto: una <strong>transición difícil con un abanico amplio de resultados<\/strong> (que la Lección 12 explora como escenarios). Hay que evitar por igual el \"ascenso imparable\" y el \"colapso inminente\".<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Modelo de crecimiento por inversión<\/strong><br><b class=\"mlbl\">Definición:<\/b>  crecimiento impulsado por ahorro e inversión masiva más que por consumo.<br><b class=\"mlbl\">Importancia:<\/b>  explica el auge y su caducidad.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que puede sostenerse indefinidamente.<\/p>\n<\/li>\n<li>\n<p><strong>Dividendo demográfico (y su reversión)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el impulso de tener mucha población activa joven, hoy invertido.<br><b class=\"mlbl\">Importancia:<\/b>  la restricción más determinista del futuro.<br><b class=\"mlbl\">Error habitual:<\/b>  pensar que la política de tres hijos revertirá la caída.<\/p>\n<\/li>\n<li>\n<p><strong>Rebalanceo hacia el consumo<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el giro necesario de un modelo de inversión a uno de demanda interna.<br><b class=\"mlbl\">Importancia:<\/b>  el reto central de la próxima década.<br><b class=\"mlbl\">Error habitual:<\/b>  verlo como puramente técnico; es también político.<\/p>\n<\/li>\n<li>\n<p><strong>Recesión de balances / deflación<\/strong><br><b class=\"mlbl\">Definición:<\/b>  cuando hogares y empresas, tras perder valor sus activos, priorizan reducir deuda antes que gastar.<br><b class=\"mlbl\">Importancia:<\/b>  explica por qué bajar tipos no basta para reactivar el gasto.<br><b class=\"mlbl\">Error habitual:<\/b>  confundir deflación (caída de precios) con simple \"abaratamiento\" positivo.<\/p>\n<\/li>\n<li>\n<p><strong>\"Envejecer antes de enriquecerse\"<\/strong><br><b class=\"mlbl\">Definición:<\/b>  envejecer demográficamente antes de alcanzar la renta de un país rico.<br><b class=\"mlbl\">Importancia:<\/b>  limita recursos para pensiones y sanidad.<br><b class=\"mlbl\">Error habitual:<\/b>  asumir que China será rica antes de ser vieja.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"El crecimiento chino fue un milagro inexplicable.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> fue extraordinario en velocidad y escala.<\/li>\n<li><strong>Qué omite:<\/strong> fue un modelo reconocible (ahorro → inversión → exportación → urbanización), con costes y una fecha de caducidad incorporada.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"El crecimiento chino no fue un milagro, sino un modelo conocido llevado al extremo; entenderlo permite ver por qué ahora se agota.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>~30 años<\/strong> de crecimiento cercano al 10 %; ~800 millones salieron de la pobreza. <em>(Banco Mundial.)<\/em><\/li>\n<li><strong>Inmobiliario:<\/strong> ~24 % del PIB en el pico (2018), ~19 % en 2024; precios ~30 % por debajo de 2021; vivienda nueva cayendo 31 meses seguidos (enero de 2026); Evergrande en liquidación (orden de enero de 2024); ~130.000 millones de dólares en impagos del sector.<\/li>\n<li><strong>Demografía:<\/strong> población −3,39 millones en 2025 (4.º año de caída); 7,92 millones de nacimientos (mínimo desde 1939); fecundidad ~1,0; activa en máximo en 2015.<\/li>\n<li><strong>Paro juvenil (16–24, sin estudiantes):<\/strong> 16,9 % en marzo de 2026; más de 12 millones de graduados universitarios en 2026.<\/li>\n<li><strong>Deflación:<\/strong> presión deflacionaria durante cerca de diez trimestres, la más larga desde los años setenta.<\/li>\n<li><strong>Crecimiento:<\/strong> ~5 % en 2025, moderándose hacia el ~4,3–4,4 % en 2026 (con dudas sobre la cifra real).<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> En 2025–2026 convergen cuatro tensiones: la deflación persiste (cerca de diez trimestres), los precios de la vivienda siguen cayendo (31 meses), la población baja por cuarto año y el paro juvenil ronda el 17 %. El crecimiento oficial se mantiene en torno al 5 %, pero se desacelera por razones <strong>estructurales<\/strong>, no coyunturales. Ante ello, Pekín prioriza las \"nuevas fuerzas productivas\" (Lección 9) antes que un gran estímulo al consumo.<\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> El agotamiento del modelo de inversión, la recesión de balances, la reversión demográfica y el consumo débil.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Es un \"rebalanceo\" manejable (la tesis de \"resiliencia y rebalanceo\" de algunos bancos), un estancamiento prolongado a la japonesa, o algo peor? Los analistas discrepan abiertamente.<\/p>\n<p><strong>Qué información falta.<\/strong> Si Pekín dará el giro hacia el consumo (se ha resistido al \"asistencialismo\") y con qué intensidad; y cuánto de la cifra oficial de crecimiento es real.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un gráfico de la desaceleración del crecimiento del PIB (del ~10 % al ~4–5 %) y otro del peso del inmobiliario en el PIB (pico de ~24 % → ~19 %), con datos de la Oficina Nacional de Estadística, el FMI y el Banco Mundial. Alternativamente, el diagrama \"motores frente a límites\". <em>(No se incluye imagen; se especifican los datos a representar para su elaboración fiable.)<\/em><\/p>\n<p><strong>Cronología (9 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1978<\/strong> — Comienza la reforma; arranca el modelo.<\/li>\n<li><strong>2001<\/strong> — OMC: la fábrica del mundo.<\/li>\n<li><strong>2008<\/strong> — Estímulo de 4 billones de yuanes; auge de deuda e infraestructura.<\/li>\n<li><strong>2015<\/strong> — Techo de la población activa.<\/li>\n<li><strong>2020<\/strong> — \"Tres líneas rojas\": freno a la deuda inmobiliaria.<\/li>\n<li><strong>2021<\/strong> — Impago de Evergrande; techo de la población total.<\/li>\n<li><strong>2023<\/strong> — Comienza la deflación; se suspende (y luego se rehace) el dato de paro juvenil.<\/li>\n<li><strong>2024<\/strong> — Orden de liquidación de Evergrande.<\/li>\n<li><strong>2025–2026<\/strong> — Cuarto año de caída poblacional; 15.º Plan.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Creer que el crecimiento fue magia irrepetible.<\/strong> <em>Corrección:<\/em> fue un modelo conocido ejecutado a escala.<\/li>\n<li><strong>Saltar de \"milagro\" a \"colapso inminente\".<\/strong> <em>Corrección:<\/em> es una transición difícil con un abanico de resultados.<\/li>\n<li><strong>Creer que China puede seguir con el mismo motor.<\/strong> <em>Corrección:<\/em> los rendimientos de la inversión decaen y la demografía sopla en contra.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si rebalancear hacia el consumo exige dar más renta y seguridad a los hogares (sanidad, pensiones, reforma del <em>hukou<\/em>), pero eso reduce el ahorro que financia la inversión y da más poder a la sociedad frente al Estado, ¿por qué podría el Partido resistirse a la solución \"obvia\"? ¿Es un problema económico o político? <em>(Conecta con las Lecciones 5, 7 y 12.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Cuáles eran los motores del crecimiento chino?<\/li>\n<li>¿Por qué el inmobiliario es tan sistémico?<\/li>\n<li>¿Qué significa \"envejecer antes de enriquecerse\"?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica la cadena por la que la caída inmobiliaria arrastra a la vez el consumo, las finanzas locales y la confianza.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China va a colapsar económicamente.\" <em>(Y su contraria: \"China superará inevitablemente a EE. UU.\")<\/em><\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia económica sobre China (deflación, paro, estímulo, inmobiliario) y sitúala en el marco motores/límites.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>El crecimiento fue un modelo conocido —ahorro, inversión, exportación, urbanización— a escala récord.<\/li>\n<li>Traía caducidad: reprimía el consumo y dependía del ladrillo y de una demografía hoy invertida.<\/li>\n<li>El inmobiliario, ~una quinta parte del PIB, arrastra al caer consumo, finanzas locales y confianza.<\/li>\n<li>La población cae y envejece; es la restricción más determinista.<\/li>\n<li>Ni colapso ni ascenso imparable: una transición difícil con muchos finales posibles.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 11.<\/strong> Los límites internos —sobrecapacidad, consumo débil— empujan a China a exportar su excedente (coches, solar, baterías) y a competir por mercados y tecnología, lo que la lleva al choque con EE. UU. y el mundo. Eso abre el Bloque final, en la Lección 11.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Michael Pettis, <em>The Great Rebalancing<\/em> — el desequilibrio inversión/consumo.<\/li>\n<li>Barry Naughton, <em>The Chinese Economy<\/em>; Nicholas Lardy sobre el sector privado y el consumo.<\/li>\n<li>Thomas Orlik, <em>China: The Bubble That Never Pops<\/em> — contrapunto de resiliencia.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Oficina Nacional de Estadística de China (con cautela); FMI, Artículo IV de 2025.<\/li>\n<li>ONU, <em>World Population Prospects<\/em> (demografía).<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>Rhodium Group (\"Rightsizing 2025\", \"Demographic Future\"); UBS, \"China Outlook 2026–27\".<\/li>\n<li><em>East Asia Forum<\/em> y <em>Asia Times<\/em> sobre la desaceleración y la demografía.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 10 — El modelo de crecimiento y sus límites Curso: Entender China en 2026. Bloque III — Territorio y economía. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: motores frente a límites C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Cómo creció China tan rápido y por qué ese modelo empieza a agotarse? La escena. Durante unos treinta años, China creció cerca del 10 % anual y sacó de la pobreza a unos 800 millones de personas: el crecimiento sostenido más rápido de la historia. En 2026 combate la deflación, una crisis inmobiliaria que ha borrado buena parte de la riqueza de los hogares, una población que se encoge y un paro juvenil cercano al 17 %. El \"milagro\" no ha terminado, pero el modelo que lo produjo se está quedando sin carretera. Ambas cosas son ciertas a la vez. Idea clave El crecimiento chino no fue un misterio: fue un modelo conocido —movilizar ahorro, invertir de forma masiva (infraestructura, fábricas, vivienda), exportar, urbanizar y absorber una enorme mano de obra joven— ejecutado a escala continental. Dio resultados espectaculares, pero traía una caducidad incorporada : infradesarrolla el consumo de los hogares, depende en exceso de la inversión y del ladrillo, y se apoyaba en una demografía favorable que ahora se ha invertido. China debe cambiar de motor —de la inversión al consumo—, y es difícil porque todo el sistema está cableado para el modelo antiguo. B Modelo mental: motores frente a límites Motores (lo que impulsó): ahorro elevado → inversión masiva (infraestructura, industria, vivienda); urbanización; dividendo demográfico (mucha población activa y joven); exportaciones; transferencia tecnológica; educación. Límites (por qué se agota): sobreinversión e inmobiliario; deuda (sobre todo local); envejecimiento y caída de población; consumo doméstico débil; productividad decreciente; paro juvenil; deflación; fricciones comerciales externas. Cómo se usa el modelo. La imagen para recordar: el motor de la inversión rinde cada vez menos por cada yuan, y la demografía, que antes soplaba a favor, ahora sopla en contra. Ante una noticia económica, ubíquela en el eje motores/límites. C Desarrollo C1. ¿Cómo creció tanto? (los motores) Un ahorro altísimo se canalizó hacia una inversión altísima; la urbanización trasladó a cientos de millones del campo a la ciudad (salto de productividad); una población activa joven y creciente aportó el \"dividendo demográfico\"; la integración en el comercio mundial (OMC, 2001) convirtió a China en la fábrica del planeta; y la transferencia de tecnología y la mejora educativa elevaron la capacidad. Es el modelo del Este asiático (Japón, Corea) llevado a escala continental. No un milagro: un modelo ejecutado a lo grande. C2. ¿Por qué el inmobiliario es el corazón del problema? El ladrillo llegó a pesar en torno al 24 % del PIB en su pico (2018): una proporción enorme. Los gobiernos locales dependían de la venta de suelo; los hogares metieron la mayor parte de su riqueza en la vivienda. Cuando el Estado apretó la deuda de las promotoras (2020, las \"tres líneas rojas\"), estalló la cadena: impago de Evergrande (2021; orden de liquidación en enero de 2024), caída de Country Garden y otras, precios de la vivienda un ~30 % por debajo de 2021 y precios de vivienda nueva cayendo 31 meses seguidos (a enero de 2026). Como el ladrillo era ~una quinta parte del PIB y el grueso del ahorro familiar, su caída arrastra a la vez al consumo, a las finanzas locales y a la confianza. Es la mecánica de una recesión de balances . C3. ¿Por qué la demografía se volvió en contra? La población activa tocó techo en 2015; la población total lleva cuatro años cayendo (−3,39 millones en 2025; 7,92 millones de nacimientos, el mínimo desde 1939; fecundidad en torno a 1,0, muy por debajo del reemplazo de 2,1). Hacia 2035 habrá unos 15 millones de muertes al año; para 2050 China podría perder 250 millones de habitantes. Consecuencias: mano de obra menguante, costes de pensiones y sanidad al alza y el riesgo de \" envejecer antes de enriquecerse \". El legado de la política de hijo único (1980–2015) y una fecundidad ultrabaja pese a la actual política de tres hijos —que no funciona— hacen de la demografía la restricción más determinista. C4. ¿Por qué el consumo es débil y por qué importa? El modelo reprimió el consumo de los hogares (baja proporción del PIB frente a la inversión) mediante intereses bajos al ahorro, el sistema del hukou , una red de protección social débil (la gente ahorra para sanidad, educación y vejez) y políticas de suelo y salarios. Ahora que la inversión rinde menos, China necesita que los hogares gasten, pero están golpeados por las pérdidas inmobiliarias, la inseguridad laboral (paro juvenil del 16,9 % en marzo de 2026) y la deflación (que invita a posponer compras). Rebalancear hacia el consumo es el reto central y es política y económicamente difícil. C5. ¿Está agotado el modelo o solo en transición? (equilibrio) Ni colapso ni milagro eterno. China conserva fortalezas reales: dominio manufacturero, liderazgo tecnológico en coche eléctrico, solar y baterías, un mercado gigantesco, ahorro elevado y capacidad estatal. Pero el motor inversión-ladrillo-demografía está gastado, y el cambio hacia consumo e innovación es incierto y lento. El veredicto honesto: una transición difícil con un abanico amplio de resultados (que la Lección 12 explora como escenarios). Hay que evitar por igual el \"ascenso imparable\" y el \"colapso inminente\". D Conceptos imprescindibles Modelo de crecimiento por inversión Definición: crecimiento impulsado por ahorro e inversión masiva más que por consumo. Importancia: explica el auge y su caducidad. Error habitual: creer que puede sostenerse indefinidamente. Dividendo demográfico (y su"}, {"id": "Leccion11_China_frente_al_mundo", "group": "IV · China y el mundo, y el futuro", "badge": "11", "title": "China frente al mundo", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~24 min.", "readmin": 24, "color": "#1d4ed8", "html": "<div class=\"doc-head\"><h1 id=\"leccion-11-china-frente-al-mundo\">Lección 11 — China frente al mundo<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~24 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: no es una relación, son cinco<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Por qué China se ha convertido en el principal desafío estratégico para Estados Unidos?<\/p><\/aside>\n<p><strong>La escena.<\/strong> En octubre de 2025, Trump y Xi se dieron la mano sobre una tregua comercial de un año; a mediados de 2026 volvieron a reunirse en Pekín. Y sin embargo, esos mismos meses vieron a EE. UU. autorizar la venta de chips de IA avanzados (los Nvidia H200) a algunas empresas chinas mientras China congelaba como arma la exportación de tierras raras y añadía firmas estadounidenses a sus listas negras. Apretones de manos y llaves de estrangulamiento a la vez. Esa paradoja —interdependencia profunda más rivalidad creciente— es la relación; reducirla a \"una nueva Guerra Fría\" pierde justo lo que la hace tan difícil.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>El ascenso de China desafía la primacía de EE. UU. en varios planos distintos que solemos mezclar: competencia económica, rivalidad tecnológica, rivalidad militar, conflicto ideológico e interdependencia. No se mueven juntos: EE. UU. y China son a la vez rivales y socios comerciales imprescindibles. Y algo decisivo: la asertividad exterior china tiene raíces <strong>internas<\/strong> —la sobrecapacidad de la Lección 10 empuja las exportaciones; el nacionalismo sustituye al crecimiento que se frena—. Para leer las noticias de China y el mundo, separe los planos.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: no es una relación, son cinco<\/span><\/div><div class=\"sec-body\">\n<p>Cinco planos, a temperaturas distintas:<\/p>\n<ol>\n<li><strong>Competencia económica:<\/strong> comercio, cadenas de suministro, excedente exportador.<\/li>\n<li><strong>Rivalidad tecnológica:<\/strong> semiconductores, IA, coche eléctrico, baterías, solar.<\/li>\n<li><strong>Rivalidad militar:<\/strong> Mar de China Meridional, Taiwán, modernización del Ejército Popular.<\/li>\n<li><strong>Conflicto ideológico:<\/strong> modelo autoritario frente a democrático; \"civilización\" frente a valores universales.<\/li>\n<li><strong>Interdependencia:<\/strong> comercio masivo, tierras raras, deuda, clima — el freno que impide una ruptura total.<\/li>\n<\/ol>\n<p><strong>Cómo se usa el modelo.<\/strong> Ante cualquier noticia, pregunte en qué plano(s) está y si se calienta (seguridad) o se enfría (tregua comercial). La frase: <strong>no es una relación, son cinco, a temperaturas distintas.<\/strong><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-por-que-comercio-y-tecnologia-son-el-campo-de-batalla-central\">C1. ¿Por qué comercio y tecnología son el campo de batalla central?<\/h3>\n<p>China pasó de fábrica de productos baratos a líder en sectores avanzados: coche eléctrico (BYD superó a Tesla como mayor fabricante mundial), solar, baterías y, cada vez más, IA (DeepSeek). La respuesta de EE. UU.: aranceles (pico del 145 % en abril de 2025), controles a la exportación de chips avanzados (para frenar la IA y el músculo militar chinos) y relocalización. La contraofensiva china: dominar los insumos (tierras raras y su procesamiento) y abrir su IA en código abierto para expandir su ecosistema (la \"Ruta de la Seda Digital\"). <strong>Mecanismo:<\/strong> cada lado convierte en arma su punto de estrangulamiento —EE. UU., el diseño y la fabricación de chips punteros; China, las tierras raras y la escala manufacturera—.<\/p>\n<h3 id=\"c2-que-es-la-guerra-de-los-semiconductores-y-por-que-importa-tanto\">C2. ¿Qué es la guerra de los semiconductores y por qué importa tanto?<\/h3>\n<p>Los chips son la mercancía estratégica: alimentan la IA y el armamento avanzado. EE. UU., con sus aliados (TSMC en Taiwán, ASML en los Países Bajos), controla la fabricación más avanzada y restringe el acceso de China para frenarla; China vuelca dinero en la autosuficiencia. Esto hace a <strong>Taiwán doblemente central<\/strong>: es un punto de fricción de soberanía <em>y<\/em> el fabricante de la mayoría de los chips punteros. La tregua de 2025–26 es frágil precisamente porque el \"carril de seguridad nacional\" —controles de chips, listas negras— nunca se detuvo.<\/p>\n<h3 id=\"c3-que-papel-juegan-el-poder-militar-y-taiwan\">C3. ¿Qué papel juegan el poder militar y Taiwán?<\/h3>\n<p>China ha construido la mayor armada del mundo por número de buques; afirma reclamaciones en el Mar de China Meridional (islas artificiales) y presiona a Taiwán (que la Lección 8 trató como cuestión doméstica-simbólica; aquí es el posible detonante de una guerra China-EE. UU.). Taiwán es donde convergen los planos económico, tecnológico y militar, y donde un error de cálculo sería más peligroso. Cautela epistémica: la operatividad real del Ejército Popular es incierta, sobre todo tras las purgas de 2025–26 (Lecciones 4 y 6).<\/p>\n<h3 id=\"c4-rusia-europa-y-el-sur-global-con-quien-se-alinea-china\">C4. Rusia, Europa y el Sur Global: ¿con quién se alinea China?<\/h3>\n<p><strong>Rusia:<\/strong> una asociación \"sin límites\" que se profundizó con la guerra de Ucrania, pero asimétrica —Rusia depende ahora de China—. China suministra bienes de doble uso (la UE sancionó a entidades chinas por ello en abril de 2026) y no quiere que Rusia pierda, pero tampoco que gane del todo: le conviene un Occidente distraído y energía rusa barata, no el caos. <strong>Europa:<\/strong> atrapada entre los lazos económicos y la alineación de seguridad con EE. UU.; el culebrón de los aranceles al coche eléctrico (aranceles en 2024 → precios mínimos en enero de 2026) muestra su ambivalencia: proteger su industria sin desacoplarse. <strong>Sur Global:<\/strong> China lo corteja con comercio, infraestructura (Franja y Ruta, Ruta de la Seda Digital), la ampliación de los BRICS y ahora tecnología verde barata e IA de código abierto, ofreciendo una alternativa al orden occidental.<\/p>\n<h3 id=\"c5-por-que-una-nueva-guerra-fria-no-basta-equilibrio\">C5. ¿Por qué \"una nueva Guerra Fría\" no basta? (equilibrio)<\/h3>\n<p>La analogía de la Guerra Fría capta la rivalidad ideológica y militar, pero pierde el rasgo definitorio: la <strong>interdependencia económica profunda<\/strong>. EE. UU. y la URSS apenas comerciaban; EE. UU. y China son socios imprescindibles, con cadenas de suministro entrelazadas y dependencias mutuas (EE. UU. de la manufactura y las tierras raras chinas; China de los chips y el mercado estadounidense). Es \"rivalidad dentro de interdependencia\": más <em>frenemies<\/em> que bloques enfrentados. La paradoja de tregua-y-lista-negra de 2025–26 lo demuestra. Hay que evitar tanto el \"guerra inevitable\" como el \"es solo negocio\".<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Desacople / reducción de riesgo (<em>decoupling<\/em> / <em>de-risking<\/em>)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  separar por completo las economías (desacople) frente a reducir dependencias críticas (de-risking).<br><b class=\"mlbl\">Importancia:<\/b>  el matiz define la política real de EE. UU. y la UE (de-risking, no desacople total).<br><b class=\"mlbl\">Error habitual:<\/b>  creer que Occidente busca cortar todos los lazos.<\/p>\n<\/li>\n<li>\n<p><strong>Guerra de los semiconductores / controles de exportación<\/strong><br><b class=\"mlbl\">Definición:<\/b>  restricciones al acceso chino a los chips más avanzados.<br><b class=\"mlbl\">Importancia:<\/b>  el frente tecnológico decisivo.<br><b class=\"mlbl\">Error habitual:<\/b>  verlo como comercio y no como seguridad nacional.<\/p>\n<\/li>\n<li>\n<p><strong>Tierras raras (la palanca china)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  minerales críticos cuyo procesamiento domina China.<br><b class=\"mlbl\">Importancia:<\/b>  el arma con la que China responde a los controles de chips.<br><b class=\"mlbl\">Error habitual:<\/b>  subestimar el poder de negociación que otorgan.<\/p>\n<\/li>\n<li>\n<p><strong>Asociación \"sin límites\" China-Rusia<\/strong><br><b class=\"mlbl\">Definición:<\/b>  alineamiento estratégico reforzado tras 2022, pero asimétrico.<br><b class=\"mlbl\">Importancia:<\/b>  reconfigura el tablero, sin ser una alianza militar plena.<br><b class=\"mlbl\">Error habitual:<\/b>  tratarla como un bloque monolítico o como algo irrelevante.<\/p>\n<\/li>\n<li>\n<p><strong>Interdependencia / rivalidad (<em>frenemies<\/em>)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  ser competidores estratégicos y socios económicos a la vez.<br><b class=\"mlbl\">Importancia:<\/b>  el rasgo que distingue esto de la Guerra Fría.<br><b class=\"mlbl\">Error habitual:<\/b>  elegir solo una de las dos caras.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"Una nueva Guerra Fría explica por completo la relación China-EE. UU.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> hay rivalidad ideológica, militar y bloques emergentes (BRICS frente a Occidente).<\/li>\n<li><strong>Qué omite:<\/strong> la interdependencia económica profunda que no existía en la Guerra Fría; no hay dos bloques separados, sino cadenas entrelazadas.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"Es rivalidad dentro de interdependencia: competidores estratégicos que siguen siendo socios comerciales esenciales; ni Guerra Fría clásica ni simple negocio.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Aranceles:<\/strong> pico del 145 % (abril de 2025); tregua de un año tras la cumbre Trump-Xi (octubre de 2025), extendida en Pekín (mayo de 2026).<\/li>\n<li><strong>Tierras raras:<\/strong> China suspendió los controles del 9 de octubre por un año (hasta noviembre de 2026), pero mantiene los de abril; añadió 10 firmas de EE. UU. a su lista (junio de 2026).<\/li>\n<li><strong>Semiconductores:<\/strong> EE. UU. autorizó chips Nvidia H200 a algunas empresas chinas; los controles siguen activos.<\/li>\n<li><strong>Tecnología china:<\/strong> BYD superó a Tesla como mayor fabricante de coche eléctrico; DeepSeek (R1 en enero de 2025; V4 en abril de 2026); dominio en solar y baterías.<\/li>\n<li><strong>China-Rusia:<\/strong> asociación reforzada; la UE sancionó entidades chinas por bienes de doble uso (abril de 2026).<\/li>\n<li><strong>UE:<\/strong> aranceles al coche eléctrico chino (7,8 %–35,3 %, octubre de 2024) sustituidos por precios mínimos (enero de 2026).<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> La paradoja de 2025–2026: tregua Trump-Xi (octubre de 2025) y cumbre de Pekín (mayo de 2026), con suspensión parcial de los controles de tierras raras y autorización de algunos chips Nvidia; y a la vez, en junio de 2026, China añade diez firmas estadounidenses a su lista de control de exportaciones. Apretones de manos y armas económicas simultáneos.<\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La rivalidad dentro de la interdependencia; los puntos de estrangulamiento (chips frente a tierras raras); los cinco planos a temperaturas distintas.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Estabiliza esto la relación (competencia gestionada) o es una calma antes de escalar? ¿Quién tiene más palanca, EE. UU. con los chips o China con las tierras raras?<\/p>\n<p><strong>Qué información falta.<\/strong> Si la tregua sobrevive más allá del otoño de 2026; y el comodín de Taiwán, capaz de romperlo todo.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un mapa de puntos de fricción y de estrangulamiento: reclamaciones en el Mar de China Meridional (\"línea de nueve trazos\"), Taiwán, primera y segunda cadenas de islas, y los nodos críticos de chips (Taiwán/TSMC, Países Bajos/ASML) y de procesamiento de tierras raras (China). <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (8 hitos).<\/strong><\/p>\n<ul>\n<li><strong>2013<\/strong> — Lanzamiento de la Franja y la Ruta.<\/li>\n<li><strong>2018<\/strong> — Primera guerra comercial de Trump.<\/li>\n<li><strong>2022<\/strong> — Ley CHIPS de EE. UU. y controles a la exportación de semiconductores.<\/li>\n<li><strong>2023<\/strong> — Controles chinos sobre galio, germanio y tierras raras.<\/li>\n<li><strong>Enero de 2025<\/strong> — Irrupción de DeepSeek.<\/li>\n<li><strong>Abril de 2025<\/strong> — Aranceles del 145 %.<\/li>\n<li><strong>Octubre de 2025<\/strong> — Tregua Trump-Xi.<\/li>\n<li><strong>2026<\/strong> — Cumbre de Pekín; nuevas listas negras cruzadas.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Reducir todo a \"Guerra Fría\".<\/strong> <em>Corrección:<\/em> ignora la interdependencia económica que define esta rivalidad.<\/li>\n<li><strong>Creer que los planos se mueven juntos.<\/strong> <em>Corrección:<\/em> el comercio puede enfriarse mientras la tecnología se calienta.<\/li>\n<li><strong>Ignorar las raíces internas de la asertividad exterior.<\/strong> <em>Corrección:<\/em> la sobrecapacidad (Lección 10) y el nacionalismo (Lección 7) empujan hacia fuera.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si China y EE. UU. son a la vez rivales y socios imprescindibles, ¿es la interdependencia un <strong>freno<\/strong> a la guerra (demasiado que perder) o una <strong>fuente<\/strong> de conflicto (cada dependencia es un arma)? ¿Qué papel juega Taiwán en inclinar la balanza? <em>(Conecta con las Lecciones 8 y 12.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué son los controles de exportación de semiconductores?<\/li>\n<li>¿Cuál es la palanca china frente a los chips?<\/li>\n<li>¿Por qué la relación China-Rusia es asimétrica?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué la sobrecapacidad interna de China (Lección 10) la empuja a exportar su excedente y a chocar con EE. UU. y la UE.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China y EE. UU. están en una nueva Guerra Fría.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia (un arancel, un chip, una maniobra militar, una cumbre) e identifica en qué plano(s) está y si se calienta o se enfría.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>La rivalidad China-EE. UU. opera en cinco planos distintos que no se mueven al unísono.<\/li>\n<li>El campo central es tecnológico-comercial: chips (palanca de EE. UU.) frente a tierras raras (palanca de China).<\/li>\n<li>Taiwán concentra los planos económico, tecnológico y militar: el punto más peligroso.<\/li>\n<li>China alinea a Rusia (asimétricamente) y corteja al Sur Global, mientras Europa duda.<\/li>\n<li>No es Guerra Fría: es rivalidad dentro de una interdependencia que ninguna de las partes puede permitirse romper.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 12.<\/strong> Todo lo anterior —economía que se frena, poder que se concentra, rivalidad que se tensa— abre un abanico de futuros. La Lección 12 los ordena como escenarios, no como profecías.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-
