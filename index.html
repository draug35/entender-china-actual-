tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Rush Doshi, <em>The Long Game<\/em> — tesis de la estrategia china (halcón; una tesis, no consenso).<\/li>\n<li>David Shambaugh, <em>China Goes Global: The Partial Power<\/em> — contrapeso.<\/li>\n<li>Kevin Rudd, <em>The Avoidable War<\/em> — gestión del riesgo EE. UU.-China.<\/li>\n<li>Jonathan Hillman, <em>The Emperor's New Road<\/em> — Franja y Ruta.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Comunicados de las cumbres Trump-Xi (2025–2026); listas de control de exportaciones del Ministerio de Comercio chino.<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>CFR y CSIS <em>ChinaPower<\/em>; MERICS.<\/li>\n<li><em>Foreign Policy<\/em> sobre tierras raras; Brookings sobre China-Rusia.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 11 — China frente al mundo Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~24 min. Recorrido de la lección A Apertura B Modelo mental: no es una relación, son cinco C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Por qué China se ha convertido en el principal desafío estratégico para Estados Unidos? La escena. En octubre de 2025, Trump y Xi se dieron la mano sobre una tregua comercial de un año; a mediados de 2026 volvieron a reunirse en Pekín. Y sin embargo, esos mismos meses vieron a EE. UU. autorizar la venta de chips de IA avanzados (los Nvidia H200) a algunas empresas chinas mientras China congelaba como arma la exportación de tierras raras y añadía firmas estadounidenses a sus listas negras. Apretones de manos y llaves de estrangulamiento a la vez. Esa paradoja —interdependencia profunda más rivalidad creciente— es la relación; reducirla a \"una nueva Guerra Fría\" pierde justo lo que la hace tan difícil. Idea clave El ascenso de China desafía la primacía de EE. UU. en varios planos distintos que solemos mezclar: competencia económica, rivalidad tecnológica, rivalidad militar, conflicto ideológico e interdependencia. No se mueven juntos: EE. UU. y China son a la vez rivales y socios comerciales imprescindibles. Y algo decisivo: la asertividad exterior china tiene raíces internas —la sobrecapacidad de la Lección 10 empuja las exportaciones; el nacionalismo sustituye al crecimiento que se frena—. Para leer las noticias de China y el mundo, separe los planos. B Modelo mental: no es una relación, son cinco Cinco planos, a temperaturas distintas: Competencia económica: comercio, cadenas de suministro, excedente exportador. Rivalidad tecnológica: semiconductores, IA, coche eléctrico, baterías, solar. Rivalidad militar: Mar de China Meridional, Taiwán, modernización del Ejército Popular. Conflicto ideológico: modelo autoritario frente a democrático; \"civilización\" frente a valores universales. Interdependencia: comercio masivo, tierras raras, deuda, clima — el freno que impide una ruptura total. Cómo se usa el modelo. Ante cualquier noticia, pregunte en qué plano(s) está y si se calienta (seguridad) o se enfría (tregua comercial). La frase: no es una relación, son cinco, a temperaturas distintas. C Desarrollo C1. ¿Por qué comercio y tecnología son el campo de batalla central? China pasó de fábrica de productos baratos a líder en sectores avanzados: coche eléctrico (BYD superó a Tesla como mayor fabricante mundial), solar, baterías y, cada vez más, IA (DeepSeek). La respuesta de EE. UU.: aranceles (pico del 145 % en abril de 2025), controles a la exportación de chips avanzados (para frenar la IA y el músculo militar chinos) y relocalización. La contraofensiva china: dominar los insumos (tierras raras y su procesamiento) y abrir su IA en código abierto para expandir su ecosistema (la \"Ruta de la Seda Digital\"). Mecanismo: cada lado convierte en arma su punto de estrangulamiento —EE. UU., el diseño y la fabricación de chips punteros; China, las tierras raras y la escala manufacturera—. C2. ¿Qué es la guerra de los semiconductores y por qué importa tanto? Los chips son la mercancía estratégica: alimentan la IA y el armamento avanzado. EE. UU., con sus aliados (TSMC en Taiwán, ASML en los Países Bajos), controla la fabricación más avanzada y restringe el acceso de China para frenarla; China vuelca dinero en la autosuficiencia. Esto hace a Taiwán doblemente central : es un punto de fricción de soberanía y el fabricante de la mayoría de los chips punteros. La tregua de 2025–26 es frágil precisamente porque el \"carril de seguridad nacional\" —controles de chips, listas negras— nunca se detuvo. C3. ¿Qué papel juegan el poder militar y Taiwán? China ha construido la mayor armada del mundo por número de buques; afirma reclamaciones en el Mar de China Meridional (islas artificiales) y presiona a Taiwán (que la Lección 8 trató como cuestión doméstica-simbólica; aquí es el posible detonante de una guerra China-EE. UU.). Taiwán es donde convergen los planos económico, tecnológico y militar, y donde un error de cálculo sería más peligroso. Cautela epistémica: la operatividad real del Ejército Popular es incierta, sobre todo tras las purgas de 2025–26 (Lecciones 4 y 6). C4. Rusia, Europa y el Sur Global: ¿con quién se alinea China? Rusia: una asociación \"sin límites\" que se profundizó con la guerra de Ucrania, pero asimétrica —Rusia depende ahora de China—. China suministra bienes de doble uso (la UE sancionó a entidades chinas por ello en abril de 2026) y no quiere que Rusia pierda, pero tampoco que gane del todo: le conviene un Occidente distraído y energía rusa barata, no el caos. Europa: atrapada entre los lazos económicos y la alineación de seguridad con EE. UU.; el culebrón de los aranceles al coche eléctrico (aranceles en 2024 → precios mínimos en enero de 2026) muestra su ambivalencia: proteger su industria sin desacoplarse. Sur Global: China lo corteja con comercio, infraestructura (Franja y Ruta, Ruta de la Seda Digital), la ampliación de los BRICS y ahora tecnología verde barata e IA de código abierto, ofreciendo una alternativa al orden occidental. C5. ¿Por qué \"una nueva Guerra Fría\" no basta? (equilibrio) La analogía de la Guerra Fría capta la rivalidad ideológica y militar, pero pierde el rasgo definitorio: la interdependencia económica profunda . EE. UU. y la URSS apenas comerciaban; EE. UU. y China son socios imprescindibles, con cadenas de suministro entrelazadas y dependencias mutuas (EE. UU. de la manufactura y las tierras raras chinas; China de los chips y el mercado estadounidense). Es \"rivalidad dentro de interdependencia\": más frenemies que bloques enfrentados. La paradoja de tregua-y-lista-negra de 2025–26 lo"}, {"id": "Leccion12_El_futuro_escenarios", "group": "IV · China y el mundo, y el futuro", "badge": "12", "title": "El futuro: escenarios", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~23 min.", "readmin": 23, "color": "#1d4ed8", "html": "<div class=\"doc-head\"><h1 id=\"leccion-12-el-futuro-escenarios-no-profecias\">Lección 12 — El futuro: escenarios, no profecías<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: la matriz de escenarios<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias — el cuadro de indicadores a vigilar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Qué futuros plausibles se abren para China?<\/p><\/aside>\n<p><strong>La escena.<\/strong> Dos titulares del mismo año. \"China dominará el siglo XXI.\" \"China está a punto de colapsar.\" Ambos se venden con aplomo; ambos son casi con seguridad erróneos, porque los dos son predicciones disfrazadas de certezas. La herramienta honesta no es la profecía, sino el <strong>escenario<\/strong>: futuros plausibles con condiciones, indicadores y consecuencias. Esta última lección enseña a pensar en escenarios y a detectar hacia cuál apunta una noticia.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>El futuro de China no está escrito. Depende de unas pocas grandes incógnitas que hemos estudiado: si la economía se rebalancea (Lección 10), si el poder sigue hiperconcentrado y cómo se resuelve la sucesión (Lección 6), si la periferia y Taiwán siguen gestionados o estallan (Lecciones 8 y 11), y cómo evoluciona la rivalidad con EE. UU. (Lección 11). En vez de predecir, trazamos escenarios, les asociamos indicadores adelantados y los mantenemos como una <strong>cartera<\/strong> que se actualiza con la evidencia. Ni el triunfo ni el colapso son un destino.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: la matriz de escenarios<\/span><\/div><div class=\"sec-body\">\n<p>Dos ejes ordenan el abanico:<\/p>\n<ul>\n<li><strong>Trayectoria económica:<\/strong> rebalanceo exitoso ↔ estancamiento o crisis prolongada.<\/li>\n<li><strong>Trayectoria política:<\/strong> concentración estable y adaptación ↔ rigidez e inestabilidad.<\/li>\n<li>Y un eje externo: acomodación ↔ conflicto con EE. UU. (sobre todo por Taiwán).<\/li>\n<\/ul>\n<p>Para cada escenario, cuatro preguntas: qué <strong>condiciones<\/strong> lo hacen posible, qué <strong>indicadores<\/strong> lo harían más probable, qué <strong>factores<\/strong> juegan en contra y qué <strong>consecuencias<\/strong> tendría (dentro y fuera).<\/p>\n<p><strong>Cómo se usa el modelo.<\/strong> No pregunte \"¿qué va a pasar?\", sino \"¿hacia qué escenario apunta la evidencia, y qué tendría que ver para cambiar de opinión?\".<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-por-que-escenarios-y-no-predicciones\">C1. ¿Por qué escenarios y no predicciones?<\/h3>\n<p>Porque el sistema tiene demasiadas incógnitas interdependientes para una predicción fiable, pero no es un caos ilegible: podemos acotar futuros plausibles y vigilar señales. Un escenario no dice \"esto ocurrirá\"; dice \"si se dan estas condiciones, esto es lo que cabría esperar, y estas son las señales tempranas\". Es humildad epistémica operativa (el hilo que recorre el curso), no renuncia al análisis.<\/p>\n<h3 id=\"c2-escenarios-economicos\">C2. Escenarios económicos<\/h3>\n<ul>\n<li><strong>(a) Desaceleración lenta pero estable (\"japonización\" suave).<\/strong> <em>Condiciones:<\/em> Pekín gestiona la deuda y el ladrillo sin crisis abierta, pero no reactiva el consumo. <em>Indicadores:<\/em> crecimiento estabilizado en el 3–4 %, deflación que remite despacio, deuda contenida. <em>En contra:<\/em> demografía y confianza. <em>Consecuencias:<\/em> China grande y capaz, pero sin el empuje de antaño.<\/li>\n<li><strong>(b) Crisis prolongada / estancamiento largo.<\/strong> <em>Condiciones:<\/em> la deuda local o inmobiliaria desborda; la confianza no vuelve. <em>Indicadores:<\/em> impagos en cadena, caída del crédito, paro alto persistente. <em>En contra:<\/em> la capacidad estatal y el ahorro elevado, que amortiguan. <em>Consecuencias:<\/em> malestar social, tentación de más control o de aventura exterior.<\/li>\n<li><strong>(c) Rebalanceo y adaptación exitosa.<\/strong> <em>Condiciones:<\/em> reformas que elevan el consumo (sanidad, pensiones, <em>hukou<\/em>) y liderazgo tecnológico que compensa. <em>Indicadores:<\/em> consumo subiendo como % del PIB, productividad al alza, sectores nuevos escalando. <em>En contra:<\/em> el coste político de dar poder e ingresos a los hogares. <em>Consecuencias:<\/em> China innovadora y más equilibrada.<\/li>\n<\/ul>\n<h3 id=\"c3-escenarios-politicos\">C3. Escenarios políticos<\/h3>\n<ul>\n<li><strong>(a) Control reforzado con menos dinamismo.<\/strong> <em>Condiciones:<\/em> Xi prioriza seguridad sobre reforma. <em>Indicadores:<\/em> más purgas, más vigilancia, menos espacio privado. <em>Consecuencias:<\/em> estabilidad a corto plazo, coste de innovación y eficiencia a largo.<\/li>\n<li><strong>(b) Adaptación exitosa del régimen.<\/strong> <em>Condiciones:<\/em> el Partido reforma la gobernanza sin abrir la política. <em>Indicadores:<\/em> mejor gestión económica, relevo ordenado. <em>Consecuencias:<\/em> resiliencia autoritaria prolongada.<\/li>\n<li><strong>(c) Crisis interna del Partido / problema de sucesión.<\/strong> <em>Condiciones:<\/em> un Xi sin sucesor designado enferma, muere o es desafiado. <em>Indicadores:<\/em> luchas de facciones, señales confusas en la cúpula. <em>En contra:<\/em> el férreo control actual. <em>Consecuencias:<\/em> incertidumbre aguda, dado que no hay mecanismo de relevo (Lección 6).<\/li>\n<\/ul>\n<h3 id=\"c4-escenarios-externos-y-taiwan\">C4. Escenarios externos y Taiwán<\/h3>\n<ul>\n<li><strong>(a) Acomodación estratégica (competencia gestionada).<\/strong> <em>Condiciones:<\/em> ambas potencias fijan límites y canales. <em>Indicadores:<\/em> treguas que se renuevan, crisis que se contienen. <em>Consecuencias:<\/em> rivalidad crónica pero sin guerra.<\/li>\n<li><strong>(b) Conflicto en torno a Taiwán.<\/strong> <em>Condiciones:<\/em> error de cálculo, cambio de statu quo, presión interna. <em>Indicadores:<\/em> maniobras mayores, retórica de plazos, ruptura de canales. <em>En contra:<\/em> el coste catastrófico para todos y la incertidumbre sobre el Ejército Popular tras las purgas. <em>Consecuencias:<\/em> económicas y militares globales.<\/li>\n<li><strong>(c) Liderazgo tecnológico chino.<\/strong> <em>Condiciones:<\/em> China cierra la brecha en chips e IA. <em>Indicadores:<\/em> avances en semiconductores propios, adopción global de su tecnología (coche eléctrico, IA abierta). <em>Consecuencias:<\/em> reordenamiento del poder sin necesidad de guerra.<\/li>\n<\/ul>\n<h3 id=\"c5-como-interactuan-los-escenarios\">C5. ¿Cómo interactúan los escenarios?<\/h3>\n<p>Los ejes no son independientes: la economía condiciona la política y viceversa. Una crisis económica podría empujar tanto a la <strong>aventura exterior<\/strong> (usar Taiwán para cohesionar por nacionalismo) como al <strong>repliegue prudente<\/strong> (concentrarse en apagar fuegos internos); depende de la cohesión de la élite y del cálculo de riesgos. Por eso conviene una <strong>cartera de escenarios<\/strong>, no una apuesta única: se siguen los indicadores y se reajustan las probabilidades a medida que llega la evidencia.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Escenario (frente a predicción)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  futuro plausible con condiciones e indicadores, no un pronóstico único.<br><b class=\"mlbl\">Importancia:<\/b>  la herramienta honesta ante la incertidumbre.<br><b class=\"mlbl\">Error habitual:<\/b>  tratarlo como una profecía.<\/p>\n<\/li>\n<li>\n<p><strong>Indicador adelantado<\/strong><br><b class=\"mlbl\">Definición:<\/b>  señal temprana que sugiere hacia qué escenario se mueve el sistema.<br><b class=\"mlbl\">Importancia:<\/b>  permite actualizar sin esperar al desenlace.<br><b class=\"mlbl\">Error habitual:<\/b>  fijarse solo en un indicador y no en el conjunto.<\/p>\n<\/li>\n<li>\n<p><strong>\"Japonización\" / estancamiento de balances<\/strong><br><b class=\"mlbl\">Definición:<\/b>  crecimiento bajo y deflación tras una burbuja, como en Japón desde los noventa.<br><b class=\"mlbl\">Importancia:<\/b>  uno de los escenarios más citados para China.<br><b class=\"mlbl\">Error habitual:<\/b>  asumir que China repetirá exactamente el caso japonés (es más pobre y más grande).<\/p>\n<\/li>\n<li>\n<p><strong>Trampa de la renta media<\/strong><br><b class=\"mlbl\">Definición:<\/b>  estancarse antes de alcanzar la renta de los países ricos.<br><b class=\"mlbl\">Importancia:<\/b>  el riesgo que el rebalanceo busca evitar.<br><b class=\"mlbl\">Error habitual:<\/b>  darlo por inevitable o por imposible.<\/p>\n<\/li>\n<li>\n<p><strong>\"Peak China\" (la tesis del techo)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la idea de que el poder chino podría estar cerca de su máximo.<br><b class=\"mlbl\">Importancia:<\/b>  contrapeso a la tesis del ascenso imparable.<br><b class=\"mlbl\">Error habitual:<\/b>  confundir una tesis con un hecho.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmaciones frecuentes (mito y contramito):<\/strong> \"China dominará inevitablemente el siglo XXI\" / \"China está a punto de colapsar\".<\/p>\n<ol>\n<li><strong>Qué es cierto en cada uno:<\/strong> China tiene fortalezas reales (escala, tecnología, capacidad estatal) que sostienen la tesis del ascenso; y debilidades reales (demografía, deuda, rigidez política) que sostienen la del declive.<\/li>\n<li><strong>Qué omite cada uno:<\/strong> ambos convierten una tendencia en destino y descartan la incertidumbre y la <strong>agencia<\/strong> —las decisiones que aún no se han tomado—.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"El futuro de China es un abanico de escenarios, no un destino; lo honesto es seguir indicadores y actualizar, no profetizar.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias — el cuadro de indicadores a vigilar<\/span><\/div><div class=\"sec-body\">\n<p><em>(Con la base de 2025–2026 de las lecciones previas.)<\/em><\/p>\n<ul>\n<li><strong>Económicos:<\/strong> consumo como % del PIB (¿sube?); precios de vivienda (¿tocan fondo tras 31 meses de caída?); deflación (¿termina tras ~10 trimestres?); deuda local (65 % de deuda oculta ya reducida); productividad.<\/li>\n<li><strong>Demográficos:<\/strong> nacimientos y fecundidad (¿se estabilizan por encima de ~1,0?).<\/li>\n<li><strong>Políticos:<\/strong> sucesión (¿designa Xi sucesor antes del Congreso de 2027?); ritmo de purgas; cohesión de la élite.<\/li>\n<li><strong>Externos:<\/strong> Taiwán (maniobras, retórica de plazos); tregua arancelaria EE. UU.-China (¿sobrevive al otoño de 2026?); alineamientos (Rusia, Sur Global).<\/li>\n<li><strong>Tecnológicos:<\/strong> avances en chips propios; IA (tras DeepSeek V4); cuota global en coche eléctrico, solar y baterías.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> En 2025–2026 el debate \"<strong>Peak China<\/strong>\" está vivo: tras años de \"China en ascenso\", la desaceleración (deflación, ladrillo, demografía) alimentó la tesis de que su poder podría estar tocando techo, mientras el empuje tecnológico (DeepSeek, coche eléctrico) alimenta la tesis contraria del ascenso continuado. Ambos bandos citan evidencia real. <em>(Verificado; debate abierto.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> Escenarios frente a predicción; indicadores adelantados; el rechazo del determinismo.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> Prácticamente todas: es el sentido de la lección. Lo que se enseña es a ponderar la evidencia, no a zanjar.<\/p>\n<p><strong>Qué información falta.<\/strong> Las decisiones que aún no se han tomado —la agencia de Pekín, de Washington y de otros actores—, que ningún dato presente contiene.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Una <strong>matriz 2×2<\/strong> de escenarios (eje económico × eje político) con los seis escenarios ubicados, y un <strong>cuadro de indicadores<\/strong> (el de la sección F) para actualizar con el tiempo. <em>(No se incluye imagen; se describe para su elaboración.)<\/em><\/p>\n<p><strong>Calendario de hitos futuros a vigilar (no historia, sino agenda).<\/strong><\/p>\n<ul>\n<li><strong>Otoño de 2026<\/strong> — Vencimiento de la tregua arancelaria EE. UU.-China.<\/li>\n<li><strong>2026–2027<\/strong> — Trayectoria de precios de vivienda y deflación.<\/li>\n<li><strong>Finales de 2027<\/strong> — 21.º Congreso del Partido: ¿cuarto mandato de Xi?, ¿señales de sucesión?<\/li>\n<li><strong>Continuo<\/strong> — Nacimientos anuales; maniobras en el estrecho de Taiwán; avances en semiconductores.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Confundir un escenario con una predicción.<\/strong> <em>Corrección:<\/em> un escenario es condicional; no afirma que ocurrirá.<\/li>\n<li><strong>Elegir el escenario que confirma tus ideas previas.<\/strong> <em>Corrección:<\/em> vigila el sesgo de confirmación; busca lo que te haría cambiar de opinión.<\/li>\n<li><strong>Tratar las tendencias actuales como destino.<\/strong> <em>Corrección:<\/em> incorpora la agencia y los puntos de inflexión.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>De todos los indicadores, ¿cuál crees que es el más decisivo para saber hacia qué escenario se dirige China: el consumo, la sucesión política o Taiwán? Justifica por qué, y di qué tendrías que observar para cambiar de opinión. <em>(Esta pregunta sintetiza el curso entero.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué diferencia un escenario de una predicción?<\/li>\n<li>¿Qué es un indicador adelantado?<\/li>\n<li>¿Qué sostiene la tesis \"Peak China\"?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué una crisis económica podría empujar tanto a la aventura exterior (Taiwán) como al repliegue prudente. ¿De qué depende cuál de las dos?<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China dominará el siglo XXI.\" <em>(Y su contraria: \"China va a colapsar.\")<\/em><\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nElige un escenario y construye su cuadro de indicadores: ¿qué tres señales lo harían claramente más probable en los próximos dos años?<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>El futuro de China es un abanico de escenarios, no un destino.<\/li>\n<li>Se ordenan por dos ejes: trayectoria económica y trayectoria política (más Taiwán).<\/li>\n<li>Cada escenario tiene condiciones, indicadores, factores en contra y consecuencias.<\/li>\n<li>Los ejes interactúan: una crisis económica puede llevar a la aventura o al repliegue.<\/li>\n<li>Lo honesto no es profetizar, sino seguir indicadores y actualizar la cartera.<\/li>\n<\/ol><\/aside>\n<p><strong>Cierre del curso.<\/strong> Ha recorrido las tres capas de China (Lección 1), el trauma que la moldea (2), el legado de Mao (3), el giro de Deng a Xi (4), el tipo de sistema (5), quién manda (6), cómo controla a la sociedad (7) y a la periferia (8), cómo funciona su economía (9) y por qué se frena (10), su choque con el mundo (11) y sus futuros posibles (12). La herramienta que lo une todo es la hoja <strong>\"Cómo leer una noticia sobre China\"<\/strong> (entre los materiales finales): ante cualquier titular, pregúntese quién decide, qué incentivo hay, qué precedente se invoca, qué es hecho y qué interpretación, y qué explicación alternativa existe. Con eso, ya no necesita que le expliquen China: puede interpretarla usted.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Hal Brands y Michael Beckley, <em>Danger Zone: The Coming Conflict with China<\/em> — tesis del \"pico\" y la \"zona de peligro\".<\/li>\n<li>David Shambaugh, <em>China's Future?<\/em> — escenarios de trayectoria del régimen.<\/li>\n<li>Susan Shirk, <em>Overreach<\/em>; Andrew Nathan sobre resiliencia autoritaria.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Proyecciones del FMI; objetivos del 15.º Plan Quinquenal (2026–2030).<\/li>\n<\/ul>\n<p><strong>Análisis (para el debate actual)<\/strong><\/p>\n<ul>\n<li>Rhodium Group y MERICS sobre trayectoria económica.<\/li>\n<li>CSIS y <em>Foreign Affairs<\/em> sobre el debate \"Peak China\" frente al ascenso continuado.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 12 — El futuro: escenarios, no profecías Curso: Entender China en 2026. Bloque IV — China y el mundo, China y el futuro. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: la matriz de escenarios C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias — el cuadro de indicadores a vigilar G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Qué futuros plausibles se abren para China? La escena. Dos titulares del mismo año. \"China dominará el siglo XXI.\" \"China está a punto de colapsar.\" Ambos se venden con aplomo; ambos son casi con seguridad erróneos, porque los dos son predicciones disfrazadas de certezas. La herramienta honesta no es la profecía, sino el escenario : futuros plausibles con condiciones, indicadores y consecuencias. Esta última lección enseña a pensar en escenarios y a detectar hacia cuál apunta una noticia. Idea clave El futuro de China no está escrito. Depende de unas pocas grandes incógnitas que hemos estudiado: si la economía se rebalancea (Lección 10), si el poder sigue hiperconcentrado y cómo se resuelve la sucesión (Lección 6), si la periferia y Taiwán siguen gestionados o estallan (Lecciones 8 y 11), y cómo evoluciona la rivalidad con EE. UU. (Lección 11). En vez de predecir, trazamos escenarios, les asociamos indicadores adelantados y los mantenemos como una cartera que se actualiza con la evidencia. Ni el triunfo ni el colapso son un destino. B Modelo mental: la matriz de escenarios Dos ejes ordenan el abanico: Trayectoria económica: rebalanceo exitoso ↔ estancamiento o crisis prolongada. Trayectoria política: concentración estable y adaptación ↔ rigidez e inestabilidad. Y un eje externo: acomodación ↔ conflicto con EE. UU. (sobre todo por Taiwán). Para cada escenario, cuatro preguntas: qué condiciones lo hacen posible, qué indicadores lo harían más probable, qué factores juegan en contra y qué consecuencias tendría (dentro y fuera). Cómo se usa el modelo. No pregunte \"¿qué va a pasar?\", sino \"¿hacia qué escenario apunta la evidencia, y qué tendría que ver para cambiar de opinión?\". C Desarrollo C1. ¿Por qué escenarios y no predicciones? Porque el sistema tiene demasiadas incógnitas interdependientes para una predicción fiable, pero no es un caos ilegible: podemos acotar futuros plausibles y vigilar señales. Un escenario no dice \"esto ocurrirá\"; dice \"si se dan estas condiciones, esto es lo que cabría esperar, y estas son las señales tempranas\". Es humildad epistémica operativa (el hilo que recorre el curso), no renuncia al análisis. C2. Escenarios económicos (a) Desaceleración lenta pero estable (\"japonización\" suave). Condiciones: Pekín gestiona la deuda y el ladrillo sin crisis abierta, pero no reactiva el consumo. Indicadores: crecimiento estabilizado en el 3–4 %, deflación que remite despacio, deuda contenida. En contra: demografía y confianza. Consecuencias: China grande y capaz, pero sin el empuje de antaño. (b) Crisis prolongada / estancamiento largo. Condiciones: la deuda local o inmobiliaria desborda; la confianza no vuelve. Indicadores: impagos en cadena, caída del crédito, paro alto persistente. En contra: la capacidad estatal y el ahorro elevado, que amortiguan. Consecuencias: malestar social, tentación de más control o de aventura exterior. (c) Rebalanceo y adaptación exitosa. Condiciones: reformas que elevan el consumo (sanidad, pensiones, hukou ) y liderazgo tecnológico que compensa. Indicadores: consumo subiendo como % del PIB, productividad al alza, sectores nuevos escalando. En contra: el coste político de dar poder e ingresos a los hogares. Consecuencias: China innovadora y más equilibrada. C3. Escenarios políticos (a) Control reforzado con menos dinamismo. Condiciones: Xi prioriza seguridad sobre reforma. Indicadores: más purgas, más vigilancia, menos espacio privado. Consecuencias: estabilidad a corto plazo, coste de innovación y eficiencia a largo. (b) Adaptación exitosa del régimen. Condiciones: el Partido reforma la gobernanza sin abrir la política. Indicadores: mejor gestión económica, relevo ordenado. Consecuencias: resiliencia autoritaria prolongada. (c) Crisis interna del Partido / problema de sucesión. Condiciones: un Xi sin sucesor designado enferma, muere o es desafiado. Indicadores: luchas de facciones, señales confusas en la cúpula. En contra: el férreo control actual. Consecuencias: incertidumbre aguda, dado que no hay mecanismo de relevo (Lección 6). C4. Escenarios externos y Taiwán (a) Acomodación estratégica (competencia gestionada). Condiciones: ambas potencias fijan límites y canales. Indicadores: treguas que se renuevan, crisis que se contienen. Consecuencias: rivalidad crónica pero sin guerra. (b) Conflicto en torno a Taiwán. Condiciones: error de cálculo, cambio de statu quo, presión interna. Indicadores: maniobras mayores, retórica de plazos, ruptura de canales. En contra: el coste catastrófico para todos y la incertidumbre sobre el Ejército Popular tras las purgas. Consecuencias: económicas y militares globales. (c) Liderazgo tecnológico chino. Condiciones: China cierra la brecha en chips e IA. Indicadores: avances en semiconductores propios, adopción global de su tecnología (coche eléctrico, IA abierta). Consecuencias: reordenamiento del poder sin necesidad de guerra. C5. ¿Cómo interactúan los escenarios? Los ejes no son independientes: la economía condiciona la política y viceversa. Una crisis económica podría empujar tanto a la aventura exterior (usar Taiwán para cohesionar por nacionalismo) como al repliegue prudente (concentrarse en apagar fuegos internos); depende de la cohesión de la élite y del cálculo de riesgos. Por eso conviene una cartera de escenarios , no una apuesta única: se siguen los indicadores y se reajustan las probabilidades a medida que llega la evidencia. D Conceptos imprescindibles Escenario (frente a"}, {"id": "13_Glosario", "group": "Referencia", "badge": "▦", "title": "Glosario (55 conceptos)", "kind": "glosario", "meta": "55 conceptos clave del curso, en orden alfabético. Cada entrada: definición breve y por qué importa (y, cuando conviene, el error habitual). La lección de referencia va entre corchetes.", "readmin": 9, "color": "#b45309", "html": "<div class=\"doc-head\"><h1 id=\"glosario-entender-la-china-actual\">Glosario — Entender China en 2026<\/h1><p class=\"doc-meta\">55 conceptos clave del curso, en orden alfabético. Cada entrada: definición breve y por qué importa (y, cuando conviene, el error habitual). La lección de referencia va entre corchetes.<\/p>\n<hr><div class=\"glos-grid\">\n<p><strong>Alturas dominantes<\/strong> [L5, L9]. Sectores estratégicos (energía, banca, telecomunicaciones, ferrocarril, defensa) controlados por empresas estatales. Son la palanca económica directa del Estado: no hace falta gestionar cada fábrica si se controla el crédito, la energía y el suelo.<\/p>\n<p><strong>Asamblea Nacional Popular (ANP)<\/strong> [L6]. El legislativo formal de China.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que legisla con autonomía; en la práctica sobre todo ratifica decisiones ya tomadas en el Partido.<\/p>\n<p><strong>Asociación \"sin límites\" (China-Rusia)<\/strong> [L11]. Alineamiento estratégico reforzado tras la invasión de Ucrania (2022), pero asimétrico: Rusia depende cada vez más de China. No es una alianza militar plena.<\/p>\n<p><strong>Autoritarismo fragmentado<\/strong> [L6, L9]. Poder concentrado en la cúspide pero disputado en la ejecución: provincias y ministerios negocian, resisten y aplican a su manera lo que Pekín ordena. Matiza el mito del control total.<\/p>\n<p><strong>Autoritarismo receptivo<\/strong> [L7]. Control que concede selectivamente —revierte una política, castiga a un cargo local— para desactivar el descontento sin ceder poder. Explica por qué el régimen a veces rectifica (p. ej., el fin del COVID cero).<\/p>\n<p><strong>Banda de los Cuatro<\/strong> [L3]. Facción radical (incluida la viuda de Mao) detenida en 1976 tras su muerte; su caída abrió la puerta a la era de Deng.<\/p>\n<p><strong>BRICS<\/strong> [L11]. Agrupación (Brasil, Rusia, India, China, Sudáfrica y nuevos miembros) que China impulsa como alternativa parcial al orden occidental y vía hacia el Sur Global.<\/p>\n<p><strong>CCDI (Comisión Central de Inspección Disciplinaria)<\/strong> [L4, L6]. Órgano anticorrupción del Partido. Limpia corrupción y, a la vez, disciplina rivales: arma de poder tanto como de integridad.<\/p>\n<p><strong>Ciclo dinástico<\/strong> [L1]. Patrón histórico de ascenso, apogeo, decadencia y caída de dinastías, con fases de unidad y de fragmentación. Fija la asociación unidad = orden / división = catástrofe.<br><b class=\"mlbl\">Error habitual:<\/b>  convertirlo en ley determinista.<\/p>\n<p><strong>Civilización-Estado<\/strong> [L1]. Tesis de que China es una civilización organizada como Estado, distinta en naturaleza de un Estado-nación. Capta una autoimagen real, pero es un concepto contestado y con carga ideológica: herramienta, no dogma ni coartada.<\/p>\n<p><strong>Comisión Militar Central (CMC)<\/strong> [L6]. Órgano del Partido que manda sobre el Ejército Popular de Liberación. Controlarla es condición del poder supremo; el ejército es del Partido, no del Estado.<\/p>\n<p><strong>Comité Permanente del Politburó<\/strong> [L6]. La cúspide real del poder: siete miembros (2026). Cuanto más arriba, menos personas y más poder efectivo.<\/p>\n<p><strong>Consejo de Estado<\/strong> [L6]. El gobierno/gabinete, encabezado por el primer ministro (Li Qiang desde 2023). Administra; ejecuta la política del Partido.<\/p>\n<p><strong>COVID cero<\/strong> [L7]. Política de contención extrema (2020–2022) cuyo abrupto fin, tras las protestas del \"papel en blanco\", ilustró el autoritarismo receptivo.<\/p>\n<p><strong>Crédito dirigido<\/strong> [L9]. Asignación del crédito por los bancos públicos según prioridades políticas, no solo de mercado. Cómo el Estado premia sectores sin poseer las empresas.<\/p>\n<p><strong>Crédito social<\/strong> [L7]. <em>Mito vs. realidad:<\/em> no existe una puntuación nacional única que califique cada gesto de cada ciudadano; es un mosaico fragmentado de listas negras judiciales y calificaciones a empresas. Corrige el error occidental más extendido sobre China.<\/p>\n<p><strong>Deflación / recesión de balances<\/strong> [L10]. Caída sostenida de precios que lleva a hogares y empresas a reducir deuda en vez de gastar; por eso bajar tipos no basta para reactivar el consumo. China acumula la racha deflacionaria más larga desde los años setenta.<\/p>\n<p><strong>Desacople / reducción de riesgo (<em>decoupling<\/em> / <em>de-risking<\/em>)<\/strong> [L11]. Separar por completo las economías (desacople) frente a reducir solo las dependencias críticas (de-risking). Occidente practica sobre todo lo segundo.<\/p>\n<p><strong>Dividendo demográfico<\/strong> [L10]. El impulso de contar con mucha población activa y joven. En China se ha <strong>invertido<\/strong>: la población activa tocó techo en 2015 y la total cae desde 2022.<\/p>\n<p><strong>Educación patriótica<\/strong> [L2]. Política sistemática desde 1991 que enseña la humillación histórica y el papel redentor del Partido. Mecanismo por el que el trauma se transmite y se activa políticamente.<\/p>\n<p><strong>Ejército Popular de Liberación (EPL)<\/strong> [L6, L11]. Las fuerzas armadas, leales al Partido (vía la CMC), no a la nación ni a la Constitución. Ya es la mayor armada del mundo por número de buques.<\/p>\n<p><strong>Empresas estatales (SOEs)<\/strong> [L5, L9]. Grandes empresas públicas que dominan los sectores estratégicos. Siguen siendo centrales y financiadas, no reliquias residuales.<\/p>\n<p><strong>\"Envejecer antes de enriquecerse\"<\/strong> [L10]. Envejecer demográficamente antes de alcanzar la renta de un país rico, lo que limita los recursos para pensiones y sanidad.<\/p>\n<p><strong>\"Esconderse y esperar\" (韬光养晦)<\/strong> [L4]. Máxima de Deng de mantener un perfil internacional bajo. Su abandono bajo Xi marca el giro asertivo.<\/p>\n<p><strong>Estado-partido (<em>party-state<\/em>)<\/strong> [L5]. La fusión de Partido y Estado en una sola estructura de poder. Explica por qué el Partido está <em>dentro<\/em> de todo, no fuera.<\/p>\n<p><strong>Economía socialista de mercado<\/strong> [L5]. Término oficial (desde 1992–93) para el híbrido de control del Partido y asignación por el mercado. Describe el sistema mejor que \"comunista\" o \"capitalista\".<\/p>\n<p><strong>Extraterritorialidad / concesiones<\/strong> [L2]. Enclaves y regímenes donde los extranjeros escapaban a la ley china durante el \"siglo de la humillación\". Símbolo máximo de la soberanía perdida.<\/p>\n<p><strong>Finanzas del suelo<\/strong> [L9]. Modelo por el que los gobiernos locales se financiaban vendiendo derechos de uso del suelo. Motor del crecimiento y origen de la burbuja inmobiliaria; se hundió con el ladrillo.<\/p>\n<p><strong>Franja y la Ruta (Belt and Road)<\/strong> [L11]. Iniciativa de infraestructura e influencia global lanzada en 2013; su versión tecnológica es la \"Ruta de la Seda Digital\".<\/p>\n<p><strong>Gran Cortafuegos<\/strong> [L7]. Sistema que bloquea plataformas extranjeras y modera las nacionales. Su meta es impedir la coordinación colectiva, no silenciar toda queja.<\/p>\n<p><strong>Gran Salto Adelante / Gran Hambruna (1958–62)<\/strong> [L3]. Campaña de industrialización y colectivización forzada que provocó la mayor hambruna de la historia (estimaciones de 15 a 55 millones de muertos; consenso frecuente en 30–45). Muestra la movilización sin contrapesos convertida en catástrofe.<\/p>\n<p><strong>Hukou<\/strong> [L7, L10]. Sistema de registro de hogar que ata los derechos (escuela, sanidad) al lugar de origen, creando una desigualdad estructural entre urbanos y migrantes. Clave para entender el consumo débil.<\/p>\n<p><strong>Humillación, siglo de la (百年国耻)<\/strong> [L2]. El periodo 1839–1949 de derrotas, cesiones e invasión, convertido en relato nacional. Núcleo emocional del nacionalismo chino; trauma real y, a la vez, administrado.<\/p>\n<p><strong>Indicador adelantado<\/strong> [L12]. Señal temprana que sugiere hacia qué escenario se mueve el sistema. Permite actualizar sin esperar al desenlace.<\/p>\n<p><strong>Interdependencia / rivalidad (<em>frenemies<\/em>)<\/strong> [L11]. Ser competidores estratégicos y socios económicos a la vez. El rasgo que distingue la relación China-EE. UU. de la Guerra Fría.<\/p>\n<p><strong>\"Japonización\"<\/strong> [L12]. Escenario de crecimiento bajo y deflación prolongada tras una burbuja, como en Japón desde los noventa.<br><b class=\"mlbl\">Error habitual:<\/b>  asumir que China repetirá el caso japonés siendo más pobre y más grande.<\/p>\n<p><strong>Leninismo<\/strong> [L5]. Doctrina del monopolio del partido sobre el poder. China conserva el leninismo político aunque haya abandonado el marxismo económico clásico.<\/p>\n<p><strong>Ley de Seguridad Nacional (Hong Kong, 2020)<\/strong> [L8]. Norma que, junto al Artículo 23 (2024), desmontó en la práctica \"un país, dos sistemas\": oposición encarcelada, prensa arrasada.<\/p>\n<p><strong>LGFV (vehículos de financiación de gobiernos locales)<\/strong> [L9]. Entidades con las que los gobiernos locales se endeudaban fuera de balance. Fuente de dinamismo y de una enorme deuda oculta.<\/p>\n<p><strong>\"Lección soviética\"<\/strong> [L3, L4]. La convicción del Partido de que la URSS cayó por abrirse políticamente y por repudiar a sus fundadores. Justifica no reformar la política y no negar a Mao.<\/p>\n<p><strong>Luan (乱, caos)<\/strong> [L1, L2]. El desorden; el temor político fundamental. La unidad se vive como defensa frente a él.<\/p>\n<p><strong>Made in China 2025<\/strong> [L9, L11]. Programa de política industrial que ayudó a que China lidere hoy en coche eléctrico, solar y baterías.<\/p>\n<p><strong>Mandato del Cielo (<em>tianming<\/em>)<\/strong> [L1]. Legitimidad concedida a quien gobierna con orden y prosperidad, retirable si trae caos. Antecede a la legitimidad <em>por desempeño<\/em> del Partido actual.<\/p>\n<p><strong>Nihilismo histórico<\/strong> [L3]. Concepto oficial que criminaliza cuestionar la versión del Partido sobre su historia. Convierte la memoria (de Mao, sobre todo) en asunto de seguridad del régimen.<\/p>\n<p><strong>\"Nuevas fuerzas productivas\"<\/strong> [L9]. Prioridad del 15.º Plan (2026–30): chips, IA, biomedicina, cuántica, aeroespacial, 6G. Apuesta por la autosuficiencia tecnológica.<\/p>\n<p><strong>\"Papel en blanco\", protestas del (nov. 2022)<\/strong> [L7]. Protestas contra el COVID cero; su nombre alude a las hojas en blanco para eludir la censura. Mostraron que el pacto autoritario puede agrietarse.<\/p>\n<p><strong>Pacto autoritario<\/strong> [L7]. Intercambio implícito de prosperidad y orden por quiescencia política. Marco para leer protestas y concesiones; el consentimiento no es solo miedo.<\/p>\n<p><strong>\"Peak China\"<\/strong> [L12]. Tesis de que el poder chino podría estar cerca de su máximo. Contrapeso a la del ascenso imparable; una tesis, no un hecho.<\/p>\n<p><strong>Planes quinquenales / política industrial<\/strong> [L9]. Prioridades y subsidios que orientan la inversión hacia sectores elegidos. Explican liderazgos (coche eléctrico, solar) y también la sobrecapacidad.<\/p>\n<p><strong>Rebalanceo<\/strong> [L10]. El giro necesario de un modelo de inversión a uno de consumo interno. Reto central de la próxima década; a la vez económico y político.<\/p>\n<p><strong>Reforma y apertura (改革开放)<\/strong> [L4]. El giro iniciado en 1978 hacia el mercado y la inversión extranjera. Origen del ascenso económico; fue experimentación gradual, no un plan maestro.<\/p>\n<p><strong>Regiones autónomas<\/strong> [L8]. Territorios de minorías con autonomía formal pero control real del Partido. La autonomía es nominal.<\/p>\n<p><strong>Secretario general<\/strong> [L6]. El jefe del Partido y, por tanto, el cargo con poder real.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que la presidencia del Estado es el puesto decisivo.<\/p>\n<p><strong>Sinización<\/strong> [L8]. Política de alinear lengua, religión e identidad de las minorías con la cultura han y la ideología del Partido. El hilo común de la gestión de la periferia bajo Xi.<\/p>\n<p><strong>Tierras raras<\/strong> [L11]. Minerales críticos cuyo procesamiento domina China; su palanca de negociación frente a los controles de chips de EE. UU.<\/p>\n<p><strong>Tianxia (todo bajo el cielo)<\/strong> [L1]. Concepción de un orden mundial jerárquico y concéntrico, no de Estados soberanos iguales. Marco alternativo al westfaliano que aún tiñe la visión china del mundo.<\/p>\n<p><strong>Tratados desiguales<\/strong> [L2]. Acuerdos impuestos tras derrotas militares que cedían territorio, soberanía y privilegios. Fuente del reflejo defensivo ante toda imposición externa.<\/p>\n<p><strong>Tres Representaciones<\/strong> [L4, L5]. Teoría (2001) que permitió a los empresarios ingresar en el Partido: el giro del partido \"comunista\" hacia el capital.<\/p>\n<p><strong>\"Un país, dos sistemas\"<\/strong> [L8]. Fórmula que prometía autonomía a Hong Kong (y se ofrecía a Taiwán). Su vaciamiento en Hong Kong desacreditó el modelo para Taiwán.<\/p>\n<p><strong>\"Una sola China\"<\/strong> [L8, L11]. Principio por el que Pekín reclama Taiwán como parte de China. Soberanía inconclusa ligada a la legitimidad del régimen; para Pekín no es política exterior.<\/p>\n<p><strong>Zhongguo (中国, \"país del centro\")<\/strong> [L1]. El nombre de China y la autoimagen de centralidad que expresa. Explica la incomodidad con un orden de Estados formalmente iguales.<\/p>\n<p><strong>Zonas Económicas Especiales (ZEE)<\/strong> [L4]. Enclaves (Shenzhen y otros) con reglas favorables al capital extranjero. Laboratorio del modelo exportador, ensayado localmente antes de escalarse.<\/p><\/div><\/div>", "text": "Glosario — Entender China en 2026 55 conceptos clave del curso, en orden alfabético. Cada entrada: definición breve y por qué importa (y, cuando conviene, el error habitual). La lección de referencia va entre corchetes. Alturas dominantes [L5, L9]. Sectores estratégicos (energía, banca, telecomunicaciones, ferrocarril, defensa) controlados por empresas estatales. Son la palanca económica directa del Estado: no hace falta gestionar cada fábrica si se controla el crédito, la energía y el suelo. Asamblea Nacional Popular (ANP) [L6]. El legislativo formal de China. Error habitual: creer que legisla con autonomía; en la práctica sobre todo ratifica decisiones ya tomadas en el Partido. Asociación \"sin límites\" (China-Rusia) [L11]. Alineamiento estratégico reforzado tras la invasión de Ucrania (2022), pero asimétrico: Rusia depende cada vez más de China. No es una alianza militar plena. Autoritarismo fragmentado [L6, L9]. Poder concentrado en la cúspide pero disputado en la ejecución: provincias y ministerios negocian, resisten y aplican a su manera lo que Pekín ordena. Matiza el mito del control total. Autoritarismo receptivo [L7]. Control que concede selectivamente —revierte una política, castiga a un cargo local— para desactivar el descontento sin ceder poder. Explica por qué el régimen a veces rectifica (p. ej., el fin del COVID cero). Banda de los Cuatro [L3]. Facción radical (incluida la viuda de Mao) detenida en 1976 tras su muerte; su caída abrió la puerta a la era de Deng. BRICS [L11]. Agrupación (Brasil, Rusia, India, China, Sudáfrica y nuevos miembros) que China impulsa como alternativa parcial al orden occidental y vía hacia el Sur Global. CCDI (Comisión Central de Inspección Disciplinaria) [L4, L6]. Órgano anticorrupción del Partido. Limpia corrupción y, a la vez, disciplina rivales: arma de poder tanto como de integridad. Ciclo dinástico [L1]. Patrón histórico de ascenso, apogeo, decadencia y caída de dinastías, con fases de unidad y de fragmentación. Fija la asociación unidad = orden / división = catástrofe. Error habitual: convertirlo en ley determinista. Civilización-Estado [L1]. Tesis de que China es una civilización organizada como Estado, distinta en naturaleza de un Estado-nación. Capta una autoimagen real, pero es un concepto contestado y con carga ideológica: herramienta, no dogma ni coartada. Comisión Militar Central (CMC) [L6]. Órgano del Partido que manda sobre el Ejército Popular de Liberación. Controlarla es condición del poder supremo; el ejército es del Partido, no del Estado. Comité Permanente del Politburó [L6]. La cúspide real del poder: siete miembros (2026). Cuanto más arriba, menos personas y más poder efectivo. Consejo de Estado [L6]. El gobierno/gabinete, encabezado por el primer ministro (Li Qiang desde 2023). Administra; ejecuta la política del Partido. COVID cero [L7]. Política de contención extrema (2020–2022) cuyo abrupto fin, tras las protestas del \"papel en blanco\", ilustró el autoritarismo receptivo. Crédito dirigido [L9]. Asignación del crédito por los bancos públicos según prioridades políticas, no solo de mercado. Cómo el Estado premia sectores sin poseer las empresas. Crédito social [L7]. Mito vs. realidad: no existe una puntuación nacional única que califique cada gesto de cada ciudadano; es un mosaico fragmentado de listas negras judiciales y calificaciones a empresas. Corrige el error occidental más extendido sobre China. Deflación / recesión de balances [L10]. Caída sostenida de precios que lleva a hogares y empresas a reducir deuda en vez de gastar; por eso bajar tipos no basta para reactivar el consumo. China acumula la racha deflacionaria más larga desde los años setenta. Desacople / reducción de riesgo ( decoupling / de-risking ) [L11]. Separar por completo las economías (desacople) frente a reducir solo las dependencias críticas (de-risking). Occidente practica sobre todo lo segundo. Dividendo demográfico [L10]. El impulso de contar con mucha población activa y joven. En China se ha invertido : la población activa tocó techo en 2015 y la total cae desde 2022. Educación patriótica [L2]. Política sistemática desde 1991 que enseña la humillación histórica y el papel redentor del Partido. Mecanismo por el que el trauma se transmite y se activa políticamente. Ejército Popular de Liberación (EPL) [L6, L11]. Las fuerzas armadas, leales al Partido (vía la CMC), no a la nación ni a la Constitución. Ya es la mayor armada del mundo por número de buques. Empresas estatales (SOEs) [L5, L9]. Grandes empresas públicas que dominan los sectores estratégicos. Siguen siendo centrales y financiadas, no reliquias residuales. \"Envejecer antes de enriquecerse\" [L10]. Envejecer demográficamente antes de alcanzar la renta de un país rico, lo que limita los recursos para pensiones y sanidad. \"Esconderse y esperar\" (韬光养晦) [L4]. Máxima de Deng de mantener un perfil internacional bajo. Su abandono bajo Xi marca el giro asertivo. Estado-partido ( party-state ) [L5]. La fusión de Partido y Estado en una sola estructura de poder. Explica por qué el Partido está dentro de todo, no fuera. Economía socialista de mercado [L5]. Término oficial (desde 1992–93) para el híbrido de control del Partido y asignación por el mercado. Describe el sistema mejor que \"comunista\" o \"capitalista\". Extraterritorialidad / concesiones [L2]. Enclaves y regímenes donde los extranjeros escapaban a la ley china durante el \"siglo de la humillación\". Símbolo máximo de la soberanía perdida. Finanzas del suelo [L9]. Modelo por el que los gobiernos locales se financiaban vendiendo derechos de uso del suelo. Motor del crecimiento y origen de la burbuja inmobiliaria; se hundió con el ladrillo. Franja y la Ruta (Belt and Road) [L11]. Iniciativa de infraestructura e influencia global lanzada en 2013; su versión tecnológica es la \"Ruta de la Seda Digital\". Gran Cortafuegos [L7]. Sistema que bloquea plataformas extranjeras y modera las nacionales. Su meta es impedir la coordinación colectiva, no silenc"}, {"id": "14_Cronologia_1839_actualidad", "group": "Referencia", "badge": "▦", "title": "Cronología 1839–2026", "kind": "plain", "meta": "Hitos seleccionados por su valor explicativo, no por exhaustividad. Se incluye algún hito anterior a 1839 como contexto (marcado con «·»). Entre corchetes, la lección donde se trata.", "readmin": 5, "color": "#b45309", "html": "<div class=\"doc-head\"><h1 id=\"cronologia-general-de-china-18392026\">Cronología general de China, 1839–2026<\/h1><p class=\"doc-meta\">Hitos seleccionados por su valor explicativo, no por exhaustividad. Se incluye algún hito anterior a 1839 como contexto (marcado con «·»). Entre corchetes, la lección donde se trata.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"contexto-previo-imperio\">Contexto previo (imperio)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>· 221 a. C.<\/strong> — Qin Shi Huang unifica los Reinos Combatientes; estandariza la escritura: nace el \"guion\" común. [L1]<\/li>\n<li><strong>· 1271–1279<\/strong> — Los mongoles (dinastía Yuan) gobiernan toda China: quienes \"eran China\" no siempre eran han. [L1]<\/li>\n<li><strong>· 1644<\/strong> — Los manchúes fundan la dinastía Qing, la última. [L1]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"el-siglo-de-la-humillacion-18391949\">El siglo de la humillación (1839–1949)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>1839–1842<\/strong> — Primera Guerra del Opio; derrota china. [L2]<\/li>\n<li><strong>1842<\/strong> — Tratado de Nanjing: cesión de la isla de Hong Kong, puertos de tratado, extraterritorialidad. [L2]<\/li>\n<li><strong>1850–1864<\/strong> — Rebelión Taiping (~20 millones de muertos o más): el colapso también viene de dentro. [L2]<\/li>\n<li><strong>1856–1860<\/strong> — Segunda Guerra del Opio; saqueo del Palacio de Verano (1860). [L2]<\/li>\n<li><strong>1894–1895<\/strong> — Guerra Sino-Japonesa; el Tratado de Shimonoseki cede Taiwán a Japón. [L2, L8]<\/li>\n<li><strong>1899–1901<\/strong> — Rebelión de los Bóxers y Protocolo Bóxer. [L2]<\/li>\n<li><strong>1911–1912<\/strong> — Revolución de Xinhai: cae la Qing; fin de más de dos mil años de sistema imperial. [L1, L2]<\/li>\n<li><strong>1921<\/strong> — Fundación del Partido Comunista Chino. [L3]<\/li>\n<li><strong>1931<\/strong> — Invasión japonesa de Manchuria. [L2]<\/li>\n<li><strong>1934–1935<\/strong> — Larga Marcha; Mao consolida su liderazgo. [L3]<\/li>\n<li><strong>1937–1945<\/strong> — Guerra total con Japón; Masacre de Nanjing (1937–38). [L2]<\/li>\n<li><strong>1945–1949<\/strong> — Guerra civil entre comunistas y Kuomintang. [L2, L3]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"la-era-de-mao-19491976\">La era de Mao (1949–1976)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>1949<\/strong> — Fundación de la República Popular China: \"China se ha puesto de pie\". El Kuomintang se repliega a Taiwán. [L2, L3, L8]<\/li>\n<li><strong>1950–1951<\/strong> — Incorporación del Tíbet; reforma agraria. [L3, L8]<\/li>\n<li><strong>1950–1953<\/strong> — Guerra de Corea. [L3]<\/li>\n<li><strong>1956–1957<\/strong> — Campaña de las Cien Flores y giro Antiderechista. [L3]<\/li>\n<li><strong>1958–1962<\/strong> — Gran Salto Adelante y Gran Hambruna. [L3]<\/li>\n<li><strong>1959<\/strong> — Levantamiento tibetano; el Dalái Lama se exilia. [L8]<\/li>\n<li><strong>1966–1976<\/strong> — Revolución Cultural. [L3]<\/li>\n<li><strong>1971<\/strong> — La RPC ocupa el asiento de \"China\" en la ONU; \"caso Lin Biao\". [L1, L3]<\/li>\n<li><strong>1972<\/strong> — Visita de Nixon: apertura a EE. UU. [L3]<\/li>\n<li><strong>1976<\/strong> — Muerte de Mao; caída de la Banda de los Cuatro. [L3]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"reforma-y-apertura-19782012\">Reforma y apertura (1978–2012)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>1978<\/strong> — III Pleno del XI Comité Central: comienza la reforma y apertura. [L4]<\/li>\n<li><strong>1979<\/strong> — Política de hijo único (vigente hasta 2015). [L10]<\/li>\n<li><strong>1980<\/strong> — Zona Económica Especial de Shenzhen. [L4]<\/li>\n<li><strong>1981<\/strong> — Resolución sobre la historia del Partido: Mao, \"70 % de aciertos, 30 % de errores\". [L3]<\/li>\n<li><strong>1989<\/strong> — Protestas y represión de Tiananmén (4 de junio). [L4]<\/li>\n<li><strong>1992<\/strong> — Gira del Sur de Deng: relanza la reforma; se consagra la \"economía socialista de mercado\". [L4, L5]<\/li>\n<li><strong>1994<\/strong> — Reforma fiscal: centraliza ingresos y empuja a los locales a las \"finanzas del suelo\". [L9]<\/li>\n<li><strong>1997<\/strong> — Traspaso de Hong Kong (\"un país, dos sistemas\"). [L8]<\/li>\n<li><strong>2001<\/strong> — Ingreso en la OMC; \"Tres Representaciones\" (empresarios en el Partido). [L4, L5]<\/li>\n<li><strong>2008<\/strong> — Juegos Olímpicos de Pekín; estímulo de 4 billones de yuanes tras la crisis global. [L9]<\/li>\n<li><strong>2009<\/strong> — Disturbios de Urumqi (Xinjiang). [L8]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"la-era-de-xi-2012\">La era de Xi (2012–)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>2012<\/strong> — Xi Jinping, secretario general; arranca la campaña anticorrupción (2013). [L4, L6]<\/li>\n<li><strong>2013<\/strong> — \"Papel decisivo del mercado\"; lanzamiento de la Franja y la Ruta; controles previos que anticipan la política de tierras raras. [L5, L9, L11]<\/li>\n<li><strong>2015<\/strong> — \"Made in China 2025\"; techo de la población activa; fin de la política de hijo único. [L9, L10]<\/li>\n<li><strong>2017<\/strong> — \"Pensamiento Xi Jinping\" inscrito en los estatutos del Partido. [L4, L6]<\/li>\n<li><strong>2018<\/strong> — Eliminación de los límites de mandato de la presidencia estatal; primera guerra comercial con EE. UU. [L4, L11]<\/li>\n<li><strong>~2017–<\/strong> — Escalada de los campos y la sinización en Xinjiang. [L8]<\/li>\n<li><strong>2019–2020<\/strong> — Protestas de Hong Kong; Ley de Seguridad Nacional (2020). [L8]<\/li>\n<li><strong>2020<\/strong> — \"Tres líneas rojas\": freno a la deuda inmobiliaria; freno regulatorio a las tecnológicas (2020–21). [L5, L10]<\/li>\n<li><strong>2021<\/strong> — Impago de Evergrande; techo y (2022) inicio del declive de la población total. [L10]<\/li>\n<li><strong>2022<\/strong> — XX Congreso: tercer mandato de Xi; informe de la ONU sobre Xinjiang; protestas del \"papel en blanco\" (nov.); fin del COVID cero (dic.). [L6, L7, L8]<\/li>\n<li><strong>2022<\/strong> — Ley CHIPS de EE. UU. y controles a la exportación de semiconductores. [L11]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"20232026-coyuntura-del-curso\">2023–2026 (coyuntura del curso)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>2023<\/strong> — Li Qiang, primer ministro; comienza la deflación; se suspende (y luego rehace) el dato de paro juvenil; controles chinos sobre galio y germanio. [L6, L10, L11]<\/li>\n<li><strong>2024<\/strong> — Orden de liquidación de Evergrande (enero); Artículo 23 en Hong Kong; aranceles de la UE al coche eléctrico chino (octubre). [L8, L10, L11]<\/li>\n<li><strong>Enero 2025<\/strong> — Irrupción de DeepSeek (modelo R1). [L11]<\/li>\n<li><strong>Febrero 2025<\/strong> — Simposio de Xi con empresarios privados (reaparece Jack Ma). [L5]<\/li>\n<li><strong>Abril 2025<\/strong> — Aranceles EE. UU.-China hasta el 145 %; Ley de Promoción de la Economía Privada (aprobada el 30 de abril, en vigor el 20 de mayo). [L5, L11]<\/li>\n<li><strong>Julio 2025<\/strong> — El Dalái Lama cumple 90 años; pulso por la sucesión con Pekín. [L8]<\/li>\n<li><strong>Septiembre 2025<\/strong> — Desfile del 80.º aniversario de la victoria sobre Japón (Putin y Kim presentes). [L2]<\/li>\n<li><strong>Octubre 2025<\/strong> — Tregua comercial Trump-Xi; expulsión de altos mandos militares (He Weidong, Miao Hua). [L4, L6, L11]<\/li>\n<li><strong>Noviembre 2025<\/strong> — Declaraciones de la primera ministra japonesa Takaichi sobre Taiwán; crisis chino-japonesa. [L2]<\/li>\n<li><strong>Diciembre 2025<\/strong> — Jimmy Lai condenado a 20 años en Hong Kong. [L8]<\/li>\n<li><strong>Enero 2026<\/strong> — Veto chino a exportaciones de doble uso a Japón; expertos de la ONU alertan de trabajo forzado en Xinjiang; la UE pasa a precios mínimos para el coche eléctrico chino. [L2, L8, L11]<\/li>\n<li><strong>Comienzos de 2026<\/strong> — Caída del vicepresidente de la CMC Zhang Youxia; ~5 de 6 miembros de la CMC purgados. [L4, L6]<\/li>\n<li><strong>Abril 2026<\/strong> — DeepSeek presenta el modelo V4; la UE sanciona entidades chinas por bienes de doble uso a Rusia. [L11]<\/li>\n<li><strong>Mayo 2026<\/strong> — Cumbre Trump-Xi en Pekín; extensión de la tregua. [L11]<\/li>\n<li><strong>2026<\/strong> — Despliegue del 15.º Plan Quinquenal (2026–2030) y las \"nuevas fuerzas productivas\"; cuarto año de caída poblacional. [L9, L10]<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"hitos-futuros-a-vigilar\">Hitos futuros a vigilar<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Otoño de 2026<\/strong> — Vencimiento de la tregua arancelaria EE. UU.-China. [L12]<\/li>\n<li><strong>Finales de 2027<\/strong> — 21.º Congreso del Partido: ¿cuarto mandato de Xi?, ¿señales de sucesión? [L12]<\/li>\n<\/ul><\/div><\/section>", "text": "Cronología general de China, 1839–2026 Hitos seleccionados por su valor explicativo, no por exhaustividad. Se incluye algún hito anterior a 1839 como contexto (marcado con «·»). Entre corchetes, la lección donde se trata. Contexto previo (imperio) · 221 a. C. — Qin Shi Huang unifica los Reinos Combatientes; estandariza la escritura: nace el \"guion\" común. [L1] · 1271–1279 — Los mongoles (dinastía Yuan) gobiernan toda China: quienes \"eran China\" no siempre eran han. [L1] · 1644 — Los manchúes fundan la dinastía Qing, la última. [L1] El siglo de la humillación (1839–1949) 1839–1842 — Primera Guerra del Opio; derrota china. [L2] 1842 — Tratado de Nanjing: cesión de la isla de Hong Kong, puertos de tratado, extraterritorialidad. [L2] 1850–1864 — Rebelión Taiping (~20 millones de muertos o más): el colapso también viene de dentro. [L2] 1856–1860 — Segunda Guerra del Opio; saqueo del Palacio de Verano  4 billones de yuanes tras la crisis global. [L9] 2009 — Disturbios de Urumqi (Xinjiang). [L8] La era de Xi (2012–) 2012 — Xi Jinping, secretario general; arranca la campaña anticorrupción (2013). [L4, L6] 2013 — \"Papel decisivo del mercado\"; lanzamiento de la Franja y la Ruta; controles previos que anticipan la política de tierras raras. [L5, L9, L11] 2015 — \"Made in China 2025\"; techo de la población activa; fin de la política de hijo único. [L9, L10] 2017 — \"Pensamiento Xi Jinping\" inscrito en los estatutos del Partido. [L4, L6] 2018 — Eliminación de los límites de mandato de la presidencia estatal; primera guerra comercial con EE. UU. [L4, L11] ~2017– — Escalada de los campos y la sinización en Xinjiang. [L8] 2019–2020 — Protestas de Hong Kong; Ley de Seguridad Nacional (2020). [L8] 2020 — \"Tres líneas rojas\": freno a la deuda inmobiliaria; freno regulatorio a las tecnológicas (2020–21). [L5, L10] 2021 — Impago de Evergrande; techo y (2022) inicio del declive de la población total. [L10] 2022 — XX Congreso: tercer mandato de Xi; informe de la ONU sobre Xinjiang; protestas del \"papel en blanco\" (nov.); fin del COVID cero (dic.). [L6, L7, L8] 2022 — Ley CHIPS de EE. UU. y controles a la exportación de semiconductores. [L11] 2023–2026 (coyuntura del curso) 2023 — Li Qiang, primer ministro; comienza la deflación; se suspende (y luego rehace) el dato de paro juvenil; controles chinos sobre galio y germanio. [L6, L10, L11] 2024 — Orden de liquidación de Evergrande (enero); Artículo 23 en Hong Kong; aranceles de la UE al coche eléctrico chino (octubre). [L8, L10, L11] Enero 2025 — Irrupción de DeepSeek (modelo R1). [L11] Febrero 2025 — Simposio de Xi con empresarios privados (reaparece Jack Ma). [L5] Abril 2025 — Aranceles EE. UU.-China hasta el 145 %; Ley de Promoción de la Economía Privada (aprobada el 30 de abril, en vigor el 20 de mayo). [L5, L11] Julio 2025 — El Dalái Lama cumple 90 años; pulso por la sucesión con Pekín. [L8] Septiembre 2025 — Desfile del 80.º aniversario de la victoria sobre Japón (Putin y Kim presentes). [L2] Octubre 2025 — Tregua comercial Trump-Xi; expulsión de altos mandos militares (He Weidong, Miao Hua). [L4, L6, L11] Noviembre 2025 — Declaraciones de la primera ministra japonesa Takaichi sobre Taiwán; crisis chino-japonesa. [L2] Diciembre 2025 — Jimmy Lai condenado a 20 años en Hong Kong. [L8] Enero 2026 — Veto chino a exportaciones de doble uso a Japón; expertos de la ONU alertan de trabajo forzado en Xinjiang; la UE pasa a precios mínimos para el coche eléctrico chino. [L2, L8, L11] Comienzos de 2026 — Caída del vicepresidente de la CMC Zhang Youxia; ~5 de 6 miembros de la CMC purgados. [L4, L6] Abril 2026 — DeepSeek presenta el modelo V4; la UE sanciona entidades chinas por bienes de doble uso a Rusia. [L11] Mayo 2026 — Cumbre Trump-Xi en Pekín; extensión de la tregua. [L11] 2026 — Despliegue del 15.º Plan Quinquenal (2026–2030) y las \"nuevas fuerzas productivas\"; cuarto año de caída poblacional. [L9, L10] Hitos futuros a vigilar Otoño de 2026 — Vencimiento de la tregua arancelaria EE. UU.-China. [L12] Finales de 2027 — 2"}, {"id": "15_Mapa_de_instituciones_y_actores", "group": "Referencia", "badge": "▦", "title": "Mapa de instituciones", "kind": "plain", "meta": "Esquema de referencia. No es un mapa geográfico, sino un organigrama del poder. Regla de oro: **el Partido está por encima del Estado, y el ejército pertenece al Partido, no al Estado.** [Lección 6]", "readmin": 3, "color": "#b45309", "html": "<div class=\"doc-head\"><h1 id=\"mapa-de-instituciones-y-actores-del-poder-en-china\">Mapa de instituciones y actores del poder en China<\/h1><p class=\"doc-meta\">Esquema de referencia. No es un mapa geográfico, sino un organigrama del poder. Regla de oro: <\/em><em>el Partido está por encima del Estado, y el ejército pertenece al Partido, no al Estado.<\/em><em> [Lección 6]<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"esquema-general\">Esquema general<\/h2><div class=\"sec-body\">\n<pre><code>                          ┌───────────────────────────────┐\n                          │   XI JINPING (una persona,     │\n                          │   tres sombreros)              │\n                          │   · Secretario general (Partido)\n                          │   · Jefe de la CMC (ejército)  │\n                          │   · Presidente (Estado)        │\n                          └───────────────┬───────────────┘\n                                          │\n      ╔═══════════════════════════════════╪═══════════════════════════════════╗\n      ║  PARTIDO  (donde reside el poder)  │                                   ║\n      ║                                    ▼                                   ║\n      ║   Secretario general                                                   ║\n      ║        │                                                               ║\n      ║        ▼                                                               ║\n      ║   Comité Permanente del Politburó  (7 miembros) ── la cúpula real      ║\n      ║        │                                                               ║\n      ║        ▼                                                               ║\n      ║   Politburó (24)                                                       ║\n      ║        │                                                               ║\n      ║        ▼                                                               ║\n      ║   Comité Central (~200)                                                ║\n      ║        │                                                               ║\n      ║        ▼                                                               ║\n      ║   Congreso Nacional del Partido (~2.300, cada 5 años) ── ratifica      ║\n      ║                                                                        ║\n      ║   Órganos clave del Partido:                                           ║\n      ║   · Comisión Militar Central (CMC) ──────────► manda al EJÉRCITO (EPL) ║\n      ║   · CCDI (disciplina / anticorrupción) ──────► arma de control         ║\n      ║   · Departamento de Organización ────────────► nombra los cargos       ║\n      ╚═══════════════════════╤════════════════════════════════════════════════╝\n                              │  el Partido dirige y controla al Estado\n                              ▼\n      ┌────────────────────────────────────────────────────────────────────────┐\n      │  ESTADO  (la cara visible, que administra y ejecuta)                     │\n      │                                                                          │\n      │   Presidencia (protocolaria)                                             │\n      │   Consejo de Estado / Primer ministro (Li Qiang) ── el gobierno          │\n      │   Asamblea Nacional Popular (ANP) ── el legislativo, que ratifica        │\n      │   Gobiernos provinciales y locales ── ejecutan… y regatean               │\n      └────────────────────────────────────────────────────────────────────────┘\n<\/code><\/pre>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"los-actores-uno-a-uno\">Los actores, uno a uno<\/h2><div class=\"sec-body\">\n<p><strong>Xi Jinping.<\/strong> Concentra los tres cargos decisivos. El que le da poder real no es la presidencia del Estado (protocolaria), sino la <strong>secretaría general del Partido<\/strong> y la <strong>jefatura de la Comisión Militar Central<\/strong>. [L1, L6]<\/p>\n<h3 id=\"la-columna-del-partido-el-poder-real\">La columna del Partido (el poder real)<\/h3>\n<ul>\n<li><strong>Secretario general.<\/strong> El jefe del Partido; el cargo con poder efectivo.<\/li>\n<li><strong>Comité Permanente del Politburó (7).<\/strong> La cúspide de decisión. Composición 2026: Xi Jinping, Li Qiang, Zhao Leji, Wang Huning, Cai Qi, Ding Xuexiang, Li Xi.<\/li>\n<li><strong>Politburó (24).<\/strong> El siguiente anillo.<\/li>\n<li><strong>Comité Central (~200).<\/strong> Titulares y suplentes; élite ampliada.<\/li>\n<li><strong>Congreso Nacional del Partido (~2.300, cada 5 años).<\/strong> En la práctica, ratifica.<\/li>\n<li><strong>Comisión Militar Central (CMC).<\/strong> El Partido manda al ejército a través de ella. Muy purgada en 2025–26.<\/li>\n<li><strong>CCDI (Comisión Central de Inspección Disciplinaria).<\/strong> Anticorrupción y disciplina; arma de poder además de integridad.<\/li>\n<li><strong>Departamento de Organización.<\/strong> Controla los nombramientos: una palanca de poder silenciosa pero enorme.<\/li>\n<\/ul>\n<h3 id=\"la-columna-del-estado-administra-y-ejecuta\">La columna del Estado (administra y ejecuta)<\/h3>\n<ul>\n<li><strong>Presidencia del Estado.<\/strong> Cargo en gran medida protocolario.<\/li>\n<li><strong>Consejo de Estado y primer ministro (Li Qiang desde 2023).<\/strong> El gobierno; gestiona la economía y la administración.<\/li>\n<li><strong>Asamblea Nacional Popular (ANP).<\/strong> El legislativo formal; ratifica más que legisla.<\/li>\n<li><strong>Gobiernos provinciales y locales.<\/strong> Ejecutan la política central, pero con intereses propios: compiten, improvisan y regatean (el \"autoritarismo fragmentado\"). [L6, L9]<\/li>\n<\/ul>\n<h3 id=\"el-ejercito\">El ejército<\/h3>\n<ul>\n<li><strong>Ejército Popular de Liberación (EPL).<\/strong> Leal al <strong>Partido<\/strong> (vía la CMC), no a la nación ni a la Constitución. Ya es la mayor armada del mundo por número de buques. [L6, L11]<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"como-leer-este-mapa\">Cómo leer este mapa<\/h2><div class=\"sec-body\">\n<ol>\n<li><strong>Busque el cargo de partido, no el estatal.<\/strong> Ante un dirigente, pregunte qué puesto ocupa en la columna izquierda (Partido), no en la derecha (Estado).<\/li>\n<li><strong>El organigrama no basta.<\/strong> El poder real también fluye por <strong>facciones<\/strong>, control de <strong>nombramientos<\/strong> y la <strong>campaña anticorrupción<\/strong>. Añada siempre esa capa informal. [L6]<\/li>\n<li><strong>Abajo hay holgura.<\/strong> Provincias y ministerios no son meros ejecutores: negocian y desvían. \"Todo se decide en Pekín\" es falso. [L9]<\/li>\n<li><strong>La gran incógnita es la sucesión.<\/strong> No hay sucesor designado: mucho poder en una persona y ningún mecanismo de relevo. [L6, L12]<\/li>\n<\/ol>\n<p><em>(Para una versión gráfica en alta resolución puede elaborarse este mismo esquema en una herramienta de diagramas; aquí se ofrece en texto para que sea fiable y editable.)<\/em><\/p><\/div><\/section>", "text": "Mapa de instituciones y actores del poder en China Esquema de referencia. No es un mapa geográfico, sino un organigrama del poder. Regla de oro: el Partido está por encima del Estado, y el ejército pertenece al Partido, no al Estado. [Lección 6] Esquema general ┌───────────────────────────────┐ │ XI JINPING (una persona, │ │ tres sombreros) │ │ · Secretario general (Partido) │ · Jefe de la CMC (ejército) │ │ · Presidente (Estado) │ └───────────────┬───────────────┘ │ ╔═══════════════════════════════════╪═══════════════════════════════════╗ ║ PARTIDO (donde reside el poder) │ ║ ║ ▼ ║ ║ Secretario general ║ ║ │ ║ ║ ▼ ║ ║ Comité Permanente del Politburó (7 miembros) ── la cúpula real ║ ║ │ ║ ║ ▼ ║ ║ Politburó (24) ║ ║ │ ║ ║ ▼ ║ ║ Comité Central (~200) ║ ║ │ ║ ║ ▼ ║ ║ Congreso Nacional del Partido (~2.300, cada 5 años) ── ratifica ║ ║ ║ ║ Órganos clave del Partido: ║ ║ · Comisión Militar Central (CMC) ──────────► manda al EJÉRCITO (EPL) ║ ║ · CCDI (disciplina / anticorrupción) ──────► arma de control ║ ║ · Departamento de Organización ────────────► nombra los cargos ║ ╚═══════════════════════╤════════════════════════════════════════════════╝ │ el Partido dirige y controla al Estado ▼ ┌────────────────────────────────────────────────────────────────────────┐ │ ESTADO (la cara visible, que administra y ejecuta) │ │ │ │ Presidencia (protocolaria) │ │ Consejo de Estado / Primer ministro (Li Qiang) ── el gobierno │ │ Asamblea Nacional Popular (ANP) ── el legislativo, que ratifica │ │ Gobiernos provinciales y locales ── ejecutan… y regatean │ └────────────────────────────────────────────────────────────────────────┘ Los actores, uno a uno Xi Jinping. Concentra los tres cargos decisivos. El que le da poder real no es la presidencia del Estado (protocolaria), sino la secretaría general del Partido y la jefatura de la Comisión Militar Central . [L1, L6] La columna del Partido (el poder real) Secretario general. El jefe del Partido; el cargo con poder efectivo. Comité Permanente del Politburó (7). La cúspide de decisión. Composición 2026: Xi Jinping, Li Qiang, Zhao Leji, Wang Huning, Cai Qi, Ding Xuexiang, Li Xi. Politburó (24). El siguiente anillo. Comité Central (~200). Titulares y suplentes; élite ampliada. Congreso Nacional del Partido (~2.300, cada 5 años). En la práctica, ratifica. Comisión Militar Central (CMC). El Partido manda al ejército a través de ella. Muy purgada en 2025–26. CCDI (Comisión Central de Inspección Disciplinaria). Anticorrupción y disciplina; arma de poder además de integridad. Departamento de Organización. Controla los nombramientos: una palanca de poder silenciosa pero enorme. La columna del Estado (administra y ejecuta) Presidencia del Estado. Cargo en gran medida protocolario. Consejo de Estado y primer ministro (Li Qiang desde 2023). El gobierno; gestiona la economía y la administración. Asamblea Nacional Popular (ANP). El legislativo formal; ratifica más que legisla. Gobiernos provinciales y locales. Ejecutan la política central, pero con intereses propios: compiten, improvisan y regatean (el \"autoritarismo fragmentado\"). [L6, L9] El ejército Ejército Popular de Liberación (EPL). Leal al Partido (vía la CMC), no a la nación ni a la Constitución. Ya es la mayor armada del mundo por número de buques. [L6, L11] Cómo leer este mapa Busque el cargo de partido, no el estatal. Ante un dirigente, pregunte qué puesto ocupa en la columna izquierda (Partido), no en la derecha (Estado). El organigrama no basta. El poder real también fluye por facciones , control de nombramientos y la campaña anticorrupción . Añada siempre esa capa informal. [L6] Abajo hay holgura. Provincias y ministerios no son meros ejecutores: negocian y desvían. \"Todo se decide en Pekín\" es falso. [L9] La gran incógnita es la sucesión. No hay sucesor designado: mucho poder en una persona y ningún mecanismo de relevo. [L6, L12] (Para una versión gráfica en alta resolución puede elaborarse este mismo esquema en una herramienta de diagramas; aquí se ofrece en texto para que sea fiable y editable.)"}, {"id": "16_Tabla_comparativa_China_democracia_URSS", "group": "Referencia", "badge": "▦", "title": "Tabla comparativa", "kind": "plain", "meta": "Herramienta para situar a China por contraste. La idea central: China **no es** la URSS —aprendió de su caída (la \"lección soviética\")— ni **es** una democracia liberal. Es un tercer tipo. Las casillas simplifican para comparar; los matices están en las lecciones indicadas.", "readmin": 3, "color": "#b45309", "html": "<div class=\"doc-head\"><h1 id=\"tabla-comparativa-china-rpc-democracia-liberal-urss\">Tabla comparativa: China (RPC) / democracia liberal / URSS<\/h1><p class=\"doc-meta\">Herramienta para situar a China por contraste. La idea central: China <\/em><em>no es<\/em><em> la URSS —aprendió de su caída (la \"lección soviética\")— ni <\/em><em>es<\/em><em> una democracia liberal. Es un tercer tipo. Las casillas simplifican para comparar; los matices están en las lecciones indicadas.<\/p>\n<hr>\n<table>\n<thead>\n<tr>\n<th>Dimensión<\/th>\n<th>China (RPC, 2026)<\/th>\n<th>Democracia liberal<\/th>\n<th>URSS (≈1970–85)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Poder político<\/strong><\/td>\n<td>Monopolio de un partido leninista; sin oposición legal [L5, L6]<\/td>\n<td>Pluralismo; partidos que compiten en elecciones<\/td>\n<td>Monopolio de un
