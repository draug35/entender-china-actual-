partido leninista<\/td>\n<\/tr>\n<tr>\n<td><strong>Economía<\/strong><\/td>\n<td>Mercado dirigido por el Partido-Estado; gran sector privado [L5, L9]<\/td>\n<td>Mercado con regulación; propiedad privada dominante<\/td>\n<td>Economía planificada de mando; casi sin sector privado<\/td>\n<\/tr>\n<tr>\n<td><strong>Propiedad privada<\/strong><\/td>\n<td>Permitida y extensa, pero condicional (el capital no es soberano) [L5]<\/td>\n<td>Garantizada como derecho<\/td>\n<td>Prohibida en lo esencial<\/td>\n<\/tr>\n<tr>\n<td><strong>Fuente de legitimidad<\/strong><\/td>\n<td>Desempeño (prosperidad, orden) + nacionalismo [L1, L4]<\/td>\n<td>Procedimiento (elecciones, ley)<\/td>\n<td>Ideología marxista-leninista<\/td>\n<\/tr>\n<tr>\n<td><strong>Ideología<\/strong><\/td>\n<td>Marxismo-leninismo + \"Pensamiento Xi\" + nacionalismo; flexible en lo económico [L4]<\/td>\n<td>Liberalismo; pluralismo de valores<\/td>\n<td>Marxismo-leninismo dogmático<\/td>\n<\/tr>\n<tr>\n<td><strong>Sucesión del líder<\/strong><\/td>\n<td>Sin mecanismo claro; Xi sin sucesor designado [L6, L12]<\/td>\n<td>Reglada por elecciones/mandatos<\/td>\n<td>Informal, opaca (gerontocracia)<\/td>\n<\/tr>\n<tr>\n<td><strong>Relación con el mercado mundial<\/strong><\/td>\n<td>Muy integrada (fábrica del mundo, exportadora) [L9, L11]<\/td>\n<td>Integrada<\/td>\n<td>Bloque autárquico, poco integrado<\/td>\n<\/tr>\n<tr>\n<td><strong>Medios e información<\/strong><\/td>\n<td>Censura y \"guía\" de la opinión; Gran Cortafuegos [L7]<\/td>\n<td>Prensa libre (con imperfecciones)<\/td>\n<td>Censura y propaganda de Estado<\/td>\n<\/tr>\n<tr>\n<td><strong>Sociedad civil<\/strong><\/td>\n<td>Muy restringida; sin organización autónoma [L7]<\/td>\n<td>Autónoma y protegida<\/td>\n<td>Suprimida<\/td>\n<\/tr>\n<tr>\n<td><strong>Control social<\/strong><\/td>\n<td>Vigilancia + cooptación + respuesta selectiva (pacto) [L7]<\/td>\n<td>Estado de derecho; libertades<\/td>\n<td>Coerción y aparato de seguridad<\/td>\n<\/tr>\n<tr>\n<td><strong>Estado de derecho<\/strong><\/td>\n<td>El Partido está por encima de la ley [L5, L6]<\/td>\n<td>Ley por encima del poder<\/td>\n<td>El Partido por encima de la ley<\/td>\n<\/tr>\n<tr>\n<td><strong>Capacidad económica<\/strong><\/td>\n<td>Innovación real (coche eléctrico, IA, solar) [L11]<\/td>\n<td>Innovación de mercado<\/td>\n<td>Estancamiento tecnológico tardío<\/td>\n<\/tr>\n<tr>\n<td><strong>Postura exterior<\/strong><\/td>\n<td>Asertiva; revisionista parcial; interdependiente [L11]<\/td>\n<td>Variada<\/td>\n<td>Expansionista; bloque rival<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"las-lecciones-del-contraste\">Las lecciones del contraste<\/h2><div class=\"sec-body\">\n<p><strong>China no es la URSS.<\/strong> El Partido observó el colapso soviético y extrajo conclusiones deliberadas —la \"<strong>lección soviética<\/strong>\" [L3, L4]—: no repudiar a sus fundadores (de ahí el \"70-30\" sobre Mao y la criminalización del \"nihilismo histórico\"), no abrir la política mientras se reforma la economía, e <strong>integrarse<\/strong> en el mercado mundial en lugar de aislarse. Donde la URSS se estancó económicamente y se abrió políticamente hasta romperse, China hizo casi lo contrario: dinamismo económico con cierre político. Por eso la analogía \"China = URSS tardía\" induce a error.<\/p>\n<p><strong>China no es una democracia liberal.<\/strong> Comparte con el mundo desarrollado el mercado y la integración global, pero no la separación de poderes, la prensa libre, la oposición ni el Estado de derecho por encima del poder. Aplicar sin más las categorías occidentales —\"presidente\", \"parlamento\", \"reforma\"— deforma lo que se observa [L1, L6].<\/p>\n<p><strong>China es un tercer tipo.<\/strong> Un Estado-partido leninista que dirige una economía de mercado, se legitima por desempeño y nacionalismo, y se integra en el mundo sin democratizarse. Ninguna de las dos columnas de referencia lo describe: por eso hace falta el modelo propio que construye este curso.<\/p>\n<p><em>Advertencia:<\/em> la columna \"democracia liberal\" es un tipo ideal; las democracias reales varían y tienen sus propias patologías. La comparación busca situar a China, no idealizar a las otras.<\/p><\/div><\/section>", "text": "Tabla comparativa: China (RPC) / democracia liberal / URSS Herramienta para situar a China por contraste. La idea central: China no es la URSS —aprendió de su caída (la \"lección soviética\")— ni es una democracia liberal. Es un tercer tipo. Las casillas simplifican para comparar; los matices están en las lecciones indicadas. Dimensión China (RPC, 2026) Democracia liberal URSS (≈1970–85) Poder político Monopolio de un partido leninista; sin oposición legal [L5, L6] Pluralismo; partidos que compiten en elecciones Monopolio de un partido leninista Economía Mercado dirigido por el Partido-Estado; gran sector privado [L5, L9] Mercado con regulación; propiedad privada dominante Economía planificada de mando; casi sin sector privado Propiedad privada Permitida y extensa, pero condicional (el capital no es soberano) [L5] Garantizada como derecho Prohibida en lo esencial Fuente de legitimidad Desempeño (prosperidad, orden) + nacionalismo [L1, L4] Procedimiento (elecciones, ley) Ideología marxista-leninista Ideología Marxismo-leninismo + \"Pensamiento Xi\" + nacionalismo; flexible en lo económico [L4] Liberalismo; pluralismo de valores Marxismo-leninismo dogmático Sucesión del líder Sin mecanismo claro; Xi sin sucesor designado [L6, L12] Reglada por elecciones/mandatos Informal, opaca (gerontocracia) Relación con el mercado mundial Muy integrada (fábrica del mundo, exportadora) [L9, L11] Integrada Bloque autárquico, poco integrado Medios e información Censura y \"guía\" de la opinión; Gran Cortafuegos [L7] Prensa libre (con imperfecciones) Censura y propaganda de Estado Sociedad civil Muy restringida; sin organización autónoma [L7] Autónoma y protegida Suprimida Control social Vigilancia + cooptación + respuesta selectiva (pacto) [L7] Estado de derecho; libertades Coerción y aparato de seguridad Estado de derecho El Partido está por encima de la ley [L5, L6] Ley por encima del poder El Partido por encima de la ley Capacidad económica Innovación real (coche eléctrico, IA, solar) [L11] Innovación de mercado Estancamiento tecnológico tardío Postura exterior Asertiva; revisionista parcial; interdependiente [L11] Variada Expansionista; bloque rival Las lecciones del contraste China no es la URSS. El Partido observó el colapso soviético y extrajo conclusiones deliberadas —la \" lección soviética \" [L3, L4]—: no repudiar a sus fundadores (de ahí el \"70-30\" sobre Mao y la criminalización del \"nihilismo histórico\"), no abrir la política mientras se reforma la economía, e integrarse en el mercado mundial en lugar de aislarse. Donde la URSS se estancó económicamente y se abrió políticamente hasta romperse, China hizo casi lo contrario: dinamismo económico con cierre político. Por eso la analogía \"China = URSS tardía\" induce a error. China no es una democracia liberal. Comparte con el mundo desarrollado el mercado y la integración global, pero no la separación de poderes, la prensa libre, la oposición ni el Estado de derecho por encima del poder. Aplicar sin más las categorías occidentales —\"presidente\", \"parlamento\", \"reforma\"— deforma lo que se observa [L1, L6]. China es un tercer tipo. Un Estado-partido leninista que dirige una economía de mercado, se legitima por desempeño y nacionalismo, y se integra en el mundo sin democratizarse. Ninguna de las dos columnas de referencia lo describe: por eso hace falta el modelo propio que construye este curso. Advertencia: la columna \"democracia liberal\" es un tipo ideal; las democracias reales varían y tienen sus propias patologías. La comparación busca situar a China, no idealizar a las otras."}, {"id": "21_Bibliografia_comentada", "group": "Referencia", "badge": "▦", "title": "Bibliografía comentada", "kind": "plain", "meta": "Selección para seguir profundizando. Se clasifica por tema y por tipo de fuente, con una nota crítica sobre el sesgo o el uso recomendado. Verifique la edición/año al citar. Las tesis controvertidas se señalan como tales: leer a un autor no es suscribirlo.", "readmin": 4, "color": "#b45309", "html": "<div class=\"doc-head\"><h1 id=\"bibliografia-comentada\">Bibliografía comentada<\/h1><p class=\"doc-meta\">Selección para seguir profundizando. Se clasifica por tema y por tipo de fuente, con una nota crítica sobre el sesgo o el uso recomendado. Verifique la edición/año al citar. Las tesis controvertidas se señalan como tales: leer a un autor no es suscribirlo.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"como-usarla\">Cómo usarla<\/h2><div class=\"sec-body\">\n<p>Tres tipos de fuente, que conviene no mezclar:<\/p>\n<ul>\n<li><strong>Fuente primaria / oficial:<\/strong> documentos del Partido, datos oficiales, discursos. Informan de la <em>posición<\/em> o la <em>intención<\/em>, no necesariamente de la realidad.<\/li>\n<li><strong>Investigación académica:<\/strong> libros y revistas revisadas; la base más fiable, aunque con debates internos.<\/li>\n<li><strong>Análisis y prensa:<\/strong> think tanks y periodismo para la actualidad; útiles y rápidos, pero con línea e intereses.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"historia-marco-e-imperio-siglo-de-la-humillacion-mao\">Historia (marco e imperio, siglo de la humillación, Mao)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Jonathan Spence, <em>The Search for Modern China<\/em>.<\/strong> Narrativa histórica canónica desde la Qing. Punto de partida.<\/li>\n<li><strong>Klaus Mühlhahn, <em>Making China Modern<\/em>.<\/strong> Síntesis moderna y equilibrada del paso del imperio a Xi. Excelente si se lee un solo libro.<\/li>\n<li><strong>Odd Arne Westad, <em>Restless Empire<\/em>.<\/strong> China y el mundo desde 1750: imprescindible para el marco exterior.<\/li>\n<li><strong>Julia Lovell, <em>The Opium War<\/em><\/strong> y <strong>Stephen Platt, <em>Imperial Twilight<\/em> / <em>Autumn in the Heavenly Kingdom<\/em>.<\/strong> Guerras del Opio y rebelión Taiping; narrativa rigurosa.<\/li>\n<li><strong>Rana Mitter, <em>China's War with Japan<\/em> y <em>China's Good War<\/em>.<\/strong> La guerra con Japón y el uso <em>político<\/em> de su memoria. Directamente útil para la Lección 2.<\/li>\n<li><strong>Frank Dikötter, trilogía <em>Mao's Great Famine / The Tragedy of Liberation / The Cultural Revolution<\/em>.<\/strong> Documentación potente, pero <strong>extremo crítico y cifras altas<\/strong>: contrastar.<\/li>\n<li><strong>Yang Jisheng, <em>Lápida (Tombstone)<\/em>.<\/strong> Estudio monumental de la hambruna por un periodista <em>miembro del Partido<\/em>: casi fuente primaria. Contrapeso indispensable a Dikötter.<\/li>\n<li><strong>Roderick MacFarquhar y Michael Schoenhals, <em>Mao's Last Revolution<\/em><\/strong> y <strong>Andrew Walder, <em>China Under Mao<\/em>.<\/strong> Referencia y síntesis equilibrada sobre el maoísmo.<\/li>\n<li><em>Nota:<\/em> Jung Chang y J. Halliday, <em>Mao: The Unknown Story<\/em>, es muy vendido pero <strong>muy hostil y discutido<\/strong> por los especialistas; úselo con cautela.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"politica-y-sistema-deng-xi-poder\">Política y sistema (Deng, Xi, poder)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Richard McGregor, <em>The Party<\/em>.<\/strong> El mejor libro sobre cómo funciona por dentro el PCCh. Base de las Lecciones 5 y 6.<\/li>\n<li><strong>Ezra Vogel, <em>Deng Xiaoping and the Transformation of China<\/em>.<\/strong> Biografía canónica de Deng; <strong>simpatética<\/strong>, minimiza Tiananmén: contrastar con Weber y Gewirtz.<\/li>\n<li><strong>Elizabeth Economy, <em>The Third Revolution<\/em><\/strong> y <strong>Susan Shirk, <em>Overreach<\/em>.<\/strong> La era de Xi; Shirk defiende que Xi se <em>extralimitó<\/em> (una tesis, no consenso).<\/li>\n<li><strong>Kenneth Lieberthal, <em>Governing China<\/em>.<\/strong> Origen del concepto \"autoritarismo fragmentado\".<\/li>\n<li><strong>Sebastian Heilmann (ed.), <em>China's Political System<\/em>.<\/strong> Manual institucional de referencia.<\/li>\n<li><strong>Joseph Torigian<\/strong> (política de élite y sucesión) y <strong>Alice Miller<\/strong> (<em>China Leadership Monitor<\/em>): para el poder informal.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"economia\">Economía<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Barry Naughton, <em>The Chinese Economy<\/em> y <em>The Rise of China's Industrial Policy<\/em>.<\/strong> Manual estándar; base de las Lecciones 9–10.<\/li>\n<li><strong>Yuen Yuen Ang, <em>How China Escaped the Poverty Trap<\/em> y <em>China's Gilded Age<\/em>.<\/strong> Mecánica del crecimiento local y de la corrupción. Muy recomendable.<\/li>\n<li><strong>Nicholas Lardy, <em>Markets over Mao<\/em> y <em>The State Strikes Back<\/em>.<\/strong> El debate Estado vs. sector privado, por el mismo autor en dos momentos: útil ver el giro.<\/li>\n<li><strong>Isabella Weber, <em>How China Escaped Shock Therapy<\/em>.<\/strong> La reforma como experimentación; apoya la crítica al \"mito del gran arquitecto\".<\/li>\n<li><strong>Michael Pettis, <em>The Great Rebalancing<\/em>.<\/strong> El desequilibrio inversión/consumo: clave para la Lección 10.<\/li>\n<li><strong>Arthur Kroeber, <em>China's Economy: What Everyone Needs to Know<\/em>.<\/strong> Accesible. <strong>Thomas Orlik, <em>China: The Bubble That Never Pops<\/em>.<\/strong> Contrapunto de resiliencia.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"sociedad-control-y-periferia\">Sociedad, control y periferia<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Margaret Roberts, <em>Censored<\/em>.<\/strong> Cómo funciona la censura china (fricción, inundación, miedo). Base de la Lección 7.<\/li>\n<li><strong>Kai Strittmatter, <em>We Have Been Harmonized<\/em>.<\/strong> Vigilancia y autoritarismo digital.<\/li>\n<li><strong>Darren Byler, <em>In the Camps<em> / <\/em>Terror Capitalism<\/em><\/strong> y <strong>Sean Roberts, <em>The War on the Uyghurs<\/em>.<\/strong> Xinjiang.<\/li>\n<li><strong>Barbara Demick, <em>Eat the Buddha<\/em><\/strong> (Tíbet) y <strong>Louisa Lim, <em>Indelible City<\/em><\/strong> (Hong Kong) y <strong><em>The People's Republic of Amnesia<\/em><\/strong> (Tiananmén).<\/li>\n<li><em>Nota:<\/em> Human Rights Watch y Amnistía Internacional son <strong>organizaciones de denuncia<\/strong>: rigurosas pero con función declaradamente crítica; cítelas como tales.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"relaciones-internacionales-y-futuro\">Relaciones internacionales y futuro<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Rush Doshi, <em>The Long Game<\/em>.<\/strong> Tesis influyente de gran estrategia china; <strong>halcón<\/strong>: una tesis, no el consenso.<\/li>\n<li><strong>David Shambaugh, <em>China Goes Global: The Partial Power<\/em><\/strong> y <strong><em>China's Future?<\/em><\/strong>. Contrapeso (\"potencia parcial\") y escenarios de trayectoria.<\/li>\n<li><strong>Kevin Rudd, <em>The Avoidable War<\/em>.<\/strong> EE. UU.-China por un autor que lee chino y conoce a ambos.<\/li>\n<li><strong>Hal Brands y Michael Beckley, <em>Danger Zone<\/em>.<\/strong> La tesis del \"pico de China\" y la \"zona de peligro\": provocadora, discutida.<\/li>\n<li><strong>Jonathan Hillman, <em>The Emperor's New Road<\/em>.<\/strong> Franja y Ruta.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"datos-y-seguimiento-de-la-actualidad\">Datos y seguimiento de la actualidad<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>Oficiales / internacionales:<\/strong> Oficina Nacional de Estadística de China (con cautela), <strong>FMI<\/strong> (<em>Article IV<\/em>), <strong>Banco Mundial<\/strong>, <strong>ONU<\/strong> (<em>World Population Prospects<\/em>), World Inequality Database.<\/li>\n<li><strong>Think tanks:<\/strong> <strong>MERICS<\/strong> (Berlín), <strong>CSIS <em>ChinaPower<\/em><\/strong> (Washington), <strong>Rhodium Group<\/strong> y <strong>Gavekal Dragonomics<\/strong> (economía), <em>China Leadership Monitor<\/em> (Hoover).<\/li>\n<li><strong>Prensa:<\/strong> <em>Financial Times<\/em>, <em>The Economist<\/em>, <strong><em>Caixin<\/em><\/strong> (prensa económica china relativamente rigurosa), <em>South China Morning Post<\/em> (con cautela: propiedad de Alibaba). Boletín <strong><em>Sinocism<\/em><\/strong> (Bill Bishop).<\/li>\n<li><strong>Académico:<\/strong> <em>The China Quarterly<\/em>, <em>Journal of Contemporary China<\/em>.<\/li>\n<li><strong>A leer como propaganda<\/strong> (útiles para conocer la posición oficial, no como hechos): <em>Global Times<\/em>, <em>Xinhua<\/em>, <em>People's Daily<\/em>.<\/li>\n<li><strong>Divulgación:<\/strong> podcasts <em>Sinica<\/em> y <em>ChinaTalk<\/em>.<\/li>\n<\/ul>\n<hr>\n<p><em>Regla final: triangule. Ninguna fuente única —ni oficial china, ni think tank occidental, ni exilio— basta por sí sola. La verdad más cercana suele estar en el cruce.<\/em><\/p><\/div><\/section>", "text": "Bibliografía comentada Selección para seguir profundizando. Se clasifica por tema y por tipo de fuente, con una nota crítica sobre el sesgo o el uso recomendado. Verifique la edición/año al citar. Las tesis controvertidas se señalan como tales: leer a un autor no es suscribirlo. Cómo usarla Tres tipos de fuente, que conviene no mezclar: Fuente primaria / oficial: documentos del Partido, datos oficiales, discursos. Informan de la posición o la intención , no necesariamente de la realidad. Investigación académica: libros y revistas revisadas; la base más fiable, aunque con debates internos. Análisis y prensa: think tanks y periodismo para la actualidad; útiles y rápidos, pero con línea e intereses. Historia (marco e imperio, siglo de la humillación, Mao) Jonathan Spence, The Search for Modern China . Narrativa histórica canónica desde la Qing. Punto de partida. Klaus Mühlhahn, Making China Modern . Síntesis moderna y equilibrada del paso del imperio a Xi. Excelente si se lee un solo libro. Odd Arne Westad, Restless Empire . China y el mundo desde 1750: imprescindible para el marco exterior. Julia Lovell, The Opium War y Stephen Platt, Imperial Twilight / Autumn in the Heavenly Kingdom . Guerras del Opio y rebelión Taiping; narrativa rigurosa. Rana Mitter, China's War with Japan y China's Good War . La guerra con Japón y el uso político de su memoria. Directamente útil para la Lección 2. Frank Dikötter, trilogía Mao's Great Famine / The Tragedy of Liberation / The Cultural Revolution . Documentación potente, pero extremo crítico y cifras altas : contrastar. Yang Jisheng, Lápida (Tombstone) . Estudio monumental de la hambruna por un periodista miembro del Partido : casi fuente primaria. Contrapeso indispensable a Dikötter. Roderick MacFarquhar y Michael Schoenhals, Mao's Last Revolution y Andrew Walder, China Under Mao . Referencia y síntesis equilibrada sobre el maoísmo. Nota: Jung Chang y J. Halliday, Mao: The Unknown Story , es muy vendido pero muy hostil y discutido por los especialistas; úselo con cautela. Política y sistema (Deng, Xi, poder) Richard McGregor, The Party . El mejor libro sobre cómo funciona por dentro el PCCh. Base de las Lecciones 5 y 6. Ezra Vogel, Deng Xiaoping and the Transformation of China . Biografía canónica de Deng; simpatética , minimiza Tiananmén: contrastar con Weber y Gewirtz. Elizabeth Economy, The Third Revolution y Susan Shirk, Overreach . La era de Xi; Shirk defiende que Xi se extralimitó (una tesis, no consenso). Kenneth Lieberthal, Governing China . Origen del concepto \"autoritarismo fragmentado\". Sebastian Heilmann (ed.), China's Political System . Manual institucional de referencia. Joseph Torigian (política de élite y sucesión) y Alice Miller ( China Leadership Monitor ): para el poder informal. Economía Barry Naughton, The Chinese Economy y The Rise of China's Industrial Policy . Manual estándar; base de las Lecciones 9–10. Yuen Yuen Ang, How China Escaped the Poverty Trap y China's Gilded Age . Mecánica del crecimiento local y de la corrupción. Muy recomendable. Nicholas Lardy, Markets over Mao y The State Strikes Back . El debate Estado vs. sector privado, por el mismo autor en dos momentos: útil ver el giro. Isabella Weber, How China Escaped Shock Therapy . La reforma como experimentación; apoya la crítica al \"mito del gran arquitecto\". Michael Pettis, The Great Rebalancing . El desequilibrio inversión/consumo: clave para la Lección 10. Arthur Kroeber, China's Economy: What Everyone Needs to Know . Accesible. Thomas Orlik, China: The Bubble That Never Pops . Contrapunto de resiliencia. Sociedad, control y periferia Margaret Roberts, Censored . Cómo funciona la censura china (fricción, inundación, miedo). Base de la Lección 7. Kai Strittmatter, We Have Been Harmonized . Vigilancia y autoritarismo digital. Darren Byler, In the Camps / Terror Capitalism y Sean Roberts, The War on the Uyghurs . Xinjiang. Barbara Demick, Eat the Buddha (Tíbet) y Louisa Lim, Indelible City (Hong Kong) y The People's Republic of Amnesia (Tiananmén). Nota: Human Rights Watch y Amnistía Internacional son organizaciones de denuncia : rigurosas pero con función declaradamente crítica; cítelas como tales. Relaciones internacionales y futuro Rush Doshi, The Long Game . Tesis influyente de gran estrategia china; halcón : una tesis, no el consenso. David Shambaugh, China Goes Global: The Partial Power y China's Future? . Contrapeso (\"potencia parcial\") y escenarios de trayectoria. Kevin Rudd, The Avoidable War . EE. UU.-China por un autor que lee chino y conoce a ambos. Hal Brands y Michael Beckley, Danger Zone . La tesis del \"pico de China\" y la \"zona de peligro\": provocadora, discutida. Jonathan Hillman, The Emperor's New Road . Franja y Ruta. Datos y seguimiento de la actualidad Oficiales / internacionales: Oficina Nacional de Estadística de China (con cautela), FMI ( Article IV ), Banco Mundial , ONU ( World Population Prospects ), World Inequality Database. Think tanks: MERICS (Berlín), CSIS ChinaPower (Washington), Rhodium Group y Gavekal Dragonomics (economía), China Leadership Monitor (Hoover). Prensa: Financial Times , The Economist , Caixin (prensa económica china relativamente rigurosa), South China Morning Post (con cautela: propiedad de Alibaba). Boletín Sinocism (Bill Bishop). Académico: The China Quarterly , Journal of Contemporary China . A leer como propaganda (útiles para conocer la posición oficial, no como hechos): Global Times , Xinhua , People's Daily . Divulgación: podcasts Sinica y ChinaTalk . Regla final: triangule. Ninguna fuente única —ni oficial china, ni think tank occidental, ni exilio— basta por sí sola. La verdad más cercana suele estar en el cruce."}, {"id": "24_Como_leer_una_noticia_sobre_China", "group": "Aplicación y evaluación", "badge": "◆", "title": "Cómo leer una noticia sobre China", "kind": "plain", "meta": "La hoja que condensa todo el curso. Téngala a mano ante cualquier titular. No sustituye al criterio: lo organiza.", "readmin": 4, "color": "#0e7490", "html": "<div class=\"doc-head\"><h1 id=\"como-leer-una-noticia-sobre-china\">Cómo leer una noticia sobre China<\/h1><p class=\"doc-meta\">La hoja que condensa todo el curso. Téngala a mano ante cualquier titular. No sustituye al criterio: lo organiza.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"nueve-preguntas-el-metodo\">Nueve preguntas (el método)<\/h2><div class=\"sec-body\">\n<p>Ante una noticia sobre China, hágase estas nueve preguntas en orden:<\/p>\n<ol>\n<li><strong>¿Quién toma la decisión?<\/strong> ¿El Partido, el Estado, un gobierno local o una empresa? No son lo mismo. Busque el cargo de <strong>partido<\/strong>, no el estatal. [→ Mapa de instituciones]<\/li>\n<li><strong>¿Qué objetivo político existe?<\/strong> Casi siempre remite a una prioridad: unidad, estabilidad del régimen, control, legitimidad. Pregunte <em>qué<\/em> estabilidad, <em>frente a qué<\/em> amenaza, <em>quién<\/em> se beneficia y <em>a qué<\/em> coste (no use \"estabilidad\" como palabra mágica).<\/li>\n<li><strong>¿Qué incentivo económico existe?<\/strong> ¿A quién beneficia materialmente? Piense en gobiernos locales, empresas estatales, sectores subvencionados, exportadores.<\/li>\n<li><strong>¿Qué precedente histórico se está invocando?<\/strong> ¿El \"siglo de la humillación\"? ¿La unidad frente al caos? ¿La \"lección soviética\"? El pasado suele ser la coartada o la clave del presente.<\/li>\n<li><strong>¿Qué datos respaldan la noticia?<\/strong> ¿Cifras oficiales (a tratar con cautela), de organismos internacionales, de investigación independiente? ¿Se dan rangos o certezas sospechosas?<\/li>\n<li><strong>¿Qué perspectiva falta?<\/strong> ¿La del gobierno local, la del trabajador, la del empresario, la del ciudadano de la periferia, la del crítico? Casi siempre falta alguna.<\/li>\n<li><strong>¿Qué es hecho y qué es interpretación?<\/strong> Separe el hecho comprobado de la inferencia, la interpretación, la opinión y la cuestión abierta.<\/li>\n<li><strong>¿Qué explicación alternativa existe?<\/strong> Si la noticia ofrece una sola causa, busque al menos otra plausible. La monocausalidad es sospechosa.<\/li>\n<li><strong>¿Quién cuenta esto y con qué interés?<\/strong> Medios estatales chinos (propaganda), think tanks con línea propia, fuentes del exilio, prensa occidental con sus sesgos. Identifique la procedencia.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"tres-reflejos-rapidos-de-las-lecciones\">Tres reflejos rápidos (de las lecciones)<\/h2><div class=\"sec-body\">\n<ul>\n<li><strong>¿Qué capa actúa y cuál se invoca?<\/strong> El Estado moderno actúa (una ley, un despliegue) mientras invoca la civilización (\"5.000 años\") o la memoria imperial (unidad, territorio). No confunda la capa que decide con la que se enarbola. [L1]<\/li>\n<li><strong>¿Se calienta o se enfría, y en qué plano?<\/strong> En política exterior hay cinco planos —económico, tecnológico, militar, ideológico, interdependencia— a temperaturas distintas. Una tregua comercial no significa deshielo militar. [L11]<\/li>\n<li><strong>¿Es un dato o un destino?<\/strong> Desconfíe de \"China dominará\" y de \"China colapsará\". Convierta la tendencia en escenario con indicadores, no en profecía. [L12]<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"cinco-banderas-rojas-senales-de-que-le-estan-simplificando\">Cinco banderas rojas (señales de que le están simplificando)<\/h2><div class=\"sec-body\">\n<ol>\n<li><strong>\"El presidente Xi ordenó…\"<\/strong> — pista de que quien escribe no distingue el poder de partido del estatal.<\/li>\n<li><strong>\"China quiere dominar el mundo\"<\/strong> / <strong>\"China está a punto de colapsar\"<\/strong> — determinismo; falta el abanico de escenarios.<\/li>\n<li><strong>\"Un algoritmo de crédito social puntúa a cada ciudadano\"<\/strong> — el mito distópico; ese marcador único no existe. [L7]<\/li>\n<li><strong>\"Nueva Guerra Fría\"<\/strong> como explicación total — ignora la interdependencia económica. [L11]<\/li>\n<li><strong>Una sola cifra oficial redonda sin rango ni fuente<\/strong> — sobre todo en PIB, empleo o víctimas. Pida el intervalo y la procedencia.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"ejemplo-resuelto\">Ejemplo resuelto<\/h2><div class=\"sec-body\">\n<p><strong>Titular (enero de 2026):<\/strong> <em>\"China veta la exportación de productos de doble uso a Japón tras las declaraciones de Tokio sobre Taiwán.\"<\/em><\/p>\n<ul>\n<li><strong>¿Quién decide?<\/strong> El Estado (Ministerio de Comercio), ejecutando una prioridad del Partido. [P. 1]<\/li>\n<li><strong>¿Objetivo político?<\/strong> Castigar y disuadir a Japón por tocar Taiwán —línea roja de soberanía— y reforzar el nacionalismo interno. [P. 2]<\/li>\n<li><strong>¿Incentivo económico?<\/strong> Secundario; prima lo político sobre lo comercial (de hecho, la inversión japonesa seguía creciendo: \"economía caliente, política fría\"). [P. 3]<\/li>\n<li><strong>¿Precedente histórico?<\/strong> El \"siglo de la humillación\" y el lugar aparte de Japón; y Taiwán como asunto inconcluso desde 1895 y 1949. [P. 4 → L2, L8]<\/li>\n<li><strong>¿Datos?<\/strong> El anuncio del veto es un hecho; su impacto real, una cuestión abierta.<\/li>\n<li><strong>¿Perspectiva que falta?<\/strong> La de las empresas de ambos países, perjudicadas por la política.<\/li>\n<li><strong>¿Hecho vs. interpretación?<\/strong> <em>Hecho:<\/em> el veto y su fecha. <em>Interpretación:<\/em> si es reacción proporcionada o amplificación deliberada del agravio.<\/li>\n<li><strong>¿Explicación alternativa?<\/strong> ¿Gesto de fuerza hacia el exterior o mensaje a la audiencia interna? Probablemente ambas.<\/li>\n<li><strong>¿Quién lo cuenta?<\/strong> Compare la versión de la prensa china, la japonesa y la de terceros.<\/li>\n<\/ul>\n<p><strong>Lectura final:<\/strong> una decisión estatal con lógica política (soberanía y nacionalismo) más que económica, anclada en un agravio histórico, cuyo efecto real está por ver. Ni \"agresión gratuita\" ni \"defensa legítima\": una jugada calculada en el plano donde China es más sensible.<\/p>\n<hr>\n<p><em>Si solo se lleva una idea del curso, que sea esta hoja. Con ella, ya no necesita que le expliquen China: puede interpretarla usted.<\/em><\/p><\/div><\/section>", "text": "Cómo leer una noticia sobre China La hoja que condensa todo el curso. Téngala a mano ante cualquier titular. No sustituye al criterio: lo organiza. Nueve preguntas (el método) Ante una noticia sobre China, hágase estas nueve preguntas en orden: ¿Quién toma la decisión? ¿El Partido, el Estado, un gobierno local o una empresa? No son lo mismo. Busque el cargo de partido , no el estatal. [→ Mapa de instituciones] ¿Qué objetivo político existe? Casi siempre remite a una prioridad: unidad, estabilidad del régimen, control, legitimidad. Pregunte qué estabilidad, frente a qué amenaza, quién se beneficia y a qué coste (no use \"estabilidad\" como palabra mágica). ¿Qué incentivo económico existe? ¿A quién beneficia materialmente? Piense en gobiernos locales, empresas estatales, sectores subvencionados, exportadores. ¿Qué precedente histórico se está invocando? ¿El \"siglo de la humillación\"? ¿La unidad frente al caos? ¿La \"lección soviética\"? El pasado suele ser la coartada o la clave del presente. ¿Qué datos respaldan la noticia? ¿Cifras oficiales (a tratar con cautela), de organismos internacionales, de investigación independiente? ¿Se dan rangos o certezas sospechosas? ¿Qué perspectiva falta? ¿La del gobierno local, la del trabajador, la del empresario, la del ciudadano de la periferia, la del crítico? Casi siempre falta alguna. ¿Qué es hecho y qué es interpretación? Separe el hecho comprobado de la inferencia, la interpretación, la opinión y la cuestión abierta. ¿Qué explicación alternativa existe? Si la noticia ofrece una sola causa, busque al menos otra plausible. La monocausalidad es sospechosa. ¿Quién cuenta esto y con qué interés? Medios estatales chinos (propaganda), think tanks con línea propia, fuentes del exilio, prensa occidental con sus sesgos. Identifique la procedencia. Tres reflejos rápidos (de las lecciones) ¿Qué capa actúa y cuál se invoca? El Estado moderno actúa (una ley, un despliegue) mientras invoca la civilización (\"5.000 años\") o la memoria imperial (unidad, territorio). No confunda la capa que decide con la que se enarbola. [L1] ¿Se calienta o se enfría, y en qué plano? En política exterior hay cinco planos —económico, tecnológico, militar, ideológico, interdependencia— a temperaturas distintas. Una tregua comercial no significa deshielo militar. [L11] ¿Es un dato o un destino? Desconfíe de \"China dominará\" y de \"China colapsará\". Convierta la tendencia en escenario con indicadores, no en profecía. [L12] Cinco banderas rojas (señales de que le están simplificando) \"El presidente Xi ordenó…\" — pista de que quien escribe no distingue el poder de partido del estatal. \"China quiere dominar el mundo\" / \"China está a punto de colapsar\" — determinismo; falta el abanico de escenarios. \"Un algoritmo de crédito social puntúa a cada ciudadano\" — el mito distópico; ese marcador único no existe. [L7] \"Nueva Guerra Fría\" como explicación total — ignora la interdependencia económica. [L11] Una sola cifra oficial redonda sin rango ni fuente — sobre todo en PIB, empleo o víctimas. Pida el intervalo y la procedencia. Ejemplo resuelto Titular (enero de 2026): \"China veta la exportación de productos de doble uso a Japón tras las declaraciones de Tokio sobre Taiwán.\" ¿Quién decide? El Estado (Ministerio de Comercio), ejecutando una prioridad del Partido. [P. 1] ¿Objetivo político? Castigar y disuadir a Japón por tocar Taiwán —línea roja de soberanía— y reforzar el nacionalismo interno. [P. 2] ¿Incentivo económico? Secundario; prima lo político sobre lo comercial (de hecho, la inversión japonesa seguía creciendo: \"economía caliente, política fría\"). [P. 3] ¿Precedente histórico? El \"siglo de la humillación\" y el lugar aparte de Japón; y Taiwán como asunto inconcluso desde 1895 y 1949. [P. 4 → L2, L8] ¿Datos? El anuncio del veto es un hecho; su impacto real, una cuestión abierta. ¿Perspectiva que falta? La de las empresas de ambos países, perjudicadas por la política. ¿Hecho vs. interpretación? Hecho: el veto y su fecha. Interpretación: si es reacción proporcionada o amplificación deliberada del agravio. ¿Explicación alternativa? ¿Gesto de fuerza hacia el exterior o mensaje a la audiencia interna? Probablemente ambas. ¿Quién lo cuenta? Compare la versión de la prensa china, la japonesa y la de terceros. Lectura final: una decisión estatal con lógica política (soberanía y nacionalismo) más que económica, anclada en un agravio histórico, cuyo efecto real está por ver. Ni \"agresión gratuita\" ni \"defensa legítima\": una jugada calculada en el plano donde China es más sensible. Si solo se lleva una idea del curso, que sea esta hoja. Con ella, ya no necesita que le expliquen China: puede interpretarla usted."}, {"id": "17_Dossier_10_noticias_comentadas", "group": "Aplicación y evaluación", "badge": "◆", "title": "Dossier: 10 noticias comentadas", "kind": "plain", "meta": "Diez casos reales de 2025–2026, analizados con el método de la hoja \"Cómo leer una noticia sobre China\". Cada uno lleva fecha. Sirven de modelo: el lector puede aplicar las mismas preguntas a cualquier titular nuevo. Recordatorio: los casos caducan; están fechados a propósito.", "readmin": 5, "color": "#0e7490", "html": "<div class=\"doc-head\"><h1 id=\"dossier-10-noticias-sobre-china-comentadas\">Dossier: 10 noticias sobre China, comentadas<\/h1><p class=\"doc-meta\">Diez casos reales de 2025–2026, analizados con el método de la hoja \"Cómo leer una noticia sobre China\". Cada uno lleva fecha. Sirven de modelo: el lector puede aplicar las mismas preguntas a cualquier titular nuevo. Recordatorio: los casos caducan; están fechados a propósito.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"1-el-desfile-del-80o-aniversario-de-la-victoria-sobre-japon\">1. El desfile del 80.º aniversario de la victoria sobre Japón<\/h2><div class=\"sec-body\">\n<p><strong>(3 de septiembre de 2025)<\/strong> — Más de 12.000 soldados, armamento hipersónico y 26 líderes extranjeros, con Putin y Kim junto a Xi. [L2]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> el Partido-Estado, en su máxima expresión ceremonial.<\/li>\n<li><strong>Objetivo político:<\/strong> legitimación por orgullo nacional y disuasión hacia EE. UU. y Japón.<\/li>\n<li><strong>Precedente invocado:<\/strong> el \"siglo de la humillación\"; \"la primera victoria completa contra una agresión extranjera\".<\/li>\n<li><strong>Hecho vs. interpretación:<\/strong> <em>hecho<\/em>, el desfile y sus asistentes; <em>interpretación<\/em>, si prima la disuasión, la conmemoración o el mensaje interno.<\/li>\n<li><strong>Qué falta:<\/strong> el peso relativo del público interno frente al externo.<\/li>\n<li><strong>Lectura:<\/strong> memoria histórica convertida en instrumento de poder presente.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"2-la-crisis-china-japon-por-taiwan\">2. La crisis China-Japón por Taiwán<\/h2><div class=\"sec-body\">\n<p><strong>(noviembre 2025 – enero 2026)<\/strong> — Tras las palabras de la primera ministra Takaichi sobre una intervención en Taiwán, China veta (6 de enero de 2026) exportaciones de doble uso a Japón. [L2, L11]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> el Estado (Ministerio de Comercio), por prioridad del Partido.<\/li>\n<li><strong>Objetivo político:<\/strong> castigar y disuadir por tocar Taiwán, línea roja de soberanía.<\/li>\n<li><strong>Incentivo económico:<\/strong> secundario (la inversión japonesa seguía subiendo: \"economía caliente, política fría\").<\/li>\n<li><strong>Precedente invocado:<\/strong> Japón como herida aparte; Taiwán desde 1895 y 1949.<\/li>\n<li><strong>Explicación alternativa:<\/strong> gesto exterior de fuerza y, a la vez, mensaje a la audiencia interna.<\/li>\n<li><strong>Lectura:<\/strong> lo político prima sobre lo económico; efecto real por ver.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"3-la-purga-de-la-cupula-militar\">3. La purga de la cúpula militar<\/h2><div class=\"sec-body\">\n<p><strong>(octubre 2025 – comienzos de 2026)<\/strong> — Caen los vicepresidentes de la Comisión Militar Central He Weidong y Zhang Youxia; ~5 de sus 6 miembros, purgados. [L4, L6]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> Xi, vía la CCDI y su control de la CMC.<\/li>\n<li><strong>Objetivo político:<\/strong> control personal del ejército; eliminación de rivales.<\/li>\n<li><strong>Precedente invocado:<\/strong> el principio leninista de que \"el Partido manda al fusil\".<\/li>\n<li><strong>Hecho vs. interpretación:<\/strong> <em>hecho<\/em>, las destituciones; <em>interpretación<\/em>, si revelan fuerza o inseguridad.<\/li>\n<li><strong>Qué falta:<\/strong> casi todo el detalle (política de élite opaca): humildad epistémica.<\/li>\n<li><strong>Lectura:<\/strong> radiografía de dónde reside el poder real y de su paradoja (más concentración, menos seguridad).<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"4-la-ley-de-promocion-de-la-economia-privada\">4. La Ley de Promoción de la Economía Privada<\/h2><div class=\"sec-body\">\n<p><strong>(simposio con Jack Ma, 17 de febrero de 2025; ley en vigor el 20 de mayo de 2025)<\/strong> — Un partido comunista legisla para proteger el capital privado. [L5]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> Partido (señal política) y Estado (ley).<\/li>\n<li><strong>Objetivo político:<\/strong> recuperar la confianza del sector privado tras el freno de 2020–21.<\/li>\n<li><strong>Incentivo económico:<\/strong> reanimar crecimiento, empleo e innovación.<\/li>\n<li><strong>Interpretación discutible:<\/strong> ¿protección sincera o tranquilización táctica? ¿Puede una ley vincular a un partido que está sobre la ley?<\/li>\n<li><strong>Lectura:<\/strong> el capital es instrumental, no soberano; el Partido aprieta y afloja según le conviene.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"5-el-credito-social-mito-frente-a-realidad\">5. El \"crédito social\": mito frente a realidad<\/h2><div class=\"sec-body\">\n<p><strong>(consolidación 2025–2026)<\/strong> — Los ensayos de puntuación individual terminan; el sistema se centra en empresas. [L7]<\/p>\n<ul>\n<li><strong>Dato:<\/strong> no existe un marcador ciudadano nacional único; sí listas negras judiciales y calificaciones a ~33 millones de empresas.<\/li>\n<li><strong>Qué corrige:<\/strong> el mito occidental de la distopía algorítmica total.<\/li>\n<li><strong>Matiz simétrico:<\/strong> la vigilancia real (cámaras, biometría, censura) sí es masiva.<\/li>\n<li><strong>Lectura:<\/strong> ni ciencia ficción ni propaganda occidental exagerada; control real pero fragmentado y burocrático.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"6-la-onu-alerta-de-trabajo-forzado-en-xinjiang\">6. La ONU alerta de trabajo forzado en Xinjiang<\/h2><div class=\"sec-body\">\n<p><strong>(22 de enero de 2026)<\/strong> — Expertos de la ONU advierten de que podría constituir crímenes contra la humanidad; el plan 2021–25 proyectaba 13,75 millones de transferencias laborales. [L8]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> el Partido-Estado, con ejecución regional.<\/li>\n<li><strong>Objetivo político:<\/strong> seguridad y asimilación (sinización) para prevenir el separatismo.<\/li>\n<li><strong>Terminología en disputa:<\/strong> \"genocidio\" (EE. UU. y algunos parlamentos) frente a \"crímenes contra la humanidad\" (ONU) frente a \"formación profesional\" (China).<\/li>\n<li><strong>Hecho vs. etiqueta:<\/strong> los abusos (detención, trabajo forzado, supresión cultural) están documentados; la etiqueta legal se debate.<\/li>\n<li><strong>Qué falta:<\/strong> acceso independiente; la evidencia procede de filtraciones, satélite y testimonios.<\/li>\n<li><strong>Lectura:<\/strong> hechos documentados sin eufemismo; lógica de Pekín explicada, no avalada.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"7-jimmy-lai-condenado-a-20-anos-en-hong-kong\">7. Jimmy Lai, condenado a 20 años en Hong Kong<\/h2><div class=\"sec-body\">\n<p><strong>(diciembre de 2025)<\/strong> — La pena más larga bajo la Ley de Seguridad Nacional; la libertad de prensa cayó del puesto 80 al 140. [L8]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> el Estado de Hong Kong bajo dirección de Pekín; jueces designados.<\/li>\n<li><strong>Objetivo político:<\/strong> cerrar la disidencia y desactivar \"un país, dos sistemas\".<\/li>\n<li><strong>Precedente invocado:<\/strong> seguridad nacional; injerencia extranjera.<\/li>\n<li><strong>Explicación alternativa:<\/strong> ¿reacción a las protestas de 2019 o plan largamente preparado?<\/li>\n<li><strong>Lectura para Taiwán:<\/strong> desacredita \"un país, dos sistemas\" como oferta.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"8-la-sucesion-del-dalai-lama\">8. La sucesión del Dalái Lama<\/h2><div class=\"sec-body\">\n<p><strong>(6 de julio de 2025)<\/strong> — A sus 90 años, declara que solo su fundación —no Pekín— reconocerá su reencarnación; China exige aprobarla. [L8]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> choque entre el Dalái Lama (exilio) y el Partido (ateo).<\/li>\n<li><strong>Objetivo político:<\/strong> controlar lo sagrado para controlar al pueblo tibetano.<\/li>\n<li><strong>Riesgo:<\/strong> dos Dalái Lamas rivales.<\/li>\n<li><strong>Hecho vs. interpretación:<\/strong> <em>hecho<\/em>, las posturas declaradas; <em>cuestión abierta<\/em>, qué ocurrirá al fallecer.<\/li>\n<li><strong>Lectura:<\/strong> sinización llevada al terreno de la religión.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"9-la-tregua-trump-xi-y-el-pulso-de-chips-y-tierras-raras\">9. La tregua Trump-Xi y el pulso de chips y tierras raras<\/h2><div class=\"sec-body\">\n<p><strong>(tregua de octubre 2025; cumbre de Pekín, mayo 2026; nuevas listas negras, junio 2026)<\/strong> — Apretones de manos y armas económicas a la vez; DeepSeek V4 (abril 2026) y BYD por delante de Tesla. [L11]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> EE. UU. y China, cada uno con su punto de estrangulamiento (chips / tierras raras).<\/li>\n<li><strong>Planos:<\/strong> el comercio se enfría (tregua) mientras la seguridad tecnológica sigue caliente.<\/li>\n<li><strong>Interpretación discutible:<\/strong> ¿competencia gestionada o calma antes de escalar?<\/li>\n<li><strong>Qué falta:<\/strong> si la tregua sobrevive al otoño de 2026; el comodín de Taiwán.<\/li>\n<li><strong>Lectura:<\/strong> rivalidad dentro de interdependencia; no es Guerra Fría.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"10-deflacion-ladrillo-y-demografia-el-15o-plan\">10. Deflación, ladrillo y demografía: el 15.º Plan<\/h2><div class=\"sec-body\">\n<p><strong>(2025–2026)<\/strong> — Deflación de ~10 trimestres, vivienda cayendo 31 meses, cuarta caída anual de población, paro juvenil ~17 %; Pekín responde con \"nuevas fuerzas productivas\". [L9, L10]<\/p>\n<ul>\n<li><strong>Quién decide:<\/strong> el Partido-Estado, vía el plan quinquenal.<\/li>\n<li><strong>Objetivo político/económico:<\/strong> autosuficiencia tecnológica antes que gran estímulo al consumo.<\/li>\n<li><strong>Dato (con rango):<\/strong> crecimiento oficial ~5 % en 2025, moderándose hacia ~4,3–4,4 % en 2026.<\/li>\n<li><strong>Interpretación discutible:<\/strong> ¿rebalanceo manejable, japonización o algo peor?<\/li>\n<li><strong>Qué falta:<\/strong> si Pekín girará hacia el consumo (se ha resistido al \"asistencialismo\").<\/li>\n<li><strong>Lectura:<\/strong> los límites internos empujan hacia fuera (exportación, choque comercial).<\/li>\n<\/ul>\n<hr>\n<p><em>Ejercicio: elija una noticia de esta semana sobre China y constrúyale su propia ficha con las nueve preguntas. Compárela con estas diez.<\/em><\/p><\/div><\/section>", "text": "Dossier: 10 noticias sobre China, comentadas Diez casos reales de 2025–2026, analizados con el método de la hoja \"Cómo leer una noticia sobre China\". Cada uno lleva fecha. Sirven de modelo: el lector puede aplicar las mismas preguntas a cualquier titular nuevo. Recordatorio: los casos caducan; están fechados a propósito. 1. El desfile del 80.º aniversario de la victoria sobre Japón (3 de septiembre de 2025) — Más de 12.000 soldados, armamento hipersónico y 26 líderes extranjeros, con Putin y Kim junto a Xi. [L2] Quién decide: el Partido-Estado, en su máxima expresión ceremonial. Objetivo político: legitimación por orgullo nacional y disuasión hacia EE. UU. y Japón. Precedente invocado: el \"siglo de la humillación\"; \"la primera victoria completa contra una agresión extranjera\". Hecho vs. interpretación: hecho , el desfile y sus asistentes; interpretación , si prima la disuasión, la conmemoración o el mensaje interno. Qué falta: el peso relativo del público interno frente al externo. Lectura: memoria histórica convertida en instrumento de poder presente. 2. La crisis China-Japón por Taiwán (noviembre 2025 – enero 2026) — Tras las palabras de la primera ministra Takaichi sobre una intervención en Taiwán, China veta (6 de enero de 2026) exportaciones de doble uso a Japón. [L2, L11] Quién decide: el Estado (Ministerio de Comercio), por prioridad del Partido. Objetivo político: castigar y disuadir por tocar Taiwán, línea roja de soberanía. Incentivo económico: secundario (la inversión japonesa seguía subiendo: \"economía caliente, política fría\"). Precedente invocado: Japón como herida aparte; Taiwán desde 1895 y 1949. Explicación alternativa: gesto exterior de fuerza y, a la vez, mensaje a la audiencia interna. Lectura: lo político prima sobre lo económico; efecto real por ver. 3. La purga de la cúpula militar (octubre 2025 – comienzos de 2026) — Caen los vicepresidentes de la Comisión Militar Central He Weidong y Zhang Youxia; ~5 de sus 6 miembros, purgados. [L4, L6] Quién decide: Xi, vía la CCDI y su control de la CMC. Objetivo político: control personal del ejército; eliminación de rivales. Precedente invocado: el principio leninista de que \"el Partido manda al fusil\". Hecho vs. interpretación: hecho , las destituciones; interpretación , si revelan fuerza o inseguridad. Qué falta: casi todo el detalle (política de élite opaca): humildad epistémica. Lectura: radiografía de dónde reside el poder real y de su paradoja (más concentración, menos seguridad). 4. La Ley de Promoción de la Economía Privada (simposio con Jack Ma, 17 de febrero de 2025; ley en vigor el 20 de mayo de 2025) — Un partido comunista legisla para proteger el capital privado. [L5] Quién decide: Partido (señal política) y Estado (ley). Objetivo político: recuperar la confianza del sector privado tras el freno de 2020–21. Incentivo económico: reanimar crecimiento, empleo e innovación. Interpretación discutible: ¿protección sincera o tranquilización táctica? ¿Puede una ley vincular a un partido que está sobre la ley? Lectura: el capital es instrumental, no soberano; el Partido aprieta y afloja según le conviene. 5. El \"crédito social\": mito frente a realidad (consolidación 2025–2026) — Los ensayos de puntuación individual terminan; el sistema se centra en empresas. [L7] Dato: no existe un marcador ciudadano nacional único; sí listas negras judiciales y calificaciones a ~33 millones de empresas. Qué corrige: el mito occidental de la distopía algorítmica total. Matiz simétrico: la vigilancia real (cámaras, biometría, censura) sí es masiva. Lectura: ni ciencia ficción ni propaganda occidental exagerada; control real pero fragmentado y burocrático. 6. La ONU alerta de trabajo forzado en Xinjiang (22 de enero de 2026) — Expertos de la ONU advierten de que podría constituir crímenes contra la humanidad; el plan 2021–25 proyectaba 13,75 millones de transferencias laborales. [L8] Quién decide: el Partido-Estado, con ejecución regional. Objetivo político: seguridad y asimilación (sinización) para prevenir el separatismo. Terminología en disputa: \"genocidio\" (EE. UU. y algunos parlamentos) frente a \"crímenes contra la humanidad\" (ONU) frente a \"formación profesional\" (China). Hecho vs. etiqueta: los abusos (detención, trabajo forzado, supresión cultural) están documentados; la etiqueta legal se debate. Qué falta: acceso independiente; la evidencia procede de filtraciones, satélite y testimonios. Lectura: hechos documentados sin eufemismo; lógica de Pekín explicada, no avalada. 7. Jimmy Lai, condenado a 20 años en Hong Kong (diciembre de 2025) — La pena más larga bajo la Ley de Seguridad Nacional; la libertad de prensa cayó del puesto 80 al 140. [L8] Quién decide: el Estado de Hong Kong bajo dirección de Pekín; jueces designados. Objetivo político: cerrar la disidencia y desactivar \"un país, dos sistemas\". Precedente invocado: seguridad nacional; injerencia extranjera. Explicación alternativa: ¿reacción a las protestas de 2019 o plan largamente preparado? Lectura para Taiwán: desacredita \"un país, dos sistemas\" como oferta. 8. La sucesión del Dalái Lama (6 de julio de 2025) — A sus 90 años, declara que solo su fundación —no Pekín— reconocerá su reencarnación; China exige aprobarla. [L8] Quién decide: choque entre el Dalái Lama (exilio) y el Partido (ateo). Objetivo político: controlar lo sagrado para controlar al pueblo tibetano. Riesgo: dos Dalái Lamas rivales. Hecho vs. interpretación: hecho , las posturas declaradas; cuestión abierta , qué ocurrirá al fallecer. Lectura: sinización llevada al terreno de la religión. 9. La tregua Trump-Xi y el pulso de chips y tierras raras (tregua de octubre 2025; cumbre de Pekín, mayo 2026; nuevas listas negras, junio 2026) — Apretones de manos y armas económicas a la vez; DeepSeek V4 (abril 2026) y BYD por delante de Tesla. [L11] Quién decide: EE. UU. y China, cada uno con su punto de estrangulamiento (chips / tierras raras). Planos: el comercio se enfría (tregua) mientras la seguridad tecnológica sig"}, {"id": "18_Preguntas_de_debate", "group": "Aplicación y evaluación", "badge": "◆", "title": "10 preguntas de debate", "kind": "plain", "meta": "Preguntas abiertas, sin respuesta obvia, que obligan a cruzar historia, política y economía. Pensadas para discusión en grupo o ensayo. Cada una remite a las lecciones que aportan munición para argumentar.", "readmin": 2, "color": "#0e7490", "html": "<div class=\"doc-head\"><h1 id=\"diez-preguntas-de-debate\">Diez preguntas de debate<\/h1><p class=\"doc-meta\">Preguntas abiertas, sin respuesta obvia, que obligan a cruzar historia, política y economía. Pensadas para discusión en grupo o ensayo. Cada una remite a las lecciones que aportan munición para argumentar.<\/p>\n<hr>\n<ol>\n<li>\n<p><strong>Legitimidad sin urnas.<\/strong> Si la legitimidad del Partido depende del desempeño (orden y prosperidad) más que del procedimiento (elecciones), ¿qué le ocurre cuando el crecimiento se frena? ¿Puede el nacionalismo sustituir a la prosperidad, o solo complementarla? <em>(L1, L4, L7, L10)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>Explicar no es avalar.<\/strong> El curso insiste en que entender el miedo chino a la fragmentación no justifica los métodos empleados en Xinjiang o Hong Kong. ¿Dónde está la línea entre comprender la lógica de un actor y legitimarla? ¿Es posible un análisis \"neutral\" de la represión? <em>(L1, L2, L8)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>El mismo motor.<\/strong> La movilización de masas sin contrapesos unificó China bajo Mao y también causó la mayor hambruna de la historia. ¿Ha resuelto la China de hoy el problema de los sistemas sin mecanismos de corrección, o solo lo ha desplazado a nuevas formas de control? <em>(L3, L6, L7, L9)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>¿Fuerza o fragilidad?<\/strong> Xi ha concentrado el poder como nadie desde Mao y no ha designado sucesor. ¿Es eso una fortaleza (decisión rápida, sin disputa) o una fragilidad estructural (todo depende de una persona, sin relevo)? <em>(L4, L6, L12)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>La etiqueta imposible.<\/strong> Si el régimen político es leninista y la economía es de mercado, ¿por qué nos resistimos tanto a aceptar que ambas cosas convivan? ¿Qué revela nuestra necesidad de una etiqueta única sobre nuestras propias categorías? <em>(L5, L9)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>El dilema del rebalanceo.<\/strong> Dar más renta y seguridad a los hogares (para que consuman) reduce el ahorro que financia la inversión y da poder a la sociedad frente al Estado. ¿Es el estancamiento chino un problema económico con solución técnica, o un problema político sin solución cómoda? <em>(L7, L10)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>Interdependencia: ¿freno o arma?<\/strong> China y EE. UU. son rivales y socios imprescindibles. ¿La interdependencia hace la guerra menos probable (demasiado que perder) o más peligrosa (cada dependencia es un arma)? <em>(L11)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>El precio de la unidad.<\/strong> La unidad territorial es, para Pekín, existencial. Tras el vaciamiento de \"un país, dos sistemas\" en Hong Kong, ¿qué opciones creíbles le quedan con Taiwán, y qué coste tendría cada una para China y para el mundo? <em>(L1, L8, L11, L12)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>La trampa de la memoria.<\/strong> El \"siglo de la humillación\" es un trauma real y, a la vez, una narrativa administrada. ¿Puede un régimen que se legitima por el agravio permitirse alguna vez transigir sin parecer débil ante su propia población? <em>(L2, L7, L11)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>Ni profeta ni agorero.<\/strong> De todos los indicadores del curso (consumo, sucesión, Taiwán, tecnología, demografía), ¿cuál es el más decisivo para anticipar el futuro de China, y qué tendría que ver para cambiar de opinión? <em>(L10, L11, L12)<\/em><\/p>\n<\/li>\n<\/ol>\n<hr>\n<p><em>Regla del buen debate sobre China: quien no pueda formular el mejor argumento del bando contrario todavía no está listo para defender el suyo.<\/em><\/p><\/div>", "text": "Diez preguntas de debate Preguntas abiertas, sin respuesta obvia, que obligan a cruzar historia, política y economía. Pensadas para discusión en grupo o ensayo. Cada una remite a las lecciones que aportan munición para argumentar. Legitimidad sin urnas. Si la legitimidad del Partido depende del desempeño (orden y prosperidad) más que del procedimiento (elecciones), ¿qué le ocurre cuando el crecimiento se frena? ¿Puede el nacionalismo sustituir a la prosperidad, o solo complementarla? (L1, L4, L7, L10) Explicar no es avalar. El curso insiste en que entender el miedo chino a la fragmentación no justifica los métodos empleados en Xinjiang o Hong Kong. ¿Dónde está la línea entre comprender la lógica de un actor y legitimarla? ¿Es posible un análisis \"neutral\" de la represión? (L1, L2, L8) El mismo motor. La movilización de masas sin contrapesos unificó China bajo Mao y también causó la mayor hambruna de la historia. ¿Ha resuelto la China de hoy el problema de los sistemas sin mecanismos de corrección, o solo lo ha desplazado a nuevas formas de control? (L3, L6, L7, L9) ¿Fuerza o fragilidad? Xi ha concentrado el poder como nadie desde Mao y no ha designado sucesor. ¿Es eso una fortaleza (decisión rápida, sin disputa) o una fragilidad estructural (todo depende de una persona, sin relevo)? (L4, L6, L12) La etiqueta imposible. Si el régimen político es leninista y la economía es de mercado, ¿por qué nos resistimos tanto a aceptar que ambas cosas convivan? ¿Qué revela nuestra necesidad de una etiqueta única sobre nuestras propias categorías? (L5, L9) El dilema del rebalanceo. Dar más renta y seguridad a los hogares (para que consuman) reduce el ahorro que financia la inversión y da poder a la sociedad frente al Estado. ¿Es el estancamiento chino un problema económico con solución técnica, o un problema político sin solución cómoda? (L7, L10) Interdependencia: ¿freno o arma? China y EE. UU. son rivales y socios imprescindibles. ¿La interdependencia hace la guerra menos probable (demasiado que perder) o más peligrosa (cada dependencia es un arma)? (L11) El precio de la unidad. La unidad territorial es, para Pekín, existencial. Tras el vaciamiento de \"un país, dos sistemas\" en Hong Kong, ¿qué opciones creíbles le quedan con Taiwán, y qué coste tendría cada una para China y para el mundo? (L1, L8, L11, L12) La trampa de la memoria. El \"siglo de la humillación\" es un trauma real y, a la vez, una narrativa administrada. ¿Puede un régimen que se legitima por el agravio permitirse alguna vez transigir sin parecer débil ante su propia población? (L2, L7, L11) Ni profeta ni agorero. De todos los indicadores del curso (consumo, sucesión, Taiwán, tecnología, demografía), ¿cuál es el más decisivo para anticipar el futuro de China, y qué tendría que ver para cambiar de opinión? (L10, L11, L12) Regla del buen debate sobre China: quien no pueda formular el mejor argumento del bando contrario todavía no está listo para defender el suyo."}, {"id": "19_Evaluacion_final", "group": "Aplicación y evaluación", "badge": "◆", "title": "Evaluación final", "kind": "plain", "meta": "Cubre las doce lecciones. Cuatro partes: conceptos, explicación causal, matización de tópicos y aplicación a una noticia. Las respuestas modelo están en la \"Guía de respuestas\" (archivo aparte); intente responder antes de consultarla.", "readmin": 3, "color": "#0e7490", "html": "<div class=\"doc-head\"><h1 id=\"evaluacion-final-del-curso\">Evaluación final del curso<\/h1><p class=\"doc-meta\">Cubre las doce lecciones. Cuatro partes: conceptos, explicación causal, matización de tópicos y aplicación a una noticia. Las respuestas modelo están en la \"Guía de respuestas\" (archivo aparte); intente responder antes de consultarla.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"parte-a-conceptos-10-preguntas-breves\">Parte A — Conceptos (10 preguntas breves)<\/h2><div class=\"sec-body\">\n<p>Responda en 1–3 frases cada una.<\/p>\n<ol>\n<li>¿Qué expresa el nombre 中国 (<em>Zhongguo<\/em>) y por qué importa políticamente? <em>(L1)<\/em><\/li>\n<li>¿Por qué el \"siglo de la humillación\" es a la vez un trauma real y una narrativa administrada? <em>(L2)<\/em><\/li>\n<li>¿Qué significa la fórmula \"70-30\" sobre Mao y para qué sirve al Partido? <em>(L3)<\/em><\/li>\n<li>¿Qué quiere decir \"liberalización económica sin democratización\"? <em>(L4)<\/em><\/li>\n<li>¿Por qué \"economía socialista de mercado\" describe China mejor que \"comunista\" o \"capitalista\"? <em>(L5)<\/em><\/li>\n<li>¿Por qué el cargo de secretario general importa más que el de presidente? <em>(L6)<\/em><\/li>\n<li>¿Existe una \"puntuación de crédito social\" única para cada ciudadano? Explique. <em>(L7)<\/em><\/li>\n<li>¿Qué significa \"autonomía\" en las regiones autónomas chinas? <em>(L8)<\/em><\/li>\n<li>¿Cómo se financiaban los gobiernos locales y por qué eso creó un problema? <em>(L9)<\/em><\/li>\n<li>¿Qué significa \"envejecer antes de enriquecerse\"? <em>(L10)<\/em><\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-b-explicacion-causal-4-preguntas\">Parte B — Explicación causal (4 preguntas)<\/h2><div class=\"sec-body\">\n<p>Explique el mecanismo, ordenando la cadena de causas.<\/p>\n<ol start=\"11\">\n<li>¿Por qué una política utópica (el Gran Salto Adelante) desembocó en una hambruna masiva? <em>(L3)<\/em><\/li>\n<li>¿Por qué Deng concluyó \"apertura económica sí, apertura política no\" tras 1989 y el colapso soviético? <em>(L4)<\/em><\/li>\n<li>¿Por qué la caída del sector inmobiliario arrastra a la vez al consumo, a las finanzas locales y a la confianza? <em>(L10)<\/em><\/li>\n<li>¿Por qué la sobrecapacidad interna de China la empuja a exportar y a chocar con EE. UU. y la UE? <em>(L10, L11)<\/em><\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-c-matice-estos-topicos-4-afirmaciones\">Parte C — Matice estos tópicos (4 afirmaciones)<\/h2><div class=\"sec-body\">\n<p>Diga qué parte es cierta, qué omite y ofrezca una versión más precisa.<\/p>\n<ol start=\"15\">\n<li>\"China solo quiere dominar.\" <em>(L2)<\/em><\/li>\n<li>\"China se hizo capitalista y abandonó el comunismo.\" <em>(L4, L5)<\/em><\/li>\n<li>\"En China un algoritmo controla cada gesto de cada ciudadano.\" <em>(L7)<\/em><\/li>\n<li>\"China y EE. UU. están en una nueva Guerra Fría.\" <em>(L11)<\/em><\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-d-aplicacion-a-una-noticia-2-actividades\">Parte D — Aplicación a una noticia (2 actividades)<\/h2><div class=\"sec-body\">\n<ol start=\"19\">\n<li>\n<p>Toma esta noticia y analízala con las nueve preguntas de la hoja \"Cómo leer una noticia sobre China\":<\/p>\n<blockquote>\n<p><em>\"El Ministerio de Comercio chino suspende durante un año los controles de exportación de tierras raras tras la cumbre con EE. UU., pero mantiene los impuestos en abril y añade nuevas empresas estadounidenses a su lista de control.\" (2026)<\/em>\nIdentifique: quién decide, objetivo político, incentivo económico, precedente, qué es hecho y qué interpretación, y una explicación alternativa.<\/p>\n<\/blockquote>\n<\/li>\n<li>\n<p>Elige uno de los seis escenarios de la Lección 12 y construye su \"cuadro de indicadores\": ¿qué tres señales concretas lo harían claramente más probable en los próximos dos años?<\/p>\n<\/li>\n<\/ol>\n<hr>\n<h3 id=\"autoevaluacion-rubrica-orientativa\">Autoevaluación (rúbrica orientativa)<\/h3>\n<ul>\n<li><strong>Parte A:<\/strong> 1 punto por respuesta correcta y precisa (10).<\/li>\n<li><strong>Parte B:<\/strong> hasta 3 puntos por respuesta según la calidad de la cadena causal (12).<\/li>\n<li><strong>Parte C:<\/strong> hasta 3 puntos: 1 por lo cierto, 1 por lo omitido, 1 por la versión precisa (12).<\/li>\n<li><strong>Parte D:<\/strong> hasta 8 puntos por el uso correcto del método y la distinción hecho/interpretación (16).<\/li>\n<li><strong>Total:<\/strong> 50 puntos. <em>No memorice: lo que se evalúa es la capacidad de razonar con los modelos del curso, no de recitar datos.<\/em><\/li>\n<\/ul><\/div><\/section>", "text": "Evaluación final del curso Cubre las doce lecciones. Cuatro partes: conceptos, explicación causal, matización de tópicos y aplicación a una noticia. Las respuestas modelo están en la \"Guía de respuestas\" (archivo aparte); intente responder antes de consultarla. Parte A — Conceptos (10 preguntas breves) Responda en 1–3 frases cada una. ¿Qué expresa el nombre 中国 ( Zhongguo ) y por qué importa políticamente? (L1) ¿Por qué el \"siglo de la humillación\" es a la vez un trauma real y una narrativa administrada? (L2) ¿Qué significa la fórmula \"70-30\" sobre Mao y para qué sirve al Partido? (L3) ¿Qué quiere decir \"liberalización económica sin democratización\"? (L4) ¿Por qué \"economía socialista de mercado\" describe China mejor que \"comunista\" o \"capitalista\"? (L5) ¿Por qué el cargo de secretario general importa más que el de presidente? (L6) ¿Existe una \"puntuación de crédito social\" única para cada ciudadano? Explique. (L7) ¿Qué significa \"autonomía\" en las regiones autónomas chinas? (L8) ¿Cómo se financiaban los gobiernos locales y por qué eso creó un problema? (L9) ¿Qué significa \"envejecer antes de enriquecerse\"? (L10) Parte B — Explicación causal (4 preguntas) Explique el mecanismo, ordenando la cadena de causas. ¿Por qué una política utópica (el Gran Salto Adelante) desembocó en una hambruna masiva? (L3) ¿Por qué Deng concluyó \"apertura económica sí, apertura política no\" tras 1989 y el colapso soviético? (L4) ¿Por qué la caída del sector inmobiliario arrastra a la vez al consumo, a las finanzas locales y a la confianza? (L10) ¿Por qué la sobrecapacidad interna de China la empuja a exportar y a chocar con EE. UU. y la UE? (L10, L11) Parte C — Matice estos tópicos (4 afirmaciones) Diga qué parte es cierta, qué omite y ofrezca una versión más precisa. \"China solo quiere dominar.\" (L2) \"China se hizo capitalista y abandonó el comunismo.\" (L4, L5) \"En China un algoritmo controla cada gesto de cada ciudadano.\" (L7) \"China y EE. UU. están en una nueva Guerra Fría.\" (L11) Parte D — Aplicación a una noticia (2 actividades) Toma esta noticia y analízala con las nueve preguntas de la hoja \"Cómo leer una noticia sobre China\": \"El Ministerio de Comercio chino suspende durante un año los controles de exportación de tierras raras tras la cumbre con EE. UU., pero mantiene los impuestos en abril y añade nuevas empresas estadounidenses a su lista de control.\" (2026) Identifique: quién decide, objetivo político, incentivo económico, precedente, qué es hecho y qué interpretación, y una explicación alternativa. Elige uno de los seis escenarios de la Lección 12 y construye su \"cuadro de indicadores\": ¿qué tres señales concretas lo harían claramente más probable en los próximos dos años? Autoevaluación (rúbrica orientativa) Parte A: 1 punto por respuesta correcta y precisa (10). Parte B: hasta 3 puntos por respuesta según la calidad de la cadena causal (12). Parte C: hasta 3 puntos: 1 por lo cierto, 1 por lo omitido, 1 por la versión precisa (12). Parte D: hasta 8 puntos por el uso correcto del método y la distinción hecho/interpretación (16). Total: 50 puntos. No memorice: lo que se evalúa es la capacidad de razonar con los modelos del curso, no de recitar datos."}, {"id": "20_Guia_de_respuestas", "group": "Aplicación y evaluación", "badge": "◆", "title": "Guía de respuestas", "kind": "plain", "meta": "Respuestas modelo, no las únicas válidas. En las partes B–D se valora el razonamiento, no la coincidencia literal.", "readmin": 5, "color": "#0e7490", "html": "<div class=\"doc-head\"><h1 id=\"guia-de-respuestas-de-la-evaluacion-final\">Guía de respuestas de la evaluación final<\/h1><p class=\"doc-meta\">Respuestas modelo, no las únicas válidas. En las partes B–D se valora el razonamiento, no la coincidencia literal.<\/p>\n<hr>\n<\/div><section class=\"sec t-plain\"><h2 id=\"parte-a-conceptos\">Parte A — Conceptos<\/h2><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>中国 / Zhongguo<\/strong> significa \"país del centro\" y expresa una autoimagen de centralidad civilizatoria. Importa porque explica la incomodidad china con un orden internacional de Estados formalmente iguales. <em>(L1)<\/em><\/p>\n<\/li>\n<li>\n<p>Es un <strong>trauma real<\/strong> (derrotas, tratados desiguales, invasión, 1839–1949) <em>y<\/em> una <strong>narrativa administrada<\/strong>: el Partido la sistematizó desde 1991 (educación patriótica) como fuente de legitimidad. Ambas cosas a la vez. <em>(L2)<\/em><\/p>\n<\/li>\n<li>\n<p>\"<strong>70-30<\/strong>\" (70 % de aciertos, 30 % de errores) es el veredicto de la Resolución de 1981 sobre Mao. Permite al Partido reconocer los desastres sin repudiar a su fundador, preservando su legitimidad (la \"lección soviética\"). <em>(L3)<\/em><\/p>\n<\/li>\n<li>\n<p>Que China <strong>abrió la economía al mercado sin abrir el sistema político<\/strong>: mantuvo el monopolio del Partido. Es la fórmula que Deng fijó tras Tiananmén. <em>(L4)<\/em><\/p>\n<\/li>\n<li>\n<p>Porque el sistema es un <strong>híbrido<\/strong>: régimen leninista (\"comunista\") con economía mayoritariamente de mercado (\"capitalista\"). Ninguna etiqueta única sirve; política y economía no comparten etiqueta. <em>(L5)<\/em><\/p>\n<\/li>\n<li>\n<p>Porque el <strong>Partido está por encima del Estado<\/strong>, y el secretario general lo dirige; la presidencia es protocolaria. El poder real está en el Partido (y en la jefatura del ejército). <em>(L6)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>No.<\/strong> No existe un marcador nacional único que puntúe cada gesto. Hay un mosaico de listas negras judiciales y calificaciones a empresas; los ensayos individuales terminaron en gran medida hacia 2026. (La vigilancia real, en cambio, sí es masiva.) <em>(L7)<\/em><\/p>\n<\/li>\n<li>\n<p>Es una <strong>autonomía nominal<\/strong>: el poder real reside en los secretarios del Partido, controlados por el centro. No hay autogobierno real. <em>(L8)<\/em><\/p>\n<\/li>\n<li>\n<p>Con las \"<strong>finanzas del suelo<\/strong>\" (venta de derechos de uso) y deuda fuera de balance (LGFV). El problema: alimentó la burbuja inmobiliaria y una enorme deuda oculta, y colapsó con el ladrillo. <em>(L9)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>Envejecer demográficamente antes de alcanzar la renta de un país rico<\/strong>, lo que limita los recursos para pensiones y sanidad. <em>(L10)<\/em><\/p>\n<\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-b-explicacion-causal\">Parte B — Explicación causal<\/h2><div class=\"sec-body\">\n<ol start=\"11\">\n<li>\n<p>Cadena: <strong>metas utópicas<\/strong> → cuadros locales <strong>falsifican al alza<\/strong> la producción por miedo o ambición → el Estado <strong>requisa grano<\/strong> según cifras infladas → el campo se queda <strong>sin comida<\/strong> → sin prensa libre ni datos veraces, <strong>no hay corrección<\/strong> hasta que es tarde. Resultado: la mayor hambruna de la historia. <em>(L3)<\/em><\/p>\n<\/li>\n<li>\n<p>Deng vio dos cosas: en 1989 (<strong>Tiananmén<\/strong>) que la apertura política amenazaba el poder del Partido; y en 1991 (<strong>colapso soviético<\/strong>) que abrir la política —como hizo Gorbachov— podía hundir el régimen. Conclusión: reformar la economía <strong>para salvar al Partido<\/strong>, nunca abrir la política. <em>(L4)<\/em><\/p>\n<\/li>\n<li>\n<p>El inmobiliario era ~una quinta parte del PIB y el grueso del <strong>ahorro familiar<\/strong>; además, los <strong>gobiernos locales<\/strong> se financiaban con suelo. Al caer los precios: los hogares se sienten más pobres y <strong>gastan menos<\/strong> (consumo); los locales pierden ingresos (<strong>finanzas<\/strong>); y la caída se autoalimenta con la <strong>pérdida de confianza<\/strong>. Es una recesión de balances. <em>(L10)<\/em><\/p>\n<\/li>\n<li>\n<p>La política industrial genera <strong>sobrecapacidad<\/strong> (más producción que demanda interna, con un consumo débil); ese <strong>excedente<\/strong> (coches, solar, baterías) se <strong>exporta<\/strong> a precios muy competitivos; eso provoca <strong>aranceles y controles<\/strong> en EE. UU. y la UE, que temen por su industria. Los límites internos se proyectan como fricción externa. <em>(L10, L11)<\/em><\/p>\n<\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-c-matizacion-de-topicos\">Parte C — Matización de tópicos<\/h2><div class=\"sec-body\">\n<ol start=\"15\">\n<li>\n<p><strong>\"China solo quiere dominar.\"<\/strong> <em>Cierto:<\/em> proyecta poder y reclama territorios. <em>Omite:<\/em> el miedo a <em>volver<\/em> a ser dominada (trauma de la humillación) como motor defensivo. <em>Versión precisa:<\/em> busca poder y estatus, en parte, para no volver a ser vulnerable; el miedo es clave explicativa, no justificación automática. <em>(L2)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>\"China se hizo capitalista y abandonó el comunismo.\"<\/strong> <em>Cierto:<\/em> introdujo mercado y propiedad privada. <em>Omite:<\/em> el Partido nunca cedió el poder político y bajo Xi ha reforzado su presencia económica. <em>Versión precisa:<\/em> adoptó el mercado como herramienta sin renunciar al monopolio político; ni capitalismo liberal ni comunismo clásico. <em>(L4, L5)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>\"Un algoritmo controla cada gesto.\"<\/strong> <em>Cierto:<\/em> hay vigilancia masiva real. <em>Omite:<\/em> no existe una puntuación única; el sistema es fragmentado y burocrático, con márgenes de queja e incluso concesión. <em>Versión precisa:<\/em> vigilancia real y extensa + censura selectiva orientada a impedir la acción colectiva, no a dictar cada gesto. <em>(L7)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>\"Nueva Guerra Fría.\"<\/strong> <em>Cierto:<\/em> hay rivalidad ideológica, militar y bloques emergentes. <em>Omite:<\/em> la interdependencia económica profunda que no existía entre EE. UU. y la URSS. <em>Versión precisa:<\/em> rivalidad dentro de interdependencia; competidores estratégicos que siguen siendo socios esenciales. <em>(L11)<\/em><\/p>\n<\/li>\n<\/ol>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"parte-d-aplicacion\">Parte D — Aplicación<\/h2><div class=\"sec-body\">\n<ol start=\"19\">\n<li>\n<p><strong>Análisis de la noticia de las tierras raras:<\/strong>\n- <em>Quién decide:<\/em> el Estado (Ministerio de Comercio), por prioridad del Partido.\n- <em>Objetivo político:<\/em> negociar con EE. UU. manteniendo palanca; señal de fuerza controlada.\n- <em>Incentivo económico:<\/em> las tierras raras son el punto de estrangulamiento chino frente a los chips estadounidenses.\n- <em>Precedente:<\/em> la lógica de reciprocidad y represalia de la guerra comercial iniciada en 2018.\n- <em>Hecho vs. interpretación:<\/em> <em>hecho<\/em>, la suspensión parcial y las nuevas listas; <em>interpretación<\/em>, si estabiliza la relación o solo hace una pausa táctica.\n- <em>Explicación alternativa:<\/em> ¿concesión genuina para rebajar tensión, o gesto calculado para conservar la baza de cara al vencimiento de la tregua? Probablemente lo segundo.\n- <em>Lectura:<\/em> rivalidad dentro de interdependencia; el comercio se enfría mientras la seguridad tecnológica sigue caliente. <em>(L11)<\/em><\/p>\n<\/li>\n<li>\n<p><strong>Ejemplo (escenario \"rebalanceo exitoso\"):<\/strong> tres indicadores que lo harían más probable: (a) el <strong>consumo<\/strong> sube de forma sostenida como % del PIB; (b) reformas efectivas del <em>hukou<\/em> y de la protección social (sanidad, pensiones) que reduzcan el ahorro precautorio; (c) sectores de \"nuevas fuerzas productivas\" (IA, chips) que <strong>escalen<\/strong> lo bastante para compensar la contracción del ladrillo. <em>(Cualquier escenario es válido si los tres indicadores son concretos, medibles y coherentes.)<\/em> <em>(L12)<\/em><\/p>\n<\/li>\n<\/ol>\n<hr>\n<p><em>Criterio general de corrección: se premia distinguir hecho de interpretación, usar rangos en las cifras, evitar el determinismo y reconocer lo que no se sabe.<\/em><\/p><\/div><\/section>", "text": "Guía de respuestas de la evaluación final Respuestas modelo, no las únicas válidas. En las partes B–D se valora el razonamiento, no la coincidencia literal. Parte A — Conceptos 中国 / Zhongguo significa \"país del centro\" y expresa una autoimagen de centralidad civilizatoria. Importa porque explica la incomodidad china con un orden internacional de Estados formalmente iguales. (L1) Es un trauma real (derrotas, tratados desiguales, invasión, 1839–1949) y una narrativa administrada : el Partido la sistematizó desde 1991 (educación patriótica) como fuente de legitimidad. Ambas cosas a la vez. (L2) \" 70-30 \" (70 % de aciertos, 30 % de errores) es el veredicto de la Resolución de 1981 sobre Mao. Permite al Partido reconocer los desastres sin repudiar a su fundador, preservando su legitimidad (la \"lección soviética\"). (L3) Que China abrió la economía al mercado sin abrir el sistema político : mantuvo el monopolio del Partido. Es la fórmula que Deng fijó tras Tiananmén. (L4) Porque el sistema es un híbrido : régimen leninista (\"comunista\") con economía mayoritariamente de mercado (\"capitalista\"). Ninguna etiqueta única sirve; política y economía no comparten etiqueta. (L5) Porque el Partido está por encima del Estado , y el secretario general lo dirige; la presidencia es protocolaria. El poder real está en el Partido (y en la jefatura del ejército). (L6) No. No existe un marcador nacional único que puntúe cada gesto. Hay un mosaico de listas negras judiciales y calificaciones a empresas; los ensayos individuales terminaron en gran medida hacia 2026. (La vigilancia real, en cambio, sí es masiva.) (L7) Es una autonomía nominal : el poder real reside en los secretarios del Partido, controlados por el centro. No hay autogobierno real. (L8) Con las \" finanzas del suelo \" (venta de derechos de uso) y deuda fuera de balance (LGFV). El problema: alimentó la burbuja inmobiliaria y una enorme deuda oculta, y colapsó con el ladrillo. (L9) Envejecer demográficamente antes de alcanzar la renta de un país rico , lo que limita los recursos para pensiones y sanidad. (L10) Parte B — Explicación causal Cadena: metas utópicas → cuadros locales falsifican al alza la producción por miedo o ambición → el Estado requisa grano según cifras infladas → el campo se queda sin comida → sin prensa libre ni datos veraces, no hay corrección hasta que es tarde. Resultado: la mayor hambruna de la historia. (L3) Deng vio dos cosas: en 1989 ( Tiananmén ) que la apertura política amenazaba el poder del Partido; y en 1991 ( colapso soviético ) que abrir la política —como hizo Gorbachov— podía hundir el régimen. Conclusión: reformar la economía para salvar al Partido , nunca abrir la política. (L4) El inmobiliario era ~una quinta parte del PIB y el grueso del ahorro familiar ; además, los gobiernos locales se financiaban con suelo. Al caer los precios: los hogares se sienten más pobres y gastan menos (consumo); los locales pierden ingresos ( finanzas ); y la caída se autoalimenta con la pérdida de confianza . Es una recesión de balances. (L10) La política industrial genera sobrecapacidad (más producción que demanda interna, con un consumo débil); ese excedente (coches, solar, baterías) se exporta a precios muy competitivos; eso provoca aranceles y controles en EE. UU. y la UE, que temen por su industria. Los límites internos se proyectan como fricción externa. (L10, L11) Parte C — Matización de tópicos \"China solo quiere dominar.\" Cierto: proyecta poder y reclama territorios. Omite: el miedo a volver a ser dominada (trauma de la humillación) como motor defensivo. Versión precisa: busca poder y estatus, en parte, para no volver a ser vulnerable; el miedo es clave explicativa, no justificación automática. (L2) \"China se hizo capitalista y abandonó el comunismo.\" Cierto: introdujo mercado y propiedad privada. Omite: el Partido nunca cedió el poder político y bajo Xi ha reforzado su presencia económica. Versión precisa: adoptó el mercado como herramienta sin renunciar al monopolio político; ni capitalismo liberal ni comunismo clásico. (L4, L5) \"Un algoritmo controla cada gesto.\" Cierto: hay vigilancia masiva real. Omite: no existe una puntuación única; el sistema es fragmentado y burocrático, con márgen
