/strong>\n¿Por qué la campaña de educación patriótica se intensificó justo después de 1989–1991? Explica el vínculo entre Tiananmén, el colapso soviético y el giro hacia el nacionalismo.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China exagera la humillación para justificar su expansión.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia reciente sobre China-Japón o China-Taiwán e identifica qué agravio histórico concreto se está invocando y con qué fin político.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>Entre 1839 y 1949 China pasó de centro económico mundial a país semicolonizado, invadido y fragmentado.<\/li>\n<li>La humillación fue depredación extranjera <em>y<\/em> colapso interno, no solo una de las dos.<\/li>\n<li>Japón ocupa un lugar aparte por la magnitud, la cercanía y la reconciliación incompleta.<\/li>\n<li>El trauma es real, pero el Partido lo sistematizó como fuente de legitimidad desde 1991.<\/li>\n<li>El miedo a <em>volver<\/em> a ser dominada explica —sin justificar automáticamente— buena parte de la política china de hoy.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 3.<\/strong> El relato dice que la humillación terminó en 1949, cuando los comunistas de Mao vencieron y proclamaron que China \"se había puesto de pie\". Pero ¿quién fue Mao, qué construyó y qué destruyó? Eso examina la Lección 3.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Julia Lovell, <em>The Opium War<\/em> — las guerras y su memoria.<\/li>\n<li>Stephen R. Platt, <em>Autumn in the Heavenly Kingdom<\/em> (Taiping) e <em>Imperial Twilight<\/em> (antesala de la Guerra del Opio).<\/li>\n<li>Rana Mitter, <em>China's War with Japan / Forgotten Ally<\/em> y <em>China's Good War<\/em> (uso político de la memoria de la guerra).<\/li>\n<li>Odd Arne Westad, <em>Restless Empire<\/em> — China y las potencias.<\/li>\n<li>William A. Callahan, <em>China: The Pessoptimist Nation<\/em> — discurso de la humillación y educación patriótica.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / actualidad (leer como posición oficial)<\/strong><\/p>\n<ul>\n<li>Xinhua y discurso de Xi Jinping en el desfile del 3 de septiembre de 2025.<\/li>\n<li><em>Diplomatic Bluebook<\/em> de Japón, edición 2026 (posición japonesa).<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>Brookings y <em>The Diplomat<\/em> sobre la crisis chino-japonesa de 2025–2026.<\/li>\n<li>MERICS / CSIS <em>ChinaPower<\/em> sobre el desfile y el nacionalismo.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 2 — El siglo de la humillación (1839–1949) Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~22 min. Recorrido de la lección A Apertura B Modelo mental: la herida nacional como lente C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Por qué la soberanía, Taiwán, Hong Kong, Japón y Occidente son asuntos especialmente sensibles? La escena. El 3 de septiembre de 2025, en la avenida Chang'an de Pekín, más de 12.000 soldados desfilaron con misiles hipersónicos y armas de energía dirigida ante Xi Jinping, con Vladímir Putin y Kim Jong-un a su lado. El motivo oficial: el 80.º aniversario de la victoria sobre Japón en 1945. La pregunta incómoda: ¿por qué una superpotencia del siglo XXI exhibe su armamento más moderno bajo la bandera de una guerra que terminó hace ocho décadas? Porque el desfile no trata realmente de 1945. Trata de un relato que va de 1839 a hoy: el de la humillación y la recuperación. Idea clave Entre 1839 y 1949, China pasó de ser una de las mayores economías del mundo a un país semicolonizado, invadido y fragmentado. Ese siglo —el \"siglo de la humillación\" (百年国耻, bǎinián guóchǐ )— es el núcleo emocional y político del nacionalismo chino moderno. Explica la obsesión con la soberanía y el territorio y la sensibilidad extrema ante Japón, Taiwán, Hong Kong y \"Occidente\". Pero es también una narrativa administrada por el Partido (y antes por el Kuomintang): un trauma real convertido en herramienta de gobierno. Hay que entender las dos cosas a la vez: la herida y su uso político. B Modelo mental: la herida nacional como lente Una secuencia en tres tiempos: Antes (~1800): según las estimaciones de Angus Maddison, hacia 1820 China representaba en torno a un tercio del PIB mundial. Un imperio vasto y confiado, pero tecnológica y militarmente superado por una Europa que se industrializaba. Durante (1839–1949): Guerras del Opio → tratados desiguales → concesiones y extraterritorialidad → rebeliones internas devastadoras → caída de la dinastía (1911) → señores de la guerra → invasión japonesa → guerra civil. Después (1949–): \"China se ha puesto de pie\" (Mao). Un relato de recuperación en el que cada agravio presente se lee a través de un \"nunca más\". Cómo se usa el modelo. La humillación funciona hoy como una lente: una venta de armas de EE. UU. a Taiwán, una frase de un primer ministro japonés o una crítica occidental de derechos humanos se procesan a través del recuerdo de la vulnerabilidad. Ante una noticia, pregúntese qué agravio histórico se está activando. C Desarrollo C1. ¿Cómo cayó el \"país del centro\"? Hacia 1800 el imperio Qing era enorme y próspero, pero descansaba en una superioridad que ya no tenía. Europa se industrializaba y desarrollaba una potencia militar y naval sin precedentes; la corte Qing, confiada y mirando hacia dentro, no lo advirtió a tiempo. La colisión no llegó por una gran guerra de conquista, sino por el comercio: concretamente, por el opio. C2. ¿Qué fueron las Guerras del Opio y los \"tratados desiguales\"? Gran Bretaña compraba té, seda y porcelana a China y pagaba en plata, con un déficit creciente. Para equilibrarlo, vendió opio producido en la India británica. Cuando la Qing intentó prohibirlo, estalló la Primera Guerra del Opio (1839–1842) , que China perdió. El Tratado de Nanjing (1842) cedió la isla de Hong Kong, abrió \"puertos de tratado\", impuso indemnizaciones y consagró la extraterritorialidad (los extranjeros no se sometían a las leyes chinas). Vinieron más: la Segunda Guerra del Opio (1856–1860) , con el saqueo del Palacio de Verano en 1860, y una cascada de tratados desiguales. Hong Kong se completó por partes —Kowloon (1860) y los Nuevos Territorios (arrendados en 1898 por 99 años, de ahí la retrocesión de 1997—, dato clave para entender el presente. Mecanismo: las potencias extranjeras extrajeron soberanía a plazos, sin colonizar formalmente todo el país. C3. ¿Por qué el colapso vino también desde dentro? La humillación no fue solo obra extranjera. La rebelión Taiping (1850–1864) fue una de las guerras más mortíferas de la historia —del orden de veinte millones de muertos o más, según las estimaciones— y estuvo a punto de derribar a la Qing, que sobrevivió debilitada. A ella se sumaron otras revueltas y, en 1911, la caída de la dinastía y la fragmentación del país en feudos de señores de la guerra. Es decir: la humillación fue depredación externa y descomposición interna a la vez. Olvidar la segunda parte deforma el cuadro. C4. ¿Por qué Japón ocupa un lugar aparte? Japón se modernizó con la Restauración Meiji y derrotó a China en la Primera Guerra Sino-Japonesa (1894–1895) . El Tratado de Shimonoseki le cedió Taiwán , que quedó bajo dominio japonés hasta 1945 (razón por la que Taiwán tiene una trayectoria distinta —clave para la Lección 8). Después vinieron la invasión de Manchuria (1931), la guerra total desde 1937 y la Masacre de Nanjing (1937–1938) . Japón es la herida más aguda por tres razones: fue un vecino asiático, no una potencia lejana; la violencia fue masiva y reciente; y la reconciliación de posguerra nunca fue tan completa como la europea con Alemania. De ahí la sensibilidad extrema que persiste hoy. C5. ¿Cómo se convirtió el trauma en herramienta política? El discurso de la \"humillación nacional\" ya existía bajo la República y el Kuomintang, pero el Partido Comunista lo sistematizó , sobre todo a partir de 1991, con la campaña de educación patriótica . El momento no es casual: tras Tiananmén (1989) y el colapso soviético (1991), la legitimidad comunista clásica se agrietaba, y el régimen desplazó su base hacia el nacionalismo. Museos, libros de texto y aniversarios fijaron un relato en el que el Partido es la fuerza que terminó la humillación y el único garante frente a su regr"}, {"id": "Leccion03_Mao_unificar_transformar_destruir", "group": "I · Marco e historia", "badge": "3", "title": "Mao: unificar, transformar, destruir", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min.", "readmin": 23, "color": "#c0392b", "html": "<div class=\"doc-head\"><h1 id=\"leccion-3-mao-unificar-transformar-y-destruir-19491976\">Lección 3 — Mao: unificar, transformar y destruir (1949–1976)<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: un mismo motor, tres resultados<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Qué construyó Mao y qué destruyó?<\/p><\/aside>\n<p><strong>La escena.<\/strong> El rostro de Mao Zedong sigue en todos los billetes de yuan y su retrato preside la puerta de Tiananmén. Y sin embargo, el mismo Partido que lo venera reconoce oficialmente que cometió \"errores graves\" que costaron decenas de millones de vidas. ¿Cómo puede un régimen fundarse sobre un hombre al que no puede ni alabar del todo ni repudiar? La respuesta oficial es una fórmula aritmética: Mao fue \"setenta por ciento de aciertos, treinta por ciento de errores\". Esa cuenta imposible es la llave para entender a la vez a Mao y al Partido de hoy.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>Mao hizo dos cosas que parecen incompatibles. <strong>Unificó<\/strong> un país roto, construyó por primera vez en décadas un Estado moderno y restauró la soberanía (\"China se ha puesto de pie\"); y <strong>destruyó<\/strong> —con la hambruna del Gran Salto Adelante (decenas de millones de muertos) y con el caos de la Revolución Cultural (una década)—. Las dos cosas son ciertas y, lo más importante, están conectadas: <strong>el mismo instrumento<\/strong> que le permitió lo primero —la movilización de masas bajo un poder sin contrapesos— fue el que produjo lo segundo. El Partido lo conserva como santo fundador porque repudiarlo, como Jrushchov hizo con Stalin, amenazaría —según la propia lógica de Xi— su legitimidad. Es la \"lección soviética\".<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: un mismo motor, tres resultados<\/span><\/div><div class=\"sec-body\">\n<p>Piense en la era de Mao como un arco de tres fases movidas por el mismo motor:<\/p>\n<ol>\n<li><strong>Unificar (1949 – principios de los 50):<\/strong> construcción del Estado, reforma agraria, recuperación de la soberanía.<\/li>\n<li><strong>Transformar (mediados de los 50):<\/strong> transformación socialista, industrialización, colectivización, movilización total.<\/li>\n<li><strong>Destruir (1958–1976):<\/strong> el Gran Salto Adelante y su hambruna (1958–62); la Revolución Cultural (1966–76).<\/li>\n<\/ol>\n<p><strong>El motor común:<\/strong> la capacidad de movilizar a cientos de millones de personas mediante la ideología y el poder concentrado. Esa fuerza levantó un Estado y también desencadenó las catástrofes, porque en un sistema sin prensa libre, sin oposición y sin datos fiables <strong>no había mecanismo para frenar el error a tiempo<\/strong>. Ese es el hilo que conviene retener.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-que-significo-china-se-ha-puesto-de-pie\">C1. ¿Qué significó \"China se ha puesto de pie\"?<\/h3>\n<p>En 1949, tras derrotar al Kuomintang en la guerra civil, Mao proclamó que \"el pueblo chino se ha puesto de pie\". No era solo retórica: por primera vez en décadas, un poder central efectivo gobernaba casi todo el territorio, se ponía fin a las concesiones extranjeras y se recuperaba la soberanía. Los logros iniciales fueron reales: un Estado que funcionaba, campañas masivas de alfabetización, sanidad básica (los \"médicos descalzos\"), un aumento notable de la esperanza de vida y una reforma agraria que redistribuyó la tierra. Esa reforma fue también <strong>violenta<\/strong>: entre uno y dos millones de terratenientes, o más, fueron ejecutados (estimaciones). El nuevo orden nació con logros y con sangre.<\/p>\n<h3 id=\"c2-como-se-construyo-el-nuevo-estado\">C2. ¿Cómo se construyó el nuevo Estado?<\/h3>\n<p>El Partido penetró la sociedad como ninguna dinastía lo había hecho: a través de las <strong>unidades de trabajo<\/strong> (<em>danwei<\/em>), la colectivización del campo y la propiedad estatal de la industria, siguiendo al principio el modelo soviético. Se fundió Partido y Estado en una sola estructura —el rasgo que definirá al sistema hasta hoy (y que examinan las Lecciones 5 y 6)—. Por primera vez, el poder llegaba de forma capilar hasta la aldea.<\/p>\n<h3 id=\"c3-que-fue-el-gran-salto-adelante-y-por-que-causo-una-hambruna\">C3. ¿Qué fue el Gran Salto Adelante y por qué causó una hambruna?<\/h3>\n<p>Entre <strong>1958 y 1962<\/strong>, Mao quiso \"saltar\" hacia el comunismo mediante la movilización: comunas populares y hornos de acero en los patios traseros para superar a Occidente en pocos años. El resultado fue la mayor hambruna de la historia. <strong>El mecanismo importa más que la cifra:<\/strong> metas utópicas → cuadros locales que falsificaban al alza la producción por miedo o ambición → el Estado requisaba grano según esas cifras infladas → el campo se quedaba sin comida. Sin prensa libre ni canales de información veraz, el error no pudo corregirse hasta que fue tarde. Las estimaciones de muertos oscilan <strong>entre 15 y 55 millones<\/strong> según la fuente; las cifras académicas más citadas rondan los <strong>30–45 millones<\/strong>. <em>(Rango disputado; ver Evidencias.)<\/em><\/p>\n<h3 id=\"c4-que-fue-la-revolucion-cultural\">C4. ¿Qué fue la Revolución Cultural?<\/h3>\n<p>Apartado del poder tras el desastre del Gran Salto, Mao volvió a la carga en <strong>1966<\/strong> movilizando a la juventud —los Guardias Rojos— contra la propia dirección del Partido y contra \"las cuatro antiguallas\" (viejas ideas, cultura, costumbres y hábitos). Siguieron purgas, persecuciones, destrucción cultural, cierre de escuelas y violencia entre facciones. El coste humano se estima entre varios cientos de miles y cerca de dos millones de muertos, con millones de perseguidos (estimaciones). <strong>Propósito:<\/strong> Mao reafirmaba su poder personal y su idea de \"revolución permanente\". El caos duró, con altibajos, hasta su muerte en 1976 y la caída de la \"Banda de los Cuatro\".<\/p>\n<h3 id=\"c5-por-que-el-partido-no-puede-repudiar-a-mao\">C5. ¿Por qué el Partido no puede repudiar a Mao?<\/h3>\n<p>En 1981, bajo Deng Xiaoping, el Partido aprobó una <strong>Resolución sobre su propia historia<\/strong> que reconocía los \"errores graves\" de Mao sin destruir su figura fundacional: la fórmula fue \"setenta por ciento de aciertos, treinta por ciento de errores\". Deng necesitaba admitir los desastres —para justificar la reforma que venía— sin dinamitar la legitimidad del Partido, que descansa en Mao. El contraste es deliberado: en 1956, Jrushchov denunció los crímenes de Stalin en un discurso secreto; Xi Jinping cita ese episodio como el <strong>precedente fatal<\/strong> que ayudó a deslegitimar y, con el tiempo, a hundir a la URSS. Por eso hoy cuestionar la versión oficial de la historia —el \"nihilismo histórico\"— es delito. Aquí está el equilibrio de la lección: ni \"solo un tirano\" ni \"el gran modernizador\"; las dos caras son inseparables, y el Partido lo sabe.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>\"China se ha puesto de pie\" (1949)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  proclamación de Mao del fin de la humillación y la recuperación de la soberanía.<br><b class=\"mlbl\">Importancia:<\/b>  cierra el relato de la Lección 2 y abre la legitimidad fundacional del Partido.<br><b class=\"mlbl\">Error habitual:<\/b>  leerlo como simple propaganda; describía también un cambio real de poder efectivo.<\/p>\n<\/li>\n<li>\n<p><strong>Gran Salto Adelante / Gran Hambruna (1958–62)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  campaña de industrialización y colectivización forzada que provocó una hambruna masiva.<br><b class=\"mlbl\">Importancia:<\/b>  muestra cómo la movilización sin contrapesos se vuelve catástrofe.<br><b class=\"mlbl\">Error habitual:<\/b>  verlo como \"mala suerte climática\"; fue sobre todo un fallo político y de información.<\/p>\n<\/li>\n<li>\n<p><strong>Revolución Cultural (1966–76)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  movilización de masas contra el propio Partido y la cultura tradicional, con purgas y caos.<br><b class=\"mlbl\">Importancia:<\/b>  trauma generacional que explica el miedo posterior del Partido al desorden.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginarla solo como \"lucha ideológica\"; fue violencia y colapso institucional reales.<\/p>\n<\/li>\n<li>\n<p><strong>Resolución de 1981 / \"70-30\"<\/strong><br><b class=\"mlbl\">Definición:<\/b>  veredicto oficial que reconoce los errores de Mao sin repudiarlo.<br><b class=\"mlbl\">Importancia:<\/b>  fija cómo el Partido gestiona su pasado hasta hoy.<br><b class=\"mlbl\">Error habitual:<\/b>  tomarla como análisis histórico; es un acto político de equilibrio.<\/p>\n<\/li>\n<li>\n<p><strong>Nihilismo histórico<\/strong><br><b class=\"mlbl\">Definición:<\/b>  concepto oficial que criminaliza cuestionar la versión del Partido sobre su historia.<br><b class=\"mlbl\">Importancia:<\/b>  convierte la memoria de Mao en asunto de seguridad del régimen.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que es retórica; conlleva sanciones y penas reales.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmaciones frecuentes (mito y contramito):<\/strong> \"Mao fue solamente un tirano\" / \"Mao liberó y modernizó China\".<\/p>\n<ol>\n<li><strong>Qué es cierto en cada uno:<\/strong> Mao unificó el país, restauró la soberanía, construyó un Estado y amplió alfabetización y sanidad; <em>y<\/em> provocó la hambruna más letal de la historia y una década de caos.<\/li>\n<li><strong>Qué omite cada uno:<\/strong> la versión \"solo tirano\" borra la construcción estatal real en un país devastado; la versión \"libertador\" blanquea decenas de millones de muertos.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"Mao construyó el Estado moderno chino y restauró su soberanía, y con los mismos instrumentos —movilización de masas y poder absoluto— causó catástrofes de escala histórica. Las dos cosas son inseparables.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>1949:<\/strong> fundación de la RPC. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Reforma agraria (1950–53):<\/strong> entre uno y dos millones de terratenientes ejecutados, o más. <em>(Rango estimado.)<\/em><\/li>\n<li><strong>Gran Salto (1958–62):<\/strong> entre 15 y 55 millones de muertos por hambruna; consenso académico frecuente en 30–45 millones. <em>(Rango disputado: Yang Jisheng ~36 M; Dikötter ~45 M; cifras oficiales chinas, menores.)<\/em><\/li>\n<li><strong>Esperanza de vida:<\/strong> subió de alrededor de 40 años a mediados de siglo a cerca de 65 hacia el final de la era de Mao, pese a la caída durante la hambruna. <em>(Estimación ampliamente citada.)<\/em><\/li>\n<li><strong>Revolución Cultural (1966–76):<\/strong> de varios cientos de miles a cerca de dos millones de muertos; millones de perseguidos. <em>(Rango estimado.)<\/em><\/li>\n<li><strong>1981:<\/strong> Resolución del Partido; fórmula \"70-30\". <em>(Hecho comprobado.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> El Partido mantiene una campaña activa contra el <strong>\"nihilismo histórico\"<\/strong>. Xi Jinping fijó la línea en un discurso de enero de 2013 (la URSS cayó, dijo, en parte porque \"nadie fue lo bastante hombre\" para defender su historia); en 2021, antes del centenario del Partido, se habilitó incluso una línea telefónica y un sitio web para <strong>denunciar<\/strong> a quienes difundieran \"nihilismo histórico\", y una reforma penal castiga la difamación de \"héroes y mártires\". La política sigue vigente en 2025–2026. <em>(Fechas verificadas: 2013, 2021; vigencia actual confirmada.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La Resolución de 1981 y el \"70-30\"; la imposibilidad de repudiar a Mao sin erosionar la legitimidad; la \"lección soviética\".<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Protege el Estado la \"verdad histórica\" frente a distorsiones, o blinda al poder actual contra cualquier crítica bloqueando el pasado? ¿Es fortaleza (control del relato) o fragilidad (miedo a la propia historia)? Caben ambas lecturas.<\/p>\n<p><strong>Qué información falta.<\/strong> Su eficacia real y las actitudes generacionales: cuánto creen los jóvenes urbanos el relato oficial frente a cuánto lo repiten por prudencia.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Más que un mapa geográfico, conviene un <strong>mapa de intensidad de la hambruna del Gran Salto<\/strong> por provincias (Henan, Anhui, Sichuan y Gansu entre las más golpeadas), para mostrar que el desastre no fue uniforme y dependió de decisiones políticas locales. <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (9 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1949<\/strong> — Fundación de la RPC.<\/li>\n<li><strong>1950–1953<\/strong> — Reforma agraria; guerra de Corea.<\/li>\n<li><strong>1956–1957<\/strong> — Campaña de las Cien Flores y giro Antiderechista.<\/li>\n<li><strong>1958–1962<\/strong> — Gran Salto Adelante y Gran Hambruna.<\/li>\n<li><strong>1966–1976<\/strong> — Revolución Cultural.<\/li>\n<li><strong>1971<\/strong> — \"Caso Lin Biao\" (caída del sucesor designado).<\/li>\n<li><strong>1972<\/strong> — Visita de Nixon: apertura a EE. UU.<\/li>\n<li><strong>1976<\/strong> — Muerte de Mao; caída de la Banda de los Cuatro.<\/li>\n<li><strong>1981<\/strong> — Resolución sobre la historia del Partido (\"70-30\").<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Juzgar a Mao solo por el aura fundacional o solo por las catástrofes.<\/strong> <em>Corrección:<\/em> hay que sostener las dos caras a la vez; es lo que hace difícil el juicio.<\/li>\n<li><strong>Tomar las cifras de muertos como exactas.<\/strong> <em>Corrección:<\/em> son rangos disputados; se usan intervalos y se cita la incertidumbre, sin por ello minimizar la magnitud.<\/li>\n<li><strong>Creer que el culto a Mao es nostalgia inocente.<\/strong> <em>Corrección:<\/em> es una pieza activa de la legitimidad presente; por eso el \"nihilismo histórico\" es delito.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si el mismo instrumento —la movilización de masas bajo un poder sin contrapesos— produjo tanto la unificación como la hambruna, ¿qué revela eso sobre los sistemas que carecen de mecanismos de corrección (prensa libre, oposición, datos fiables)? ¿Ha resuelto la China de hoy ese problema, o solo lo ha desplazado hacia nuevas formas de control? <em>(Conecta con las Lecciones 6 —poder—, 7 —control— y 9 —cómo circula, o no, la información en la economía—.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué fue el Gran Salto Adelante?<\/li>\n<li>¿Qué significa la fórmula \"70-30\" y quién la formuló?<\/li>\n<li>¿Por qué el Partido no repudia a Mao?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica el mecanismo por el que una política utópica (el Gran Salto) desembocó en una hambruna masiva. Ordena la cadena: metas → falsificación → requisas → hambre → ausencia de corrección.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"Mao modernizó China, así que las cifras de muertos son propaganda occidental.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nBusca una noticia sobre censura de historia o \"nihilismo histórico\" en China y conéctala con la Resolución de 1981 y con la \"lección soviética\".<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>Mao unificó China y restauró su soberanía tras un siglo de humillación.<\/li>\n<li>Con los mismos instrumentos causó la mayor hambruna de la historia y una década de caos.<\/li>\n<li>Unificación y catástrofe salen del mismo motor: movilización total sin contrapesos ni corrección.<\/li>\n<li>El Partido no puede repudiarlo sin dañarse: de ahí el \"70-30\" y la \"lección soviética\".<\/li>\n<li>Por eso la memoria de Mao es hoy asunto de seguridad del régimen, no debate histórico libre.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 4.<\/strong> La muerte de Mao (1976) dejó un país agotado y pobre. ¿Cómo introdujo Deng Xiaoping el mercado sin ceder el poder del Partido, y por qué la China de Xi parece deslizarse de nuevo hacia la concentración de poder al estilo de Mao? Eso examina la Lección 4.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Yang Jisheng, <em>Lápida (Mubei / Tombstone)<\/em> — estudio monumental de la hambruna por un periodista y miembro del Partido; fuente casi primaria.<\/li>\n<li>Frank Dikötter, <em>Mao's Great Famine<\/em> y <em>The Cultural Revolution<\/em> — extremo crítico y cifras altas; contrastar.<\/li>\n<li>Roderick MacFarquhar y Michael Schoenhals, <em>Mao's Last Revolution<\/em> — referencia sobre la Revolución Cultural.<\/li>\n<li>Andrew G. Walder, <em>China Under Mao: A Revolution Derailed<\/em> — síntesis equilibrada.<\/li>\n<li>Philip Short, <em>Mao: A Life<\/em> — biografía. <em>(Nota: Jung Chang y J. Halliday, <\/em>Mao: The Unknown Story<em>, es muy hostil y sus tesis están discutidas por especialistas; usar con cautela.)<\/em><\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>\"Resolución sobre algunas cuestiones de la historia del Partido\" (1981).<\/li>\n<li>Discursos de Xi Jinping sobre el \"nihilismo histórico\" (desde 2013) y reforma penal de 2021.<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li><em>Journal of Democracy<\/em>, \"China in Xi's New Era: The Return to Personalistic Rule\".<\/li>\n<li><em>Time<\/em>, \"What Xi Jinping Draws From Mao's Legacy\"; Jamestown Foundation y Coda Story sobre el \"nihilismo histórico\".<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 3 — Mao: unificar, transformar y destruir (1949–1976) Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: un mismo motor, tres resultados C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Qué construyó Mao y qué destruyó? La escena. El rostro de Mao Zedong sigue en todos los billetes de yuan y su retrato preside la puerta de Tiananmén. Y sin embargo, el mismo Partido que lo venera reconoce oficialmente que cometió \"errores graves\" que costaron decenas de millones de vidas. ¿Cómo puede un régimen fundarse sobre un hombre al que no puede ni alabar del todo ni repudiar? La respuesta oficial es una fórmula aritmética: Mao fue \"setenta por ciento de aciertos, treinta por ciento de errores\". Esa cuenta imposible es la llave para entender a la vez a Mao y al Partido de hoy. Idea clave Mao hizo dos cosas que parecen incompatibles. Unificó un país roto, construyó por primera vez en décadas un Estado moderno y restauró la soberanía (\"China se ha puesto de pie\"); y destruyó —con la hambruna del Gran Salto Adelante (decenas de millones de muertos) y con el caos de la Revolución Cultural (una década)—. Las dos cosas son ciertas y, lo más importante, están conectadas: el mismo instrumento que le permitió lo primero —la movilización de masas bajo un poder sin contrapesos— fue el que produjo lo segundo. El Partido lo conserva como santo fundador porque repudiarlo, como Jrushchov hizo con Stalin, amenazaría —según la propia lógica de Xi— su legitimidad. Es la \"lección soviética\". B Modelo mental: un mismo motor, tres resultados Piense en la era de Mao como un arco de tres fases movidas por el mismo motor: Unificar (1949 – principios de los 50): construcción del Estado, reforma agraria, recuperación de la soberanía. Transformar (mediados de los 50): transformación socialista, industrialización, colectivización, movilización total. Destruir (1958–1976): el Gran Salto Adelante y su hambruna (1958–62); la Revolución Cultural (1966–76). El motor común: la capacidad de movilizar a cientos de millones de personas mediante la ideología y el poder concentrado. Esa fuerza levantó un Estado y también desencadenó las catástrofes, porque en un sistema sin prensa libre, sin oposición y sin datos fiables no había mecanismo para frenar el error a tiempo . Ese es el hilo que conviene retener. C Desarrollo C1. ¿Qué significó \"China se ha puesto de pie\"? En 1949, tras derrotar al Kuomintang en la guerra civil, Mao proclamó que \"el pueblo chino se ha puesto de pie\". No era solo retórica: por primera vez en décadas, un poder central efectivo gobernaba casi todo el territorio, se ponía fin a las concesiones extranjeras y se recuperaba la soberanía. Los logros iniciales fueron reales: un Estado que funcionaba, campañas masivas de alfabetización, sanidad básica (los \"médicos descalzos\"), un aumento notable de la esperanza de vida y una reforma agraria que redistribuyó la tierra. Esa reforma fue también violenta : entre uno y dos millones de terratenientes, o más, fueron ejecutados (estimaciones). El nuevo orden nació con logros y con sangre. C2. ¿Cómo se construyó el nuevo Estado? El Partido penetró la sociedad como ninguna dinastía lo había hecho: a través de las unidades de trabajo ( danwei ), la colectivización del campo y la propiedad estatal de la industria, siguiendo al principio el modelo soviético. Se fundió Partido y Estado en una sola estructura —el rasgo que definirá al sistema hasta hoy (y que examinan las Lecciones 5 y 6)—. Por primera vez, el poder llegaba de forma capilar hasta la aldea. C3. ¿Qué fue el Gran Salto Adelante y por qué causó una hambruna? Entre 1958 y 1962 , Mao quiso \"saltar\" hacia el comunismo mediante la movilización: comunas populares y hornos de acero en los patios traseros para superar a Occidente en pocos años. El resultado fue la mayor hambruna de la historia. El mecanismo importa más que la cifra: metas utópicas → cuadros locales que falsificaban al alza la producción por miedo o ambición → el Estado requisaba grano según esas cifras infladas → el campo se quedaba sin comida. Sin prensa libre ni canales de información veraz, el error no pudo corregirse hasta que fue tarde. Las estimaciones de muertos oscilan entre 15 y 55 millones según la fuente; las cifras académicas más citadas rondan los 30–45 millones . (Rango disputado; ver Evidencias.) C4. ¿Qué fue la Revolución Cultural? Apartado del poder tras el desastre del Gran Salto, Mao volvió a la carga en 1966 movilizando a la juventud —los Guardias Rojos— contra la propia dirección del Partido y contra \"las cuatro antiguallas\" (viejas ideas, cultura, costumbres y hábitos). Siguieron purgas, persecuciones, destrucción cultural, cierre de escuelas y violencia entre facciones. El coste humano se estima entre varios cientos de miles y cerca de dos millones de muertos, con millones de perseguidos (estimaciones). Propósito: Mao reafirmaba su poder personal y su idea de \"revolución permanente\". El caos duró, con altibajos, hasta su muerte en 1976 y la caída de la \"Banda de los Cuatro\". C5. ¿Por qué el Partido no puede repudiar a Mao? En 1981, bajo Deng Xiaoping, el Partido aprobó una Resolución sobre su propia historia que reconocía los \"errores graves\" de Mao sin destruir su figura fundacional: la fórmula fue \"setenta por ciento de aciertos, treinta por ciento de errores\". Deng necesitaba admitir los desastres —para justificar la reforma que venía— sin dinamitar la legitimidad del Partido, que descansa en Mao. El contraste es deliberado: en 1956, Jrushchov denunció los crímenes de Stalin en un discurso secreto; Xi Jinping cita ese episodio como el precedente fatal que ayudó a deslegitimar y, con el tiempo, a hundir a la URSS. Por eso hoy "}, {"id": "Leccion04_De_Deng_a_Xi", "group": "I · Marco e historia", "badge": "4", "title": "De Deng a Xi", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min.", "readmin": 23, "color": "#c0392b", "html": "<div class=\"doc-head\"><h1 id=\"leccion-4-de-deng-a-xi-reforma-apertura-y-la-nueva-ruptura-1978hoy\">Lección 4 — De Deng a Xi: reforma, apertura y la nueva ruptura (1978–hoy)<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: dos eras con una bisagra<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Cómo introdujo China el mercado sin ceder el poder del Partido, y por qué la China de Xi rompe con el consenso de Deng?<\/p><\/aside>\n<p><strong>La escena.<\/strong> Dos imágenes separadas por cuarenta años. Años ochenta: Deng Xiaoping resume su filosofía con un proverbio —\"no importa que el gato sea blanco o negro, con tal de que cace ratones\"—; prima el crecimiento sobre la ideología, la dirección es colegiada, hay límites de mandato y la consigna exterior es \"esconderse y esperar\". Año 2026: Xi Jinping ha purgado a cinco de los seis miembros de la Comisión Militar Central, eliminó los límites de mandato en 2018 y ha concentrado el poder como nadie desde Mao. El mismo Partido, el estilo opuesto. Medir la distancia entre esas dos imágenes es entender la China de hoy.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>El acierto de Deng fue introducir el mercado sin ceder el monopolio político del Partido: <strong>liberalización económica sin democratización<\/strong>. Durante unos treinta años eso cuajó en un consenso —crecimiento primero, liderazgo colectivo (no personal), sucesión ordenada, perfil internacional bajo—. Xi Jinping, desde 2012, ha roto buena parte de ese consenso: recentraliza el poder en su persona, subordina la economía a la seguridad y al control del Partido, y proyecta asertividad hacia fuera. La China actual no es la de Deng avanzando por inercia; es una <strong>ruptura parcial<\/strong>.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: dos eras con una bisagra<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Era de reforma (1978–2012): Deng → Jiang → Hu.<\/strong> Principios: pragmatismo, crecimiento, experimentación, dirección colegiada, \"esconderse y esperar\", integración en el mundo.<\/li>\n<li><strong>Era de Xi (2012–hoy).<\/strong> Principios: recentralización, primacía del Partido y la seguridad sobre el crecimiento, culto al líder, asertividad exterior.<\/li>\n<li><strong>La bisagra:<\/strong> lo que <em>no<\/em> cambió (el monopolio político del Partido, la fusión Partido-Estado) frente a lo que <em>sí<\/em> cambió (el estilo y las prioridades). Ante cualquier análisis de la China actual, pregúntese si describe la continuidad estructural o la ruptura de estilo: confundirlas es el error más común.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-que-hizo-deng-distinto-de-mao\">C1. ¿Qué hizo Deng distinto de Mao?<\/h3>\n<p>Tras la muerte de Mao (1976), el país estaba agotado y era pobre. Deng lanzó en 1978 la \"reforma y apertura\", y lo hizo sin plano previo: experimentando (\"cruzar el río tanteando las piedras\"). Descolectivizó la agricultura (el \"sistema de responsabilidad familiar\"): al poder quedarse con lo que producían por encima de una cuota, los campesinos dispararon la producción. Creó <strong>Zonas Económicas Especiales<\/strong> (Shenzhen, 1980) para atraer inversión extranjera, permitió la empresa privada y toleró que \"enriquecerse fuera glorioso\". Pero mantuvo intacto el monopolio político del Partido. <strong>Mecanismo:<\/strong> la legitimidad se desplazó de la ideología y el carisma (Mao) al <strong>desempeño<\/strong> —entregar prosperidad—, el eco del Mandato del Cielo de la Lección 1.<\/p>\n<h3 id=\"c2-por-que-tiananmen-marco-el-limite\">C2. ¿Por qué Tiananmén marcó el límite?<\/h3>\n<p>En 1989, protestas por reformas políticas, contra la corrupción y la inflación ocuparon la plaza de Tiananmén. El 4 de junio fueron aplastadas por el ejército. La lección que Deng extrajo fue explícita: apertura económica, sí; apertura política, no. Ahí nace la fórmula que define al sistema hasta hoy. Y hay un segundo aprendizaje: Deng observó cómo la URSS se abría políticamente (<em>glasnost<\/em>) y se hundía, y sacó la conclusión inversa —la \"lección soviética\" que ya vimos en la Lección 3—. Reformar la economía para salvar al Partido; jamás lo contrario.<\/p>\n<h3 id=\"c3-que-fue-la-era-de-jiang-y-hu-19892012\">C3. ¿Qué fue la era de Jiang y Hu (1989–2012)?<\/h3>\n<p>El \"esconderse y esperar\" dio frutos. China ingresó en la <strong>OMC (2001)<\/strong> y se convirtió en la fábrica del mundo; se formalizó la \"economía socialista de mercado\" (1993); y con la teoría de las \"Tres Representaciones\" (2001) Jiang Zemin permitió que los <strong>empresarios ingresaran en el Partido<\/strong> —un giro ideológico enorme: el partido \"comunista\" abrazando a los capitalistas—. Hu Jintao predicó la \"sociedad armoniosa\" y mantuvo una dirección colegiada y discreta. La sucesión ordenada (Deng→Jiang→Hu→Xi) se volvió norma. También se acumularon los costes: desigualdad, corrupción, daño ambiental. Ese es el consenso que Xi rompería.<\/p>\n<h3 id=\"c4-que-rompio-xi-jinping-desde-2012\">C4. ¿Qué rompió Xi Jinping desde 2012?<\/h3>\n<p>Recentralización en varios frentes: la <strong>campaña anticorrupción<\/strong> (limpieza real <em>y<\/em> purga de rivales a la vez); la <strong>eliminación de los límites de mandato<\/strong> de la presidencia (2018); el \"Pensamiento Xi Jinping\" inscrito en la Constitución (2017); la reafirmación del Partido sobre la economía y el sector privado; la seguridad elevada por encima del crecimiento; y una diplomacia asertiva (\"lobo guerrero\") que entierra el \"esconderse y esperar\". La <strong>purga militar de 2025–2026<\/strong> —cinco de los seis miembros de la Comisión Militar Central detenidos o desaparecidos— es la prueba más nítida del control personalizado del ejército. La interpretación se discute: ¿fortaleza (centralización decidida) o fragilidad (un líder que no se fía de nadie)?<\/p>\n<h3 id=\"c5-continuidad-o-ruptura\">C5. ¿Continuidad o ruptura?<\/h3>\n<p>Lo que <strong>no<\/strong> cambió: el monopolio del Partido, la fusión Partido-Estado, la legitimidad por desempeño más nacionalismo. Lo que <strong>sí<\/strong> cambió: de dirección colectiva a personal; de crecimiento primero a seguridad primero; de perfil bajo a asertividad; de sucesión institucionalizada a incertidumbre. Es decir, <strong>ruptura de estilo y prioridades dentro de la continuidad de la estructura<\/strong>. El equilibrio crítico: ni \"Xi es Mao otra vez\" (la economía sigue siendo de mercado y la sociedad es incomparablemente más abierta que bajo Mao) ni \"nada ha cambiado desde Deng\".<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Reforma y apertura (改革开放)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el giro iniciado en 1978 hacia el mercado y la inversión extranjera.<br><b class=\"mlbl\">Importancia:<\/b>  origen del ascenso económico chino.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginarlo como un plan maestro; fue experimentación gradual.<\/p>\n<\/li>\n<li>\n<p><strong>Zonas Económicas Especiales<\/strong><br><b class=\"mlbl\">Definición:<\/b>  enclaves (Shenzhen y otros) con reglas favorables al capital extranjero.<br><b class=\"mlbl\">Importancia:<\/b>  laboratorio del modelo exportador.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que se aplicaron de golpe a todo el país; fueron pruebas locales que se escalaron.<\/p>\n<\/li>\n<li>\n<p><strong>Liberalización económica sin democratización<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la fórmula post-Tiananmén: abrir la economía, cerrar la política.<br><b class=\"mlbl\">Importancia:<\/b>  desmiente la tesis occidental de que el mercado traería democracia.<br><b class=\"mlbl\">Error habitual:<\/b>  suponer que ambas van necesariamente unidas.<\/p>\n<\/li>\n<li>\n<p><strong>\"Esconderse y esperar\" (韬光养晦)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la máxima de Deng de mantener un perfil internacional bajo.<br><b class=\"mlbl\">Importancia:<\/b>  su abandono bajo Xi marca el giro asertivo.<br><b class=\"mlbl\">Error habitual:<\/b>  leer la asertividad actual como eterna; es reciente y deliberada.<\/p>\n<\/li>\n<li>\n<p><strong>Recentralización / culto al líder<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la concentración de poder en Xi desde 2012.<br><b class=\"mlbl\">Importancia:<\/b>  define la ruptura con el consenso de la era de reforma.<br><b class=\"mlbl\">Error habitual:<\/b>  confundirla con un retorno completo al maoísmo.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"China se hizo capitalista y abandonó el comunismo.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta:<\/strong> introdujo mercado, propiedad privada y empresarios.<\/li>\n<li><strong>Qué omite:<\/strong> el Partido nunca cedió el poder político; sigue controlando y, bajo Xi, ha reforzado su presencia en la economía. \"Comunista\" describe hoy el régimen de poder, no el sistema económico.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"China adoptó el mercado como herramienta sin renunciar al monopolio político del Partido: ni capitalismo liberal ni comunismo clásico.\" <em>(Se define en la Lección 5.)<\/em><\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>1978:<\/strong> III Pleno del XI Comité Central; inicio de la reforma y apertura. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>1980:<\/strong> Zona Económica Especial de Shenzhen, que pasó de aldea a metrópolis. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>4 de junio de 1989:<\/strong> represión de Tiananmén. <em>(Hecho comprobado; cifra de víctimas disputada y censurada.)<\/em><\/li>\n<li><strong>2001:<\/strong> ingreso en la OMC y \"Tres Representaciones\". <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>2018:<\/strong> eliminación de los límites de mandato de la presidencia estatal. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>2025–2026:<\/strong> purga militar; cinco de los seis miembros de la Comisión Militar Central caídos; más de 190 altos cuadros desde 2023; más de un millón de expedientes disciplinarios en 2025.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> Desde 2023, y con especial intensidad en <strong>2025–2026<\/strong>, Xi ha purgado la cúpula militar: en octubre de 2025 fueron expulsados del Partido el vicepresidente de la Comisión Militar Central He Weidong y el general Miao Hua; a comienzos de 2026 cayó el otro vicepresidente, Zhang Youxia. Analistas calculan que cerca de un centenar de altos oficiales han sido detenidos o han desaparecido, dejando la Comisión Militar Central prácticamente vaciada. En paralelo, la disciplina interna batió récords: más de un millón de expedientes en 2025. <em>(Fechas verificadas.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La recentralización y el culto al líder; la anticorrupción como herramienta simultánea de limpieza y de poder; la ruptura con la dirección colegiada de la era de reforma.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Revela la purga fortaleza (control total sobre el ejército) o fragilidad (inseguridad de un líder que elimina hasta a sus propios nombramientos)? Foreign Affairs habla de \"purga permanente\" y de una paradoja: cuanto más se concentra el poder, menos seguro se siente quien lo detenta.<\/p>\n<p><strong>Qué información falta.<\/strong> El efecto sobre la operatividad del EPL y sobre la planificación respecto a Taiwán; y si la purga desestabiliza el ya incierto problema de la sucesión.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un diagrama-línea de los cuatro líderes —Deng, Jiang, Hu, Xi— con el lema y la prioridad de cada era, para visualizar la bisagra de 2012. Como complemento geográfico, un mapa del gradiente de desarrollo costero (Shenzhen, Zhuhai, Shantou, Xiamen y luego Shanghái/Pudong) que muestre cómo la reforma avanzó de la costa hacia el interior. <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (10 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1976<\/strong> — Muere Mao.<\/li>\n<li><strong>1978<\/strong> — Comienza la reforma y apertura.<\/li>\n<li><strong>1980<\/strong> — Zona Económica Especial de Shenzhen.<\/li>\n<li><strong>1989<\/strong> — Tiananmén.<\/li>\n<li><strong>1992<\/strong> — Gira del Sur de Deng: relanza la reforma tras el parón post-Tiananmén.<\/li>\n<li><strong>2001<\/strong> — Ingreso en la OMC.<\/li>\n<li><strong>2012<\/strong> — Xi Jinping, secretario general.<\/li>\n<li><strong>2018<\/strong> — Se eliminan los límites de mandato presidencial.<\/li>\n<li><strong>2022<\/strong> — XX Congreso: tercer mandato de Xi.<\/li>\n<li><strong>2025–2026<\/strong> — Purgas militares.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Creer que la reforma fue un plan maestro de Deng.<\/strong> <em>Corrección:<\/em> fue experimentación descentralizada; el mérito fue permitir y escalar lo que funcionaba.<\/li>\n<li><strong>Creer que Xi es \"Mao 2.0\".<\/strong> <em>Corrección:<\/em> la economía sigue siendo de mercado y la sociedad es mucho más abierta que bajo Mao; hay recentralización política, no colectivización.<\/li>\n<li><strong>Creer que abrir la economía lleva inevitablemente a la democracia.<\/strong> <em>Corrección:<\/em> la historia desmintió esa expectativa occidental; el Partido separó deliberadamente lo económico de lo político.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si la legitimidad del Partido pasó de la ideología (Mao) al desempeño económico (Deng), ¿qué ocurre cuando el crecimiento se frena y Xi vuelve a poner la seguridad y el control por encima de la economía? ¿Está desplazando la base de la legitimidad —de la prosperidad al orgullo nacional y la seguridad— y a qué coste? <em>(Conecta con las Lecciones 1, 2 y 10.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué fueron las Zonas Económicas Especiales?<\/li>\n<li>¿Qué lección política sacó Deng de Tiananmén?<\/li>\n<li>¿Qué significó el ingreso en la OMC en 2001?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\nExplica por qué Deng concluyó \"apertura económica sí, apertura política no\" tras 1989 y el colapso soviético. Ordena la cadena de razonamiento.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"Xi ha devuelto a China al maoísmo.\"<\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma una noticia sobre una purga o una campaña anticorrupción y distingue qué parte es lucha real contra la corrupción y qué parte es consolidación de poder.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>Deng introdujo el mercado sin ceder el poder: liberalización económica sin democratización.<\/li>\n<li>Tiananmén (1989) fijó ese límite; la \"lección soviética\" lo reforzó.<\/li>\n<li>Jiang y Hu consolidaron el modelo exportador, la OMC y la dirección colegiada.<\/li>\n<li>Xi rompió el consenso: dirección personal, seguridad sobre crecimiento, asertividad exterior.<\/li>\n<li>La estructura (monopolio del Partido) no cambió; el estilo y las prioridades, sí.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 5.<\/strong> Si China tiene mercado pero el Partido manda por encima de todo, ¿qué tipo de sistema es exactamente: comunista, capitalista, otra cosa? La Lección 5 pone nombre.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre investigación académica, fuente primaria/oficial y análisis de actualidad.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Ezra Vogel, <em>Deng Xiaoping and the Transformation of China<\/em> — biografía canónica (simpatética; contrastar).<\/li>\n<li>Isabella Weber, <em>How China Escaped Shock Therapy<\/em> — la reforma como experimentación.<\/li>\n<li>Julian Gewirtz, <em>Unlikely Partners<\/em> y <em>Never Turn Back<\/em> — reformadores y límites de la reforma.<\/li>\n<li>Elizabeth Economy, <em>The Third Revolution<\/em>; Susan Shirk, <em>Overreach<\/em> — la era de Xi.<\/li>\n<li>Richard McGregor, <em>Xi Jinping: The Backlash<\/em>.<\/li>\n<\/ul>\n<p><strong>Fuente primaria / oficial<\/strong><\/p>\n<ul>\n<li>Informe al XX Congreso del PCCh (2022).<\/li>\n<li>Comunicados de la CCDI (comisión de disciplina) sobre las purgas.<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li><em>Foreign Affairs<\/em>, \"Xi's Forever Purge\".<\/li>\n<li><em>East Asia Forum<\/em>, \"Xi Jinping's forever war on corruption\"; Jamestown Foundation sobre las purgas del EPL.<\/li>\n<\/ul>\n<\/div><\/section><section class=\"sec t-plain\"><h2 id=\"-\">---<\/h2><div class=\"sec-body\">\n<\/div><\/section>", "text": "Lección 4 — De Deng a Xi: reforma, apertura y la nueva ruptura (1978–hoy) Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~23 min. Recorrido de la lección A Apertura B Modelo mental: dos eras con una bisagra C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Cómo introdujo China el mercado sin ceder el poder del Partido, y por qué la China de Xi rompe con el consenso de Deng? La escena. Dos imágenes separadas por cuarenta años. Años ochenta: Deng Xiaoping resume su filosofía con un proverbio —\"no importa que el gato sea blanco o negro, con tal de que cace ratones\"—; prima el crecimiento sobre la ideología, la dirección es colegiada, hay límites de mandato y la consigna exterior es \"esconderse y esperar\". Año 2026: Xi Jinping ha purgado a cinco de los seis miembros de la Comisión Militar Central, eliminó los límites de mandato en 2018 y ha concentrado el poder como nadie desde Mao. El mismo Partido, el estilo opuesto. Medir la distancia entre esas dos imágenes es entender la China de hoy. Idea clave El acierto de Deng fue introducir el mercado sin ceder el monopolio político del Partido: liberalización económica sin democratización . Durante unos treinta años eso cuajó en un consenso —crecimiento primero, liderazgo colectivo (no personal), sucesión ordenada, perfil internacional bajo—. Xi Jinping, desde 2012, ha roto buena parte de ese consenso: recentraliza el poder en su persona, subordina la economía a la seguridad y al control del Partido, y proyecta asertividad hacia fuera. La China actual no es la de Deng avanzando por inercia; es una ruptura parcial . B Modelo mental: dos eras con una bisagra Era de reforma (1978–2012): Deng → Jiang → Hu. Principios: pragmatismo, crecimiento, experimentación, dirección colegiada, \"esconderse y esperar\", integración en el mundo. Era de Xi (2012–hoy). Principios: recentralización, primacía del Partido y la seguridad sobre el crecimiento, culto al líder, asertividad exterior. La bisagra: lo que no cambió (el monopolio político del Partido, la fusión Partido-Estado) frente a lo que sí cambió (el estilo y las prioridades). Ante cualquier análisis de la China actual, pregúntese si describe la continuidad estructural o la ruptura de estilo: confundirlas es el error más común. C Desarrollo C1. ¿Qué hizo Deng distinto de Mao? Tras la muerte de Mao (1976), el país estaba agotado y era pobre. Deng lanzó en 1978 la \"reforma y apertura\", y lo hizo sin plano previo: experimentando (\"cruzar el río tanteando las piedras\"). Descolectivizó la agricultura (el \"sistema de responsabilidad familiar\"): al poder quedarse con lo que producían por encima de una cuota, los campesinos dispararon la producción. Creó Zonas Económicas Especiales (Shenzhen, 1980) para atraer inversión extranjera, permitió la empresa privada y toleró que \"enriquecerse fuera glorioso\". Pero mantuvo intacto el monopolio político del Partido. Mecanismo: la legitimidad se desplazó de la ideología y el carisma (Mao) al desempeño —entregar prosperidad—, el eco del Mandato del Cielo de la Lección 1. C2. ¿Por qué Tiananmén marcó el límite? En 1989, protestas por reformas políticas, contra la corrupción y la inflación ocuparon la plaza de Tiananmén. El 4 de junio fueron aplastadas por el ejército. La lección que Deng extrajo fue explícita: apertura económica, sí; apertura política, no. Ahí nace la fórmula que define al sistema hasta hoy. Y hay un segundo aprendizaje: Deng observó cómo la URSS se abría políticamente ( glasnost ) y se hundía, y sacó la conclusión inversa —la \"lección soviética\" que ya vimos en la Lección 3—. Reformar la economía para salvar al Partido; jamás lo contrario. C3. ¿Qué fue la era de Jiang y Hu (1989–2012)? El \"esconderse y esperar\" dio frutos. China ingresó en la OMC (2001) y se convirtió en la fábrica del mundo; se formalizó la \"economía socialista de mercado\" (1993); y con la teoría de las \"Tres Representaciones\" (2001) Jiang Zemin permitió que los empresarios ingresaran en el Partido —un giro ideológico enorme: el partido \"comunista\" abrazando a los capitalistas—. Hu Jintao predicó la \"sociedad armoniosa\" y mantuvo una dirección colegiada y discreta. La sucesión ordenada (Deng→Jiang→Hu→Xi) se volvió norma. También se acumularon los costes: desigualdad, corrupción, daño ambiental. Ese es el consenso que Xi rompería. C4. ¿Qué rompió Xi Jinping desde 2012? Recentralización en varios frentes: la campaña anticorrupción (limpieza real y purga de rivales a la vez); la eliminación de los límites de mandato de la presidencia (2018); el \"Pensamiento Xi Jinping\" inscrito en la Constitución (2017); la reafirmación del Partido sobre la economía y el sector privado; la seguridad elevada por encima del crecimiento; y una diplomacia asertiva (\"lobo guerrero\") que entierra el \"esconderse y esperar\". La purga militar de 2025–2026 —cinco de los seis miembros de la Comisión Militar Central detenidos o desaparecidos— es la prueba más nítida del control personalizado del ejército. La interpretación se discute: ¿fortaleza (centralización decidida) o fragilidad (un líder que no se fía de nadie)? C5. ¿Continuidad o ruptura? Lo que no cambió: el monopolio del Partido, la fusión Partido-Estado, la legitimidad por desempeño más nacionalismo. Lo que sí cambió: de dirección colectiva a personal; de crecimiento primero a seguridad primero; de perfil bajo a asertividad; de sucesión institucionalizada a incertidumbre. Es decir, ruptura de estilo y prioridades dentro de la continuidad de la estructura . El equilibrio crítico: ni \"Xi es Mao otra vez\" (la economía sigue siendo de mercado y la sociedad es incomparablemente más abierta que bajo Mao) ni \"nada ha cambiado desde Deng\". D Conceptos imprescindibles Reforma y apertura (改革开放) Definición: el giro iniciado en 197"}, {"id": "Leccion05_Es_China_comunista", "group": "II · Cómo funciona el sistema", "badge": "5", "title": "¿Es China comunista?", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~21 min.", "readmin": 21, "color": "#4f46e5", "html": "<div class=\"doc-head\"><h1 id=\"leccion-5-es-china-comunista-tipologia-del-sistema\">Lección 5 — ¿Es China comunista? Tipología del sistema<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque II — Cómo funciona el sistema. Lectura: ~21 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: tres niveles — Partido / Estado / Mercado<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Qué tipo de sistema político y económico es realmente China?<\/p><\/aside>\n<p><strong>La escena.<\/strong> El 17 de febrero de 2025, Xi Jinping —líder del Partido Comunista— se sentó con los empresarios privados más ricos de China, entre ellos Jack Ma, el fundador de Alibaba al que el propio Estado había humillado en 2020, para tranquilizarlos. Semanas después, la Asamblea Nacional Popular aprobó una <strong>Ley de Promoción de la Economía Privada<\/strong> que garantiza los derechos de propiedad de las empresas privadas. Un partido comunista legislando para proteger el capital privado. ¿Es esto comunismo? ¿Capitalismo? La respuesta es que ninguna etiqueta simple funciona, y ese es justamente el punto.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>China se define como una \"economía socialista de mercado\". Ese oxímoron es honesto: el sistema combina de verdad el monopolio leninista del poder por un partido con una economía mayoritariamente de mercado y un enorme sector privado, más objetivos nacionalistas y desarrollistas. Ninguna etiqueta única —comunista, capitalista— lo describe. La pregunta productiva no es \"¿qué etiqueta?\", sino \"¿cómo encajan las piezas y quién decide?\".<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: tres niveles — Partido / Estado / Mercado<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>Partido (arriba):<\/strong> monopoliza el poder político, fija las reglas y las prioridades, y está <em>dentro<\/em> del Estado y de las grandes empresas.<\/li>\n<li><strong>Estado (en medio):<\/strong> administra; posee empresas estratégicas y bancos; ejecuta la política del Partido.<\/li>\n<li><strong>Mercado (abajo, pero enorme):<\/strong> asigna la mayoría de los recursos; el sector privado genera la mayor parte del empleo y la innovación; pero opera bajo permiso y vigilancia del Partido.<\/li>\n<\/ul>\n<p><strong>Cómo se usa el modelo.<\/strong> Imagine una economía de mercado funcionando <em>dentro<\/em> de una carcasa política leninista. El Partido no gestiona cada empresa, pero fija los límites e interviene cuando quiere. La fórmula para recordar: <strong>el mercado asigna; el Partido dispone.<\/strong><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-que-significa-economia-socialista-de-mercado\">C1. ¿Qué significa \"economía socialista de mercado\"?<\/h3>\n<p>Es el término oficial desde 1992–93. \"Mercado\", para asignar recursos y generar crecimiento; \"socialista\", por el control del Partido, la propiedad pública de los sectores estratégicos y la afirmación de que todo ello sirve a fines colectivos. La clave está en el enfoque de Deng: el mercado es una <strong>herramienta<\/strong>, no una ideología (\"la planificación y el mercado son ambos instrumentos\"). No hay que tomarlo como una contradicción a resolver, sino como una descripción de un híbrido real.<\/p>\n<h3 id=\"c2-por-que-permite-propiedad-privada-y-capitalistas\">C2. ¿Por qué permite propiedad privada y capitalistas?<\/h3>\n<p>Porque funciona. El propio Partido resume el peso del sector privado con la fórmula \"<strong>56789<\/strong>\": más del 50 % de los ingresos fiscales, en torno al 60 % del PIB, el 70 % de la innovación, el 80 % del empleo urbano y el 90 % del número de empresas (cifras oficiales aproximadas). Desde 2001 los empresarios pueden militar en el Partido. Pero el permiso es <strong>condicional<\/strong>: el freno regulatorio a las tecnológicas de 2020–21 (con la salida a bolsa de Ant Group suspendida y Alibaba multada) demostró que el Partido puede disciplinar al capital que se vuelve demasiado autónomo o políticamente incómodo. Y el giro de 2025 muestra que vuelve a cortejarlo cuando necesita crecimiento. <strong>Mecanismo:<\/strong> el capital es instrumental, no soberano.<\/p>\n<h3 id=\"c3-que-papel-conserva-el-estado\">C3. ¿Qué papel conserva el Estado?<\/h3>\n<p>Las \"alturas dominantes\" de la economía: las empresas estatales dominan sectores estratégicos (energía, banca, telecomunicaciones, ferrocarril); los bancos públicos dirigen el crédito; el suelo es de propiedad estatal o colectiva; y los planes quinquenales y la política industrial orientan la inversión. No es, por tanto, <em>laissez-faire<\/em>. <em>(La mecánica detallada se ve en la Lección 9; aquí basta con retener que el Estado conserva las palancas.)<\/em><\/p>\n<h3 id=\"c4-que-etiquetas-conviven\">C4. ¿Qué etiquetas conviven?<\/h3>\n<p>Cuatro lógicas operan a la vez:<\/p>\n<ul>\n<li><strong>Capitalista:<\/strong> mercado, propiedad privada, ánimo de lucro, competencia.<\/li>\n<li><strong>Socialista/leninista:<\/strong> monopolio del Partido, propiedad pública estratégica, planificación.<\/li>\n<li><strong>Nacionalista:<\/strong> poder y estatus nacional, superación de la humillación (Lección 2).<\/li>\n<li><strong>Desarrollista:<\/strong> el modelo del Estado que dirige el desarrollo (como Japón o Corea del Sur en su día), pero con un partido leninista al mando.\nNinguna de las cuatro, por separado, describe el conjunto.<\/li>\n<\/ul>\n<h3 id=\"c5-por-que-ninguna-etiqueta-simple-funciona\">C5. ¿Por qué ninguna etiqueta simple funciona?<\/h3>\n<p>\"Comunista\" es cierto del <strong>régimen político<\/strong> (partido leninista que monopoliza el poder, marxismo oficial) y falso de la <strong>economía<\/strong> (mayoritariamente de mercado). \"Capitalista\" es cierto de la mecánica económica y falso de quién detenta el poder último. El error consiste en dar por hecho que la economía y la política deben compartir la misma etiqueta. En China, deliberadamente, no la comparten. La mejor descripción es funcional: <strong>un Estado-partido leninista que dirige una economía de mercado<\/strong>, o bien la propia fórmula oficial —\"economía socialista de mercado\"— tomada en serio como híbrido.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Economía socialista de mercado<\/strong><br><b class=\"mlbl\">Definición:<\/b>  término oficial para el híbrido de control del Partido y asignación por el mercado.<br><b class=\"mlbl\">Importancia:<\/b>  describe el sistema mejor que \"comunista\" o \"capitalista\".<br><b class=\"mlbl\">Error habitual:<\/b>  tomarlo por mera propaganda; describe una realidad híbrida.<\/p>\n<\/li>\n<li>\n<p><strong>Estado-partido (party-state)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  la fusión de Partido y Estado en una sola estructura de poder.<br><b class=\"mlbl\">Importancia:<\/b>  explica por qué el Partido está <em>dentro<\/em> de todo, no fuera.<br><b class=\"mlbl\">Error habitual:<\/b>  imaginar un Estado y un Partido separados como en Occidente.<\/p>\n<\/li>\n<li>\n<p><strong>Leninismo vs. marxismo<\/strong><br><b class=\"mlbl\">Definición:<\/b>  leninismo = monopolio del partido sobre el poder; marxismo = doctrina sobre la economía.<br><b class=\"mlbl\">Importancia:<\/b>  China conserva el leninismo (poder) aunque haya abandonado el marxismo económico clásico.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que abandonar la economía planificada implica abandonar el leninismo político.<\/p>\n<\/li>\n<li>\n<p><strong>Empresas estatales (SOEs) / \"alturas dominantes\"<\/strong><br><b class=\"mlbl\">Definición:<\/b>  grandes empresas públicas que controlan sectores estratégicos.<br><b class=\"mlbl\">Importancia:<\/b>  la palanca económica directa del Estado.<br><b class=\"mlbl\">Error habitual:<\/b>  pensar que son residuales; siguen siendo centrales.<\/p>\n<\/li>\n<li>\n<p><strong>Capitalismo de Estado / Estado desarrollista<\/strong><br><b class=\"mlbl\">Definición:<\/b>  etiquetas que subrayan el papel dirigente del Estado en el desarrollo.<br><b class=\"mlbl\">Importancia:<\/b>  capturan una parte del sistema.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que lo explican todo; ignoran el mercado privado real y la competencia.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"Hay que elegir entre llamar a China comunista o capitalista.\"<\/p>\n<ol>\n<li><strong>Qué parte es cierta en cada opción:<\/strong> el régimen político es leninista (\"comunista\"); la economía es mayoritariamente de mercado (\"capitalista\").<\/li>\n<li><strong>Qué omite:<\/strong> que política y economía no tienen por qué compartir etiqueta; el sistema es un híbrido deliberado.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"China es un Estado-partido leninista que dirige una economía de mercado con un gran sector privado y un Estado propietario de las alturas estratégicas.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>1992–93:<\/strong> adopción oficial de la \"economía socialista de mercado\". <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>2001:<\/strong> \"Tres Representaciones\"; empresarios admitidos en el Partido. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Sector privado:<\/strong> fórmula oficial \"56789\" (≈50 % de impuestos, 60 % del PIB, 70 % de la innovación, 80 % del empleo urbano, 90 % de las empresas). <em>(Cifras oficiales aproximadas.)<\/em><\/li>\n<li><strong>2020–21:<\/strong> freno regulatorio a las tecnológicas; salida a bolsa de Ant Group suspendida; multa a Alibaba. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>17 de febrero de 2025:<\/strong> simposio de Xi con empresarios privados; reaparición de Jack Ma.<\/li>\n<li><strong>30 de abril de 2025:<\/strong> aprobación de la Ley de Promoción de la Economía Privada (en vigor el 20 de mayo de 2025).<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> Tras el freno regulatorio de 2020–21, la confianza del sector privado se desplomó y la economía se resintió. El <strong>17 de febrero de 2025<\/strong>, Xi reunió a los grandes empresarios —con la reaparición pública de Jack Ma como señal— para transmitir apoyo; el <strong>30 de abril de 2025<\/strong> se aprobó la primera <strong>Ley de Promoción de la Economía Privada<\/strong>, que promete igualdad de trato, protección de la propiedad y acceso justo al mercado para las empresas privadas. <em>(Fechas verificadas.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La \"economía socialista de mercado\"; el carácter instrumental del capital; la relación Partido-empresa privada.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Es una protección jurídica sincera o una tranquilización táctica para reanimar una economía en apuros? Y una pregunta de fondo: ¿puede una ley vincular a un partido que está <em>por encima<\/em> de la ley?<\/p>\n<p><strong>Qué información falta.<\/strong> Si los empresarios recuperan de verdad la confianza (lo dirán los datos de inversión privada de 2025–2026), o si la desconfianza sembrada en 2020 pesa más que la ley de 2025.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Recurso recomendado (a elaborar).<\/strong> Un diagrama de la pirámide de tres niveles (Partido / Estado / Mercado) con flechas de control descendente, y una tabla de \"quién posee qué\" por sector: estratégico (estatal) frente a consumo y tecnología (privado bajo supervisión). <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (7 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1978<\/strong> — Comienza la reforma; el mercado entra como herramienta.<\/li>\n<li><strong>1992<\/strong> — Gira del Sur de Deng; se consagra la \"economía socialista de mercado\".<\/li>\n<li><strong>2001<\/strong> — OMC y \"Tres Representaciones\".<\/li>\n<li><strong>2013<\/strong> — El Partido proclama el \"papel decisivo del mercado\" y, a la vez, \"empresas estatales más fuertes\".<\/li>\n<li><strong>2020–2021<\/strong> — Freno a las tecnológicas; \"prosperidad común\".<\/li>\n<li><strong>2025<\/strong> — Ley de Promoción de la Economía Privada.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Asumir que \"comunista\" describe la economía.<\/strong> <em>Corrección:<\/em> describe el régimen de poder, no cómo se asignan los recursos (eso lo hace sobre todo el mercado).<\/li>\n<li><strong>Creer que un gran sector privado significa que el Partido soltó el control.<\/strong> <em>Corrección:<\/em> puede intervenir cuando quiera; 2020–21 lo demostró.<\/li>\n<li><strong>Creer que \"capitalismo de Estado\" lo explica todo.<\/strong> <em>Corrección:<\/em> capta una parte, pero ignora el mercado privado real y la competencia feroz entre empresas y regiones.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><spa
