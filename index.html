<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entender China en 2026 · Mini-curso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f3ec; --surface:#fffdf8; --surface-2:#efebe1; --paper:#fbf9f3;
  --ink:#211d15; --muted:#75705f; --line:#e3ded0;
  --accent:#b23327; --accent-2:#8c2015; --accent-soft:#f6e6e2;
  --gold:#a9852f;
  --sans:'Figtree',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --serif:'Newsreader',Georgia,serif;
  --sb:330px; --tb:62px; --maxw:920px; --c:#b23327; --block:#b23327;
}
html[data-theme="dark"]{
  --bg:#14110c; --surface:#1c1913; --surface-2:#272219; --paper:#191610;
  --ink:#ece6d8; --muted:#a69d8a; --line:#332d21;
  --accent:#e06a5c; --accent-2:#ef8b7d; --accent-soft:rgba(224,106,92,.14);
  --gold:#cfa84e;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.65;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent-soft)}

/* ── chrome ─────────────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--tb);z-index:50;display:flex;align-items:center;gap:14px;
  padding:0 20px;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:saturate(1.3) blur(14px);
  border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:-.01em;cursor:pointer;white-space:nowrap}
.brand .seal{width:32px;height:32px;border-radius:7px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
  color:#fff;display:grid;place-items:center;font-family:var(--serif);font-weight:500;font-size:19px;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.28),0 2px 6px rgba(140,32,21,.3)}
.brand small{color:var(--muted);font-weight:500;font-size:12.5px}
.spacer{flex:1}
.search{position:relative;display:flex;align-items:center;max-width:400px;flex:1}
.search input{width:100%;height:40px;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:11px;padding:0 60px 0 36px;font-family:var(--sans);font-size:14px;outline:none;transition:.15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search>svg{position:absolute;left:12px;width:16px;height:16px;color:var(--muted)}
.search kbd{position:absolute;right:10px;font-family:var(--sans);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 6px;background:var(--surface-2)}
.sr{position:absolute;top:46px;left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;
  box-shadow:0 18px 50px rgba(30,20,10,.18);overflow:hidden;display:none;max-height:min(60vh,480px);overflow-y:auto}
.sr.open{display:block}
.sr a{display:block;padding:11px 15px;border-bottom:1px solid var(--line);color:var(--ink)}
.sr a:last-child{border-bottom:none}
.sr a:hover,.sr a.sel{background:var(--surface-2);text-decoration:none}
.sr .st{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.sr .st span{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--sc,var(--accent))}
.sr .sn{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.45}
.sr mark{background:var(--accent-soft);color:var(--accent-2);border-radius:3px;padding:0 1px}
.sr .empty{padding:14px 16px;font-size:13px;color:var(--muted)}
.iconbtn{width:40px;height:40px;flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:11px;display:grid;place-items:center;cursor:pointer}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}
#menuBtn{display:none}
.progress{position:fixed;top:var(--tb);left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0;z-index:60;transition:width .1s linear}

/* ── sidebar ────────────────────────────── */
.sidebar{position:fixed;top:var(--tb);bottom:0;left:0;width:var(--sb);overflow-y:auto;
  background:var(--paper);border-right:1px solid var(--line);padding:14px 14px 60px}
.side-prog{margin:4px 8px 14px;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface)}
.side-prog .l{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px}
.side-prog .l b{color:var(--accent)}
.side-prog .bar{height:5px;border-radius:99px;background:var(--surface-2);overflow:hidden}
.side-prog .bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .4s ease}
.grp{margin:18px 8px 7px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.nav a{display:flex;align-items:center;gap:12px;padding:8px 11px;border-radius:10px;color:var(--ink);
  font-size:14.5px;line-height:1.32;margin:1px 0;border:1px solid transparent}
.nav a:hover{background:var(--surface-2);text-decoration:none}
.nav a.active{background:color-mix(in srgb,var(--b) 11%,transparent);border-color:color-mix(in srgb,var(--b) 32%,transparent);color:var(--b);font-weight:600}
.badge{flex:0 0 auto;width:27px;height:27px;border-radius:8px;display:grid;place-items:center;
  font-size:12.5px;font-weight:700;background:color-mix(in srgb,var(--b,#888) 14%,var(--surface-2));color:var(--b,var(--muted));font-variant-numeric:tabular-nums}
.nav a.active .badge,.nav a.key .badge{background:var(--b);color:#fff}
.nav .tt{flex:1;min-width:0}
.nav .rt{font-size:11px;color:var(--muted);flex:0 0 auto}
.nav a.read .rt{color:#3f8f4f;font-weight:800}

/* ── layout ─────────────────────────────── */
.wrap{margin-left:var(--sb);padding-top:var(--tb)}
.main{max-width:var(--maxw);margin:0 auto;padding:34px 28px 100px}

/* ── documento (idéntico al original, tipografía afinada) ── */
.doc-head h1{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.1;letter-spacing:-.015em;margin:.1em 0 .28em}
.doc-meta{font-family:var(--sans);font-size:12.5px;color:var(--muted);background:var(--surface-2);
  display:inline-block;padding:6px 12px;border-radius:8px;margin:.1em 0 .3em;line-height:1.5}
.doc-head > p{font-family:var(--sans);font-size:20px}
.content{font-family:var(--sans);font-size:20px;line-height:1.8;--c:var(--block)}
.content em{font-style:normal;font-weight:600}
.sec-body>p,.doc-head>p{max-width:80ch}
.block-tag{display:inline-block;font-family:var(--sans);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  color:#fff;background:var(--block);padding:5px 12px;border-radius:20px;margin:0 0 10px}
.lesson-map{margin:8px 0 24px;border:1px solid color-mix(in srgb,var(--block) 22%,var(--line));
  background:color-mix(in srgb,var(--block) 5%,var(--surface));border-radius:16px;padding:15px 17px}
.lm-h{display:block;font-family:var(--sans);font-size:11.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--block);margin-bottom:10px}
.lm-chips{display:flex;flex-wrap:wrap;gap:8px}
.lm-chip{font-family:var(--sans);font-size:13.5px;font-weight:500;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:22px;padding:5px 12px 5px 6px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.lm-chip b{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:6px;
  background:color-mix(in srgb,var(--block) 16%,var(--surface));color:var(--block);font-size:11.5px;font-weight:800}
.lm-chip:hover{border-color:var(--block);color:var(--block);background:color-mix(in srgb,var(--block) 6%,var(--surface))}
.sec{margin:32px 0;scroll-margin-top:78px}
.sec-h{display:flex;align-items:center;gap:17px;margin:0 0 15px}
.sec-badge{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--c);color:#fff;
  font-family:var(--serif);font-weight:600;font-size:19px;display:grid;place-items:center}
.sec-tt{font-family:var(--serif);font-size:27px;font-weight:500;line-height:1.15}
.sec-body>p:first-child{margin-top:0}
.sec-body>p,.sec-body>ul,.sec-body>ol{margin:.55em 0 .8em}
.content p{margin:.55em 0}
.content ul,.content ol{margin:.4em 0 .7em;padding-left:1.25em}
.content li{margin:.3em 0}
.content strong{font-weight:700}
.content hr{border:none;border-top:1px solid var(--line);margin:1.4em 0}
.content h2{font-family:var(--serif);font-weight:500;font-size:24px;letter-spacing:-.01em;margin:1.5em 0 .45em;padding-top:.3em;border-top:1px solid var(--line)}
.doc-head > h2:first-of-type,.content > .doc-head h2{border-top:none}
.content h3{font-family:var(--sans);font-weight:700;font-size:16.5px;letter-spacing:-.01em;margin:1.35em 0 .3em;color:var(--ink)}
.content code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.84em;background:var(--surface-2);padding:.1em .4em;border-radius:5px}
.content pre{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:15px;overflow-x:auto;font-size:12px;line-height:1.45}
.content pre code{background:none;padding:0}
.content blockquote{margin:1em 0;padding:.5em 1.1em;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 10px 10px 0;font-size:.96em}
.content blockquote p{margin:.3em 0}
.t-modelo .sec-body,.t-mito .sec-body,.t-caso .sec-body,.t-pensar .sec-body{
  background:color-mix(in srgb,var(--c) 7%,var(--surface));
  border:1px solid color-mix(in srgb,var(--c) 22%,var(--line));border-radius:16px;padding:6px 20px 14px}
.t-mapa .sec-body{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:6px 20px 14px}
.cal{margin:16px 0;border-radius:14px;padding:15px 18px;position:relative}
.cal-l{display:block;font-family:var(--sans);font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px}
.cal p{margin:.2em 0}
.c-idea{background:color-mix(in srgb,var(--block) 10%,var(--surface));border:1px solid color-mix(in srgb,var(--block) 30%,var(--line))}
.c-idea .cal-l{color:var(--block)}
.c-idea p{font-family:var(--sans);font-size:20px;line-height:1.62;font-weight:500}
.c-preg{background:color-mix(in srgb,var(--block) 8%,var(--surface));border:1px solid color-mix(in srgb,var(--block) 30%,var(--line))}
.c-preg .cal-l{color:var(--block)}
.c-preg p{font-family:var(--sans);font-size:20.5px;line-height:1.5;font-weight:600}
.c-sum{background:color-mix(in srgb,var(--block) 8%,var(--surface));border:1px solid color-mix(in srgb,var(--block) 28%,var(--line))}
.c-sum .cal-l{color:var(--block)}
.c-sum ol{margin:.2em 0 0;padding-left:0;list-style:none;counter-reset:s}
.c-sum ol li{counter-increment:s;position:relative;padding:7px 0 7px 40px;border-top:1px solid color-mix(in srgb,var(--block) 14%,var(--line));font-size:19px}
.c-sum ol li:first-child{border-top:none}
.c-sum ol li::before{content:counter(s);position:absolute;left:0;top:7px;width:26px;height:26px;border-radius:8px;
  background:var(--block);color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;display:grid;place-items:center}
.t-conceptos .sec-body>ol{list-style:none;padding:0;margin:0;display:grid;gap:12px;counter-reset:cc}
.t-conceptos .sec-body>ol>li{counter-increment:cc;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:14px 16px 14px 52px;position:relative;margin:0}
.t-conceptos .sec-body>ol>li::before{content:counter(cc);position:absolute;left:14px;top:14px;width:26px;height:26px;
  border-radius:8px;background:color-mix(in srgb,var(--c) 14%,var(--surface));color:var(--c);
  font-family:var(--sans);font-weight:800;font-size:13px;display:grid;place-items:center}
.t-conceptos .sec-body>ol>li>strong:first-child{display:block;font-family:var(--serif);font-size:19.5px;margin-bottom:3px}
.mlbl{font-family:var(--sans);font-size:12px;font-weight:700;color:var(--c)}
.t-evidencias .sec-body>ul{list-style:none;padding:0;display:grid;gap:7px}
.t-evidencias .sec-body>ul>li{position:relative;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--line);border-radius:10px;font-size:.95em}
.t-evidencias .sec-body>ul>li::before{content:"✓";position:absolute;left:11px;top:8px;color:#15803d;font-weight:800}
.t-evidencias em{font-family:var(--sans);font-style:normal;font-size:11.5px;color:var(--muted);background:var(--surface-2);padding:1px 7px;border-radius:20px;white-space:nowrap}
.t-errores .sec-body>ol{list-style:none;padding:0;display:grid;gap:8px;counter-reset:e}
.t-errores .sec-body>ol>li{counter-increment:e;position:relative;padding:10px 14px 10px 38px;
  background:color-mix(in srgb,#be123c 5%,var(--surface));border:1px solid color-mix(in srgb,#be123c 18%,var(--line));border-radius:11px}
.t-errores .sec-body>ol>li::before{content:"✕";position:absolute;left:13px;top:10px;color:#be123c;font-weight:800}
.t-caso .sec-body>p>strong:first-child{color:var(--c)}
.t-pensar .sec-body{font-family:var(--sans)}
.t-pensar .sec-body p{font-size:19px;font-weight:500}
.t-fuentes .sec-body{font-family:var(--sans);font-size:14px;color:var(--muted)}
.t-fuentes .sec-body strong{color:var(--ink)}
.anexo{margin:26px 0 0;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);overflow:hidden}
.anexo>summary{cursor:pointer;padding:12px 16px;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--muted);list-style:none}
.anexo>summary::before{content:"▸ ";color:var(--accent)}
.anexo[open]>summary::before{content:"▾ "}
.anexo .sec-body{padding:0 18px 14px;font-family:var(--sans);font-size:13.5px}
.anexo h2{font-family:var(--sans);font-weight:700;font-size:13.5px;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);border:none;margin:16px 0 5px;padding:0}
.anexo h3{font-size:13px;margin:10px 0 3px}
.anexo table{font-size:12.5px}
.content table{border-collapse:separate;border-spacing:0;width:100%;margin:1.1em 0;font-family:var(--sans);font-size:14px;
  display:block;overflow-x:auto;border:1px solid var(--line);border-radius:12px}
.content th,.content td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}
.content tr td:last-child,.content tr th:last-child{border-right:none}
.content tbody tr:last-child td{border-bottom:none}
.content th{background:var(--surface-2);font-weight:700}
.content tbody tr:nth-child(even) td{background:color-mix(in srgb,var(--surface-2) 45%,transparent)}
.glos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-top:14px}
.glos-grid p{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:0;font-size:15.5px;line-height:1.55}
.glos-grid p strong:first-child{color:var(--accent-2)}

/* ── home ───────────────────────────────── */
.hero{position:relative;padding:30px 0 10px;overflow:visible}
.hanzi{position:absolute;top:-10px;right:-6px;writing-mode:vertical-rl;font-family:var(--serif);
  font-size:120px;line-height:1.06;color:color-mix(in srgb,var(--accent) 9%,transparent);
  letter-spacing:.12em;user-select:none;pointer-events:none;font-weight:500}
.hero-seal{position:absolute;right:8px;top:300px;width:52px;height:52px;border-radius:9px;
  background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;display:grid;place-items:center;
  font-family:var(--serif);font-size:30px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.3),0 6px 18px rgba(140,32,21,.35);
  transform:rotate(-4deg)}
.eyebrow{font-family:var(--sans);font-size:12.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:26px;height:2px;background:var(--accent)}
.hero h1{font-family:var(--serif);font-weight:500;font-size:clamp(44px,5.4vw,68px);line-height:1.02;letter-spacing:-.02em;margin:.2em 0 .08em;max-width:12ch}
.hero .sub{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--muted);font-weight:400;margin-bottom:.7em}
.hero p.lead{font-family:var(--sans);font-size:19.5px;line-height:1.68;max-width:58ch}
.stats{display:flex;flex-wrap:wrap;gap:0 34px;margin:22px 0 4px;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat b{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--ink)}
.stat span{display:block;font-size:11.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin:22px 0 4px}
.chip{font-family:var(--sans);font-size:14px;font-weight:600;padding:10px 17px;border-radius:999px;border:1px solid var(--line);background:var(--surface);cursor:pointer;color:var(--ink);transition:.15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.solid{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 16px rgba(140,32,21,.25)}
.chip.solid:hover{color:#fff;filter:brightness(1.07)}
.resume{display:flex;align-items:center;gap:14px;margin:26px 0 0;padding:14px 17px;border:1px solid color-mix(in srgb,var(--gold) 40%,var(--line));
  background:color-mix(in srgb,var(--gold) 7%,var(--surface));border-radius:14px;cursor:pointer;transition:.15s}
.resume:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(30,20,10,.1)}
.resume .rz{width:38px;height:38px;border-radius:10px;background:var(--gold);color:#fff;display:grid;place-items:center;flex:0 0 auto}
.resume .rl{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.resume .rtt{font-family:var(--serif);font-size:18px}
.h-sec{margin:44px 0 0}
.h-sec>h2{font-family:var(--serif);font-weight:500;font-size:30px;letter-spacing:-.01em;margin:0 0 4px;display:flex;align-items:baseline;gap:12px}
.h-sec>h2 small{font-family:var(--sans);font-size:12.5px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.h-sec>.hs-sub{font-size:14.5px;color:var(--muted);margin:0 0 18px}
.blocks{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.blk{border:1px solid var(--line);background:var(--surface);border-radius:18px;overflow:hidden;
  border-top:3px solid var(--bc);transition:.18s}
.blk:hover{box-shadow:0 16px 40px rgba(30,20,10,.09);transform:translateY(-3px)}
.blk-h{display:flex;align-items:center;gap:13px;padding:15px 17px 11px}
.blk-h .rn{font-family:var(--serif);font-size:30px;font-weight:500;color:var(--bc);width:44px;flex:0 0 auto;line-height:1}
.blk-h h3{font-family:var(--serif);font-weight:500;font-size:19.5px;margin:0;line-height:1.2}
.blk-h .bk{display:block;font-family:var(--sans);font-size:10.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--bc)}
.blk ul{list-style:none;margin:0;padding:4px 8px 10px}
.blk li a{display:flex;align-items:center;gap:11px;padding:8px 9px;border-radius:10px;color:var(--ink);font-size:14.5px;line-height:1.3}
.blk li a:hover{background:color-mix(in srgb,var(--bc) 7%,transparent);text-decoration:none;color:var(--bc)}
.blk li a b{flex:0 0 auto;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:800;
  background:color-mix(in srgb,var(--bc) 13%,var(--surface-2));color:var(--bc)}
.blk li a .lt{flex:1;min-width:0}
.blk li a .lm{font-size:11px;color:var(--muted);flex:0 0 auto}

<script>const DOCS = [{"id": "00_Introduccion_general", "group": "Introducción", "badge": "★", "title": "Introducción general", "kind": "plain", "meta": "Mini-curso en 12 lecciones. Última actualización: 13 de julio de 2026.", "readmin": 4, "color": "#0f766e", "html": "<div class=\"doc-head\"><h1 id=\"entender-la-china-actual-historia-poder-economia-y-futuro\">Entender China en 2026: historia, poder, economía y futuro<\/h1>\n<\/div><section class=\"sec t-plain\"><h2 id=\"introduccion-general\">Introducción general<\/h2><div class=\"sec-body\">\n<p><em>Mini-curso en 12 lecciones. Última actualización: 13 de julio de 2026.<\/em><\/p>\n<hr>\n<h3 id=\"para-que-sirve-este-curso\">Para qué sirve este curso<\/h3>\n<p>No para acumular datos sobre China, sino para <strong>construir un modelo mental<\/strong> que permita interpretar por cuenta propia las noticias, los debates y los conflictos que la rodean. La pregunta que lo guía es una sola:<\/p>\n<blockquote>\n<p><strong>¿Cómo funciona realmente China y por qué actúa como actúa?<\/strong><\/p>\n<\/blockquote>\n<p>Al terminar, el objetivo no es que le expliquen China, sino que pueda leer un titular sobre Taiwán, una purga militar, una crisis inmobiliaria o un veto a las tierras raras y entender qué está en juego, quién decide y qué se está omitiendo.<\/p>\n<h3 id=\"para-quien-es\">Para quién es<\/h3>\n<p>Para adultos y estudiantes sin conocimientos previos, interesados en historia, política, economía y relaciones internacionales. Lectores inteligentes, no especialistas. El nivel es accesible pero no superficial; riguroso pero sin jerga innecesaria.<\/p>\n<h3 id=\"como-esta-construido\">Cómo está construido<\/h3>\n<p>Doce lecciones de entre 15 y 25 minutos, cada una legible de forma independiente pero encadenada con las demás. Todas siguen la misma estructura: una escena que engancha, un modelo mental sencillo, el desarrollo, los conceptos imprescindibles, un mito que se corrige, evidencias fechadas, un caso actual, errores habituales, preguntas para pensar y comprobar, y fuentes. Los casos actuales están fechados a propósito: caducan, y conviene saberlo.<\/p>\n<p><strong>El mapa de las doce lecciones:<\/strong><\/p>\n<p><em>Bloque I — Marco e historia<\/em><\/p>\n<ol>\n<li>China no es (solo) un Estado-nación: cómo mirarla sin las gafas equivocadas.<\/li>\n<li>El siglo de la humillación (1839–1949).<\/li>\n<li>Mao: unificar, transformar y destruir (1949–1976).<\/li>\n<li>De Deng a Xi: reforma, apertura y la nueva ruptura (1978–hoy).<\/li>\n<\/ol>\n<p><em>Bloque II — Cómo funciona el sistema<\/em><\/p>\n<ol start=\"5\">\n<li>¿Es China comunista? Tipología del sistema.<\/li>\n<li>¿Quién manda realmente? Estructura de poder e instituciones.<\/li>\n<li>Estado y sociedad: control, consentimiento y contrato social.<\/li>\n<\/ol>\n<p><em>Bloque III — Territorio y economía<\/em><\/p>\n<ol start=\"8\">\n<li>La periferia y el problema de la unidad (Xinjiang, Tíbet, Hong Kong, Taiwán).<\/li>\n<li>Cómo funciona la economía: mercado dirigido por el Partido-Estado.<\/li>\n<li>El modelo de crecimiento y sus límites.<\/li>\n<\/ol>\n<p><em>Bloque IV — China y el mundo, China y el futuro<\/em><\/p>\n<ol start=\"11\">\n<li>China frente al mundo.<\/li>\n<li>El futuro: escenarios, no profecías.<\/li>\n<\/ol>\n<h3 id=\"las-cinco-ideas-que-atraviesan-el-curso\">Las cinco ideas que atraviesan el curso<\/h3>\n<p>Tres son el corazón; dos se añaden como método.<\/p>\n<ol>\n<li><strong>China no busca simplemente copiar a Occidente.<\/strong> Persigue modernización, seguridad, riqueza y poder por una trayectoria propia. (Cuidado: \"trayectoria propia\" no debe deslizarse hacia el excepcionalismo que lo justifica todo.)<\/li>\n<li><strong>El Partido no gobierna la economía desde fuera.<\/strong> Está dentro de las instituciones, los incentivos, las empresas, el crédito y las carreras.<\/li>\n<li><strong>La prioridad es la supervivencia del régimen<\/strong> — pero nunca como palabra mágica. En cada caso se especifica <em>qué<\/em> estabilidad se busca, <em>frente a qué<\/em> amenaza, <em>quién<\/em> decide, <em>quién<\/em> se beneficia y <em>a qué<\/em> coste.<\/li>\n<li><strong>La caja de herramientas analítica es la espina dorsal.<\/strong> Ante cualquier noticia: ¿quién decide?, ¿qué incentivo hay?, ¿qué precedente se invoca?, ¿qué es hecho y qué interpretación? (Se recoge en la hoja \"Cómo leer una noticia sobre China\".)<\/li>\n<li><strong>Humildad epistémica.<\/strong> China es opaca: estadísticas dudosas, política de élite hermética, propaganda abundante. Se marca siempre el grado de certeza y se evita la especulación disfrazada de dato.<\/li>\n<\/ol>\n<h3 id=\"el-compromiso-de-equilibrio\">El compromiso de equilibrio<\/h3>\n<p>El curso evita por igual dos trampas: la <strong>propaganda oficial china<\/strong> (el excepcionalismo civilizatorio, el \"ascenso pacífico\", la legitimación por desarrollo aceptada sin crítica) y el <strong>tópico occidental<\/strong> (China como monolito, como distopía de ciencia ficción, o como coloso a punto de colapsar o de dominarlo todo). Cuando hay desacuerdo académico relevante, se muestra. Explicar la lógica interna de una decisión —por ejemplo, el miedo a la fragmentación— <strong>no equivale a avalarla<\/strong>.<\/p>\n<h3 id=\"como-distinguir-lo-que-lee\">Cómo distinguir lo que lee<\/h3>\n<p>A lo largo del curso, cada afirmación importante se trata como una de estas cinco cosas, y conviene que el lector haga lo mismo con cualquier noticia:<\/p>\n<ul>\n<li><strong>hecho comprobado<\/strong> — respaldado por fuentes fiables;<\/li>\n<li><strong>inferencia razonable<\/strong> — deducción plausible a partir de hechos;<\/li>\n<li><strong>interpretación<\/strong> — lectura discutible de los mismos hechos;<\/li>\n<li><strong>opinión<\/strong> — juicio de valor;<\/li>\n<li><strong>cuestión abierta<\/strong> — lo que aún no se sabe.<\/li>\n<\/ul>\n<h3 id=\"materiales-complementarios\">Materiales complementarios<\/h3>\n<p>Además de las doce lecciones, el curso incluye: un <strong>glosario<\/strong> de conceptos, una <strong>cronología<\/strong> de 1839 a la actualidad, un <strong>mapa de instituciones y actores<\/strong>, una <strong>tabla comparativa<\/strong> entre China, una democracia liberal y la antigua URSS, un <strong>dossier de noticias comentadas<\/strong>, <strong>preguntas de debate<\/strong>, una <strong>evaluación final<\/strong> con su guía de respuestas, una <strong>bibliografía comentada<\/strong> y la hoja <strong>\"Cómo leer una noticia sobre China\"<\/strong>, que condensa el método del curso en una sola página.<\/p>\n<h3 id=\"una-advertencia-sobre-las-fechas\">Una advertencia sobre las fechas<\/h3>\n<p>Los datos de coyuntura (economía, dirigentes, conflictos) están actualizados a mediados de 2026 y envejecen deprisa. Las cifras económicas y demográficas se ofrecen con su fuente y, cuando procede, como rangos. Los casos actuales llevan fecha explícita. Si lee esto mucho después, use el curso por su <strong>método<\/strong> —los modelos mentales y las preguntas— más que por sus cifras concretas.<\/p><\/div><\/section>", "text": "Entender China en 2026: historia, poder, economía y futuro Introducción general Mini-curso en 12 lecciones. Última actualización: 13 de julio de 2026. Para qué sirve este curso No para acumular datos sobre China, sino para construir un modelo mental que permita interpretar por cuenta propia las noticias, los debates y los conflictos que la rodean. La pregunta que lo guía es una sola: ¿Cómo funciona realmente China y por qué actúa como actúa? Al terminar, el objetivo no es que le expliquen China, sino que pueda leer un titular sobre Taiwán, una purga militar, una crisis inmobiliaria o un veto a las tierras raras y entender qué está en juego, quién decide y qué se está omitiendo. Para quién es Para adultos y estudiantes sin conocimientos previos, interesados en historia, política, economía y relaciones internacionales. Lectores inteligentes, no especialistas. E de 2026 y envejecen deprisa. Las cifras económicas y demográficas se ofrecen con su fuente y, cuando procede, como rangos. Los casos actuales llevan fecha explícita. Si lee esto mucho después, use el curso por su método —los modelos mentales y las preguntas— más que por sus cifras concretas."}, {"id": "Leccion01_China_no_es_Estado_nacion", "group": "I · Marco e historia", "badge": "1", "title": "China no es (solo) un Estado-nación", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~20 min.", "readmin": 20, "color": "#c0392b", "html": "<div class=\"doc-head\"><h1 id=\"leccion-1-china-no-es-solo-un-estado-nacion-como-mirarla-sin-las-gafas-equivocadas\">Lección 1 — China no es (solo) un Estado-nación: cómo mirarla sin las gafas equivocadas<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~20 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: las tres capas de China<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Por qué interpretamos mal a China cuando usamos exclusivamente categorías políticas occidentales?<\/p><\/aside>\n<p><strong>La escena.<\/strong> La prensa internacional llama a Xi Jinping \"presidente\". Es su título menos importante. Su poder no viene de ser jefe del Estado (国家主席, un cargo en gran medida protocolario), sino de dirigir el Partido Comunista —secretario general— y de mandar el ejército. Quien cree que Xi \"gobierna como un presidente\" ya ha entendido mal el sistema desde la primera palabra. Segundo desconcierto: China trata una isla autogobernada de 23 millones de personas, Taiwán, que el actual Estado no ha administrado nunca, como parte sagrada e irrenunciable de \"China\". Eso solo tiene sentido si \"China\" no significa \"el territorio que gobierna el Estado de hoy\", sino algo más antiguo y más amplio.<\/p>\n<p>Las categorías occidentales —presidente, país, fronteras, soberanía— no es que sean falsas: es que llegan tarde. Se aplican sobre una realidad que se piensa a sí misma con otro vocabulario.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>China puede leerse como tres cosas superpuestas a la vez: una <strong>civilización<\/strong> milenaria, un antiguo <strong>imperio<\/strong> y un <strong>Estado-nación moderno<\/strong> levantado sobre las dos anteriores y que las utiliza. El análisis occidental tiende a ver solo la tercera capa y a olvidar las otras dos; por eso el comportamiento chino parece a veces \"irracional\" o \"agresivo\" cuando en realidad sigue una lógica interna distinta: la unidad como supervivencia, la legitimidad como desempeño, y una autoimagen de centralidad y continuidad. Ahora bien —y esto es decisivo— esa lente civilizatoria es también un relato que el Partido cuenta sobre sí mismo para justificar su poder. La usaremos como herramienta de análisis, no como creencia.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: las tres capas de China<\/span><\/div><div class=\"sec-body\">\n<p>Piense en China como tres capas apiladas, no como tres etapas que se sustituyen:<\/p>\n<ol>\n<li><strong>Civilización<\/strong> (milenios): escritura común, burocracia meritocrática, ideas de orden y jerarquía, y un sentido de centralidad inscrito hasta en el nombre del país, 中国 (<em>Zhongguo<\/em>), \"país del centro\".<\/li>\n<li><strong>Imperio<\/strong> (dinastías, hasta 1911): expansión y contracción territorial, relación centro-periferia, legitimación por el \"Mandato del Cielo\", ciclo de ascenso y caída de dinastías.<\/li>\n<li><strong>Estado-nación moderno<\/strong> (desde 1912, consolidado desde 1949): fronteras fijas, soberanía, nacionalismo e instituciones modernas —construido <em>por encima<\/em> de las dos capas previas y sirviéndose de ellas.<\/li>\n<\/ol>\n<p><strong>Cómo se usa el modelo.<\/strong> Ante cualquier noticia sobre China, pregúntese qué capa se está invocando. Muy a menudo es el Estado moderno el que actúa (una ley, un despliegue militar) mientras invoca la civilización (\"5.000 años\", \"rejuvenecimiento nacional\") y la memoria imperial (unidad, territorio). Distinguir la capa que actúa de la capa que se invoca es el primer gesto analítico del curso.<\/p>\n<p><em>(En la sección H se describe el mapa que conviene tener delante para visualizar esto.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-por-que-pais-del-centro\">C1. ¿Por qué \"país del centro\"?<\/h3>\n<p>El nombre 中国 (<em>Zhongguo<\/em>) no es folclore: expresa una autoimagen. Durante siglos, China no se concibió como <em>un<\/em> Estado entre iguales, sino como el <strong>centro civilizatorio<\/strong> de un orden jerárquico, resumido en el concepto de <em>tianxia<\/em> (\"todo bajo el cielo\"): un mundo ordenado en círculos de mayor a menor proximidad a la cultura central, no un tablero de Estados soberanos equivalentes. El sistema tributario tradicional —reinos vecinos que reconocían la superioridad del emperador a cambio de comercio y reconocimiento— es lo contrario del orden westfaliano europeo de Estados formalmente iguales. <strong>Consecuencia hoy:<\/strong> una incomodidad de fondo con un orden internacional diseñado en Occidente sobre la ficción de la igualdad soberana, y una preferencia intuitiva por las jerarquías y las esferas de influencia.<\/p>\n<h3 id=\"c2-que-es-el-mandato-del-cielo-y-por-que-sigue-importando\">C2. ¿Qué es el Mandato del Cielo y por qué sigue importando?<\/h3>\n<p>El <em>tianming<\/em> o Mandato del Cielo era la doctrina que legitimaba al emperador: el Cielo concede el derecho a gobernar a quien mantiene el orden y la prosperidad, y lo retira a quien trae caos, hambre o corrupción. Las catástrofes y las revueltas se leían como señales de un mandato perdido. Esa idea legitimaba a la vez la <strong>obediencia<\/strong> (mientras hay orden) y la <strong>rebelión<\/strong> (cuando se pierde). <strong>Eco moderno:<\/strong> la legitimidad del Partido Comunista es sobre todo de <em>desempeño<\/em> —entregar orden y prosperidad— y no de <em>procedimiento<\/em> —ganar elecciones—. Esto reencuadra por qué el Partido se obsesiona con el crecimiento y con evitar el desorden: no es un capricho autoritario, es su fuente de legitimidad. <em>Cautela:<\/em> es una analogía útil, no una continuidad literal; no conviene explicarlo todo con ella.<\/p>\n<h3 id=\"c3-continuidad-o-ruptura-el-mito-central-de-esta-leccion\">C3. ¿Continuidad o ruptura? (el mito central de esta lección)<\/h3>\n<p>La frase \"China ha sido siempre el mismo país\" es falsa. Las dinastías cayeron; pueblos no-han conquistaron y gobernaron el país entero (los mongoles fundaron la dinastía Yuan; los manchúes, la Qing); las fronteras se movieron enormemente; y el siglo XX fue una ruptura radical: fin del imperio en 1911, república, guerra civil, 1949, maoísmo, reforma. Lo que persiste no es \"el mismo país\", sino un <strong>guion recurrente<\/strong>: una idea de unidad y centralidad y una tradición escrita y burocrática que se han reconstruido una y otra vez sobre Estados muy distintos. Continuidad de una <em>idea y una escritura<\/em>, no de un Estado.<\/p>\n<h3 id=\"c4-por-que-la-unidad-es-una-obsesion-y-no-un-capricho\">C4. ¿Por qué la unidad es una obsesión y no un capricho?<\/h3>\n<p>En la experiencia histórica china, la unidad se asocia con paz y prosperidad, y la fragmentación con señores de la guerra, hambrunas y depredación extranjera (lo que la Lección 2 examinará en detalle). El miedo al <em>luan<\/em> (乱, caos, desorden) es el temor político fundamental. De ahí que el imperativo \"el país no debe dividirse\" —aplicado a Taiwán, Xinjiang, Tíbet, Hong Kong— no sea, desde dentro, una ambición expansionista sino una defensa contra el regreso al caos. <strong>Mecanismo:<\/strong> para la elite, la división no es un problema político más, es existencial. <strong>Consecuencia:<\/strong> conductas que desde fuera parecen agresión (aplastar el separatismo) se enmarcan desde dentro como prevención del desastre. <em>Equilibrio necesario:<\/em> explicar esta lógica no equivale a avalar los métodos con que se aplica.<\/p>\n<h3 id=\"c5-centro-y-periferia-como-se-gobierna-un-espacio-tan-diverso\">C5. Centro y periferia: ¿cómo se gobierna un espacio tan diverso?<\/h3>\n<p>China nunca fue étnica ni administrativamente uniforme. El modelo imperial gestionaba de forma distinta un núcleo han y unas periferias no-han. La República Popular heredó ese problema: un Estado nacionalista y unitario que intenta sostener a la vez provincias de mayoría han y regiones de otras etnias. Ahí anida una tensión que recorrerá el curso: la ideología moderna del Estado-nación (\"una nación\") choca con la realidad imperial heredada (un espacio diverso mantenido por un centro). <em>(Se desarrolla en la Lección 8.)<\/em><\/p>\n<h3 id=\"c6-donde-falla-la-etiqueta-civilizacion-estado\">C6. ¿Dónde falla la etiqueta \"civilización-Estado\"?<\/h3>\n<p>El término —popularizado por autores como Zhang Weiwei o Martin Jacques— capta algo real: la escala, la autoimagen y la continuidad de una idea. Pero hay que usarlo con pinzas por tres motivos. <strong>Primero<\/strong>, es en parte la autojustificación del propio Partido, exportada para desactivar la crítica democrática y de derechos humanos (\"no nos juzguen con valores universales, somos una civilización distinta\"). <strong>Segundo<\/strong>, es analíticamente laxo: todo país grande tiene historia profunda; eso no lo convierte en una categoría política aparte. <strong>Tercero<\/strong>, desliza un determinismo peligroso (\"China está <em>destinada<\/em> a ser jerárquica y no democrática\"). El politólogo Lucian Pye lo formuló al revés, con ironía: China es \"una civilización que finge ser un Estado\". La República Popular es, muy señaladamente, un <strong>Estado-nación moderno que instrumentaliza lo civilizatorio<\/strong>. La lente sirve como lupa, no como biblia.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>中国 / <em>Zhongguo<\/em> (\"país del centro\")<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el nombre de China y la autoimagen de centralidad que expresa.<br><b class=\"mlbl\">Importancia:<\/b>  explica la incomodidad con un orden de Estados formalmente iguales.<br><b class=\"mlbl\">Error habitual:<\/b>  tomarlo como mera etimología pintoresca en vez de como un dato político.<\/p>\n<\/li>\n<li>\n<p><strong><em>Tianxia<\/em> (\"todo bajo el cielo\")<\/strong><br><b class=\"mlbl\">Definición:<\/b>  concepción de un orden mundial jerárquico y concéntrico, no de Estados soberanos iguales.<br><b class=\"mlbl\">Importancia:<\/b>  marco alternativo al westfaliano que aún tiñe la visión china del mundo.<br><b class=\"mlbl\">Error habitual:<\/b>  traducirlo como \"imperio universal\" agresivo; es más bien una jerarquía cultural.<\/p>\n<\/li>\n<li>\n<p><strong>Mandato del Cielo (<em>tianming<\/em>)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  legitimidad concedida a quien gobierna con orden y prosperidad, retirable si trae caos.<br><b class=\"mlbl\">Importancia:<\/b>  antecede a la legitimidad <em>por desempeño<\/em> del Partido actual.<br><b class=\"mlbl\">Error habitual:<\/b>  leerlo como religión anticuada en vez de como lógica de legitimación vigente.<\/p>\n<\/li>\n<li>\n<p><strong>Ciclo dinástico<\/strong><br><b class=\"mlbl\">Definición:<\/b>  patrón histórico de ascenso, apogeo, decadencia y caída de las dinastías, con fases de unidad y de fragmentación.<br><b class=\"mlbl\">Importancia:<\/b>  fija la asociación unidad = orden / división = catástrofe.<br><b class=\"mlbl\">Error habitual:<\/b>  convertirlo en una \"ley\" determinista que predice el futuro de la RPC.<\/p>\n<\/li>\n<li>\n<p><strong>Civilización-Estado<\/strong><br><b class=\"mlbl\">Definición:<\/b>  tesis de que China es una civilización organizada como Estado, distinta en naturaleza de un Estado-nación.<br><b class=\"mlbl\">Importancia:<\/b>  captura una autoimagen real, pero es un concepto contestado.<br><b class=\"mlbl\">Error habitual:<\/b>  adoptarlo como verdad (y coartada) en lugar de como hipótesis discutida.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"China ha sido siempre el mismo país.\"<\/p>\n<ol>\n<li><strong>Qué parte puede ser cierta:<\/strong> persiste una idea recurrente de unidad y centralidad, junto con una tradición escrita y burocrática que da continuidad <em>cultural<\/em>.<\/li>\n<li><strong>Qué omite:<\/strong> las caídas dinásticas, las conquistas por pueblos no-han (Yuan mongol, Qing manchú), el enorme desplazamiento de fronteras y la ruptura radical del siglo XX (fin del imperio, república, 1949, maoísmo, reforma).<\/li>\n<li><strong>Versión más precisa:<\/strong> \"China no es un país continuo; es un espacio en el que se ha reconstruido repetidamente una misma <em>idea<\/em> de unidad, encarnada en Estados muy diferentes.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>221 a. C.:<\/strong> Qin Shi Huang unifica los Reinos Combatientes y estandariza escritura, pesos y medidas: nace el \"guion\" común que sobrevivirá a los Estados que lo usen. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Dinastías no-han:<\/strong> los mongoles gobiernan toda China bajo la dinastía Yuan (proclamada en 1271, dominio completo hacia 1279) y los manchúes fundan la Qing (1644–1911). Quienes \"eran China\" no siempre eran han. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>1911–1912:<\/strong> la Revolución de Xinhai derriba la Qing; termina un sistema imperial de más de dos mil años. Ruptura, no continuidad. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>Diversidad interna:<\/strong> la RPC reconoce oficialmente 56 grupos étnicos; los han rondan el 91 % de la población (censo de 2020), pero las regiones autónomas —Xinjiang, Tíbet, Mongolia Interior— cubren una parte enorme del territorio: la herencia viva del problema centro-periferia. <em>(Hecho comprobado; el detalle en la Lección 8.)<\/em><\/li>\n<li><strong>Uso político del pasado:<\/strong> el discurso oficial de los \"5.000 años de civilización continua\" y la Iniciativa de Civilización Global (Xi Jinping, 15 de marzo de 2023), integrada en 2025 en un paquete de cuatro \"iniciativas globales\", muestran la historia profunda convertida en instrumento de política presente. <em>(Hecho comprobado el lanzamiento y su expansión; su alcance real es interpretación —ver G.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> El 15 de marzo de 2023, Xi Jinping lanzó la <strong>Iniciativa de Civilización Global (ICG)<\/strong>, con el argumento de que no existe un único modelo (occidental) de modernidad y que las civilizaciones deben respetarse como diversas e iguales. Para 2025–2026 ese planteamiento se ha <strong>institucionalizado<\/strong>: la ICG es hoy una de las cuatro \"iniciativas globales\" de Xi —junto a las de Desarrollo, Seguridad y, añadida en 2025, <strong>Gobernanza Global<\/strong>—, presentadas como un paquete alternativo al orden liderado por Occidente. En octubre de 2025, Xi publicó un artículo para impulsar su implementación, y Pekín afirma el respaldo de más de 140 países y organizaciones. <em>(Lanzamiento: 15 de marzo de 2023; marco ampliado y vigente en 2025–2026.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> La centralidad (<em>Zhongguo<\/em>), la etiqueta de civilización-Estado y la idea transversal de que China busca modernizarse por una trayectoria propia, no copiando a Occidente.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Es la Iniciativa (i) una defensa sincera del pluralismo cultural, (ii) un escudo para desactivar la crítica de derechos humanos y democracia —\"no nos midan con valores universales\"— o (iii) un intento de legitimar modelos autoritarios en el exterior? Analistas serios discrepan: bien recibida en parte del Sur Global, think tanks occidentales (Atlantic Council) la leen como un intento de sustituir los \"valores universales\" por la soberanía absoluta y los \"valores tradicionales\". La lección no zanja: enseña a ver las tres lecturas.<\/p>\n<p><strong>Qué información falta.<\/strong> Cuánta tracción real obtiene fuera de China (adhesión frente a mera retórica) y en qué medida el destinatario principal es la audiencia interna, no la externa.<\/p>\n<blockquote>\n<p><em>Nota de método:<\/em> caso lanzado en 2023 y actualizado con su expansión de 2025–2026 (las cuatro \"iniciativas globales\" y la Iniciativa de Gobernanza Global de 2025). Su alcance real —adhesión frente a mera retórica— sigue siendo interpretación, no hecho.<\/p>\n<\/blockquote>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Mapa recomendado (a elaborar, no incluido aquí).<\/strong> Un mapa que superponga la extensión máxima de varias dinastías (Han, Tang, Yuan, Qing) sobre las fronteras actuales de la RPC, con Taiwán señalado. Debe mostrar dos cosas: que \"China\" se expandió y se contrajo mucho a lo largo del tiempo, y que las fronteras actuales se aproximan sobre todo a la extensión de la Qing. Un segundo mapa útil marcaría el núcleo de provincias han frente a las regiones autónomas periféricas, para visualizar el problema centro-periferia. <em>(No se proporciona imagen para no inventar un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (8 hitos).<\/strong><\/p>\n<ul>\n<li><strong>221 a. C.<\/strong> — Unificación bajo Qin; estandarización de la escritura.<\/li>\n<li><strong>1279<\/strong> — Los mongoles (Yuan) controlan toda China.<\/li>\n<li><strong>1644<\/strong> — Los manchúes fundan la Qing, la última dinastía.<\/li>\n<li><strong>1839–1842<\/strong> — Primera Guerra del Opio (enlace con la Lección 2).<\/li>\n<li><strong>1911–1912<\/strong> — Cae la Qing; fin del sistema imperial.<\/li>\n<li><strong>1949<\/strong> — Fundación de la República Popular China.<\/li>\n<li><strong>1971<\/strong> — La RPC ocupa el asiento de \"China\" en la ONU.<\/li>\n<li><strong>2023<\/strong> — Lanzamiento de la Iniciativa de Civilización Global.<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Traducir el poder de Xi como el de un \"presidente\" occidental.<\/strong> <em>Corrección:<\/em> su poder procede de ser secretario general del Partido y jefe del ejército; la jefatura del Estado es casi protocolaria (se detalla en la Lección 6).<\/li>\n<li><strong>Tomar \"5.000 años de historia continua\" como un hecho neutro.<\/strong> <em>Corrección:<\/em> es a la vez una simplificación histórica y una herramienta política de legitimación.<\/li>\n<li><strong>Leer la insistencia en la unidad (Taiwán, Xinjiang) como mera agresividad expansionista.<\/strong> <em>Corrección:<\/em> sin justificar los métodos, entender que responde a un miedo histórico y estructural a la fragmentación.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si la legitimidad del Partido depende del <strong>desempeño<\/strong> (orden y prosperidad) más que del <strong>procedimiento<\/strong> (elecciones), ¿qué le ocurre a esa legitimidad cuando el crecimiento se frena —como en la etapa de deflación y crisis inmobiliaria de 2023–2026—? ¿Puede el discurso civilizatorio y nacionalista sustituir a la prosperidad como fuente de legitimidad, o solo complementarla? <em>(La pregunta conecta esta lección con la economía —Lección 10— y con el nacionalismo como legitimación —Lección 7—.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué significa 中国 y qué autoimagen refleja?<\/li>\n<li>¿Qué es el Mandato del Cielo y con qué tipo de legitimidad actual puede compararse?<\/li>\n<li>Nombra dos dinastías gobernadas por pueblos no-han.<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\/strong>\n¿Por qué la fragmentación territorial genera en la elite china un miedo \"existencial\" y no solo político? Explica el mecanismo histórico que lo conecta con el orden y la prosperidad.<\/p>\n<p><strong>Afirmación que debes matizar<\/strong>\n\"China es una civilización-Estado y por eso no puede ser democrática.\"\n<em>(Pista: distingue entre una autoimagen y un destino; entre una herramienta analítica y una creencia; y recuerda quién promueve la etiqueta y para qué.)<\/em><\/p>\n<p><strong>Actividad de aplicación a una noticia<\/strong>\nToma un titular reciente sobre Taiwán o Xinjiang. Identifica qué \"capa\" (civilización, imperio o Estado moderno) invoca el discurso oficial chino y cuál emplea la prensa occidental. Anota en qué se pierde información al usar solo una.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-L\" class=\"sec t-cierre\"><div class=\"sec-h\"><span class=\"sec-badge\">L<\/span><span class=\"sec-tt\">Cierre<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-sum\"><span class=\"cal-l\">Lo esencial en cinco líneas<\/span><ol>\n<li>China se lee mejor como tres capas superpuestas —civilización, imperio, Estado moderno— y no solo como el Estado de hoy.<\/li>\n<li>Lo que perdura no es \"el mismo país\", sino una idea recurrente de unidad y centralidad.<\/li>\n<li>La legitimidad del poder es sobre todo de desempeño (orden y prosperidad), heredera del Mandato del Cielo.<\/li>\n<li>La unidad se vive como supervivencia, no como capricho; de ahí la sensibilidad ante toda fragmentación.<\/li>\n<li>\"Civilización-Estado\" es una lente útil pero contestada: herramienta, no dogma —ni verdad ni coartada—.<\/li>\n<\/ol><\/aside>\n<p><strong>Conexión con la Lección 2.<\/strong> El miedo a la fragmentación y la susceptibilidad extrema ante la soberanía no son abstractos: se grabaron a fuego en un siglo concreto de derrotas, tratados impuestos y ocupación extranjera (1839–1949), el llamado \"siglo de la humillación\", que examina la Lección 2.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-M\" class=\"sec t-fuentes\"><div class=\"sec-h\"><span class=\"sec-badge\">M<\/span><span class=\"sec-tt\">Fuentes<\/span><\/div><div class=\"sec-body\">\n<p><em>Se distingue entre fuente primaria (posición oficial), investigación académica y análisis. Las tesis de \"civilización-Estado\" se listan como posiciones de sus defensores, no como consenso.<\/em><\/p>\n<p><strong>Investigación académica / obras de referencia<\/strong><\/p>\n<ul>\n<li>Jonathan Spence, <em>The Search for Modern China<\/em> — narrativa histórica canónica.<\/li>\n<li>Klaus Mühlhahn, <em>Making China Modern: From the Great Qing to Xi Jinping<\/em> — síntesis del paso del imperio al Estado moderno.<\/li>\n<li>Odd Arne Westad, <em>Restless Empire: China and the World Since 1750<\/em> — China y el orden internacional.<\/li>\n<li>Lucian W. Pye, \"China: Erratic State, Frustrated Society\" (<em>Foreign Affairs<\/em>, 1990) — origen de la tesis \"una civilización que finge ser un Estado\".<\/li>\n<li>William A. Callahan, <em>China: The Pessoptimist Nation<\/em> — uso político de la historia y la humillación.<\/li>\n<\/ul>\n<p><strong>Interpretación contestada (defensores de la tesis civilizatoria)<\/strong><\/p>\n<ul>\n<li>Zhang Weiwei, <em>The China Wave: Rise of a Civilizational State<\/em>.<\/li>\n<li>Martin Jacques, <em>When China Rules the World<\/em>.<\/li>\n<li>Zhao Tingyang, obra sobre <em>tianxia<\/em> / \"todo bajo el cielo\" (lectura filosófica, discutida).<\/li>\n<\/ul>\n<p><strong>Fuente primaria / actualidad (leer como posición oficial)<\/strong><\/p>\n<ul>\n<li>Discurso de Xi Jinping en el lanzamiento de la Iniciativa de Civilización Global, 15 de marzo de 2023 (texto oficial vía Xinhua).<\/li>\n<li>Informe al XX Congreso del PCCh, octubre de 2022 (concepto de \"modernización de estilo chino\").<\/li>\n<\/ul>\n<p><strong>Análisis (para el caso actual)<\/strong><\/p>\n<ul>\n<li>MERICS (Mercator Institute for China Studies) y CSIS <em>ChinaPower<\/em>: análisis del discurso civilizatorio y de la Iniciativa de Civilización Global.<\/li>\n<\/ul>\n<\/div><\/section>", "text": "Lección 1 — China no es (solo) un Estado-nación: cómo mirarla sin las gafas equivocadas Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~20 min. Recorrido de la lección A Apertura B Modelo mental: las tres capas de China C Desarrollo D Conceptos imprescindibles E Mito o simplificación F Evidencias G Caso actual H Mapa y cronología I Errores habituales J Pregunta para pensar K Comprobación del aprendizaje L Cierre M Fuentes A Apertura Pregunta central ¿Por qué interpretamos mal a China cuando usamos exclusivamente categorías políticas occidentales? La escena. La prensa internacional llama a Xi Jinping \"presidente\". Es su título menos importante. Su poder no viene de ser jefe del Estado (国家主席, un cargo en gran medida protocolario), sino de dirigir el Partido Comunista —secretario general— y de mandar el ejército. Quien cree que Xi \"gobierna como un presidente\" ya ha entendido mal el sistema desde la primera palabra. Segundo desconcierto: China trata una isla autogobernada de 23 millones de personas, Taiwán, que el actual Estado no ha administrado nunca, como parte sagrada e irrenunciable de \"China\". Eso solo tiene sentido si \"China\" no significa \"el territorio que gobierna el Estado de hoy\", sino algo más antiguo y más amplio. Las categorías occidentales —presidente, país, fronteras, soberanía— no es que sean falsas: es que llegan tarde. Se aplican sobre una realidad que se piensa a sí misma con otro vocabulario. Idea clave China puede leerse como tres cosas superpuestas a la vez: una civilización milenaria, un antiguo imperio y un Estado-nación moderno levantado sobre las dos anteriores y que las utiliza. El análisis occidental tiende a ver solo la tercera capa y a olvidar las otras dos; por eso el comportamiento chino parece a veces \"irracional\" o \"agresivo\" cuando en realidad sigue una lógica interna distinta: la unidad como supervivencia, la legitimidad como desempeño, y una autoimagen de centralidad y continuidad. Ahora bien —y esto es decisivo— esa lente civilizatoria es también un relato que el Partido cuenta sobre sí mismo para justificar su poder. La usaremos como herramienta de análisis, no como creencia. B Modelo mental: las tres capas de China Piense en China como tres capas apiladas, no como tres etapas que se sustituyen: Civilización (milenios): escritura común, burocracia meritocrática, ideas de orden y jerarquía, y un sentido de centralidad inscrito hasta en el nombre del país, 中国 ( Zhongguo ), \"país del centro\". Imperio (dinastías, hasta 1911): expansión y contracción territorial, relación centro-periferia, legitimación por el \"Mandato del Cielo\", ciclo de ascenso y caída de dinastías. Estado-nación moderno (desde 1912, consolidado desde 1949): fronteras fijas, soberanía, nacionalismo e instituciones modernas —construido por encima de las dos capas previas y sirviéndose de ellas. Cómo se usa el modelo. Ante cualquier noticia sobre China, pregúntese qué capa se está invocando. Muy a menudo es el Estado moderno el que actúa (una ley, un despliegue militar) mientras invoca la civilización (\"5.000 años\", \"rejuvenecimiento nacional\") y la memoria imperial (unidad, territorio). Distinguir la capa que actúa de la capa que se invoca es el primer gesto analítico del curso. (En la sección H se describe el mapa que conviene tener delante para visualizar esto.) C Desarrollo C1. ¿Por qué \"país del centro\"? El nombre 中国 ( Zhongguo ) no es folclore: expresa una autoimagen. Durante siglos, China no se concibió como un Estado entre iguales, sino como el centro civilizatorio de un orden jerárquico, resumido en el concepto de tianxia (\"todo bajo el cielo\"): un mundo ordenado en círculos de mayor a menor proximidad a la cultura central, no un tablero de Estados soberanos equivalentes. El sistema tributario tradicional —reinos vecinos que reconocían la superioridad del emperador a cambio de comercio y reconocimiento— es lo contrario del orden westfaliano europeo de Estados formalmente iguales. Consecuencia hoy: una incomodidad de fondo con un orden internacional diseñado en Occidente sobre la ficción de la igualdad soberana, y una preferencia intuitiva por las jerarquías y las esferas de influencia. C2. ¿Qué es el Mandato del Cielo y por qué sigue importando? El tianming o Mandato del Cielo era la doctrina que legitimaba al emperador: el Cielo concede el derecho a gobernar a quien mantiene el orden y la prosperidad, y lo retira a quien trae caos, hambre o corrupción. Las catástrofes y las revueltas se leían como señales de un mandato perdido. Esa idea legitimaba a la vez la obediencia (mientras hay orden) y la rebelión (cuando se pierde). Eco moderno: la legitimidad del Partido Comunista es sobre todo de desempeño —entregar orden y prosperidad— y no de procedimiento —ganar elecciones—. Esto reencuadra por qué el Partido se obsesiona con el crecimiento y con evitar el desorden: no es un capricho autoritario, es su fuente de legitimidad. Cautela: es una analogía útil, no una continuidad literal; no conviene explicarlo todo con ella. C3. ¿Continuidad o ruptura? (el mito central de esta lección) La frase \"China ha sido siempre el mismo país\" es falsa. Las dinastías cayeron; pueblos no-han conquistaron y gobernaron el país entero (los mongoles fundaron la dinastía Yuan; los manchúes, la Qing); las fronteras se movieron enormemente; y el siglo XX fue una ruptura radical: fin del imperio en 1911, república, guerra civil, 1949, maoísmo, reforma. Lo que persiste no es \"el mismo país\", sino un guion recurrente : una idea de unidad y centralidad y una tradición escrita y burocrática que se han reconstruido una y otra vez sobre Estados muy distintos. Continuidad de una idea y una escritura , no de un Estado. C4. ¿Por qué la unidad es una obsesión y no un capricho? En la experiencia histórica china, la unidad se asocia con paz y prosperidad, y la fragmentación con señores de la guerra, hambrunas y depredación extranjera (lo que"}, {"id": "Leccion02_El_siglo_de_la_humillacion", "group": "I · Marco e historia", "badge": "2", "title": "El siglo de la humillación", "kind": "lesson", "meta": "Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~22 min.", "readmin": 22, "color": "#c0392b", "html": "<div class=\"doc-head\"><h1 id=\"leccion-2-el-siglo-de-la-humillacion-18391949\">Lección 2 — El siglo de la humillación (1839–1949)<\/h1><p class=\"doc-meta\">Curso: Entender China en 2026. Bloque I — Marco e historia. Lectura: ~22 min.<\/em>\n<em><\/p>\n<hr>\n<\/div><nav class=\"lesson-map\"><span class=\"lm-h\">Recorrido de la lección<\/span><div class=\"lm-chips\"><button class=\"lm-chip\" onclick=\"jump('sec-A')\"><b>A<\/b>Apertura<\/button><button class=\"lm-chip\" onclick=\"jump('sec-B')\"><b>B<\/b>Modelo mental: la herida nacional como lente<\/button><button class=\"lm-chip\" onclick=\"jump('sec-C')\"><b>C<\/b>Desarrollo<\/button><button class=\"lm-chip\" onclick=\"jump('sec-D')\"><b>D<\/b>Conceptos imprescindibles<\/button><button class=\"lm-chip\" onclick=\"jump('sec-E')\"><b>E<\/b>Mito o simplificación<\/button><button class=\"lm-chip\" onclick=\"jump('sec-F')\"><b>F<\/b>Evidencias<\/button><button class=\"lm-chip\" onclick=\"jump('sec-G')\"><b>G<\/b>Caso actual<\/button><button class=\"lm-chip\" onclick=\"jump('sec-H')\"><b>H<\/b>Mapa y cronología<\/button><button class=\"lm-chip\" onclick=\"jump('sec-I')\"><b>I<\/b>Errores habituales<\/button><button class=\"lm-chip\" onclick=\"jump('sec-J')\"><b>J<\/b>Pregunta para pensar<\/button><button class=\"lm-chip\" onclick=\"jump('sec-K')\"><b>K<\/b>Comprobación del aprendizaje<\/button><button class=\"lm-chip\" onclick=\"jump('sec-L')\"><b>L<\/b>Cierre<\/button><button class=\"lm-chip\" onclick=\"jump('sec-M')\"><b>M<\/b>Fuentes<\/button><\/div><\/nav><section id=\"sec-A\" class=\"sec t-apertura\"><div class=\"sec-h\"><span class=\"sec-badge\">A<\/span><span class=\"sec-tt\">Apertura<\/span><\/div><div class=\"sec-body\">\n<aside class=\"cal c-preg\"><span class=\"cal-l\">Pregunta central<\/span><p>¿Por qué la soberanía, Taiwán, Hong Kong, Japón y Occidente son asuntos especialmente sensibles?<\/p><\/aside>\n<p><strong>La escena.<\/strong> El 3 de septiembre de 2025, en la avenida Chang'an de Pekín, más de 12.000 soldados desfilaron con misiles hipersónicos y armas de energía dirigida ante Xi Jinping, con Vladímir Putin y Kim Jong-un a su lado. El motivo oficial: el 80.º aniversario de la victoria sobre Japón en 1945. La pregunta incómoda: ¿por qué una superpotencia del siglo XXI exhibe su armamento más moderno bajo la bandera de una guerra que terminó hace ocho décadas? Porque el desfile no trata realmente de 1945. Trata de un relato que va de 1839 a hoy: el de la humillación y la recuperación.<\/p>\n<aside class=\"cal c-idea\"><span class=\"cal-l\">Idea clave<\/span><p>Entre 1839 y 1949, China pasó de ser una de las mayores economías del mundo a un país semicolonizado, invadido y fragmentado. Ese siglo —el \"siglo de la humillación\" (百年国耻, <em>bǎinián guóchǐ<\/em>)— es el núcleo emocional y político del nacionalismo chino moderno. Explica la obsesión con la soberanía y el territorio y la sensibilidad extrema ante Japón, Taiwán, Hong Kong y \"Occidente\". Pero es también una narrativa <em>administrada<\/em> por el Partido (y antes por el Kuomintang): un trauma real convertido en herramienta de gobierno. Hay que entender las dos cosas a la vez: la herida y su uso político.<\/p><\/aside>\n<hr>\n<\/div><\/section><section id=\"sec-B\" class=\"sec t-modelo\"><div class=\"sec-h\"><span class=\"sec-badge\">B<\/span><span class=\"sec-tt\">Modelo mental: la herida nacional como lente<\/span><\/div><div class=\"sec-body\">\n<p>Una secuencia en tres tiempos:<\/p>\n<ul>\n<li><strong>Antes (~1800):<\/strong> según las estimaciones de Angus Maddison, hacia 1820 China representaba en torno a un tercio del PIB mundial. Un imperio vasto y confiado, pero tecnológica y militarmente superado por una Europa que se industrializaba.<\/li>\n<li><strong>Durante (1839–1949):<\/strong> Guerras del Opio → tratados desiguales → concesiones y extraterritorialidad → rebeliones internas devastadoras → caída de la dinastía (1911) → señores de la guerra → invasión japonesa → guerra civil.<\/li>\n<li><strong>Después (1949–):<\/strong> \"China se ha puesto de pie\" (Mao). Un relato de recuperación en el que cada agravio presente se lee a través de un \"nunca más\".<\/li>\n<\/ul>\n<p><strong>Cómo se usa el modelo.<\/strong> La humillación funciona hoy como una lente: una venta de armas de EE. UU. a Taiwán, una frase de un primer ministro japonés o una crítica occidental de derechos humanos se procesan a través del recuerdo de la vulnerabilidad. Ante una noticia, pregúntese qué agravio histórico se está activando.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-C\" class=\"sec t-desarrollo\"><div class=\"sec-h\"><span class=\"sec-badge\">C<\/span><span class=\"sec-tt\">Desarrollo<\/span><\/div><div class=\"sec-body\">\n<h3 id=\"c1-como-cayo-el-pais-del-centro\">C1. ¿Cómo cayó el \"país del centro\"?<\/h3>\n<p>Hacia 1800 el imperio Qing era enorme y próspero, pero descansaba en una superioridad que ya no tenía. Europa se industrializaba y desarrollaba una potencia militar y naval sin precedentes; la corte Qing, confiada y mirando hacia dentro, no lo advirtió a tiempo. La colisión no llegó por una gran guerra de conquista, sino por el comercio: concretamente, por el opio.<\/p>\n<h3 id=\"c2-que-fueron-las-guerras-del-opio-y-los-tratados-desiguales\">C2. ¿Qué fueron las Guerras del Opio y los \"tratados desiguales\"?<\/h3>\n<p>Gran Bretaña compraba té, seda y porcelana a China y pagaba en plata, con un déficit creciente. Para equilibrarlo, vendió opio producido en la India británica. Cuando la Qing intentó prohibirlo, estalló la <strong>Primera Guerra del Opio (1839–1842)<\/strong>, que China perdió. El <strong>Tratado de Nanjing (1842)<\/strong> cedió la isla de Hong Kong, abrió \"puertos de tratado\", impuso indemnizaciones y consagró la <strong>extraterritorialidad<\/strong> (los extranjeros no se sometían a las leyes chinas). Vinieron más: la <strong>Segunda Guerra del Opio (1856–1860)<\/strong>, con el saqueo del Palacio de Verano en 1860, y una cascada de tratados desiguales. Hong Kong se completó por partes —Kowloon (1860) y los Nuevos Territorios (arrendados en 1898 por 99 años, de ahí la retrocesión de 1997—, dato clave para entender el presente. <strong>Mecanismo:<\/strong> las potencias extranjeras extrajeron soberanía a plazos, sin colonizar formalmente todo el país.<\/p>\n<h3 id=\"c3-por-que-el-colapso-vino-tambien-desde-dentro\">C3. ¿Por qué el colapso vino también desde dentro?<\/h3>\n<p>La humillación no fue solo obra extranjera. La <strong>rebelión Taiping (1850–1864)<\/strong> fue una de las guerras más mortíferas de la historia —del orden de veinte millones de muertos o más, según las estimaciones— y estuvo a punto de derribar a la Qing, que sobrevivió debilitada. A ella se sumaron otras revueltas y, en 1911, la caída de la dinastía y la fragmentación del país en feudos de señores de la guerra. Es decir: la humillación fue depredación externa <strong>y<\/strong> descomposición interna a la vez. Olvidar la segunda parte deforma el cuadro.<\/p>\n<h3 id=\"c4-por-que-japon-ocupa-un-lugar-aparte\">C4. ¿Por qué Japón ocupa un lugar aparte?<\/h3>\n<p>Japón se modernizó con la Restauración Meiji y derrotó a China en la <strong>Primera Guerra Sino-Japonesa (1894–1895)<\/strong>. El Tratado de Shimonoseki le cedió <strong>Taiwán<\/strong>, que quedó bajo dominio japonés hasta 1945 (razón por la que Taiwán tiene una trayectoria distinta —clave para la Lección 8). Después vinieron la invasión de Manchuria (1931), la guerra total desde 1937 y la <strong>Masacre de Nanjing (1937–1938)<\/strong>. Japón es la herida más aguda por tres razones: fue un vecino asiático, no una potencia lejana; la violencia fue masiva y reciente; y la reconciliación de posguerra nunca fue tan completa como la europea con Alemania. De ahí la sensibilidad extrema que persiste hoy.<\/p>\n<h3 id=\"c5-como-se-convirtio-el-trauma-en-herramienta-politica\">C5. ¿Cómo se convirtió el trauma en herramienta política?<\/h3>\n<p>El discurso de la \"humillación nacional\" ya existía bajo la República y el Kuomintang, pero el Partido Comunista lo <strong>sistematizó<\/strong>, sobre todo a partir de 1991, con la <strong>campaña de educación patriótica<\/strong>. El momento no es casual: tras Tiananmén (1989) y el colapso soviético (1991), la legitimidad comunista clásica se agrietaba, y el régimen desplazó su base hacia el nacionalismo. Museos, libros de texto y aniversarios fijaron un relato en el que el Partido es la fuerza que terminó la humillación y el único garante frente a su regreso. <strong>Este es el punto de equilibrio de la lección:<\/strong> el trauma es real <em>y<\/em> está instrumentalizado. Ambas cosas, no una u otra.<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-D\" class=\"sec t-conceptos\"><div class=\"sec-h\"><span class=\"sec-badge\">D<\/span><span class=\"sec-tt\">Conceptos imprescindibles<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li>\n<p><strong>Siglo de la humillación (百年国耻)<\/strong><br><b class=\"mlbl\">Definición:<\/b>  el periodo 1839–1949 de derrotas, cesiones e invasión, convertido en relato nacional.<br><b class=\"mlbl\">Importancia:<\/b>  núcleo emocional del nacionalismo chino actual.<br><b class=\"mlbl\">Error habitual:<\/b>  tomarlo por pura invención propagandística; es un trauma histórico real, aunque administrado.<\/p>\n<\/li>\n<li>\n<p><strong>Tratados desiguales<\/strong><br><b class=\"mlbl\">Definición:<\/b>  acuerdos impuestos tras derrotas militares que cedían territorio, soberanía y privilegios.<br><b class=\"mlbl\">Importancia:<\/b>  fuente del reflejo defensivo ante todo lo que \"huela\" a imposición externa.<br><b class=\"mlbl\">Error habitual:<\/b>  creer que China fue colonizada como la India; fue una semicolonización a plazos.<\/p>\n<\/li>\n<li>\n<p><strong>Extraterritorialidad / concesiones<\/strong><br><b class=\"mlbl\">Definición:<\/b>  enclaves y regímenes donde los extranjeros escapaban a la ley china.<br><b class=\"mlbl\">Importancia:<\/b>  símbolo máximo de la soberanía perdida.<br><b class=\"mlbl\">Error habitual:<\/b>  verlo como anécdota; fue una humillación cotidiana y estructural.<\/p>\n<\/li>\n<li>\n<p><strong>Rebelión Taiping<\/strong><br><b class=\"mlbl\">Definición:<\/b>  guerra civil-religiosa (1850–1864) que devastó el sur y debilitó a la Qing.<br><b class=\"mlbl\">Importancia:<\/b>  recuerda que el colapso también fue interno.<br><b class=\"mlbl\">Error habitual:<\/b>  atribuir toda la debacle a los extranjeros.<\/p>\n<\/li>\n<li>\n<p><strong>Educación patriótica<\/strong><br><b class=\"mlbl\">Definición:<\/b>  política sistemática (desde 1991) de enseñanza de la humillación y del papel redentor del Partido.<br><b class=\"mlbl\">Importancia:<\/b>  mecanismo por el que el trauma se transmite y se activa políticamente.<br><b class=\"mlbl\">Error habitual:<\/b>  confundir el sentimiento nacional espontáneo con su cultivo deliberado.<\/p>\n<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-E\" class=\"sec t-mito\"><div class=\"sec-h\"><span class=\"sec-badge\">E<\/span><span class=\"sec-tt\">Mito o simplificación<\/span><\/div><div class=\"sec-body\">\n<p><strong>Afirmación frecuente:<\/strong> \"China solo quiere dominar.\"<\/p>\n<ol>\n<li><strong>Qué parte puede ser cierta:<\/strong> China proyecta poder, reclama territorios y busca estatus de gran potencia; no todo es defensivo.<\/li>\n<li><strong>Qué omite:<\/strong> que buena parte de su conducta se explica por el miedo a <em>volver<\/em> a ser dominada. La defensa cerril de la soberanía es, en gran medida, un reflejo de trauma, no solo ambición.<\/li>\n<li><strong>Versión más precisa:<\/strong> \"China busca poder y estatus, en parte, para no volver a ser vulnerable. El miedo a la humillación es una clave explicativa —no una justificación automática de todo lo que hace.\"<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-F\" class=\"sec t-evidencias\"><div class=\"sec-h\"><span class=\"sec-badge\">F<\/span><span class=\"sec-tt\">Evidencias<\/span><\/div><div class=\"sec-body\">\n<ul>\n<li><strong>~1820:<\/strong> China ≈ un tercio del PIB mundial (estimaciones de Maddison). <em>(Estimación.)<\/em><\/li>\n<li><strong>1842:<\/strong> Tratado de Nanjing; cesión de la isla de Hong Kong; puertos de tratado; extraterritorialidad. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>1860:<\/strong> saqueo del Palacio de Verano (Segunda Guerra del Opio). <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>1850–1864:<\/strong> rebelión Taiping, ~20 millones de muertos o más. <em>(Rango estimado.)<\/em><\/li>\n<li><strong>1895:<\/strong> derrota ante Japón; cesión de Taiwán (Tratado de Shimonoseki). <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>1937–1938:<\/strong> Masacre de Nanjing. <em>(Hecho comprobado; la cifra exacta de víctimas está disputada.)<\/em><\/li>\n<li><strong>1991:<\/strong> inicio de la campaña de educación patriótica. <em>(Hecho comprobado.)<\/em><\/li>\n<li><strong>3 de septiembre de 2025:<\/strong> desfile del 80.º aniversario; &gt;12.000 soldados; asistencia de Putin y Kim. <em>(Hecho comprobado, verificado.)<\/em><\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-G\" class=\"sec t-caso\"><div class=\"sec-h\"><span class=\"sec-badge\">G<\/span><span class=\"sec-tt\">Caso actual<\/span><\/div><div class=\"sec-body\">\n<p><strong>Qué ha ocurrido.<\/strong> El <strong>3 de septiembre de 2025<\/strong>, China celebró el 80.º aniversario de la victoria sobre Japón con un desfile militar masivo: más de 12.000 soldados, armamento de última generación (misiles hipersónicos, sistemas no tripulados) y 26 líderes extranjeros, con Putin y Kim junto a Xi. Xi lo describió como \"la primera victoria completa de China contra una agresión extranjera en los tiempos modernos\". En paralelo, las relaciones con Japón entraron en <strong>crisis abierta en 2025–2026<\/strong>: tras las declaraciones de la primera ministra japonesa Sanae Takaichi (noviembre de 2025) de que un ataque chino a Taiwán podría ser una \"situación que amenace la supervivencia\" de Japón —fórmula legal que permitiría desplegar sus fuerzas—, China prohibió (6 de enero de 2026) la exportación a Japón de productos de doble uso con fines militares. <em>(Fechas verificadas.)<\/em><\/p>\n<p><strong>Qué conceptos de la lección lo explican.<\/strong> El \"siglo de la humillación\" y el lugar aparte de Japón; la memoria como herramienta política; el nacionalismo como base de legitimidad del Partido.<\/p>\n<p><strong>Qué interpretaciones son discutibles.<\/strong> ¿Es el desfile sobre todo (i) disuasión hacia EE. UU. y Japón, (ii) legitimación interna mediante el orgullo nacional, o (iii) conmemoración genuina? Y en el caso japonés: ¿reacción proporcionada a un cambio real en la postura de Tokio o amplificación deliberada del agravio histórico? Analistas serios discrepan.<\/p>\n<p><strong>Qué información falta.<\/strong> El peso relativo del público interno frente al externo; y hasta qué punto la crisis con Japón es coyuntural (una frase) o estructural (un realineamiento). Dato revelador de la ambivalencia: pese a la tensión política, la inversión japonesa en China creció un 55,5 % interanual en los tres primeros trimestres de 2025 (\"economía caliente, política fría\").<\/p>\n<hr>\n<\/div><\/section><section id=\"sec-H\" class=\"sec t-mapa\"><div class=\"sec-h\"><span class=\"sec-badge\">H<\/span><span class=\"sec-tt\">Mapa y cronología<\/span><\/div><div class=\"sec-body\">\n<p><strong>Mapa recomendado (a elaborar).<\/strong> Un mapa de China hacia 1900 que muestre: los puertos de tratado y las concesiones extranjeras (Shanghái, Tianjin…), Hong Kong británico, las esferas de influencia de las potencias, y los territorios perdidos (Taiwán bajo Japón desde 1895). Debe hacer visible que China no fue colonizada de una vez, sino troceada en privilegios y enclaves. <em>(No se incluye imagen para no ofrecer un recurso poco fiable.)<\/em><\/p>\n<p><strong>Cronología (10 hitos).<\/strong><\/p>\n<ul>\n<li><strong>1839–1842<\/strong> — Primera Guerra del Opio.<\/li>\n<li><strong>1842<\/strong> — Tratado de Nanjing; cesión de Hong Kong.<\/li>\n<li><strong>1850–1864<\/strong> — Rebelión Taiping.<\/li>\n<li><strong>1856–1860<\/strong> — Segunda Guerra del Opio; saqueo del Palacio de Verano.<\/li>\n<li><strong>1894–1895<\/strong> — Guerra Sino-Japonesa; cesión de Taiwán.<\/li>\n<li><strong>1899–1901<\/strong> — Rebelión de los Bóxers y Protocolo Bóxer.<\/li>\n<li><strong>1911–1912<\/strong> — Caída de la Qing; fin del imperio.<\/li>\n<li><strong>1931<\/strong> — Invasión japonesa de Manchuria.<\/li>\n<li><strong>1937–1945<\/strong> — Guerra total con Japón; Masacre de Nanjing (1937–38).<\/li>\n<li><strong>1949<\/strong> — Fundación de la RPC: \"China se ha puesto de pie\".<\/li>\n<\/ul>\n<hr>\n<\/div><\/section><section id=\"sec-I\" class=\"sec t-errores\"><div class=\"sec-h\"><span class=\"sec-badge\">I<\/span><span class=\"sec-tt\">Errores habituales<\/span><\/div><div class=\"sec-body\">\n<ol>\n<li><strong>Creer que la humillación es solo propaganda inventada.<\/strong> <em>Corrección:<\/em> es un trauma histórico real; lo administrado es su <em>uso<\/em> político, no su existencia.<\/li>\n<li><strong>Atribuir toda la humillación a los extranjeros.<\/strong> <em>Corrección:<\/em> hubo también colapso interno (Taiping, decadencia Qing, señores de la guerra).<\/li>\n<li><strong>Equiparar la herida con Japón a la de Europa con Alemania.<\/strong> <em>Corrección:<\/em> la reconciliación fue mucho menor y el agravio sigue vivo y políticamente activable.<\/li>\n<\/ol>\n<hr>\n<\/div><\/section><section id=\"sec-J\" class=\"sec t-pensar\"><div class=\"sec-h\"><span class=\"sec-badge\">J<\/span><span class=\"sec-tt\">Pregunta para pensar<\/span><\/div><div class=\"sec-body\">\n<p>Si la legitimidad del Partido se apoya en \"haber terminado la humillación y garantizar que no vuelva\", ¿qué incentivos crea eso para su política exterior? ¿Puede un régimen que se legitima por el agravio permitirse ceder o transigir en una disputa territorial sin parecer débil ante su propia población? <em>(Conecta con las Lecciones 7 —nacionalismo— y 11–12 —China frente al mundo—.)<\/em><\/p>\n<hr>\n<\/div><\/section><section id=\"sec-K\" class=\"sec t-check\"><div class=\"sec-h\"><span class=\"sec-badge\">K<\/span><span class=\"sec-tt\">Comprobación del aprendizaje<\/span><\/div><div class=\"sec-body\">\n<p><strong>Tres preguntas breves<\/strong><\/p>\n<ol>\n<li>¿Qué fue el Tratado de Nanjing y qué cedió?<\/li>\n<li>¿Qué papel tuvo la rebelión Taiping en el \"siglo de la humillación\"?<\/li>\n<li>¿Por qué 1895 es importante para entender el estatus de Taiwán?<\/li>\n<\/ol>\n<p><strong>Pregunta de explicación causal<\
