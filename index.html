es de queja e incluso concesión. Versión precisa: vigilancia real y extensa + censura selectiva orientada a impedir la acción colectiva, no a dictar cada gesto. (L7) \"Nueva Guerra Fría.\" Cierto: hay rivalidad ideológica, militar y bloques emergentes. Omite: la interdependencia económica profunda que no existía entre EE. UU. y la URSS. Versión precisa: rivalidad dentro de interdependencia; competidores estratégicos que siguen siendo socios esenciales. (L11) Parte D — Aplicación Análisis de la noticia de las tierras raras: - Quién decide: el Estado (Ministerio de Comercio), por prioridad del Partido. - Objetivo político: negociar con EE. UU. manteniendo palanca; señal de fuerza controlada. - Incentivo económico: las tierras raras son el punto de estrangulamiento chino frente a los chips estadounidenses. - Precedente: la lógica de reciprocidad y represalia de la guerra comercial iniciada en 2018. - Hecho vs. interpretación: hecho , la suspensión parcial y las nuevas listas; interpretación , si estabiliza la relación o solo hace una pausa táctica. - Explicación alternativa: ¿concesión genuina para rebajar tensión, o gesto calculado para conservar la baza de cara al vencimiento de la tregua? Probablemente lo segundo. - Lectura: rivalidad dentro de interdependencia; el comercio se enfría mientras la seguridad tecnológica sigue caliente. (L11) Ejemplo (escenario \"rebalanceo exitoso\"): tres indicadores que lo harían más probable: (a) el consumo sube de forma sostenida como % del PIB; (b) reformas efectivas del hukou y de la protección social (sanidad, pensiones) que reduzcan el ahorro precautorio; (c) sectores de \"nuevas fuerzas productivas\" (IA, chips) que escalen lo bastante para compensar la contracción del ladrillo. (Cualquier escenario es válid"}];</script>
<script>

const RK='china-read-v1', LK='china-last-v1', TK='china-course-theme-v2';
let read=new Set(); try{read=new Set(JSON.parse(localStorage.getItem(RK)||'[]'))}catch(e){}
const saveRead=()=>{try{localStorage.setItem(RK,JSON.stringify([...read]))}catch(e){}};
const esc=s=>s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function buildNav(){
  let html='',lastG=null;
  DOCS.forEach(d=>{
    if(d.group!==lastG){ html+=`<div class="grp" style="color:${d.color}">${d.group}</div>`; lastG=d.group; }
    const key=d.id==='24_Como_leer_una_noticia_sobre_China'?' key':'';
    const r=read.has(d.id);
    html+=`<a href="#/${d.id}" data-id="${d.id}" class="item${key}${r?' read':''}" style="--b:${d.color}"><span class="badge">${d.badge}</span><span class="tt">${d.title}</span><span class="rt">${r?'✓':d.readmin+'′'}</span></a>`;
  });
  nav.innerHTML=html;
  const cur=location.hash.replace('#/','');
  nav.querySelectorAll('a').forEach(a=>{ if(a.dataset.id===cur) a.classList.add('active'); });
  const n=read.size, t=DOCS.length, pct=Math.round(n/t*100);
  $('#sideProg').innerHTML=`<div class="side-prog"><div class="l"><span>Progreso del curso</span><b>${n} / ${t}</b></div><div class="bar"><i style="width:${pct}%"></i></div></div>`;
}

function homeHTML(){

  const blocks=lessonGroups.map((g,i)=>{
    const ls=DOCS.filter(d=>d.group===g);

  }).join('');
  const ref=(id,k,t,p)=>{const d=byId(id);return `<div class="ref" style="--rc:${d.color}" onclick="go('${id}')"><div class="rk">${k}</div><h4>${t}</h4><p>${p}</p></div>`;};
  let resume='';
  try{ const last=localStorage.getItem(LK); const d=last&&byId(last);
    if(d) resume=`<div class="resume" onclick="go('${d.id}')"><span class="rz"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 3l14 9-14 9V3z"/></svg></span><span><span class="rl">Continuar donde lo dejó</span><div class="rtt">${d.title}</div></span></div>`;
  }catch(e){}
  return `<section class="hero">
    <div class="hanzi" aria-hidden="true">实事求是</div>
    <div class="hero-seal" aria-hidden="true">中</div>
    <div class="eyebrow">Mini-curso · 12 lecciones · 4 bloques</div>
    <h1>Entender China en 2026</h1>
    <div class="sub">historia, poder, economía y futuro</div>
    <p class="lead">No para acumular datos, sino para construir un <strong>modelo mental</strong> que permita interpretar por cuenta propia las noticias, los debates y los conflictos sobre China. Una sola pregunta lo guía: <strong>¿cómo funciona realmente China y por qué actúa como actúa?</strong></p>
    <div class="chips">

    </div>

    </div>
    ${resume}
  </section>
  <section class="h-sec"><h2>Las doce lecciones <small>en orden de lectura</small></h2>
    <p class="hs-sub">Cada lección se lee en 15–25 minutos y funciona por sí sola, pero encadena con las demás.</p>
    <div class="blocks">${blocks}</div>
  </section>
  <section class="h-sec"><h2>Referencia <small>para consultar</small></h2>
    <div class="refgrid">
      ${ref('13_Glosario','Glosario','55 conceptos','La jerga imprescindible, explicada sin jerga.')}

    </div>
  </section>

  </div>

function render(id){
  let d = id==='__home__'?null:byId(id);
  if(id!=='__home__' && !d){ d=null; id='__home__'; }
  if(!d){ main.innerHTML=homeHTML(); }
  else{
    const i=DOCS.indexOf(d), prev=DOCS[i-1], next=DOCS[i+1];
    let pager='<div class="pager">';
    pager+= prev?`<a href="#/${prev.id}"><div class="dir">← Anterior</div><div class="t">${prev.title}</div></a>`
                :`<a href="#/__home__"><div class="dir">← Inicio</div><div class="t">Portada del curso</div></a>`;
    pager+= next?`<a class="next" href="#/${next.id}"><div class="dir">Siguiente →</div><div class="t">${next.title}</div></a>`:'';
    pager+='</div>';
    main.innerHTML=`<article class="content k-${d.kind}" style="--block:${d.color}"><div class="block-tag">${d.group}</div>${d.html}</article>${pager}`;
    read.add(d.id); saveRead();
    try{localStorage.setItem(LK,d.id)}catch(e){}
  }
  buildNav(); window.scrollTo(0,0); updateProgress(); closeNav(); closeSearch();
  document.title=(d?d.title+' · ':'')+'Entender China en 2026';
}
function go(id){ if(location.hash==='#/'+id) render(id); else location.hash='#/'+id; }
function jump(id){ const el=document.getElementById(id); if(el){ closeNav(); const y=el.getBoundingClientRect().top+window.scrollY-76; window.scrollTo({top:y,behavior:'smooth'}); } }
window.addEventListener('hashchange',()=>render(location.hash.replace('#/','')||'__home__'));

function setTheme(t){ document.documentElement.dataset.theme=t; try{localStorage.setItem(TK,t)}catch(e){} }
$('#themeBtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
try{ if(localStorage.getItem(TK)==='dark') setTheme('dark'); }catch(e){}

/* búsqueda con resultados */
const q=$('#q'), sr=$('#sr');
let selIdx=-1, results=[];
function snippet(text,term){
  const i=text.toLowerCase().indexOf(term);
  if(i<0) return esc(text.slice(0,110))+'…';
  const a=Math.max(0,i-55), b=Math.min(text.length,i+term.length+70);
  return (a>0?'…':'')+esc(text.slice(a,i))+'<mark>'+esc(text.slice(i,i+term.length))+'</mark>'+esc(text.slice(i+term.length,b))+(b<text.length?'…':'');
}
function doSearch(){
  const term=q.value.trim().toLowerCase(); selIdx=-1;
  if(term.length<2){ closeSearch(); return; }
  results=DOCS.filter(d=>d.title.toLowerCase().includes(term)||d.text.toLowerCase().includes(term)).slice(0,8);
  sr.innerHTML=results.length
    ? results.map((d,i)=>`<a href="#/${d.id}" data-i="${i}" style="--sc:${d.color}"><div class="st"><span>${d.group}</span>${esc(d.title)}</div><div class="sn">${snippet(d.text,term)}</div></a>`).join('')
    : '<div class="empty">Sin resultados para «'+esc(q.value.trim())+'»</div>';
  sr.classList.add('open');
}
function closeSearch(){ sr.classList.remove('open'); selIdx=-1; }
let deb; q.addEventListener('input',()=>{ clearTimeout(deb); deb=setTimeout(doSearch,120); });
q.addEventListener('keydown',e=>{
  const links=[...sr.querySelectorAll('a')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){ e.preventDefault(); if(!links.length) return;
    selIdx=(selIdx+(e.key==='ArrowDown'?1:-1)+links.length)%links.length;
    links.forEach((a,i)=>a.classList.toggle('sel',i===selIdx)); }
  else if(e.key==='Enter'){ const t=links[selIdx>=0?selIdx:0]; if(t){ go(t.getAttribute('href').slice(2)); q.blur(); } }
  else if(e.key==='Escape'){ closeSearch(); q.blur(); }
});
document.addEventListener('mousedown',e=>{ if(!e.target.closest('.search')) closeSearch(); });
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea')) return;
  if(e.key==='/'){ e.preventDefault(); q.focus(); q.select(); }
  const cur=location.hash.replace('#/','')||'__home__';
  if(cur!=='__home__' && (e.key==='ArrowLeft'||e.key==='ArrowRight')){
    const i=DOCS.indexOf(byId(cur)); if(i<0) return;
    const d=DOCS[i+(e.key==='ArrowRight'?1:-1)];
    if(d) go(d.id); else if(e.key==='ArrowLeft') go('__home__');
  }
});

$('#menuBtn').onclick=()=>document.body.classList.toggle('nav-open');
function closeNav(){ document.body.classList.remove('nav-open'); }
function updateProgress(){ const h=document.documentElement,max=h.scrollHeight-h.clientHeight,p=max>0?(h.scrollTop/max)*100:0;
  $('#progress').style.width=p+'%'; $('#backtop').classList.toggle('show',h.scrollTop>500); }
window.addEventListener('scroll',updateProgress,{passive:true});
render(location.hash.replace('#/','')||'__home__');
</script>
</body></html>
